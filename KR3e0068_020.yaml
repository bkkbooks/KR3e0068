body:
  text: 玉機微義卷二十明徐用誠原輯劉純續增積聚門諸經敘積之始黄帝針經百病始生第三云積者葢厥氣生足悗悗生脛寒脛寒則血脈凝濇凝濇則寒氣上入於腸胃入於腸胃則䐜脹䐜脹則腸外之汁沫迫聚不得散日以成積卒然多飲食則腸滿起居不節用力過度則絡脈傷陽絡傷則血外溢血外溢則衂血隂絡傷則血内溢血内溢則後血腸胃之絡傷則血溢於腸外有寒汁沫與血相搏則并合凝聚不得散而成積矣或外中於寒内傷於憂怒則氣上逆氣上逆則六輸不通温氣不行凝血藴褁不散津液凝濇滲著而不去而成積矣難經曰肝之積名曰肥氣見後方下云云以季夏戊己日得之何以言之肺病傳於肝肝當傳脾脾季夏適王王者不受邪肝復欲還肺肺不肯受故留結為積故知肥氣以季夏戊己日得之心之積名曰伏梁云云脾之積名曰痞氣云云肺之積名曰息賁云云腎之積名曰奔豚云云並見本文按滑氏本義曰越人之意葢以五行之道推其理勢之所有者演而成文耳初不必論其情感亦不必論其還不還與其必然否也讀者但以所勝𫝊不勝及王者不受邪遂留結為積觀之則不以辭害志而思過半矣謹按越人論五臟積傳受之本病也然針經又主絡脈傷及飲食七情所致而論之可謂詳悉然今較之積聚因飲食傷及七情而成者多且三因方於五積無主治引經况他書乎故具法不取今以東垣方附于後脈法脈經曰脈來細而附骨者積也寸口積在胸中微出寸口積在喉中闗上積在臍傍上闗上積在心下微下闗積在少腹尺積在氣街脈出在右積在右脈出在左積在左脈兩出積在中央各以其部處之脈來小沈而實者胃中有積聚不食食即吐肺積脈浮而毛按之辟易心積脈沈而芤上下無常處肝積脈弦而細腎積脈沈而急脈沈重而中散者因寒食成癥脈左轉而沈重者氣癥陽在胸中右轉出不至寸口者内有肉癥也論積聚癥瘕不同難經曰積者隂氣也聚者陽氣也故隂沈而伏陽浮而動氣之所積名曰積氣之所聚名曰聚故積者五臟所生聚者六腑所成也積者隂氣也其始發有常處其痛不離其部上下有所終始左右有所窮處聚者陽氣也其始發無根本上下無所留止其痛無常處謂之聚故以是别知積聚也原病式曰癥者腹中堅硬按之應手然水體柔順而今反堅硬如地者亢則害承乃制也瘕者中雖硬而忽聚忽散無其常故其病未及癥也經曰血不流而滯故血内凝而為瘕也小腸移熱於大腸乃為虙瘕大腸移熱於小腸謂兩熱相搏則血溢而為伏瘕血澁不利月事沈滯而不行故云為虙瘕為虙與伏同傳寫誤爾謹按積者實停蓄之總名癥者有所成而名之亦皆積爾瘕者血病也似不可言為聚聚者陽氣也然大小腸移熱為瘕如此則亦聚爾但前人施治亦未見有分其異同者唯丹溪先生曰積塊在中為痰飲在左為血積在右為食積氣不能作塊成聚塊乃有形之物痰與食積死血爾此深得病情之㫖學者可因此例而求諸論積聚分三因陳無擇云癥瘕屬肝部積聚屬肺部夫癥者堅也瘕者假也假物而成形然七癥八瘕之名經論亦不詳出雖有蛟蛇鼈肉髮蝨米等七證初非定名偶因食物相感而致患爾若婦人癥瘕則由内外不内外因動傷五臟氣血而成古人謂為痼疾以蛟蛇等為生瘕然亦不必泥此並屬血病蛇髪等事皆出偶然但飲食間誤中之留聚假血而成自有活性亦猶永徽中僧病噎者腹中有一物其狀如魚即生瘕也按此論積聚等屬臟部葢分氣血爾亦不必拘此然生瘕亦有外因而成者如昔之徐之才治取蛤精疾生於足間者若此陳扵三因何不之及論婦人腸覃石瘕之積水脹篇曰石瘕何如岐伯曰石瘕生於胞中寒氣客于子門子門閉塞氣不通惡血當瀉不瀉衃以留止日以益大狀如懷子月事不以時下皆生於女子可導而下寶鑒曰夫膀胱為津液之腑氣化則能出矣今寒客於子門則必氣塞不通血壅不流而衃以止之結硬如石是名石瘕也此氣先病而血後病故月事不來則可宣導而下出者也故難經云任之為病其内苦結男子為七疝女子為瘕聚此之謂也非大辛之藥不能已可服見睍丹腸覃何如岐伯曰寒氣客於腸外與胃相搏不得榮因有所繫瘕而内著惡氣乃起瘜肉乃生其始生者大如雞卵稍以益大至其成如懷子之狀久者離嵗按之則堅推之則移月事以時下此其候也夫腸者大腸也覃者延也大腸以傳道為事乃肺之腑肺主衞衞為氣氣得炅則泄寒則凝今寒客於大腸故衞氣不榮有所繫止而結瘕在内貼者其延久不已是名腸覃也氣散則清氣聚則濁結為瘕聚所以惡氣發起瘜肉乃生小漸益大至期而䜵其腹則如懷子狀也此氣病而血未病故月水不斷以時下本非姙娠可以此為辨矣按此謂石瘕為血壅不流故月事不來腸覃為清氣聚而濁結成瘕故血未病月水不斷而知此二積之異然亦有諸積所致或有病癰膿而似此二證者不可不察也論五積六聚治同欝斷子和曰且積之成也或因暴喜怒悲思恐之氣或傷五味之食或停温涼寒熱之飲或受六氣之邪其初甚微可呼吸按導而去之不幸遇庸醫强補而留之留而不去遂成五積夫肥氣者不獨氣有餘也其中亦有血矣葢肝藏血故也伏梁者火之欝也以熱藥散之則益甚以火炙之則彌聚况伏梁證有二名同而實異不可不詳焉其一上下左右皆有根在腸胃之外有大膿血此伏梁義同腸癰其二身體髀股胻背腫環臍而痛是即風根不可動動則為水溺濇之病此二者内經雖言不可動止謂不可大下非謂全不可下恐病去而有害痞氣者舉世皆言寒則痞内經以為濕則痞雖因飲冷而得其陽氣為濕所畜以熱攻之則不散以寒攻之則濕去而寒退矣息賁者喘息憤而上行也此舊説也余以謂賁者賁門也手太隂之筋結胸裏故貫合賁下抵季脇其痛支轉筋痛甚則成息賁手心主結於賁其病胸痛息賁又云肺下則居賁迫肝善脇下痛肝髙則上支賁門脇悦為息賁若是言之是積氣於賁而不散此靈樞説五臟處言此賁自是多故予發之賁豚者賁與奔同銅人言或因讀書得之未必皆然也腎主骨此積最深難寮大忌吐涌以其在下止宜下之故予嘗以獨聖散吐肥氣揃以木架必燠室中吐兼汗也肝之積便言風也吐出數升後必有血一二滴勿疑病當然也續以磨積之藥調之嘗治伏梁先以荼調散吐之兼汗以禹功導水奪之繼之以降火之藥調之又嘗治痞氣萬舉萬全先以𤓰蒂散吐其酸苦黄膠腥腐之物三二升次以導水禹功下二三十行末以五苓淡劑等藥調之又嘗治息賁用𤓰蒂散不計四時置燠室中更以火一爐以助其汗吐汗下三法齊行此病不可逗遛久則傷人又嘗治賁豚以導水通經三日一下之一月十下前後百行次用治血化氣磨積之藥調之此積雖不傷人亦與人偕老若六聚之物在腑屬陽而無形亦無定法倣此而行之何難之有按此論五積之異同可謂極備病情之要積為欎而用吐法更甚得古人之妙矣但每吐後繼之以禹功導水之劑則不可為例矧古人施吐必本積因而用藥如徐文伯以油為宫人吐髮瘕楮澄以蒜為李道念吐雞子積甄權以雄黄為人吐髮瘕成蛇者葢所因不同而用藥殊也大抵禹功五苓之劑十下百行等法用於濕熱盛實及體厚者則可設有隂虚氣痿積聚實而血氣弱者豈可例用乎論痰積飲積主於濕詳見痰飲門論治積大法許學士云大抵治積或以所惡者攻之或以所喜者誘之則易愈如碙砂水銀治肉積神麯麥蘖治酒積水蛭䖟蟲治血積木香檳榔治氣積牽牛甘遂治水積雄黄膩粉治涎積礞石巴豆治食積各從其類也若用羣隊之藥分其藥勢則難取効須要認得分明是何積聚兼見何證然後增減斟量使之不爾反有所損要在臨時通變也謹按諸積有不因氣動而成者如偶有所食或誤吞錢物之類是也因氣動而成者如七情所致或飲食勞倦或五臟傳受之類是也故所積之物不一氣血之聚有殊或成蠱瘤生瘕之類難測故須是認得分明是何積聚用藥宜各從其類然亦要㸔元氣虚實或攻取峻削或養正漸除可也不爾則豈但有損而已論養正積自除衞生寶鑑曰㓗古云養正積自除譬如滿座皆君子縱有一小人自無容地而出令其真氣實胃氣强積自消矣潔古之言豈欺我哉内經曰大積大聚衰其太半而止滿實中有積氣大毒之劑尚不可過况虚中有積者乎此乃治積之一端也邪正虚實宜詳審焉按或云積非下之不可今言養正而後積除將以待正氣而除乎將以待藥力而除乎然人之有積則皆為身中之邪氣若君子座中之有小人也惟其調正氣則真氣運行不失其常而積自除夫君子衆而正直在位其小人自然退避矣不然則正氣虚而真氣乖致積增膜膈胃亂真正氣絶而死矣亦若小人得志則政亂法壞而君子有所不能制焉且夫養正者非為飲食起居之間也葢積既成矣形漸悴矣必用調養使榮衞充實而積自除餘有堅而不去者方可亟下之此先補後攻期于邪去正復而後已然除之不以漸則必有顛覆之害矣若昔之武氏斵喪唐宗幾於改物尚賴狄張諸公匡扶之力漸除黨與興復丕祚惜乎中宗不鑒前轍之失而留三思至致韋氏之禍其猶積餘之尚在者而不亟下之更不慎守禁戒遂縱口嗜慾病證復起而不可制其有不喪身者未之有也積聚治法五臟積方東垣肥氣丸治肝之積在左脇下如覆杯有頭足久不愈令人發欬逆㾬瘧連嵗不已厚朴半兩黄連七錢柴胡二兩椒四錢巴豆霜五分川烏頭炮去皮一錢二分乾薑炮半錢人參二錢半白茯苓一錢半昆布二錢半甘草炙三錢廣术炮二錢半皂角去皮弦煨一錢半右件除茯苓皂角豆霜另末外為極細末和匀煉蜜為丸如桐子大初服二丸一日加一丸二日加二丸漸漸加至大便微溏再從二丸加服周而復始積減太半勿服伏梁丸治心之積起臍上大如臂上至心下久不愈令人煩心黄連一兩半厚朴製人參各半兩黄芩三錢乾姜菖蒲巴豆霜各五分桂一錢紅豆二分川烏頭五分炮茯神丹參炒各一錢右件除巴豆霜外為細末另研豆霜旋旋入末煉蜜為丸如桐子大服如上法淡黄連湯下痞氣丸治脾之積在胃脘覆大如盤久不愈令人四肢不收發黄疸飲食不為肌膚厚朴四錢半黄連八錢吳茱萸三錢黄芩二錢白茯苓澤瀉人參各一錢川烏頭炮川椒炒各半錢白术二分巴豆霜四分桂四分茵陳酒炒乾薑泡砂仁各一錢半右件除豆霜另研茯苓另末旋入外同為細末煉蜜為丸如桐子大淡甘草湯下服如上法息賁丸治肺之積在右脇下覆大如杯久不已令人洒淅寒熱喘欬發肺壅厚朴製八錢黄連炒一兩三錢乾薑泡白茯苓川椒炒紫苑各一錢半桂川烏頭炮桔梗白豆蔲陳皮京三稜天門冬各一錢巴豆霜四分人參二錢青皮五分右件除茯苓巴豆霜旋入外為末煉蜜丸如桐子大以淡薑湯送下服如上法已上四方秋冬加厚朴減黄連四分之一奔豚丸治腎之積發於小腹上至心下若豚狀或下或上無時久不已令人喘逆骨痿少氣及治男子内結七疝女人瘕聚滯下厚朴製七錢黄連五錢白茯苓澤瀉菖蒲各二錢川烏頭丁香半錢桂二分巴豆霜四分全蝎附子獨活各一錢𤣥胡索一錢半苦楝酒煮三錢右除巴豆霜茯苓另為末旋入外為細末煉蜜丸如桐子大淡鹽湯下服如上法按已上諸方宜隨證加減用之所謂益元氣洩隂火破滯氣削其堅也吐劑𤓰蒂散方見痰飲門按吐法意畧具前宜兼㸔各門吐例倒倉法丹溪曰人之七情厚味停痰瘀血互相糾纒日積月深欝結成聚甚者如桃核之穰諸般竒形之蟲成於中形於外發為癱瘓為勞瘵為蠱脹為癩疾為無名竒病宜行此法用黄牡牛肉擇肥者買一二十斤長流水煮糜爛融入湯中為液以布濾出柤滓取淨汁再入鍋文武火熬成琥珀色則成矣每飲一鍾少時又飲如此者積十數鍾寒月則重湯温而飲之病在上者欲其吐多病在下者欲其利多病在中者欲其吐利俱多全在活法而為緩急多寡也須晴明日早於一室明快不通風處以安病人視所出之物可盡病根則止吐利後或渇不得與湯水其小便必長取以飲病者名曰輪迴酒與一二椀非惟可以止渇抑且可滌濯餘垢睡一二日覺饑甚乃與粥淡食之待三日後始與少菜羮自養半月覺精神渙發形體輕健沈痾悉除其後須五年忌牛肉消導之劑御藥院方助氣丸治三焦痞閉胸膈滿悶氣不流通藴結成積痃癖氣塊並皆治之京三稜莪术各炮二斤青皮陳皮並去白白术各十五兩㯽榔枳殻木香各十兩右為末糊丸如梧子大每五十丸煎水下按此治諸氣積藥也然世俗治積之方多兼氣藥欲其氣化而積易散殊不知氣虚者何以抵受中夾熱者豈不助火反傷氣耶故用者宜分虚實寒熱選使况此方雜削氣之藥過半而云助氣恐未必然也三因散聚湯治久氣積聚狀如癥瘕隨氣上下發作有時心腹絞痛攻刺腰脇小腹䐜脹大小便不利半夏檳榔當歸各三分陳皮杏仁去皮央炒桂各二兩茯苓甘艸炙附子炮川芎枳殻炒厚朴製呉茱萸湯泡洗各一兩大黄大便利去之右㕮咀每服四錢水煎濟生大七氣湯治積聚狀如癥瘕隨氣上下發作有時心腹㽲痛上氣窒塞小腹脹滿桔梗肉桂藿香葉甘艸炙青皮各二分益智仁京三稜陳皮蓬术香附子炒各一兩半右㕮咀每服五錢水煎按此二方治聚之劑也然聚瘕用湯蕩滌之意亦要隨臟氣虚實寒熱而增損之可也東垣草豆蔲丸治酒積或傷寒冷物胃脘痛咽膈不通草豆蔲煨白术各一兩大麥蘖神麯各炒黄芩半夏各半兩枳實炒二兩炒鹽半錢陳皮青皮乾生薑各二錢右為極細末湯浸蒸餅丸如菉豆大每服百丸煎水下按此治酒積飲積藥也入氣血之分廣术潰堅湯治有積塊堅硬如石形如袢大令人坐卧不安中滿腹脹方見腹脹門寶鑒香殻丸破痰癖消癥塊及冷積木香丁香各五錢京三稜剉酒浸一宿青皮廣术剉酒浸一宿用去皮巴豆三十粒同炒巴豆黄色枳殻炒川楝子茴香炒各一兩右末醋糊丸如梧子大朱砂為衣每服二十丸薑鹽湯下按此治氣積寒積之劑下焦藥也丹溪阿魏丸治肉積連翹半兩糖毬子一兩黄連六錢半阿魏一兩醋煮作糊右為末用阿魏糊丸如梧子大每二三十丸白湯下保和丸治食積糖毬子三兩半夏茯苓各一兩神麯二兩陳皮連翹蘿蔔子各半兩右為末粥糊丸如梧子大每三四十丸白湯下按此二方食積藥也又此方治痰積飲積之劑丹溪曰脾虛者須以補脾藥下之切不可獨用虚虚之禍疾如反掌葢慎之也氣實新病宜於攻下諸方選用又不必拘此宣明三稜湯治癥瘕痃癖積聚不散堅滿痞膈食不下腹脹蓬术當歸各半兩京三稜二兩白术一兩檳榔木香各三分右為末每三錢沸湯調下按此治癥瘕之劑氣血藥也然瘕者雖硬而忽聚散即聚也屬陽氣也經云血不流而寒薄故血内凝而瘕葢又屬血爾固當兼治之此方亦可以推其變從虚實加減而輕重之可也謹按針經備隂絡傷汁血相搏并合成積或臟氣傳受及子和論七情為欝皆元氣自病不係傷諸飲食致者當先調理不可妄下故已上五臟方消導法宜選用氣虚弱甚者又宜消息此養正積自除之意若傷諸飲食致者元氣未病初非下之削之不可然治之不早元氣日減正氣日偷方用下削而能獲安者實僥倖焉至是者亦宜上法先補後攻可也醫反是之多致悞爾若積欎在身形氣飲食如常者則已下削堅之方或吐或下的在選用衰其太半宜漸除之否則失機後時而不救者多矣然有除之未盡元氣未復而使内縱口味恣七情病遂復起者亦不鮮矣嗚呼世道不古人之不謹致積又不能歸罪於已安心調理卒致殞沒不得以盡其天年者固不足惜然醫之不能精明其道悞人生命者豈無所報耶削堅之劑楊氏木香檳榔煎丸治脾積氣塊腹脇走痛口吐清水肉豆蔲五枚木香肉桂各一兩檳榔七枚乾漆半兩炒令烟盡硇砂半兩另研胡椒四十九粒右為末次入硇砂和匀煉蜜丸如梧子大每七丸橘皮湯下按此治肉積寒積藥也入氣血之分局方丁香脾積丸治諸般食積氣滯胸脹滿心腹刺痛丁香木香巴豆髙良薑醋煮各半兩莪术一兩三稜二兩青皮一兩皂角三大挺燒右入百草霜三匙同碾細為末糊丸如麻子大每十丸至二十丸按此治寒冷食積藥也鄧山房感應丸治食積化宿滯黑角沈香檀香丁香木香陳皮青皮黄連砂仁香附子半夏三稜蓬术煨各一兩為細末肥烏梅百錢重巴豆三百粒肥白者去衣膜心右用磁器一隻盛巴豆上以梅肉葢之却用米醋浸過與梅肉平於甑坐蒸至極熟以巴豆紅色為度却擂二件如泥用糯米飯和前藥勻搗千百下丸如蘿白子大每十丸湯下按此下氣積食積藥也宣明積氣丹治一切新久沈積氣塊面黄黑瘦癥瘕積聚口吐酸水檳榔二箇芫花京三稜黄連牛膝樟柳根各一兩肉豆蔲二箇硇砂二錢青皮陳皮石菖蒲各三錢大㦸大黄甘遂白牽牛乾薑青礞石乾漆各半兩蓬术一兩巴豆木香各二錢半右為末醋糊為丸如桐子大每服一丸臨卧燒棗湯下量病人虛實加減與服按此下飲積氣積肉積水積藥也本事碙砂丸治一切積聚痰飲心脇引痛硇砂三稜乾薑白芷巴豆去油各半兩大黄乾漆各一兩檳榔肉豆䓻各一箇木香青皮胡椒各一分右為末釅醋二升煮巴豆五七沸復下三稜大黄末同煎五七沸入硇砂煎成膏却入别藥和勻杵丸如菉豆大每五丸薑湯下按此下肉積氣積例藥因其中用白芷為散水行氣故更言治痰飲也破積導飲丸治積塊堅硬飲食不消心下痞悶木香檳榔陳皮青皮枳殻炒枳實炒廣术炮三稜炮半夏神麯炒麥蘖乾生薑茯苓澤瀉甘艸炙各半兩牽牛頭末六錢巴豆三十粒去皮心油右細末入巴豆霜令匀姜汁糊丸梧子大每三十丸温薑湯下按此治飲積酒積氣積藥也然世俗方類此者甚多大抵多合以熱劑不能以盡病情之變唯此方庶幾用者自宜取擇三因破飲丸方見痰飲門晞露丸治傷寒於内氣凝不流結於腸外久為癥瘕時作疼痛腰不得伸廣术三稜各酒浸一兩乾漆炒五錢茴香炒青皮雄黄穿山甲炮各三錢硇砂四錢研輕粉一錢川烏五錢炮麝香半錢巴豆三十粒去殻同三稜术炒黄色去巴豆不用右細末和勻薑汁糊丸梧子大每三二十丸温薑湯下空心服按此治腸覃寒積之劑也寶鑒見晛丹治婦人石瘕狀如懷子者附子四錢炮鬼箭羽紫石英各三錢澤瀉肉桂𤣥胡木香各二錢血竭一錢半水蛭一錢炒烟盡檳榔二錢半桃仁炒三十箇三稜五錢大黄二錢同三稜酒浸一宿焙右各研匀酒糊丸梧子大每三十丸食前用鹽湯或酒下按此治血積藥也温白丸治心腹絞痛久癥癖塊大如杯碗十種水病八種痞塞九種心痛紫苑呉茱萸菖蒲柴胡桔梗厚朴製皂角去皮子弦茯苓黄連桂川椒炒去目乾薑炮巴豆去心膜油人參各半兩川烏炮去皮臍二兩半右末入巴豆研令勻蜜丸梧子大每三丸生薑湯下按此治食積寒積藥也經驗方塌腫神應丸治諸腫蟲毒肚脹如鼓脾癖癥瘕氣塊上喘氣急欬嗽倚息不得睡服藥不效者三稜莪术青皮陳皮乾漆燒各一兩芫花七錢半大㦸三錢硇砂巴豆霜各一錢右前藥和一處用好米醋一大椀慢火上煮醋乾為度取出晒乾碾為末醋和作丸如梧子大每四五十丸生薑湯下五更服隨用椒目六兩蘿白子半斤炒香熟用手帕盛於患處熨如冷再炒熨至再三大小便行後才住熨以温稀粥補之按此治癥瘕之劑飲積氣積水積血積藥也聖散子治逺年積塊硇砂六兩川大黄八兩大麥蘖六兩乾漆燒過萹蓄茴香炒瞿麥檳榔各一兩如婦人乾血氣加穿山甲二兩炮右末每五錢温酒調下仰卧此藥只在心頭至明大便如爛魚小便赤為驗取出並無毒性小兒用一錢量大小與之按此氣血藥也謹按治積之方氣實者故宜峻削故古方多相類近世又多用推逐之劑如剪紅丸蠟丸去積亦是一法但不分氣血蟲物諸積之異人之虚實不同往往悞人故皆不録其或可吐者宜從子和之法氣虚羸弱者觀東垣諸方已啓其微用者當自求其意而為通變可也玉機微義卷二十
