body:
  text: 玉機微義卷十三明徐用誠原輯劉純續増燥門結燥附内經論燥為諸證諸澁枯涸乾勁皴揭皆属於燥按此河間論治已詳然當分大便閟結或消渴之類為裏證皮膚燥澁乾疥𤓰枯之類為表證而於陽結隂結氣盛血少痰欎風熱可得而悉燥本風熱論原病式云經曰風熱火同陽也寒燥濕同隂也又燥濕小異也然燥金雖屬秋隂而異于寒濕故反同其風熱也故火熱勝金衰而風生則風能勝濕熱能耗液而反寒陽實隂虛則風熱勝于水濕而為燥也凡人風病多因熱甚而風燥者為其兼化以熱為其主也然陽實隂虛而風熱太甚以勝水濕因而成燥肝主于筋而風氣自甚又燥熱加之液還聚扵胸膈則筋太燥也燥金主扵收歛勁切𦂳濇故為病筋脈勁强𦂳急而口噤也或病燥熱太甚而脾胃乾涸成消渴者或風熱燥甚怫欎在表而裏氣平者善伸數欠筋脈拘急或時惡寒或筋惕而搐脈浮數而弦也風熱燥并欎甚于裏故煩滿而或閟結也及風癎之發作者由熱甚而風燥為其兼化涎溢胸膈燥爍而瘈瘲昏冐僵仆也凡此諸證皆由熱甚而生風燥各有異者由風熱燥各微甚不等故也所謂中風或筋緩者因其風熱勝濕而為燥乃燥之甚也然筋緩不收而痿痺故諸膹欎病痿皆屬金肺乃燥之化也如秋深燥甚則草木痿落而不收病之象也是以手得血而能握足得血而能步夫燥之為病者血液衰少也而又氣血不能通暢故病然也論燥熱勝隂見消渴門論結燥病本不同東垣曰金匱真言論云北方黒色入通扵腎開竅扵二隂藏精扵腎又云腎主大便大便難取足少隂夫腎主五液津液潤則大便如常若飢飽勞逸損傷胃氣及食辛熱味厚之物而助火邪伏扵血中耗散真隂津液虧少故大便結燥然結燥之病不一有熱燥有風燥有陽結有隂結又有年老氣虛津液不足而結者治法云腎惡燥急食辛以潤之結者散之如少隂不得大便以辛潤之太隂不得大便以苦瀉之陽結者散之隂結者熱之仲景云小便利大便硬不可攻下以脾約丸潤之食傷太隂腹滿食不化腹響然不能大便者以苦藥瀉之大抵津液耗少而燥者以辛潤之有物而結者當下之若不究其源一槩用巴豆牽牛之類下之損其津液燥結愈甚有復下復結極則以至引導於下而不能通者遂成不救之證可不慎哉按此只是論結燥言裏證也河間所論則兼表裏而言之矣猶宜以燥熱勝隂相火論諸篇兼㸔燥證治法治風之劑機要大秦艽湯治血弱隂虛不能養筋筋燥而手足不能運動指爪乾燥屬風熱甚者方見中風門按此散風熱養血之劑太陽例藥也麻仁丸郁李仁麻子仁各一兩另研大黄二兩半以一半炒山藥防風枳殻炒各七錢半㯽榔半兩羌活木香各五錢半右為細末煉蜜丸梧子大每三二丸温水下按此手足陽明足太陽經藥表裏之劑氣分藥也東垣潤腸丸治脾胃中伏火大便秘澁或乾燥秘塞不通全不思食乃風結秘血結秘皆令秘塞也以潤燥和血疏風自然通矣麻子仁桃仁各一兩去皮尖另研羌活當歸尾大黄煨各半兩皂角仁秦芁各五錢右除另研外為細末五上火煉蜜丸如桐子大每三五十丸食前白湯下又有潤燥丸一方於本方加郁李仁防風是也按此足太隂手足陽明表裏藥也治熱之劑宣明當歸龍膽丸方見火門清涼飲子方見熱門和血潤下之劑東垣導滯通幽湯治大便難幽門不通上衝吸門不開噎塞不便燥閉氣不得下治在幽門以辛潤之當歸升麻桃仁各一錢另研生地黄熟地黄各半錢紅花炙甘草各三分右件作一服水煎調㯽榔細末半錢服加大黄名當歸潤燥湯元戎四物湯治臓結秘澁者當歸熟地黄川芎白芍藥大黄煨桃仁各等分右㕮咀水煎或為丸服亦得按此手足厥隂經藥也子和脾約丸麻仁一兩二錢半枳實炒厚朴芍藥各二兩大黄四兩蒸杏仁去皮尖炒一兩二錢右為末煉蜜丸梧子大每三二十丸温水下潤體丸郁李仁大黄桂心黒牽牛當歸黄柏各半兩輕粉少許右為末水丸如梧子大每三四十丸温水下按已上二方一氣分藥一血分藥也二方故所主不同然氣血不能宣通者非此莫能療而氣虛津液不足者慎之神功丸方見欬門按此手足太隂藥也氣分之劑滋隂之劑㧞萃六味地黄丸治下焦燥熱小便澁而數丹溪大補丸治隂虛燥熱方見火門玉機微義卷十三
