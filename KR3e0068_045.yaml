body:
  text: 玉機微義卷四十五明徐用誠原輯劉純續增黃疸門發黃附諸經叙黃疸脈證內經曰溺黃赤安卧者黃疸要略曰寸口脈浮而緩浮則為風緩則為痺痺非中風四肢苦煩脾色必黃瘀熱以行尺脈浮為傷腎跌陽脈緊為傷脾風寒相摶食榖即眩榖食不消胃中苦濁濁氣下流小便不通隂被其寒熱流膀胱身體盡黃名曰榖疸額上黑微汗出手足中熱薄暮即發膀胱急小便不利名曰女勞疸腹如水狀心中懊憹而熱不能食時欲吐名曰酒疸多不治脈經曰脈沈渴欲飲水小便不利者皆發黃凡黃候其寸口脈近掌無脈口鼻冷並不可治論五疸陳無擇云古方叙五種黃者其實一病立名異耳如黃汗者以胃為脾表屬陽明陽明蓄熱喜自汗汗出因入水中熱必鬱故汗黃也其後身體腫發熱不渴狀如風水汗出染衣色正黃如柏汗黃疸者由暴熱用冷水洗浴熱留胃中所致其候身面眼悉黃如金色小便如煮蘖汁榖疸者夫由肌發熱大食傷胃氣衝鬱所致其候食則腹滿眩暈榖氣不消云云見前酒疸由大醉當風入水所致唯酒變證最多熱毒流於清氣道中則眼黃鼻雍女勞疸由大熱交接竟入水水流濕入於脾因腎氣虛甚以所勝尅入致腎氣上行故有額黑身黃之證其間兼渴與腹脹者並難治發於隂必嘔發於陽則振寒面微熱雖本於胃氣鬱發土色上行然發於脾則為內疸發於腎則為黑疸若所論因外則風寒暑濕內則喜怒憂驚酒食房勞三因悉備世醫獨嚴於傷寒論中不亦濫矣按已上五疸與前要略所具不同宜兼考之陳氏治例未能以盡其變推其病體究治大抵已上五疸形證已具無所隱兼證者黃汗黃疸榖疸誠以元氣脾胃之氣為主而治之形氣榖氣稍實者則可得而復矣酒疸則元氣胃氣殊已傷甚形氣孤危榖氣與藥雜進能有斷厚味而守藥得復生者則幾希矣女勞疸則隂陽之氣虛竭甚者為難治陳云世醫獨嚴於傷寒而不及此此則亦非傷寒家法所可髣佛施也論傷寒陽證發黃保命集云凡發黃有六有畜血發黃邪熱傳於太陽之本小便先淋而黃其人暴狂內有血也為太陽發黃本病也濕熱發黃太隂併陽明之本為小便不利風濕熱發黃併少陽也寒濕發黃太隂併少陽也結胸發黃下之早附太陽也痞氣發黃附太隂也凡六者各隨脈證標本而治之大抵發黃從太隂陽明而論脾胃皆土也故見黃色當從其脾病色黃土氣化濕非濕毒何能發黃也論隂證發黃韓秖和云病人三五曰服下藥太過虛其脾胃亡其津液渴飲水漿脾土為隂濕加之與邪熱相㑹發黃此隂黃也當以溫藥治之如兩手脈沈細遲肢體逆冷皮膚有粟起或嘔吐舌上有胎遍身發黃煩躁欲於泥水中卧小便赤少皆隂候也故隂黃多以熱湯溫之或湯漬布搭其胸腹或以湯盛瓢中坐於臍下尉之其病愈者曾治趙顯宗病傷寒至六七日因服下藥太過致發黃其脈沈細遲無力皮膚涼發躁欲於泥中卧喘嘔小便赤澀先投茵陳橘皮湯喘嘔止次服小茵陳湯半劑脈微出不欲於泥中卧次日又服茵陳附子湯半劑四肢發熱小便二三升當日中大汗而愈似此治愈者不一一録凡傷寒病黃每遇太陽或太隂司天嵗若下之太過往往變成隂黃蓋辰戌太陽寒水司天水來犯土丑未太隂濕土司天土氣不足即脾胃虛弱亦水來侵犯多變此證也按已上論傷寒隂陽二證發黃殆無餘藴大抵本形氣虛實受證不同用藥有汗下溫之禁非若雜病之比也我丹溪先生謂發黃如􅝛麯相似濕熱有微甚及兼熱兼寒瘀血所因不同故治例不可不分論內傷發黃略例云內感傷寒勞役形體飲食失節中州變寒之病生黃非傷寒壞之而得只用建中理中大建中足矣不必用茵陳也按此言內傷不足故宜補益惟其有餘新病必須消導之久病從榖疸施治可也論發黃治例難知云色如熏黃乃濕病也一身盡痛色如橘子黃乃黃病也一身不痛乾黃燥也小便自利四肢不沈重渴而引飲者梔子蘗皮湯濕黃脾也小便不利四肢沈重似渴不欲飲者大茵陳湯若大便自利而黃者茵陳梔子黃連三物湯往來寒熱一身盡黃者小柴胡加梔子湯按一身盡痛而黃者濕勝在表也不痛者病在裏也乾燥者熱勝也故後證皆有表裏之分殊東垣云傷寒當汗不汗即生黃邪在表者宜急汗之在表之裏宜滲利之在半表裏宜和解之在裏者宜急下之若已上諸證及略例云男黃小便自利當與虛勞小建中湯若黃色不變欲自利腹滿而喘不可除熱除熱必噦小半夏湯皆不必拘於茵陳也黃疸治法升散之劑金匱桂枝加黃茋湯治黃汗身腫汗出出已輒輕輕久必身瞤胸中痛腰以下無汗腰臗㢮痛如有物在皮中劇者不能食煩躁小便不利桂枝芍藥各三錢甘草二錢黃茋五錢右水煎入薑棗服後仍飲熱粥助藥力麻黃連翹赤小豆湯治身熱不去瘀熱在裏發黃小便微利麻黃連翹各一兩赤小豆右㕮咀作一服水煎局方茵陳五苓散治傷寒或伏暑發黃小便不利煩渴本方五分加茵陳一分韓氏茵陳茯苓湯治發黃脈沈細數四肢冷小便澀煩躁而渴茯苓桂枝猪苓各一兩滑石一兩半茵陳一兩右為末每服半兩水煎服如脈未出加當歸按已上方並太陽例藥也攻下之劑金匱梔子大黃湯治酒疸心中懊憹或熱痛梔子十四枚大黃一兩枳實五枚䜴一升右水煎至二升分溫三服大黃硝石湯治黃疸腹滿小便不利而赤自汗此表和裏實大黃黃柏硝石各四兩梔子十五枚右水煎服如前法硝石􅈨石散治女勞疸身黃額黑曰晡發熱惡寒膀胱急小腹滿足下熱因作黑疸其腹滿如水狀大便必黑時溏此女勞之病非水也硝石􅈨石各燒等分右二味為散以大麥粥汁和服二錢曰三重衣覆取汗隨大小便去小便黃大便黑是其候也半夏湯治酒疸身黃無熱言了了腹滿欲嘔心煩足熱或癥瘕心中懊憹其脈沈弦或緊細半夏茯苓白术各三兩前胡枳殼炒甘草大㦸炒各二兩黃芩茵陳當歸各兩右㕮咀每服四錢水煎入薑三片空心服茵陳蒿湯治身熱鼻乾汗出陽上奔小便赤而不利濕熱發黃茵陳蒿六兩梔子十四箇大黃二兩右三味每服一兩半水煎服難知茵陳大黃湯治傷寒大熱發黃面目悉黃小便赤茵陳蒿梔子柴胡柏皮黃芩升麻大黃炒各一兩龍膽草半兩右為粗末每服五錢水煎服抵當湯治太陽傷寒頭痛身熱法當汗解反利小便熱瘀在內則身黃脈沈少腹硬小便自利其人如狂者下焦有血也宜此湯主之水蛭虻蟲各十箇大黃一兩桃仁十二箇右銼作一服水煎食前服按已上並陽明經藥也抵當湯厥隂藥輕者桃仁承氣湯主之和解之劑小柴胡加梔子湯按此手太隂足少陽藥也治熱和中之劑梔子柏皮湯治身熱不去大便利而煩熱身黃者梔子柏皮黃連各等分右㕮咀每服一兩水煎服寶鑑茯苓滲濕湯治黃疸寒熱嘔吐而渴欲飲冷身體面目黃小便不利不得安卧不思食白茯苓五分澤瀉三分茵陳六分猪苓二錢生黃芩黃連梔子防己白术蒼术陳皮青皮枳實各二分右㕮咀作一服水煎空心服酒疸兼作丸子服之按此並太陽例藥溫中之劑金匱小半夏湯治黃疸小便色不異欲利腹滿而喘半夏湯泡七次右㕮咀每服三五錢水煎入薑十片韓氏茵陳橘皮湯治身黃脈沈細數熱而手足寒喘嘔煩躁不渴者茵陳橘皮生薑各一兩白术一分半夏茯苓各半兩右為末水四升煮取二升放溫分作四服按此並足陽明太隂藥也小茵陳湯治發黃脈沈細遲四肢及遍身冷附子一箇八片甘草炙一兩茵陳二兩右為粗末用水二升煮一升溫作三服茵陳四逆湯治發黃脈沈細遲肢體逆冷腰已上自汗甘草炙一兩乾薑炮一兩半附子一箇作八片茵陳二兩右為粗末分作四貼水煎服茵陳附子湯治服四逆湯身冷汗不止者附子二箇各作八片乾薑炮二兩半茵陳一兩半右為粗末水煎分作三服按已上並少隂經藥也茵陳茱萸湯治服茵陳附子湯證未退及脈伏者吳茱萸一兩當歸三分附子二箇作八片木通一兩乾薑炮茵陳各一兩半右為粗末分作二服水煎按此足少隂厥隂藥也吐下之劑三因苦參散治濕熱內甚小便赤澀大便時祕食飲不妨服諸藥不除因為久黃苦參黃連瓜蒂黃柏大黃各一分葶藶半兩右為末每服一大錢飲調下當吐利隨時消息加減與之服按此出太陽陽明例藥也調理之劑當歸白术湯治酒疸發黃結飲癖在心胸間堅滿骨肉沈重逆害飲食小便赤黃此因內虛飲食生冷脾胃痰結所致其脈弦澀白术茯苓各三兩當歸黃芩茵陳各一兩前胡枳實炒甘草炙杏仁炒各二兩半夏一兩半右㕮咀每服四五錢入薑煎小建中湯養榮湯治五疸腳弱心忪口淡耳鳴微寒發熱氣急小便白濁當作虛勞治之方並見虛損門消食之劑三因紅丸子治穀疸發黃方見霍亂門用生薑甘草湯下寶鑑棗􅈨丸治食勞目黃身黃者皂􅈨不以多少沙鍋內木炭燒通紅赤用米醋內㸃之右為末棗肉丸桐子大每服二三十丸食後用生薑湯下取黃水法瓜蒂散瓜蒂二錢母丁香一錢黍米四十九箇赤小豆半錢右為極細末每夜於鼻內㗜之取下黃水內服凉劑三因如神散治酒毒不散發黃久久浸漬流入清氣道中宜此內鼻中取黃水苦瓠子去皮苦葫蘆子去皮三七箇黃黍米三百粒安息香二皂子大右為末以一字搐入鼻中滴出黃水一升忌勿吹吹或過多即以黍穰燒灰麝香末各少許吹鼻內立止玉機微義卷四十五
