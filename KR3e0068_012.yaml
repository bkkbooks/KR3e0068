body:
  text: 玉機微義卷十二明徐用誠原輯劉純續增濕門内經叙濕為諸證經曰諸濕腫滿皆屬脾土濕勝則濡瀉地之濕氣感則害人皮肉筋脈原病式曰諸痙强直積飲痞膈中滿霍亂吐下體重附腫肉如泥按之不起皆屬於濕脈法脈經曰脈沉而緩沉而細微緩者皆中濕脈浮風濕脈大或浮虛而濇者皆寒濕脈來滑疾身熱煩喘胸滿口燥發黄者濕熱脈洪而緩隂陽兩虛濕熱自甚脈洪而動濕熱為痛也論濕為痿為痺為痛為腫所挾寒熱不同内經曰因於濕首如裹濕熱不攘大筋腝短小筋弛長腝短為拘弛長為痿因於氣為腫四維相代陽氣乃竭按丹溪曰濕者土之濁氣首為諸陽之㑹其位髙其氣清其體虛故聰明係焉濁氣熏蒸清道不通沉重不利似乎有物䝉之失而不治濕欎為熱熱留不去大筋腝短者熱傷血不能養筋故為拘攣小筋弛長濕傷筋不能束骨故為痿弱因於濕首如裹各三字為句濕熱不攘以下各四字為句文整而意明第四章因於氣為腫下文不叙恐有脫簡然王註曰素常氣疾濕熱加之氣濕熱争故為腫也邪氣漸盛正氣漸㣲陽氣衰少致邪代正氣不宣通故四維發腫諸陽受氣於四肢也但今人見膝間闗節腫疼全以為風治者多悞矣風寒濕三氣雜至合而為痺也濕氣甚者為著痺也其多汗而濡者陽氣少隂氣盛也傷於寒濕肌膚盡痛名曰肌痺謹按濕證挾寒内甚則腹痛下利外甚則四肢沉重疼痛或肌肉濡潰痺而不仁也挾風多外甚而身重痛汗出挾熱内甚則瀉痢外甚則或痛或熱或腫發黄如此等證雖内傷外感不同況有錯雜之邪合至當論其先後多少分治可也寒濕之中人也皮膚不収肌肉堅𦂳榮血泣衛氣去故曰虛虛者聶辟氣不足按之則氣足以温之故怏然而不痛按東垣曰此清虛之地氣傷人也必從足始故地之濕氣感則害人皮肉筋脈夫百病之變皆生於風雨寒暑及飲食居處隂陽喜怒針經解云若身形不虚外邪不能傷也要畧曰太陽病闗節疼痛而煩脈沉而細者此名中濕亦曰濕痺其候小便不利大便反快但當利其小便一身盡痛發熱日晡所劇者此名風濕此病傷於汗出當風或乆傷冷所致也風濕脈浮身重汗出惡風風濕相搏身體疼煩不能轉側不嘔不渴脈虛浮而濇風濕相搏骨節疼煩掣痛不得屈伸近之則痛劇汗出短氣小便不利惡風不欲去衣或身微腫也按以上論風濕寒濕之異濕家之為病一身盡疼發熱身色如熏黄也濕家病身疼發熱面黄而喘頭痛鼻塞而煩其脈大自能飲食腹中和無病病在頭中寒濕故鼻塞内藥鼻中則愈按以上前一病本濕熱證例而論不言熱無治法當分出之濕家者唯東南方濕熱證多丹溪曰濕熱相火為病十居八九東垣有濕熱證例詳見熱門論中濕為脾虛所致陳無擇曰脾虛多中濕故曰濕流闗節中之多使人䐜脹四肢闗節疼痛而煩乆則浮腫喘滿昏不知人挾風則眩暈嘔噦兼寒則攣拳掣痛治之不得猛發汗及灼艾泄瀉惟利小便為佳也謹按脾虛中濕内因多中滿痞膈瀉痢外感多為痿痺胕腫疼痛等證葢脾主肌肉爾況有挾風寒暑熱不一詳前人以挾風與濕在表者宜解肌兼寒與在半表裏者宜温散宜滲泄唯濕熱在裏宜下裏虗者宜分消實脾土為上外感非脾虛宜汗之灸之要在適中病情也論濕生痰飲詳見痰飲門論濕為瀉痢欬瘧等證詳見泄瀉滯下等門論濕病似中風詳見中風門論濕為脚氣詳見脚氣門治濕大法賈真孫曰濕為土氣火熱能生濕土故夏熱則萬物濕潤秋涼則萬物乾燥濕病本不自生因熱而怫欎不能宣行水道故停滯而生濕也況脾土脆弱之人易為感冐豈必水不流而後為濕哉人只知風寒之威嚴不知暑濕之炎暄感人於㝠㝠之中也病式云諸痙强直積飲等證皆屬於濕或胕腫體寒而有水氣裏必小便赤少不通或渴是蓄熱入裏極深非病寒也大抵治法宜理脾清熱利小便為上故治濕不利小便非其治也宜桂苓甘露木香葶藶木通治之守真師曰葶藶木香散下神芎丸此藥下水濕消腫脹利小便理脾胃無出乎此也腹脹脚腫甚者舟車丸下之濕熱内深發黄茵陳湯下之或佐以防己黄茋一身盡腫痛或無汗是濕流闗節邪氣在表宜五苓散加官桂蒼术微汗之不可大汗若自汗出多熱燥津液内水不利切勿利之重損津液也宜防風白术甘草湯主之其濕證有二濕熱證多濕寒證少當以脈證明辨之如脈滑數小便赤澁引飲為濕熱證若小便自利清白大便瀉痢身疼自汗為寒濕證治之宜五苓散加生附蒼术木𤓰主之濕證治法解表之劑金匱防己黄茋湯治風濕脈浮身重汗出惡風或痛防己一兩甘草炙半兩白术七錢半黄茋一兩一錢右㕮咀每服一兩入薑棗煎喘者加麻黄胃氣不和加芍藥氣上衝加桂枝下有寒加細辛按濕勝身重陽微中風則汗出惡風故用黄茋炙草實表防己白术勝濕也足三隂例藥桂枝附子湯治風濕相搏身體疼煩不能自側不嘔不渴脈浮虛而濇者此湯主之桂枝八錢生薑六錢附子二錢甘草炙四錢右㕮咀入大棗作二次煎若小便自利者去桂加白术湯主之服後其人如冐狀勿怪甘草附子湯治風濕相搏骨節疼煩掣痛不得屈伸近之則痛劇汗出短氣小便不利惡風不欲去衣或身微腫痛者甘草炙四錢附子三錢白术四錢桂枝八錢右㕮咀水煎金匱减桂枝加生薑大棗名白术附子湯按此一方足太陽例藥解肌之劑也麻黄加术湯治濕勝身煩疼麻黄六錢桂枝四錢甘草炙二錢杏仁二十五箇白术八錢右㕮咀水煎取微汗金匱减桂术加薏苡仁名麻黄杏仁薏苡甘草湯治濕勝身疼日晡所劇者按此太陽發表例藥已上諸方治風寒濕之劑元戎加味五苓散治濕勝身痛小便不利體重發渴本方加羌活按此太陽解表滲利之劑治風濕寒濕藥也局方五積散治外感風寒冐寒濕身體重痛見本方按海藏云麻黄桂芍甘草即麻黄桂枝各半湯也蒼术甘草陳皮厚朴即平胃散也枳殻桔梗陳皮茯苓半夏即桔梗半夏等湯也又川芎當歸治血兼乾薑厚朴散氣此數藥相合為解表温中泄濕之劑去痰消痞調經之方雖為内寒外感表裏之分之所制實非仲景表裏麻黄桂枝薑附之的方也主於積冷嘔泄時疫項背拘急加葱白豆豉厥逆加吳茱萸寒熱欬逆加棗婦人難産加醋始知用之非一途也惟知活法者其擇之東垣羌活湯治濕熱自甚身重或眩暈麻木小便澁赤下焦痿弱無力行步不正方見熱門按此勝濕升陽之劑也出太陽茯苓澤瀉例温散之劑真武湯治寒少甚腹痛下痢四肢沉重附子湯方並見寒門按此少隂例藥也局方滲濕湯治寒濕所傷身重腰冷如坐水中小便或澁大便溏泄皆坐卧濕地或隂雨所襲之也蒼术白术甘草各一兩乾薑茯苓各二兩陳皮丁香各二錢半右㕮咀每四錢入棗煎按此足陽明太隂藥也温中勝濕之劑治熱散鬰之劑茵陳五苓散治濕熱勝發熱黄疸茵陳蒿十分五苓散五分右二物和勻水煎服宣明桂苓甘露飲治濕熱内甚煩渴瀉痢小便澁大便急痛霍亂吐下頭痛口乾方見暑門大橘皮湯治濕熱内甚心腹脹滿小便不利大便滑洩橘皮一兩半木香一錢滑石六兩㯽榔三錢茯苓一兩猪苓澤瀉白术桂枝各半兩甘草二錢右㕮咀每服六七錢入薑煎葶藶木香散治濕熱内外餘熱水腫腹脹小便赤澁大便洩葶藶茯苓猪苓白术各一兩木香半錢澤瀉木通甘草各半兩桂枝半兩滑石三兩右為末毎三錢白湯調下按以上諸方出太陽例藥也河間曰若小便不得通利而反轉泄者乃濕熱痞悶極深而攻之不開是能反為注泄此正氣已衰而多難救慎不可與此也然當滋其化源東垣清燥湯治表裏有濕熱痿厥癱瘓不能行走或足踝膝上皆腫痛口乾瀉痢方見痿門按隂陽兩虚濕熱甚者不可缺此當歸拈痛湯方見瘡瘍門按此治濕熱盛實之劑宣劑𤓰蒂散治中寒濕頭痛面黄鼻塞煩而脈大𤓰蒂一味為末右以些小於鼻内吹之其水自下按濕盛致痰液留膈上肩背重痛麻痺者宜此吐之出足太陽例藥也攻下之劑宣明三花神佑丸治一切水濕腫病大腹實脹喘滿方見痰飲門舟車丸大黄二兩甘遂大㦸芫花青皮陳皮牽牛頭末四兩木香半兩右為末水丸如桐子大每六七十丸白湯下隨證臨時加減濬川散大黄煨二兩郁李仁二兩芒硝半兩甘遂一兩製牽牛頭末四兩右為末湯調下半錢空心臨卧隨證加减服導水丸治濕熱内欎胸膈痞悶鼽衂口舌生瘡咽喉不利牙疳齒蝕口臭或遍身生濕瘡乾疥睡語咬牙驚惕怔忡大小便滯澁風熱酒毒藴熱等證大黄黄芩各二兩牽牛頭末滑石各四兩右為末水丸如梧子大每四五十丸煎水下隨證臨時加減按以上諸方出陽明例藥也又氣血之劑濕熱甚者非此不䏻除但中病者即止虚弱者慎之故守真亦云凡正氣已衰者不可與葶藶木香散况以上諸藥乎禹功散方見疝氣門除濕丹治諸濕客搏腰膝重痛足脛浮腫筋脈𦂳急津液凝澁便溺不利㯽榔甘遂葳靈仙赤芍澤瀉葶藶各二兩乳香沒藥各一兩牽牛半兩大㦸炒三兩陳皮四兩右為末糊丸桐子大每五十丸至七十丸温水下按此出太陽例藥諸濕欎滯於表裏重痛沉著非此不除東垣海金沙散治脾濕太過通身腫滿喘不得卧及腹脹如皷牽牛一兩半微炒甘遂半兩白术一兩海金沙三錢右為末每二錢煎倒流水調下得利止後服聖靈丹治脾肺有濕喘滿腫盛小便赤澁苦葶藶四兩炒茯苓寒食麵包煨木香㯽榔漢防己木通人參各二錢半右為末棗肉丸梧子大每三十丸桒白皮湯下續隨子丸治肺經有濕通身虛腫滿悶不快或欬或喘人參漢防己赤茯苓如工煨㯽榔木香各半兩葶藶四兩炒續隨子一兩海金沙半兩右為末棗肉丸梧子大每三十丸桒白皮湯下按此三方並太陽例藥當較其輕重選使可也升散滲利之劑機要白术芍藥湯白术湯茯苓湯東垣升陽除濕湯升陽除濕防風湯方並見泄瀉門導滯通經湯治脾濕有餘氣不宣通面目手足腫注悶而痛陳五苓内减猪苓桂加木香陳皮右㕮咀每服五錢水煎局方五苓散白术猪苓茯苓各兩半桂一兩澤瀉二兩半右為末每服三二錢熱湯調下按已上諸方並太陽例藥宜隨證選用平胃散蒼术八兩陳皮五兩甘草炒三兩厚朴五兩右為末每三錢薑棗煎或鹽湯㸃服對金飲子治脾胃受濕腹脹米榖不化飲食不進身體沉重肢節酸疼皮膚微腫平胃散一兩桒白皮炒一兩右為末每三二錢入薑煎服按此二方足太隂陽明手太隂藥也丹溪越鞠丸治濕欎蒼术撫芎白芷玉機微義卷十二
