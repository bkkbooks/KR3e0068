body:
  text: 玉機微義卷三十一明徐用誠原輯劉純續增腰痛門內經敘諸經腰痛經曰足太陽脈令人腰痛引項脊尻背如重狀少陽令人腰痛如以針刺其皮中循循然不可以俯仰不可以顧陽明令人腰痛不可以顧顧如有見者善悲足少隂令人腰痛痛引脊內廉厥隂之脈令人腰痛腰中如張弓弩絃太隂腰痛下如有橫木居其中甚則遺溲按本論備言諸經及奇經同隂解脈等為痛并刺法甚詳宜玩本文又曰太陽所至為腰痛巨陽虛則腰背頭項痛是動則項如拔挾脊痛腰似折髀不可以曲腰者腎之腑轉搖不能腎將敗矣脈經曰凡有所用力舉重若入房過度汗出如浴水則傷腎腎脹者腹滿引背央央然腰髀痛腎著之為病從腰以下冷腰重如帶五千錢按此云用力已下為內傷腎著是外因也脈法脈經曰尺脈沉腰背痛腰痛時時失精飲食減少其脈洪滑而遲此為可治劉三點曰腰痛之脈皆沉而弦沉弦而緊者為寒沉弦而浮者為風沉弦而濡細者為濕沉弦而實者為閃肭論腰痛為虛宜補東垣曰太陽氣虛則邪客之痛病生矣夫邪者是風熱寒濕燥皆能為病大抵寒濕多而風熱少然有房室勞傷腎虛腰痛者是陽氣虛弱不能運動故也陽之不足宜補陽如膏粱之人久服陽藥醉以入房損其真隂腎氣熱則腰脊痛而不能舉久則髓減骨枯骨枯發為骨痿隂之不足宜補隂論腰痛宜刺經云腰痛上寒不可顧取足太陽陽明腰痛上熱取足厥隂不可以俯仰取足少陽東垣云蓋足之三陽從頭走足足三隂從足入腹經所過處皆能為痛治之者當審其何經所過分野循其空穴而刺之審其寒熱而藥之假令足太陽令人腰痛引項脊尻背如重狀刺其郤中太陽二經出血餘皆倣此按本篇論刺法甚詳宜玩本文然太陽腰痛刺委中出血效速王注經中更言灸疑誤灸者宜腎俞腰俞穴論腰痛宜下子和云腰者腎之腑為大關節血氣不行則沉痛不能轉側世人多服補腎藥鮮有效者惟用牽牛甘遂等藥大瀉其濕其痛自可按此論治只是謂氣鬱氣挫經壅血瘀及濕熱甚者宜行此法至於氣血不足腎虛之類皆未宜輕舉宜以脈體别之丹溪有曰腰痛脈大者腎虛脈澀者瘀血有濕熱成痰者不可不辨論腰痛分三因陳無擇云六經腰痛皆外因大抵太陽少隂多中寒少陽厥隂多中風熱太隂陽明多燥濕以類推之失志傷腎鬱怒傷肝憂思傷脾皆致腰痛者以肝腎同系脾胃表裏脾滯胃閉最致腰痛其證虛羸不足面目黧黑逺行久立力不能盡失志所為也腹急脅脹目視􅉩􅉩所祈不得意淫於外宗筋弛縱及為白淫鬱怒所為也肌肉濡漬痺而不仁飲食不化腸胃脹滿閉墜腰脅憂思所為也此屬內因腎著腰痛腰冷如水身重不渴小便自利飲食如故腰以下冷重如帶五千錢因作勞汗出衣裏冷濕久久得之腎腰傴僂腫重引季脅痛因於墜墮惡血流滯及房勞疲力耗竭精氣致腰疼痛此屬不內外因補瀉施治按此所論病機甚詳惜乎方治所略今聊具其例一二于左學者自宜推格腰痛治法治風之劑小續命湯治因風腰痛方見中風門三因方加桃仁炒三因獨活寄生湯治腎虛卧冷濕當風所得獨活三兩桑寄生杜仲炒細辛牛膝秦艽茯苓白芍桂心川芎防風甘草炙人參熟地黃當歸各等分右㕮咀每四錢水煎空心服按此足少隂厥隂藥也牛膝酒治傷風毒腰痛牛膝川芎羌活地骨皮五加皮薏苡仁各一兩生地黃甘草各十兩海桐皮二兩杜仲一兩右㕮咀帛裹入無灰酒浸各二七日夏三五日每服一杯日三五次按此足太陽少隂藥也治寒濕之劑濟生术附湯治濕傷腎經腰重冷痛小便自利附子白术各一兩杜仲炒半兩右㕮咀每四錢入薑煎三因腎著湯治腎虛為病身重腰冷如水洗狀不渴小便自利食如故腰以下冷痛如帶五千錢茯苓白术各四兩乾薑甘草炙各二兩右㕮咀每四錢水煎空心冷服本方薑苓各四兩按此二方足少隂藥也治風寒濕之劑局方五積散治感寒濕脾胃氣閉腰痛方見濕門三因方加桃仁東垣川芎肉桂湯治冬月露卧感寒濕腰痛用此代針羌活一錢半柴胡肉桂桃仁當歸尾蒼术甘草炙川芎各一錢獨活麯炒各半錢漢防己酒製防風各三分右㕮咀作一服好酒三盞煎至一盞食前暖處溫服麻黃蒼术湯治寒濕所客身體沉重腰痛面色痿黃麻黃澤瀉白茯苓炒麯陳皮各一錢蒼术二錢杏仁十箇桂枝草豆蔻半夏豬苓各半錢黃茋三分甘草炙二錢右㕮咀作一服水煎食前溫服按此足太陽少隂藥也治濕熱之劑東垣獨活湯治因勞役濕熱自甚腰痛如折沉重如山羌活防風獨活桂大黃煨澤瀉各三錢甘草炙二錢當歸連翹各半兩防己黃柏各酒製一兩桃仁三十箇右㕮咀每半兩酒水各半盞煎空心熱服按此足太陽少隂表裏藥也蒼术湯治濕熱腰腿疼痛蒼术三錢柴胡二錢黃柏防風各一錢右作一服水煎空心溫服健步丸治下虛濕熱腰腿疼痛方見痿門謹按腰痛亦有內因寒熱致者詳見婦人門師尼寡婦之治論中宜隨證為治故其例不復具也攻下之劑三因熟大黃湯治墜墮閃肭腰痛不能屈伸大黃炒生薑各半兩右㕮咀水浸一宿五更去滓頓服之按此陽明例藥也子和益腎散甘遂右為末每三錢獖豬腰子細批開以鹽椒等物淹透爛切摻藥在內荷葉裹燒熟酒送嚼下按此足少隂例藥也理氣之劑局方小七香丸治鬱怒憂思或因閃挫攧撲一切氣滯腰痛丁皮香附甘草各一兩二錢蓬术砂仁各二錢甘松八錢益智仁六錢右為末水浸蒸餅丸菉豆大每三二十丸米飲下易簡枳殼湯治腰背氣動發痛枳殼五兩甘草右為末蔥白湯調下一二錢服訖即卧少時按已上並太隂例藥也理血之劑元戎加味四物湯治瘀血腰痛本方加桃仁紅花按此厥隂例藥也東垣地龍散治打撲傷損從高墜下惡血在太陽經中令人腰脊或脛腨臂痛股中痛不可忍鼻壅塞不通中桂四分桃仁六箇羌活二錢獨活黃柏各一錢麻黃半錢當歸一分地龍四分甘草一錢蘇木六分右㕮咀每五錢水煎服按此出太陽例藥也通關節之劑濟生菴䕡九治墜墮閃肭血氣疑滯腰痛菴䕡子半兩沒藥乳香各二錢半補骨脂炒葳靈仙杜仲炒桂當歸各半兩右為末酒糊丸如桐子大每七十丸空心溫酒鹽湯任下東垣趂痛丸治打撲閃損腰痛不可忍白萵苣子炒黃白粟米炒乳香沒藥各一錢烏梅一箇右為末蒸餅為丸如彈子大每服一丸細嚼用溫酒空心下按此出厥隂例藥也補劑局方青娥丸治腎虛腰痛或風寒乘之血氣相搏為痛杜仲薑炒一斤破故紙炒八兩胡桃二十箇右為末蒜四兩為膏和丸如梧子大每三十丸空心溫酒送下一法酒糊丸不用蒜黃茋建中湯治男女諸虛不足身重短氣腰背強痛方見補虛門三因安腎丸治腎虛腰痛破故紙炒胡蘆巴炒茴香炒川楝子炒續斷炒各三兩桃仁炒杏仁炒山藥茯苓各二兩右為末蜜丸梧子大每五十丸空心鹽湯下百一選方補髓丹治老人虛弱腎傷腰痛不可屈伸杜仲炒破故紙各十兩用芝麻五兩同研以芝麻黑色無聲為度篩去芝麻不用鹿茸一兩燎去毛酒浸炙沒藥一兩另研右為末和勻用胡桃三十箇浸去皮杵為膏入麵少許煮糊丸如梧子大每百丸溫酒鹽湯任下摩腰膏治傷寒濕腰痛附尖烏頭尖南星各二錢半砂薑一錢雄黃樟腦丁香各一錢半麝香五粒右末煉蜜為膏薑汁化如彈大放掌中火上烘熱摩之按此法是代灸之意灸者宜腎俞二冗腰俞一冗見資生經玉機微義卷三十一
