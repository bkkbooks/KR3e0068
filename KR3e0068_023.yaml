body:
  text: 玉機微義卷二十三明徐用誠原輯劉純續增脚氣門辨南方脚氣所得之由孫真人云凡四時之中皆不得久坐久立濕冷之地亦不得因酒醉汗出脱衣跣足當風取凉皆成脚氣若暑月久坐久立濕冷之地者則濕熱之氣蒸人經絡病發必熱而四肢痠疼煩悶若寒月久坐久立濕冷之地者則濕冷之氣上入經絡病發則四肢皆酷冷轉筋世有勤工力學之士久坐久立于濕地冷風來入經絡不覺成病也若欲使之不成病者初覺則灸所覺處二三十壯則愈不復發熱黄帝云當風取凉醉以入房能成此疾也東垣云千金外臺總録所録皆謂南方卑濕霧露所聚之地其民腠理疎陽氣不能外固因而履之則清濕襲虚病起于下此由血氣衰弱受清濕之邪氣與血併行於膚腠邪氣盛正氣少故血氣澁澁則痺虚則弱故令痺弱也後人名曰脚氣針經云有道以來有道以去治之多以炙焫為佳以導引濕氣外出及飲醪醴以通經散邪所制之方寒藥少熱藥多用麻黄川烏姜附之屬内經云濕淫于内以苦發之麻黄苦温發之者也川烏辛熱走而不能守通行經絡薑附辛甘大熱助陽退隂亦散清濕之邪又察足之三隂三陽是何經絡所起以引用藥為主治復審六氣中何氣客之治以佐使之藥孫真人云醫者意也隨時增損物無定方真知言哉辨北方脚氣所得之由發明曰異法方宜論云北方者其地髙陵居風寒氷冽其俗飲潼酪而肉食凡飲潼酪者以飲多速飲為能經云因而大飲則氣逆又云食入於隂長氣於陽今乃反行隂道是為逆也夫乳酪醇酒者濕熱之物飲之屬也加以奉養太過亦滋其濕水性潤下氣不能呴故下疰於足脛積久而成腫滿疼痛此飲食下流之所致也通評虚實論云穀入多而氣少濕居下也况潼酪醇酒之濕熱甚於穀者也至真要大論云太隂之勝火氣内菀流散于外足脛胕腫飲發於中胕腫于下此之謂也故飲入於胃遊溢精氣上輸于脾脾氣散精上歸于肺通調水道下輸膀胱水精四布五經並行合於四時五臟隂陽揆度以為常也若飲食自倍脾胃乃傷則胃氣不能施行脾氣不能四布故下流乗其肝腎濕流於足脛加之房事不節陽盡隂盛遂成脚氣孫真人云古人少有此疾自永嘉南渡衣冠之人多有之亦此意也按此言北方脚氣為脾之濕氣下乗加之房事不節而致當作内因處治可謂發病機之秘然南方是證亦莫不為下虚邪氣乗之故也以陳無擇所論外感當分風濕寒熱内臟虚實所因為治迥出千金之文何此理又不復具焉葢北方此證殊少耳學者審是則又知南方脚氣有全非外因者焉於紫蘇子等湯例可見論脚氣脉證嚴氏曰古無脚氣之説内經名厥兩漢間名緩風宋齊之後謂之脚氣名雖不同其實一也初得不覺因他病乃始發或奄然大悶經三兩日方覺之先從脚起或緩弱疼痺或行起忽倒或兩脛腫滿或足膝枯細或心中忪悸或小腹不仁或舉體轉筋或見食吐逆惡聞食氣或胸滿氣急或遍體痠疼此其候之不同也其脈浮而弦者起於風濡而弱者起於濕洪而數者起於熱遲而濇者起於寒夫脚氣皆由腎虚而生然婦人亦病脚氣者必因血海虚乗七情遂成斯疾兼今婦人病此者衆則知婦人以血海虚而得之與男子腎虚類矣男女用藥固無異但兼以治憂恚藥無不效也須量人盛衰微加滋補不然則氣血日衰必使年年遇蒸熱而作理之必然陳無擇曰脚氣不専主一氣亦不専在一經故與中風寒暑濕為異耳兼有所雜生諸病未易分别須尋三隂三陽病所在後察脈虚實為治自汗走疰為風勝無汗藥急掣痛為寒勝腫滿重着為濕勝煩渇熱積為暑勝四氣兼中者但推其多者為勝分其表裏以施治也脈浮為風緊為寒緩細為濕洪數為熱見於諸陽在外宜發散沈而弦者亦為風沈而緊者為寒沈細為濕沈數為熱見諸隂在内宜温利之若大虚氣之間作補湯隨病冷熱而用之千金方論但備諸證不説隂陽經絡所受從何為治按已上所言脈證但備四氣而已至於腫焮發瘡泡為濕熱熱毒之勝腫而重者有濕痰勝或腫或消兼氣不升降諸例皆所未詳陳云六經證見後各方下論脚氣主於水濕發明曰夫脚氣之疾實水濕之所為也葢濕之害人皮肉筋脈而屬于下然亦有二焉一則自外而感一則自内而致其治法自應不同故詳析而論之其為病也有證而無名脚氣之稱自晉蘇敬始而闗中河朔無有也惟南方地下水寒其清濕之氣中於人必自足始故經曰清濕襲虚則病起於下或者難曰今兹北方其地則風土髙寒其人則腠理緻密而復多此疾者豈是地之濕氣感之而為邪答曰南方之疾自外而感者也北方之疾自内而致者也二論見前其自外而入者止於下脛腫而痛自内而致者乃或至于手節也經曰足脛腫曰水太隂所至為胕腫此但言其自外者也所治之法前人方論備矣自内而致者治法則未有也謹按前論南北二方脚氣之由已頗詳盡而發明更具此者大抵言是證主於水濕而成故重宣此義合前二論之㫖也自内致者古無其法然觀東垣所出數方則意例兼備之矣論江東嶺南瘴毒為脚氣發明曰内經論南方者其地下水土弱霧露之所聚也江東嶺南大率如此春夏之交山川蒸菀風濕毒氣為甚足或感之遂成瘴毒脚氣其候則脚先屈弱漸至痺疼脛微腫小腹不仁頭痛煩心痰壅逆脯作寒熱便溲不通甚者攻心而勢迫治之誠不可緩支法存所以留意經方偏善此術者豈非江東嶺表此疾得之多歟謹按南方温熱多隂雨土濕之氣因熱蒸菀人膚腠故疎豁體虚者多感此疾及有逺行足熱乃過溪澗為水寒所傷而致者至其傳變為證不一况瘴毒乎然近江東證多主於水濕亦有夾風夾寒者其發時則或腫或痛濕熱勝者成水泡瘡或成赤腫丹毒或如疝氣攻上引下皆宜詳悉分治論脚氣似傷寒詳見熱門病本不同例下論南方脚氣病禁外臺秘要云第一忌嗔嗔則心煩煩則脚氣發又禁大語大語則傷肺肺傷亦發動又不得露足當風入水以冷水洗足兩脚脛尤不宜冷雖暑月常須著綿袴至冬寒倍令兩脛温煖微汗大佳依此將息氣漸薄損每至寅丑日割手足甲割少侵肉去氣夏時腠理開不宜當風卧睡睡覺令人按挼勿令邪氣稽留數勞動闗節常令通暢此並養生之要拒風邪之法也尋常有力每食後行三五百步疲倦便止脚中惡氣隨即下散雖浮腫氣不能上也發明云第一凡酒及潼酪勿使過度過則損傷脾胃下疰於足脛胕腫遂成脚氣第二慾不可縱嗜欲則脚氣發凡飲食之後宜緩行如上法經云逸者行之又云病在脾忌温食飽食濕地濡衣論脚氣疎下楊太受云脚氣之疾自古皆尚疎下為疾壅故也然不可太過太過則損傷脾胃使營運之氣不能上行反下注為脚氣也又不可不及不及則使氣壅不得消散今立三方于後詳虚實而用之按三方醫學發明謂導滯湯導引丸除濕丹例是也然亦大畧言爾如脚氣在表在氣血之分而疎下之法可例用乎論脚氣洗渫活人書云凡脚氣服補藥及用湯渫洗者皆醫之大禁也發明謂此為南方外感濕氣乗虚襲入為腫痛而言非為北方内受濕氣注下腫痛而言也葢濕氣不能外達宜淋渫開導泄越其邪也論脚氣宜砭刺楊太受云脚氣是為壅疾治當以宣通之劑使氣不能成壅也壅既成而盛者砭惡血而去其重勢經曰畜則腫熱砭射之也後以藥治之脚氣治法發表之劑三因麻黄左經湯治風寒暑濕流注足太陽經腰足攣痺闗節重痛增寒發熱無汗惡寒或自汗惡風頭疼麻黄乾葛細辛白术茯苓防己桂羌活甘草防風右㕮咀每半兩入薑棗煎服按此出太陽例治風寒濕之藥也半夏左經湯治足少陽經為風寒暑濕流注發熱腰脇疼痛頭目眩暈嘔吐不食熱悶煩心腿痺緩縱不隨半夏乾葛細辛白术麥門冬茯苓桂枝防風乾薑黄芩小草甘草炙柴胡右㕮咀每半兩入薑棗煎熱悶加竹瀝喘急加杏仁桑白皮按此出少陽例解風寒濕熱錯雜之邪藥也六物附子湯治四氣流注於足太隂經骨節煩疼四肢拘急自汗短氣小便不利手足或時浮腫附子桂防己各四錢白术茯苓各三錢甘草炙二錢右㕮咀每半兩入薑煎按此出少隂例治寒濕之藥也局方換腿丸治足三隂經為風寒暑濕之氣所乗發為攣痺緩縱上攻胸脇肩背下注脚膝疼痛足心發熱行步艱辛薏苡仁南星石楠葉石斛檳榔萆薢川牛膝酒浸羌活防風木𤓰各四兩黄茋當歸天麻續斷各一兩右為末酒糊丸如梧子大每五十丸鹽湯下按此出厥隂例疎風勝濕藥也五積散方見濕門按此出太陽例治風寒濕之劑氣血藥也東垣當歸拈痛湯治濕熱為病肢節煩疼肩背沈重胸膈不利兼遍身疼痛下注手足足脛腫痛不可忍者方見瘡瘍門按此出太陽例治濕熱之藥也攻裏之劑宣明導水丸治脚氣胕腫疼痛或發熱濕熱盛者按此出陽明例治濕熱之藥也除濕丹方並見濕門按此出太陽例治濕透機闗藥也謹按脚氣多係濕熱為病世人用已上方每效故收入然下之法詳見前疎下論但下後便要収拾如滲之清之升之之法是已學者宜擴充焉發表攻裏之劑三因大黄左經湯治四氣流注足陽明經使腰脚赤腫痛不可行大小便秘或惡聞食氣喘滿自汗細辛茯苓羌活大黄煨甘草炙前胡枳殻厚朴製黄芩杏仁等分右㕮咀每半兩入薑棗煎按此出陽明例治濕熱疎風導氣藥也加味敗毒散治足三陽經受熱毒氣流注脚踝上焮赤腫痛寒熱如瘧自汗惡風或無汗惡寒羌活獨活前胡柴胡枳殻桔梗甘草人參茯苓川芎大黄蒼术等分右㕮咀每半兩入薑煎按此出少陽例治風濕熱氣血藥也東垣羌活導滯湯治脚氣初發一身盡痛或肢節腫痛便溺阻隔先以此藥導之後用當歸拈痛湯羌活獨活各半兩防己當歸各三錢大黄酒濕煨一兩枳實炒二錢右㕮咀每五錢或七錢水煎服按此出陽明例治風熱之藥也理氣之劑濟生檳榔湯治一切脚痛順氣防壅檳榔香附子陳皮紫蘇葉木𤓰五加皮甘草炙各一兩右㕮咀每四錢或半兩入薑煎大腹皮散治諸脚氣腫痛小便不利檳榔荆芥穗烏藥陳皮紫蘇葉各一兩蘿蔔子炒半兩沈香桑白皮枳殻炒各一兩半大腹皮三兩木𤓰二兩半紫蘇子炒右㕮咀每半兩入薑煎澹寮方治脚氣入腹衝心疼痛腫滿大小便秘沈香木香羌活白芍檳榔各五錢甘草撫芎青皮枳殻各二錢紫蘇葉木𤓰各一錢半蘇子六錢右㕮咀每半兩入薑煎按已上三方因於氣滯氣壅者可用故收入然不可防壅而服大抵因氣者宜取擇焉理血之劑金匱八味丸治足少隂經脚氣入腹腹脹疼痛上氣喘急腎經虛寒所致也此證最急以腎乗心水尅火死不旋踵方見補虛門按此治隂虛挾寒濕之藥也三因神應養真丹治足厥隂經為四氣進襲左癱右瘓痰涎半身不遂手足頑麻語言蹇澁脚膝榮氣凝滯遍身疼痛四物内加羌活天麻右為末蜜丸雞子大每丸木𤓰絲子浸酒下按此治血虚挾風濕之劑也加味四斤丸治足痿無力脚膝疼酸方見痿按此治血虚挾風熱之劑也理氣血之劑三因紫蘇子湯治脚弱上氣隂陽交錯清濁不分上重下虚中滿喘急嘔吐自汗無復紀律紫蘇子微炒半夏各五兩前胡厚朴製甘草炙當歸各二兩桂心陳皮各三兩右㕮咀每四錢入棗薑煎服按此出少陽例血虚氣逆者可用通闗透肌骨之劑三因勝駿丸治元氣不足為寒濕之氣所襲腰足攣拳脚靣連指走痛無定筋脈不伸行步不隨常服益真氣壯筋骨附子一箇炮當歸酒浸一宿天麻牛膝酒浸木香酸棗仁炒熟地黄防風各二兩木𤓰四兩羌活乳香半兩麝香二錢全蝎炒沒藥甘草炙各一兩右為末用生地黄三斤研如泥入無灰酒四升煮爛如膏以前藥和勻杵令堅每兩作十丸每丸細嚼臨睡酒下如冬月無地黄煉蜜為丸如梧子大每五十丸服按此治血虚而風寒濕勝藥也氣血之劑疎風養血之劑獨活寄生湯治肝腎虚弱風濕内攻兩脛緩縱攣痛痺弱足膝攣重方見腰疼門消導之劑東垣開結導引丸治飲食不消心下痞悶白术陳皮澤瀉茯苓神麯炒麥蘖麯半夏各一兩青皮乾生薑各半兩枳實炒巴豆霜各一錢半右為末湯浸蒸餅丸梧子大每四五十丸或七十丸温水下按此治内傷飲食脾胃營運之氣有虧不能上升下注為脚氣故用此導飲行水化脾氣也出太陽例然亦有致腫於身腰已上及面者意見水腫論平治法下雜洗洗藥導氣除濕湯葳靈仙防風荆芥地骨皮當歸升麻白芍朔藋葉右等分剉水二斗煮一斗五升去柤熱淋洗無時候敷藥白芷蒼术羌活各半兩細辛二錢半右為末生薑汁調敷患處玉機微義卷二十三
