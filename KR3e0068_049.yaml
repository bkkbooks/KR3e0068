body:
  text: 玉機㣲義卷四十九明徐用誠原輯劉純續增婦人門論經閉不行内經隂陽别論云二陽之病發心脾有不得隱曲女子不月其傳為風消為息賁者死不治東垣曰婦人脾胃久虚或形羸氣血俱衰而致經水斷絶不行或病中消胃熱善食漸瘦津液不生夫經者血脉津液所化津液既絶為熱所爍肌肉消瘦時見渇躁血海枯竭病名曰血枯經絶宜瀉胃之燥熱補益氣血經自行矣此證或經適行而有子子不安為胎病者有矣或心包脉洪數燥作時見大便秘澁小便雖清不利而經水閉絶不行此乃血海乾枯宜調血脈除包絡中火邪而經自行矣内經所謂小腸移熱於大腸為痣瘕為沉月澁不利則月事沈滯而不利故云為痣瘕為沈也或因勞心心火上行月事不来安心補血㵼火經自行矣故内經云月事不来者胞脈閉也胞脈者属心而絡於胞中令氣上迫肺心氣不得下故月事不来也曾治驗裴澤之夫人病寒熱而月事不至者數年矣已加喘𠻳醫者率以蛤蚧桂附等投之曰不然夫人病隂為陽所搏温劑太過故無益而反害投以涼血和血之藥則經行矣已而果然要略曰婦人之病因虚積冷結氣為證經水斷絶至有歴年血寒積結胞門寒傷經絡凝堅在上嘔吐涎唾久成肺癰形體損分在中盤結繞臍寒疝或兩脇疼痛與臟相連或結熱中痛在闗元脈數無瘡經候不匀冷隂掣痛少腹惡寒或引腰脊下根氣街云云謹按良方言婦人月水不通由勞傷血氣致令體虚受風寒邪氣客於胞内損衝任之脈并手太陽少隂二經致胞絡内血絶不通如已上病機皆略之不議且血病經閉又豈止手太陽少隂二經耶然亦有不因寒熱或痰飲積聚疝瘕所致如七情所動其為氣病血從一也况隂道常虚不足者實多宜翫血證門血属隂難成易虧論及後丹溪先生等說論經水不調或紫或黑丹溪曰經水者隂血也隂必從陽故其色紅禀火色也血為氣之配氣熱則熱氣寒則寒氣升則升氣降則降氣凝則凝氣滯則滯氣清則清氣濁則濁上應於月其行有常名之曰經為氣之配因氣而行成塊者氣之凝也将行而痛者氣之滯也来後作痛者氣血俱虚也色淡者亦虚也而有水混之也錯經妄行者氣之亂也紫者氣之熱也黑者熱之甚也今人但見其紫者黑者作痛者成塊者率指為風冷乗之而行温熱之劑禍不旋踵矣良由病源論月水之病皆曰風冷乗之宜其相習而成俗也或曰黑者北方水之色也紫者黑之漸也非冷而何予曰經云亢則害承乃制熱甚者必兼水化所以熱則紫甚則黑也况婦人性執而鄙嗜欲加倍臟腑厥陽之火無日不起非熱而何若曰風冷必須外得設或有之吾恐千百而一二也按此論經病甚詳大抵不得率指為風冷所乗者此由良方所言世俗徃徃因之悞人故戒慎之也然冷證外邪初感入經必痛或不痛者久則鬱而變熱矣且寒則凝既行而紫黑故非寒也論經漏不止内經隂陽别論云隂虚陽搏謂之崩東垣曰婦人脾胃虚損致命門脈沈細而數疾或沈弦而洪大有力寸闗脈亦然皆由脾胃有虧下䧟於腎與相火相合濕熱下廹經漏不止其色紫黑如夏月腐肉之臭中有白𢃄者脉必弦細寒作於中中有赤𢃄者其脈洪數疾熱明矣必腰痛或臍下痛臨經欲行先見寒熱徃來兩脇急縮兼脾胃證出見或四肢困熱心煩不得眠卧心下急宜大補脾胃而升舉血氣可一服而愈或人故貴脫勢人事䟱少或先富後貧心氣不足其火大熾旺於血脈之中乂致脾胃飲食失節火乗其中形質肌肉容顔似不病者此心病者不行於診故脾胃飲食不調其證顯矣而經水不時而下或適來適斷暴下不止治當先說惡死之言勸諭令拒死而心不動以大補氣血之藥舉養脾胃微加鎮墜心火之藥治其心補隂㵼陽經自止矣痿論云悲哀太甚則胞絡絶則陽氣内動發則心下崩數溲血也故本病曰大經空虚發則肌痺傳為脈痿此之謂也良方論曰婦人崩中由臟腑傷損衝任血氣俱虚故也衝任為經脈之海血氣之行外循經絡内榮臟腑若無傷損則隂陽和平而氣血調適若勞動過多致臟腑俱傷而衝任之氣虚不能約制其經血故忽然暴下或由隂陽相搏為熱所乗攻傷衝任血得熱則流散甚者至於昏悶其脈數疾小為順大甚者逆按此備言經脈致病之因本於臟腑傷損合前東垣所論極言因熱因虚或悲哀七情等所致病機殆無餘藴矣脈法脈經曰尺脈滑血氣實婦人經脈不利少隂脈弱而微微則少血少隂脈滑而數者隂中則生瘡寸口脈浮而弱浮則為虚弱則無血脈來至狀如琴弦若少腹痛主月水不利孔竅生瘡肝弦沈主月水不利腰腹痛尺脈來而斷絶者月水不利寸闗調如故而尺脈絶不至者月水不利當患小腹引腰痛氣滯上攻胸臆也經不通繞臍寒疝痛其脉沈緊此由寒氣客於血室血凝不行結積血為氣所衝新血與故血相搏故痛漏血下赤白脈遲者脈小虚滑者生急疾者大緊實數者死暴崩下血寸口脈微遲尺脈微弦微遲為寒在上焦但吐爾今尺脈微弦如此即小腹痛引腰脊痛者必下血也寸口弦而大弦則為减大則為芤减則為寒芤則為虚寒虚相搏脈則為革婦人則半産漏下尺脈急而弦大風邪入少隂之經女子漏自下赤漏下赤白日下血數斗脈急疾者死遲者生尺寸脈虚者漏血漏血脈浮不可治也論赤白帶下機要云赤者熱入小腸白者熱入大腸其本實熱冤結於脈不散故為赤白帶下也寃屈也結也屈滯而病熱不散先以十棗湯下之後服苦練丸大𤣥胡散調下之熱去濕除病自除也按此止是論有餘之證也論見下良方論云帶下起於風氣寒熱之所傷或産後早起不避風邪風邪之氣入於胞門或中經脈流轉臟腑而發下血名為帶下若傷足厥隂肝之經其色青如泥傷手少隂心之經其色赤如紅津傷手太隂肺之經其色白形如涕傷足太隂脾之經則其色黄如爛𤓰傷足少隂腎之經則色黑如衃血此其因也按此言風氣寒熱之所傷諸臟致證似言外邪大抵此證多有本於隂虚陽竭榮氣不升經脈凝泣衛氣下陷精氣累滯於下焦竒經之分藴積而成其病或醉飽房勞服食燥劑所致也白物如涕之狀故言帶者亦病形也經云帶脈為病而得名而白者属氣赤属血東垣舉脈訣云崩中日久為白帶漏下多時骨木枯言崩中者始病血崩久則血少復亡其陽故白滑之物下流不止此可見未得全拘於帶脈矣詳病亦有濕痰流注於下焦或腎肝隂滛之濕勝或因驚恐而木乗土位濁液下流或思慕為筋痿内經所謂二陽之證發心脾是也或餘經濕熱屈滯於少腹小腹之下而病本殊則皆為氣血虚損榮衛之精氣累滯而成其病標一也前人立論殆盡病機則治法無定若戴人以帶下得兩手脈俱滑大而有力乃上用宣去痰飲下以導水丸泄濕熱繼以淡劑滲之此為瀉實也如其諸脈微細或沈緊而澁按之空虚或洪大而澁按之無力正為元氣不足隂虚筋痿虚極中寒等證東垣有補陽調經固真等例乃兼責虚也丹溪先生治因濕痰下注用海石南星椿根皮之類較之前人下之而復吐以提其氣或發中兼補補中兼利燥中兼升發潤中益氣温而兼收澁之例不同盖病機有輕重淺深之異爾論師尼寡婦異乎妻妾之治寳鑑曰宋禇澄療師尼寡婦别製方盖有為也此二種寡居獨隂無陽慾心萌而多不遂是以隂陽交爭乍寒乍熱全類温瘧久則為勞史記倉公傳載濟北王侍人韓女病腰背痛寒熱衆醫多以為寒熱倉公曰病得之欲男子不可得也何以知診得其脈肝脈弦出寸口是以知之盖男子以精為主婦人以血為主男子精盛以思室女人血盛以懐胎也如厥隂脈弦出寸口又上魚際則隂盛可知故知禇氏之言有謂矣論胎産諸證病機機要云治胎産之病從厥隂經論之無犯胃氣及上二焦為之三禁不可汗不可下不可利小便發汗者同傷寒下早之證利大便則脈數而已動於脾利小便則内亡津液胃中枯燥製藥之法能不犯三禁則榮衛自和而寒熱止矣如發渇而白虎氣弱則黄茋血刺痛而用當歸腹中痛而加之芍藥大抵産病天行從增損柴胡雜證從增損四物宜詳察脈證而用之謹按已上云胎産禁例大抵主於元氣本病為要至於病體所因不同學者又必當處於權變也且胎前之證良方悉具但毎證治例殊少如胎漏胎痛子煩子腫等證出方皆是治本病之例設所因不同或有所兼之證如胎漏下血亦有氣虚血熱腹痛亦有濕熱者或形志苦樂不一七情所動氣動血病胎氣即損雖治例未能以盡其變然欲學者臨證自推充而行之爾今於諸證未能一一悉具聊以證治數例附于後云胎自墮論丹溪曰陽施隂化胎孕乃成血氣虚乏不足榮養其胎則墮譬如枝枯則果落藤痿則花墜又有勞恐傷情内火便動亦能墮胎譬如風撼其木人折其枝也火能消物造化自然病源乃謂風冷傷於子臟而墮此未得病情者也予見賈氏婦但有孕至三箇月左右必墮診其脈左手大而無力重則濇知其血虚也以其壯年只補中氣使血自榮時正初夏教以濃煎白术湯下黄芩末一錢與數十貼得保全而生因而思之墮於内熱而虚者於理為多曰熱曰虚盖孕至三月上属相火所以易墮不然何以黄芩熟艾阿膠等為安胎妙藥耶難産論丹溪曰世之難産者往往見於鬱悶安佚之人富貴奉養之家若貧賤者鮮有之古方止有瘦胎飲一論而其方為湖陽公主作也恐非至到之言盖用之者其難自若予族妺苦於難産遇胎則觸而去之予甚憫焉視其形肥而勤於女工知其氣虚久坐氣不運而愈弱兒在胞胎因母氣虚不能自運耳當補其母之氣則兒健易産令其有孕至五六月來告遂於大全良方紫蘇飲加補氣藥與之數十貼因得男甚快因以此方隨母之性禀與時令加减服者無不應用臨蓐時腹不覺痛産母亦無病因名方曰達生散云論局方胎産用藥之誤丹溪曰或問婦人一門無非經候胎産用藥温熱於理頗通吾子其妄言乎予曰婦人以血為主血属隂易於虧欠非善於調攝者不能保全也餘方是否若神仙聚寳丹則有不能㤀言者其方治血海虚寒虚熱盗汗理宜補養琥珀之燥麝香之散可以用乎面色痿黄肢體浮腫理宜導濕乳香没藥自可治血可以用乎胎前産後虚實不同逐敗養新攻補雜病積塊堅癥赤白崩漏宜於彼者必妨於此而欲以一方通治乎世人以其品貴名雅又喜其常服可以安神去邪令人有子殊不知積温成熱香竄散氣服者無不被禍自非五臟能言醫者終不知覺及至變生他證悖理肉汁發隂經之火易成内傷之病先哲具有訓戒或以羊雞濃汁作糜而又常服當歸丸當歸建中湯四聖理中丸雖是滋補悉犯桂附乾薑僣熱之劑臟腑無寒何處消受若夫兒之初生母腹頓寛便啖雞子且喫火鹽不思雞子難化火鹽發熱展轉為病醫者不識委指他病率爾用藥寧不誤人予每見産婦之無疾者必教以却去黑神散與夫雞子火鹽諸般肉食且與白粥將理間以些小石首鮝魚令甘淡食之至半月以後與少肉雖雞子亦湏豁開煮之大能養胃却痰彼當富貴之家驕恣之婦率有白帶頭風氣痛膈滿痰逆口乾經事不調髪脫體熱皆是陽勝隂虚之病天生血氣本自和平日勝日虚又焉知此等謬妄有以啓之耶論婦人服熱劑求子之誤丹溪曰無子之因多起於父氣之不足豈可獨歸罪於母血之虚寒况母之血病奚止虚與寒而已哉然古方治婦人無子惟秦桂丸一方其性熱其辭確今之欲得子者率皆服之無疑夫求子於隂血何至輕用熱劑耶或曰春氣温和則物生冬氣寒凛則物消不假熱劑何由子臟得煖而成胎予曰詩言婦人和平則樂有子和則血氣不爭平則隂陽不乖今得此丸經血必轉紫黑漸成衰少或先或後始則飲食驟進久則口苦舌乾隂陽不平血氣不和焉能成胎縱使有成子亦多病以其能損真隂也鄭憲史子生七箇月得淋云云見淋閟門謹按婦人無子多因經血不調或隂虚血少積聚痰氣嗜慾等致種種不同奚止虚與寒而已然經寒者亦有之但不可例為常法爾是以先生論此戒後人不得病機之的者斯藥勿妄行也况無子之因亦豈止於婦室者如東垣云李和叔問中年以來得一子至一嵗之後身生紅絲瘤不救後三四子至一二嵗皆病瘤而死何縁至此疾翌曰思之謂曰汝乃腎中伏火精氣中多有紅絲以氣相傳生子故有此疾俗名胎瘤是也汝試視之果如其言遂以滋腎丸數服以㵼腎中火邪補真隂不足忌酒辛熱之物其妻與六味地黄丸以養隂血受胎五月之後以黄芩白术二味作散啖五七服後生子至三嵗前證不復作今已年壯噫合觀先生已上所論則其㫖深矣婦人治法調經之劑局方四物湯治衝任虚損月水不調臍腹㽲痛當歸川芎白芍藥熟地黄各等分右㕮咀每半兩水煎服按此手足太隂厥隂藥也逍遙散治血虚煩熱月水不調臍腹脹痛痰𠻳潮熱甘草炙半兩當歸茯苓白芍白术柴胡各一兩右㕮咀每半兩入薑薄荷葉煎服按此足三陽三隂藥也散血中濕熱之劑膠艾湯治勞傷血氣衝任虚損月水過多淋漓不斷阿膠炒川芎甘艸炙各二兩當歸艾葉炒各三兩熟地黄白芍各四兩右㕮咀毎半兩水煎按此温經補血之藥也厥隂例良方温經湯治婦人血海虚寒月水不利當歸川芎芍藥桂心牡丹皮莪术各半兩人參甘草牛膝各一兩右㕮咀毎五錢水煎服薑黄散治血臟久冷月水不調臍腹刺痛當歸牡丹皮延胡各二兩芍藥三兩川芎紅花桂心莪术各一兩川薑黄四兩右為末毎一錢水煎服酒同煎按此二方通經之劑破血之藥非止於温經也臟冷氣血滯者可用姑存之加减四物湯經候微少漸漸不通手足煩疼漸瘦生潮熱脈微數本方去地黄川芎加澤蘭葉三倍甘草半分經候過多本方去熟地黄加生地黄經行身熱脈數頭昏本方加柴胡黄芩各半兩經行微少或脹或疼四肢疼痛加延胡没藥白芷與本方等淡醋湯調下末子經候不調心腹㽲痛只用芎歸二味名君臣散鹿茸丸治衝任虛損又為風寒所乗尺脈微小甚者可灸闗元穴鹿茸炙赤石脂禹餘粮各一兩續斷二兩栢葉附子炮熟地黄當歸酒浸艾葉右為末酒糊丸梧子大每五十丸空心温酒下按此足少隂厥隂藥也今人多用之故收入治血虛濕勝帶下甚㨗元戎加味四物湯氣充經脈故月事頻併臍下多痛本方加芍藥經欲行臍腹絞痛本方加𤣥胡㯽榔苦楝木香經水過多本方加黄芩白术經水澁少本方加葵花紅花經水適來適斷或有往來寒熱宜先服小柴胡去寒熱後以物湯和之丹溪加味四物湯經候過而作疼血氣俱虚也宜本方對四君子湯服之經候將來作痛者血實也本方加桃仁黄連香附經水不及期血熱也本方加黄連過期血少也本方加參术帶痰加半夏陳皮過期紫黑有塊者血熱也必作痛本方加香附黄連過期而淡色者痰多也芎歸二味合二陳湯服紫色成塊者熱也本方加黄連柴胡肥人不及日數而多痰者多血虚有熱本方加香附南星半夏黄連白术瘦人血枯經閉者本方加桃仁紅花或越鞠丸方見血門簡易當歸散治經候不匀或三四月不行或一月再至或婦人天癸過期經脈不調當歸川芎白芍黄芩白术各半兩山茱萸肉一兩半右為末每二錢空心温酒調下日三次按此足厥隂少隂藥也寳鑑生地黄丸治婦人血實厥隂脈弦而長病惡風體倦乍寒乍熱面赤心忪或時自汗如傷寒狀宜服抑隂藥生地黄柴胡秦芁黄芩各半兩芍藥一兩右末蜜丸梧子大毎三十丸烏梅湯吞下日三次按此手足少隂太隂足太陽藥也謹按已上諸方皆調理法也然血分成水氣腸覃等證詳見各門兹不備錄大抵經病實者破之結者散之虚者補之要在適事為故也理氣之劑澹寮煮附丸治經候不調血氣刺痛腹脇膨脹頭暈惡心崩漏帶下並宜服之香附子擦其皮不以多少米醋浸一日用瓦銚煮冷醋盡右醋糊為丸梧子大曰乾每五十丸淡醋湯下一方香附一斤艾葉四兩當歸二兩製同名艾附丸嚴氏抑氣散治婦人氣盛於血變生諸證頭暈膈滿香附四兩茯神甘草炙各一兩陳皮二兩右為末每二錢食前沸湯調下按此方主於氣煮附丸則氣中之血藥也然氣鬱甚者宜於氣證門選用不必拘此東垣益胃升陽湯治婦人經候不調或血脫後脈弱食少水泄日三二行黄茋二錢人參甘草炙當歸身陳皮各一錢白术三錢升麻柴胡各半錢炒麯一錢半黄芩半錢秋去之右㕮咀每半兩水煎腹痛加芍藥補中益氣湯治婦人室女經候不調脈微食少體倦或熱方見熱門按此二方氣血之藥血脫益氣之大法也紺珠正氣天香湯治婦人一切氣氣上凑心心胷攻築脇肋刺痛月水不調台烏藥二錢香附子八錢陳皮蘇葉各一錢乾薑半錢右㕮咀每七八錢水煎服謹按婦人經病多有因於七情六鬱致者故集已上例以備其義大抵氣行不失其常則經血亦行也通經之劑良方通經丸治婦人室女經候不通臍腹疼痛或成血瘕川椒炒蓬术乾漆炒當歸一錢半青皮乾薑大黄桃仁炒川烏桂心各一錢右為末將一半用米醋熬成膏和餘藥成劑臼中杵之丸如梧子大隂乾每三五十丸醋湯下嚴氏方無川烏有紅花加味四物湯嚴氏名六合湯治婦室經事不行腹中結塊疼痛腰痛本方加桂蓬术各等分右㕮咀每四錢水煎服紅花當歸散治婦人血臟虚竭或積瘀血經候不行時作腹痛腰胯重疼小腹堅硬及室女經不通紅花當歸尾紫葳牛膝甘草蘇木剉各三兩白芷桂心各一兩半赤芍九兩劉寄奴五兩右為細末空心熱酒調三錢一名凌霄花散桂枝桃仁湯治經不通繞臍寒疝痛其脈沈𦂳此由寒客於血室血凝不行桂枝芍藥生地黄各二兩桃仁五十箇甘草一兩右為粗末毎服五錢水煎入薑棗地黄通經丸治經不行結積成塊臍下如覆杯熟地黄三兩䖟䖝去頭足炒水蛭糯米炒桃仁各五十箇右為細末煉蜜丸如梧子大空心温酒下五丸未知加至七丸嚴氏琥珀散治婦人室女月事凝滯腹脇脹痛及血逆攻心眩暈不省劉寄奴牡丹皮熟地黄𤣥胡索烏藥赤芍莪术三稜當歸桂心各一两右用前五味用烏豆一升生薑半斤切片米醋四升同煮豆爛為度焙乾入後五味同為細末毎服二錢用温酒調服空心食前戴人玉燭散治經候不通腹脹或痛四物湯對調胃承氣湯右㕮咀水煎服按已上諸方並出厥隂例藥也然有本於氣虚氣鬱血虚痰積等因不同宜於前調經理氣諸方内選用治崩漏之劑生地黄散治經漏下血脈虛洪經水紫黑方見血證門簡易黄芩湯治崩中下血陽乗隂經水沸溢黄芩不以多少右為末每一二錢燒秤鎚淬酒調下按此二方治熱之劑也一法用此味治天癸當住每月却行或過多不止出瑞竹堂方名芩心丸伏龍肝散治氣血勞傷衝任經虚血非時崩下臍腹冷痛脈遲弱食少或赤白帶下伏龍肝赤石脂麥門冬各一兩甘草炙半兩川芎三兩當歸乾薑七錢半桂半兩艾葉三兩熟地黄二兩右件為粗末每四錢入棗煎按此治寒例藥補血固虚之劑也備金散治婦室血崩不止香附子四兩炒當歸尾一兩二錢五靈脂一兩炒右為末每五錢淡醋湯調空心食前服一方只用香附一味澹寮茯苓補心湯治婦人亡血過多或氣逆心悶四物湯一分半參蘇飲三分右㕮咀入薑煎按已上方理氣補榮之劑也良方縮砂散治血崩新縮砂不以多少瓦上炒香為細末米飲調下三錢五靈脂散治血山崩不止靈脂十兩水煎去滓澄清再煎成膏入神麯二兩和丸如梧子大每三二十丸温酒下荆芥散治崩中不止用此一味於麻油燈上燒焦為末每三錢童便調下瑞竹堂方蒲黄散治崩中不能止破故紙蒲黄千古石灰各等分炒過右為末每二三錢淡酒或淡醋湯調下按已上諸方皆刼劑也東垣升麻除濕湯治婦人女子漏下惡血月事不調或暴崩不止多下水漿之物皆由飲食失節或勞傷形體或素有心氣不足因飲食勞倦致令心火乗脾其脈緩而弦急按之洪大皆脾土受邪也柴胡羌活蒼术黄茋各一錢半防風甘草炙升麻藁本各一錢蔓荆子七分獨活當歸各半錢右㕮咀作一服水煎食前服涼血地黄湯治婦人血崩是腎水隂虚不能鎮守胞絡相火故血走而崩也生地黄半錢黄連羌活柴胡防風各二分黄栢知母升麻藁本細辛川芎各二分甘草一錢荆芥穂蔓荆子黄芩各一分當歸半錢紅花少許右㕮咀作一服水煎按已上二方升劑也經漏不止氣血下陷非此不能治當歸芍藥湯治婦人經脈漏下不止其色鮮紅或先因勞役脾胃虚損氣短氣逆自汗不止身熱食懶大便或泄體倦無力黄茋一錢半白术蒼术當歸身白芍各一錢熟地黄半錢甘草炙生地黄各三分陳皮半錢柴胡二分右㕮咀作一服水煎按此補劑也治帶下之劑千金方治帶下脈數者枸杞根一兩生地黄五兩右二味酒煮一升至三合作一服按此治熱例藥也元戎六合湯治婦人赤白帶下脈沈微腹痛或隂中痛四物湯四兩桂附子炒五錢右㕮咀每五錢水煎食前服按此治寒之劑也宣明導水丸治濕熱鬱於下焦之分赤白帶下不止躁熱煩渇方見濕門按此治濕熱之藥下劑也嚴氏當歸煎丸治赤白帶下腹内疼痛不飲食羸瘦當歸赤芍炒牡蠣煅熟地黄阿膠炒白芍炒續斷酒浸各一兩地榆五錢右為末醋糊丸梧子大每五十丸空心米飲下按此治血虚之劑潤燥藥也良方白芷散治赤白帶下白芷一兩海螵蛸二箇燒胎髪一團煅右為細末空心温酒調下二錢伏龍肝散治婦人赤白帶下久患不差肌瘦黄瘁多困乏力棕櫚不以多少燒灰火然急以盆蓋蔭伏龍肝於鍋竈直下取炒令烟盡屋梁上塵懸長者如無竈頭虚空中有炒令烟盡右三味等分碾和令停入龍腦麝香各少許每服二錢温酒調下淡醋湯亦可患十年者半月可安按已上方皆刼劑也益母草散治赤白惡露下不止益母草開花時採隂乾為細末空心温酒調二錢日三服東垣固真丸治白帶久不止臍腹冷痛隂中亦然白石脂一錢火燒赤乾薑炮四錢黄栢酒製白芍各一錢白龍骨二錢柴胡一錢當歸身二錢右除石脂龍骨另研外同為細末水煮糊丸如桐子大每十丸食前煎水下按此寒熱之劑又止澁藥也桂附湯治白帶腥臭多悲不樂大寒肉桂一錢附子三錢黄栢知母甘草炙升麻各半錢黄茋一錢半人參七分右㕮咀作一服水煎食前服按此補陽氣極虚用黄栢等為引用又升降隂陽藥也補經固真湯治白帶下流不止始病崩中日久血少復亡其陽故白滑之物不止也柴胡甘草郁李仁研黄芩各一錢乾薑二錢橘皮半錢人參二錢白葵花去蕚一朶右㕮咀水煎空心服按此補例藥也衛生湯治帶下不止脈微弱腹痛白芍炒當歸各二兩黄茋三兩甘草一兩右㕮咀或末每五錢水煎空心服下苦楝丸三十粒按此補血之劑也苦楝丸治赤白帶下苦楝碎酒浸茴香炒當歸各等分右為末酒糊丸桐子大每五十丸空心酒下按此謂邪入小腸故用此燥丙藥也酒煮當歸丸治㿗疝白帶下注腳氣腰已下如在氷雪中以火焙乾厚衣蓋其上猶寒冷不任寒之極者靣白如枯魚之象肌肉瘦削小便不止與白帶常流不禁病甚者當歸一兩茴香半兩良薑附子炮各七錢已上四味㕮咀以好酒一升半煮至乾再焙乾炒黄鹽全蝎各三錢丁香苦楝甘草炙各半錢柴胡二錢升麻木香各一錢𤣥胡索四錢右與前同為細末酒煮糊為丸如梧子大每五七十丸空心淡醋湯下忌酒濕麫油膩物按此升陽勝濕之劑氣血藥也升陽燥濕湯治白帶下隂戸痛控心急痛身黄皮緩身重如山隂中如水防風良薑乾薑郁李仁甘草各一錢柴胡一錢三分橘皮黄芩各半錢白葵花七朶右㕮咀分作二服水煎空心服按此升散之劑也坐藥勝隂丹三柰子川烏頭大椒各半錢柴胡羌活各二分全蝎三箇蒜七分甘松二分破故紙八分與蒜同煮升麻枯礬各二分麝香少許右為細末煉蜜丸如彈子大綿裹留系在外納丸藥於隂戸内按此刼藥也灸法氣海一穴在臍下一寸五分主月事不調帶下崩中因産惡露不止繞臍㽲痛灸五壯帶脈二穴在季脇下一寸八分陷者宛宛中灸七壯主婦人月水不調及閉不通赤白帶下氣轉運背引痛不可忍血海二穴在膝臏上内膁白肉際二寸中治女子漏下惡血月事不調逆氣腹脹灸三壯隂谷二穴在膝内輔骨後大筋下小筋上按之應手屈膝取之治婦人漏血不止腹脹滿不得息小便黄如蠱膝如錐不得屈伸小腹引痛灸三壯闗元一穴在臍下四寸主婦人帶下瘕聚因産惡露不止斷産下經冷可灸百壯安胎之劑金匱方當歸散姙娠宜常服之當歸黄芩白芍川芎各一兩白术半兩右五味為末酒飲調服方寸匕日二次按此方養血清熱之劑也瘦人血少有熱胎動不安數曾半産者難産者皆宜服之以清其源而無後患也千金茯苓半夏湯治姙娠惡阻心悶吐逆頭眩四肢怠惰煩疼痰逆嘔吐惡寒自汗黄痩半夏泡七次炒黄茯苓熟地黄各三兩橘紅細辛人參芍藥紫蘇川芎各二兩苦梗甘草各半兩右㕮咀每四錢水煎空心服局方參橘散治姙娠三月惡阻吐逆不食或心虛煩悶橘皮茯苓各一兩麥門冬白术厚朴製甘草炙各半兩右㕮咀每四錢入薑竹茹煎一方加人參名竹茹湯良方名人參橘皮湯良方膠艾湯治姙娠或因頓仆胎動不安腰腹疼痛或胎上搶心或去血腹痛膠一斤炙艾葉數莖指迷方加秦艽右二味以水五升煑取二升分三服阿膠散嚴氏方作膠艾湯不問姙娠月數深淺或頓仆或因毒藥胎動不安腰痛腹滿搶心短氣熟地黄艾葉白芍川芎黄茋阿膠當歸甘草炙各一兩右㕮咀每四錢入薑棗煎金匱方無黄茋佛手散治姙娠傷胎下血當歸三錢川芎二錢右㕮咀水煎食前服安胎散治姙娠自髙墜下或為重物所壓觸動胎氣腹痛下血胃虚嘔逆並宜服之縮砂不以多少炒過右為末每二錢用酒調服艾鹽湯亦可簡易方知母飲治姙娠心脾壅熱咽膈渇苦煩悶多驚赤茯苓黄芩黄茋各三兩知母麥門冬甘草各二兩右㕮咀每四錢入桑白皮熟時再入竹瀝些小服竹葉湯治姙娠心驚膽怯終日煩悶名曰子煩白茯苓四兩防風麥門冬黄芩各三兩右㕮咀每四錢入竹葉五片水煎外䑓方有竹瀝二合無葉一方有黄芩知母㧞萃方枳殻湯治胎漏下血或因事下血枳殻炒黄芩各半兩白术一兩右為末每一錢白湯調下宣明方無枳殻二黄散治胎漏下血生地黄熟地黄右為末煎白术枳殻湯調下二錢或錢半按良方論云婦人有子之後血畜以養胎矣豈可復能散動耶所以然者有娠而月信每至是亦未必因血盛也若謂榮經有風則經血喜動以其風勝則可此例可見胎漏之因非止一端也治者宜擴充焉地黄當歸湯治胎痛當歸一兩熟地黄二兩右為末每半兩水煎良方等分為末蜜丸名内補丸許學士云大率婦人姙娠唯在抑陽助隂蓋此等藥甚多然胎前藥唯惡羣隊若隂陽交錯别生他病唯是枳殻散所以抑陽四物湯所以助隂故爾然枳殻散差寒若單服之恐有胎寒腹痛之疾以内補丸佐之則陽不至強隂不至弱隂陽調停有益胎嗣此前人未嘗論及也愚詳隂陽調停不若不服為愈全生方白术散治姙娠面目虚浮肢體腫如水氣名曰子腫白术一兩生薑皮大腹皮陳皮白茯苓各半兩右為末每二錢米飲調下指迷方有桑白皮無术李氏天仙藤散治姙娠自三月成胎之後兩足自脚面漸腫腿膝以來行歩艱辛以至喘悶飲食不美狀似水氣至於脚指間有黄水出者名曰子氣天仙藤洗畧炒香附子炒陳皮甘草烏藥等分右為末每服三錢水煎入薑三片木瓜三片紫蘇三葉同煎空心食前服日三次腫消止藥按此二方治證例相類故併錄之嚴氏紫蘇飲治胎氣不和湊上心腹脹滿疼痛謂之子懸大腹皮川芎白芍陳皮蘇葉當歸各一兩人參甘草各半兩右㕮咀毎四錢入薑葱煎安榮散治姙娠小便澁少遂成淋澁名曰子淋麥門冬通草滑石各三錢當歸燈心甘艸各半兩人參細辛各一兩右為細末每二錢煎麥門冬湯調下羚羊角散治姙娠中風頭項強直筋脉攣急言語蹇澁痰涎不利或時發搐不省人事名曰子癎羚羊角鎊川獨活酸棗仁炒五加皮各半錢薏苡仁防風當歸川芎茯神杏仁各四分木香甘草各二分半右㕮咀每五錢入薑煎八味丸治姙娠小便不通名曰轉胞亦治子淋方見補虛門丹溪參术散治姙娠轉胞四物湯加人參白术半夏製陳皮甘草右㕮咀入生薑煎空心服按丹溪曰轉胞之病胎婦之禀受弱者憂悶多者性急躁者食味厚者庸或有之古方皆用滑利藥鮮有應效因思胞不自轉為胎所壓展在一邉胞系了戾不通耳胎若舉起居於其中胞系自疏水道自利然胎之墜下必有其由近吳宅寵人患此兩脈似濇重則弦左稍和予曰此得之憂患濇為血少氣多則胎氣弱而不能舉弦為有飲血少則胎弱氣多有飲中焦不清而隘則胞知所避而就下乃以已上藥與服隨以指探喉中吐出藥汁候少頃氣定又與之次早亦然至八貼安此法恐偶中耳後又治數人亦效未知果何如耶仲景云婦人本肌肥盛頭舉自滿今反羸瘦頭舉中空胞系了戾亦多致此病但利小便則愈宜服腎氣丸以中有茯苓故也地黄為君功在補胞若頭舉等語其義未詳恐有能知之者按已上安娠諸法皆氣血本病之藥故非辛熱苦寒之劑蓋産前當清熱養血也然有外感風寒内傷生冷以辛熱散之温之大積大聚以藥衰其大半而止經曰婦人重身毒之何如岐伯曰有故無殞故無殞也斯法亦不為本病之謂也故姙娠諸證例藥詳見大全良方兹不備錄束胎丸第八箇月服之黄芩炒夏一兩春秋七錢半冬半兩白术二兩茯苓七錢半陳皮三兩忌火右為末粥為丸桐子大每三四十丸空心白湯下達生散又名束胎散大腹皮三錢人參陳皮各半錢白术白芍各一錢甘草炙二錢紫蘇葉莖半錢當歸尾一錢或加枳殻縮砂右㕮咀作一服入青葱五葉黄楊腦七箇煎服扵八九箇月服十數貼甚得力或夏加黄芩春加芎冬依正方或有别證以意消息又方於第九箇月服黄芩怯弱人减半白术一兩滑石枳殻各七錢半右為末粥丸如桐子大毎服三十丸空心熱湯下按世俗婦室姙娠鮮有服束胎藥者蓋局方良方諸法未能以盡其妙用者多輙動娠故率不敢行然丹溪先生因製已上諸方以備世俗取擇實好生君子之一端也滑胎易産藥枳殻散治姙娠胎肥壅隘難産臨月服之粉草一兩炙商州枳殻二兩炒右為細末百沸湯㸃二錢空心日三服一方枳殻六兩甘草一兩一方有糯米半升淘控乾同炒為末温隱居加當歸木香各等分又法張氏方治姙娠胎肥動止艱辛臨月服之縮胎易産治氣寛膈枳殻五兩甘草一兩半香附子二兩炒右為細末薑湯㸃服神寢丸滑胎易産入月服之通明乳香半兩枳殻一兩右為末煉蜜丸梧子大空心酒下三十丸陸氏名寤生丸乳香只一分保氣散安胎易産或居處失宜偶然頓仆胎動胎痛漏胎下血兼服佛手散香附子四兩山藥二兩縮砂一兩木香四錢粉草一兩益智仁紫蘇各半兩右為細末白湯㸃二錢入月服之益元散入月服之滑胎易産方見前産間藥施氏催生如意散臨産腰疼方可服之人參乳香各一錢末辰砂半錢右三味一處研臨産急用雞清一箇調藥末再用生薑汁調冷服如横生倒産即時端順而生催生佛手散方見前嚴氏無憂散治胎肥氣逆或人瘦血少胎弱臨蓐難産者便産湏知名保生無憂散當歸川芎白芍各一兩枳殻炒五錢乳香三錢木香一錢半血餘灰二錢甘草右為末每二錢水煎服簡易集效黑散子催生兼治横生逆産百草霜白芷末等分右和勻每二錢童便并好醋調稀更以沸湯調下局方催生丹治産婦生理不順産育艱難或横或逆並宜治之十二月兔腦髓去皮膜研如泥乳香另研細如泥母丁香二錢半麝香另研五分半右三味和匀以兎腦和丸如雞頭大隂乾油紙裹每一丸温水下即産兒手中握出良方催生乳香膏名如神開骨膏又名乳珠丹一法滴乳為末猪心血為丸五月五日午時合右如桐子大朱砂為衣毎一粒面東酒吞下未下再服如胎乾者先與四物湯秘方益母丸專治横生逆産難産并安胎順氣神效益母草五月採隂乾石臼搗為末煉蜜丸如彈子大每一丸或二丸臨産以童便和温酒送下氣不順木香參湯送下或作小丸吞服亦可獨聖散黄葵子炒七十粒研爛酒服濟君急若也臨危難産時免得全家俱哭泣小品療横生倒産手足先出方用粗針刺兒手足入二分許兒得痛驚轉即縮自當回順而生一法鹽塗兒足底又可急搔爪之并以鹽摩産婦腹上即産機要半夏湯治胎衣不下或子死腹中或子衝上而昏悶或血暴下及胎乾不能産者半夏麯一兩半桂七錢半桃仁三十箇炒大黄半兩右為細末先服四物湯三兩次服此生薑同煎良方治死胎不下其證産母舌青黑及胎上冷者子已死或指甲青舌青脹悶甚者口中作屎臭先以平胃散一貼作兩服每服酒水各一盞同煎至一盞却投朴硝半兩研細再煎數沸温服胎化血水而下鹿角散治因熱病胎死腹中鹿角屑一兩右水煎入葱白五莖䜴半合丹溪云燒過治産後血暈當歸湯治子死不下川當歸三兩川芎二兩右為末水酒各半調下四錢未下再服一方只用川芎末酒煎服香桂散下死胎麝香半錢桂心三錢為末右和匀只得一服温酒調下一方朴硝末二錢温童便調下必效方牛膝湯治胎衣不出腹臍堅脹急痛即殺人服此胞即爛下死胎牛膝瞿麥各四兩當歸三兩通草六兩滑石八兩葵子五兩右切細以水九升煮取三升分三服宣明硇砂散治胎死腹中不下硇砂研細當歸各一兩右二味研極細只分作二服温酒調下如重車行五里不下再服局方至寳丹見本方花蘂石散治胎死腹中及胎衣不下花蘂石一斤上色硫黄四兩右二味相拌匀煉製見良方黑龍丹治産後一切血疾産難胎衣不下危急惡疾垂死者但灌得下無不全活當歸五靈脂川芎良薑熟地黄各一兩剉以沙合盛赤石脂泥封紙筋鹽泥固濟炭火十斤煆令通赤去火候冷取開㸔成黑糟色取細研却入後藥百草霜五兩硫黄乳香各一錢半花蘂石琥珀各一錢右五味並細研與前藥再研如法修製和匀以米醋煮麫糊丸如彈子大每服一丸炭火燒令通赤投於生薑自然汁與童便入酒漉出控乾研細只此酒下一方取死胎用烏雞一隻去毛細切水煎三二升湯通手用衣帛蘸摩臍下胎自出産後雜方局方芎歸湯治産後去血過多暈煩不省當歸芎藭等分右㕮咀毎半兩水煎服腹疼加桂名桂香散一名琥珀散治腹中痛急自汗頭眩少氣加羊肉名羊肉湯黑神散治産後惡露不盡胎衣不下血氣攻心及腹痛不止黑豆炒半升熟地黄當歸肉桂乾薑甘草白芍蒲黄各四兩生地黄局方良方俱無此味便産湏知有之右為末每二錢酒童便各半調服一名烏金散按此手少隂足厥隂太隂陽明表裏血藥也立方大意見前丹溪之論矣今人以為治産後百病率用之故收入然用者自宜通變人參當歸散治産後去血過多血虛則隂虚隂虚則内熱心煩短氣自汗頭痛熟地黄人參當歸桂麥門冬各一兩白芍二兩炒右㕮咀每五錢入竹葉生薑煎當歸黄茋湯治産後失血多腰疼身熱自汗當歸三兩黄茋二兩白芍一兩半炒右㕮咀每五錢入薑煎失笑散治産後心腹絞痛欲死及兒枕痛蒲黄炒五靈脂各等分右為末醋調二錢熬成膏湯化服之一法治小兒枕痛各單服經驗方三聖散治兒枕痛當歸桂𤣥胡索右等分為細末每服二錢熱酒或童便調下嚴氏清魂散治産後血暈昏不知人更宜取漆器於床前燒薰之頻置醋炭更服此藥澤蘭葉人參各一兩荆芥穂四兩甘草炙八錢川芎二兩右為末毎二錢熱湯温酒各半盞調下抵聖湯治産後血氣傷於脾胃腹脇滿悶嘔逆惡心赤芍半夏澤蘭葉陳皮人參各二錢甘草炙一錢右㕮咀作一服入生薑煎當歸羊肉湯治産後發熱自汗肢體疼痛名曰蓐勞當歸人參各七錢黄茋一兩生薑半兩右㕮咀用羊肉一斤煮清汁五大盞去肉入前藥煎四盞去柤作六服良方茯苓散治産後心虚怔忡不定言語錯亂人參甘草山藥當歸各一錢生薑逺志茯苓桂心麥門冬各半錢大棗右㕮咀水煎機要增損柴胡湯治産後經水適斷感於異證手足撁搐咬牙昏冐柴胡八錢黄芩四錢半人參三錢甘草炒四錢石膏四錢知母三錢黄茋五錢半夏三錢右為粗末每半兩入薑棗煎血風湯治産諸風痿攣無力秦芁羌活防風白芷川芎芍藥白术當歸地黄茯苓半夏黄茋等分右為末一半為丸煉蜜桐子大一半為散温酒送下五七十丸愈風散治産後中風口噤牙關緊急手足瘈瘲如角弓狀荆芥穂畧炒為末右每三錢豆淋酒調下童便亦可一方加當歸謹按産後多有血病神强瘈瘲而似中風者宜用此藥通血脈而清神或加當歸者為然非外因例藥也是以姑録此一法義見後丹溪論獨行散治産後血暈昏迷五靈脂炒右為末水酒童便調下一二錢當歸散治産後氣血俱虚無大補恐增客熱宜服此去惡露當歸白芍川芎黄芩各一兩白术半兩右為細末温童便調下二錢黄茋湯治産後汗不止因隂虛而得黄茋二錢白术防風熟地黄牡蠣煆白茯苓麥門冬甘草炙各半錢右㕮咀每半兩入棗煎加减四物湯治産後隂虛發熱或日間明了暮則發熱增寒當歸川芎生地黄柴胡右等分每四五錢水煎瑞竹堂方治産後血塊腹痛京芎炒當歸炒熟地黄白芍炒各半兩蒲黄炒二分右同為細末每服二錢空心温酒調下丹溪參术膏治産後胞損成淋瀝證人參二錢半白术二錢桃仁陳皮各一錢黄茋一錢半茯苓一錢甘草炙半錢右㕮咀水煎猪羊胞後入藥作一服丹溪曰嘗見尿胞因收生不謹以致破損而得淋瀝證有徐氏婦於壯年得此因思肌肉破傷在外者且可補完胞雖在腹恐亦可治診其脈虚甚因悟曰難産之人多是氣虚難産之後血氣尤虚因用峻補以參术膏煎以猪羊胞極飢時與之每劑用一兩至一月而愈恐是氣血驟長其胞可完若稍遲緩恐難成功嚴氏趂痛散治産後血滯筋脈拘攣腰背強直遍身疼痛當歸桂白术牛膝甘草各三錢黄茋獨活生薑各半兩右㕮咀每半兩水煎按此手足三隂藥出大陽例治表之劑也然惡露不盡絞痛不止宜良方芎歸湯散治裏之劑以大黄桃仁等藥下之血畜經絡成血塊宜没藥丸以䖟虫水蛭等藥逐之皆變法也兹不詳錄故已上諸方皆調理之劑餘有異證詳見大全良方謹按産後血滯於經多成癰腫或有致不救者盖氣血虚損逆之甚也大抵此兼隂虚火動凡辛温之劑宜慎之矧産後用藥有三禁我丹溪先生謂産後如無惡阻當大補氣血雖有雜證以末治之如中風切不可作風治與小續命湯必先補氣血然後治痰當以左右手之脈分其氣血多少而治如發熱惡寒皆是氣血左手脈不足用補血藥多於補氣藥右手脈不足用補氣藥多於補血藥惡寒發熱腹痛者當去惡血以求通變之意也玉機微義卷四十九
