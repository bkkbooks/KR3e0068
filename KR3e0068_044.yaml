body:
  text: 玉機微義卷四十四明徐用誠原輯劉純續增㿀疹門論㿀疹證治潔古云㿀疹之病其為證各異瘡發焮腫於外者屬少陽三焦相火也謂之㿀小紅靨行皮膚之中不出者屬少隂君火也謂之疹凡顯㿀證若自吐瀉者慎勿亂治而多吉謂邪氣上下皆出也㿀疹並出小兒難禁是以别生他證也首尾不可下大抵安裏之藥多發表之藥少祕則微疏之令邪氣不壅併而能作畨次使兒易禁也身溫暖者順身涼者逆按此是例陽證發㿀宜與小兒門㿀論兼看證治論傷寒發㿀有隂陽不同略例曰陽證發㿀有四有傷寒發㿀有時氣發㿀有熱病發㿀有溫毒發㿀班班如錦文或發之面部或發之胸背或發之四末色紅赤者胃熱也紫黑為胃爛也一則下之早一則下之晚乃外感熱病而發㿀也當服玄參升麻白虎等藥謹按四氣發㿀溫毒為至重暑證亦發㿀固有輕重之殊見面部者傳手經也難知云戊助少隂心火入于手太隂肺也背多者足太陽胸屬足陽明四末屬脾與心也隂證發㿀亦出背胸又出手足亦稀少而微紅若作熱證投之涼劑大誤矣此無根失守之火聚於胸中上獨熏肺傳於皮膚而為班點但如蚊蚋蚤虱咬形狀而非錦文也調中溫胃加以茴香芍藥以大建中之類其火自下㿀自退可謂治本而不治標也謹按㿀證固有隂陽輕重之現證矣陽證大率用托裏清熱化㿀涼血隂證止用調中溫胃其㿀自消病體自定非若瘡成膿疱也雖輕重俱從火化大抵急則治標緩則治本論中寒發㿀略例云完顔小將軍病寒熱間作有㿀三五點鼻中微血出兩手脈沈澀胸膈四肢按之殊無大熱此內傷寒也問之因暑卧殿角傷風又渴飲氷酪水此外感者輕內傷者重從內病俱為隂也故先㿀衄後顯內隂寒熱間作脾亦有之非往來少陽之寒熱也與調中湯數服而愈論傷寒治誤發㿀陳無擇云傷寒發㿀者蓋不當下而下之熱則乘虛入胃當下而失下則胃熱不得泄二者皆能發㿀其狀如錦繡赤者易治黑者難治蓋熱毒入胃深也按此謂㿀主於胃因下早下晚之失而生至如陽證誤用熱劑而發㿀或溫毒便發㿀者皆宜從脈求其本也仲景云寸脈浮滑者可用瓜蒂散吐之是熱毒藴於胸膈也又非在胃及虛火之比大抵黑者熱極亢則害承乃制也論癮疹陳無擇云世醫論癮疹無不謂是皮膚間風然既分冷熱冷熱即寒暑之證又有因浴出湊風冷而得之者豈非溫也則知四氣偹矣經分諸瘡實熱則痛虛寒則癢又陽明主肌肉屬胃與大腸亦有冷熱分痛癢不可不審世人呼白者為婆膜赤者為血風名義混殽當以理曉察內外隨證治之謹按癮疹多屬脾隱隱然在皮膚之間故言癮疹也發則多癢或不仁者是兼風兼濕之殊色紅者兼火化也癮疹治法升散之劑元戎葛根橘皮湯治㿀在肌冬溫始發肌中㿀爛咳而心悶但嘔清汁葛根橘皮杏仁知母黃芩麻黃甘草右等分水煎服按此足陽明太陽藥也陽毒升麻湯㿀在面傷寒一二日或吐下後變成陽毒腰背痛煩悶不安面赤狂言見鬼下痢脈浮大咽痛升麻五錢犀角射干黃芩人參甘草各二錢半右㕮咀水煎取飲半盞刻許再進溫覆手足得汗出解玄參升麻湯㿀在身治汗下吐後毒不散表虛裏實發於外甚則煩躁譫妄玄參升麻甘草等分右㕮咀水煎服按已上足陽明藥也陽毒梔子湯治傷寒壯熱百節疼痛而發㿀升麻梔子仁黃芩芍藥石膏知母杏仁柴胡甘草右粗末每五錢入薑五片䜴百粒煎服按此足陽明少陽藥也消毒犀角飲子治㿀及癮疹牛蒡子六錢荆芥防風各二錢甘草一錢右㕮咀水煎按此手太隂藥也解毒防風湯治㿀及癮疹癢痛防風一兩地骨皮黃茋芍藥荆芥枳殼牛蒡子各半兩右為粗末每四五錢水煎服按此手足太隂藥也已上諸方本於陽證者宜選用之升麻葛根湯隂毒升麻鱉甲湯治隂㿀升麻三兩當歸甘草各二兩蜀椒一兩鱉甲炙雄黃半兩研右為末每服五錢水煎服按此闕三因加味羌活散治感四時所傳肌膚發為癮疹增寒壯熱羌活前胡各一兩人參桔梗甘草枳殼川芎天麻茯苓各半兩蟬蛻薄荷各三錢右㕮咀搗為末每服二大錢薑三片煎服按此足太陽手太隂少隂藥也調中湯治內傷外感而發隂㿀蒼术一錢半陳皮一錢砂仁藿香芍藥炒甘草炙桔梗半夏白芷羌活枳殼各一錢川芎半錢麻黃桂枝各半錢右㕮咀薑三片水煎服按此足太陽太隂手陽明太隂藥也已上諸方本於隂證者宜選用之和解之劑化㿀湯治傷寒汗吐下後㿀發脈虛白虎湯加人參守真類粹再加白术右㕮咀時時煎服之下劑當歸丸治傷寒㿀見無大熱脈虛祕悶當歸半兩甘草一分黃連大黃各二錢半右先將當歸熬膏子入藥末三味為丸漸加至利為度涼血之劑黑膏治溫毒發㿀生地黃半斤好䜴一升右二味以豬膏二斤合煎之至濃汁用雄黃麝香如大豆大內中攪和每服用彈子大湯化服未效再服之大青四物湯大青四兩阿膠甘草各一兩䜴八合右㕮咀每服五錢水煎服之玉機微義卷四十四
