body:
  text: 玉機微義卷十六明徐用誠原輯劉純續増氣證門内經敘諸氣動為病隂陽應象論云喜怒傷氣寒暑傷形暴怒傷隂暴喜傷陽厥氣上行滿脉去形喜怒不節寒暑過度生乃不固故重隂必陽重陽必隂玉機真藏論云憂喜悲恐怒令不得以其次故令人有大病矣因而喜大虚則腎氣乗矣憂則心氣乗矣怒則肝氣乗矣悲則肺氣乗矣恐則脾氣乗矣舉痛論云百病生於氣也怒則氣上喜則氣緩悲則氣消恐則氣下寒則氣收炅則氣泄驚則氣亂勞則氣耗思則氣結九氣不同為病詳見本文脉法經曰脉滑者多血少氣澁者少血多氣大者血氣俱多脉來大而堅者血氣俱實小者血氣俱少脉來細而緩者血氣俱虚代者氣衰細者氣少浮而絶者氣辟大而滑中有短氣尺脉澁而堅為血實氣虚尺脉細而微者血氣俱不足云云見本文劉立之脉理𤣥要曰下手脉沉便知是氣沉極則伏濇弱難治其或沉滑氣兼痰飲論九氣動為諸證子和云夫天地之氣常則安變則病而况人禀天地之氣五運迭侵於外七情交戰於中是以聖人嗇氣如持至寳庸人投物而反傷大和此軒岐所以論諸痛皆因於氣百病皆生於氣遂有九氣不同之說氣本一也因所觸而為九怒喜悲恐寒暑驚思勞也其言曰怒則氣逆甚則嘔血及飱泄故氣逆上矣王太僕曰怒則陽氣逆上而肝木乗脾故甚則嘔血及飱泄也喜則氣和志逹榮衛通利故氣緩矣悲則心系急肺布葉舉而上焦不通榮衛不散熱氣在中故氣消矣恐則精却却則上焦閉閉則氣還還則下焦脹故氣不行矣太僕云恐則傷精却上而不下流下焦隂氣亦廻還而不散故聚而脹也然上焦固禁下焦氣還故氣下行也寒則腠理閉氣不行故氣收矣太僕云身凉則衛氣沉故皮膚文理及滲泄之處皆閉宻而氣不流行衛氣收歛于中而不散也炅則腠理開榮衛通汗大出故氣泄矣太僕云人在陽則舒在隂則慘故熱則膚腠開發榮衛大通津液而汗大出也驚則心無所依神無所歸慮無所定故氣亂矣勞則喘息汗出内外皆越故氣耗矣太僕云疲勞役則氣奔速故喘息氣奔速則陽外發故汗出内外皆踰越於常紀故氣耗損也思則心有所存神有所歸正氣留而不行故氣結矣太僕云繫心不散故氣亦停留此素問之論九氣其變甚詳其理甚明然論九氣所感之疾則畧惟論嘔血及飱泄餘皆不言惟靈樞論思慮悲哀喜樂愁憂盛怒恐懼而言其病曰思慮而傷神神傷則恐懼自失破㬷脫肉毛瘁色夭死于冬脾憂愁而不解則傷意意傷則恍亂四肢不舉毛瘁色夭死于春肝悲哀動中則傷魂魂傷則狂忘不精不正當人隂而攣筋兩脇不舉毛瘁色夭死于秋肺喜樂無極則傷魄魄傷則狂狂者意不存人毛革焦毛瘁色夭死于夏腎盛怒而不止則傷志志傷則喜忘其前腰脊不可俯仰屈伸毛瘁色夭死于季夏恐懼不解則傷精精傷則骨痿厥精時自下是故五臟主藏精者也不可傷傷則失守而隂虚虚則無氣無氣則死矣靈樞論神意魂魄志精所主之病然無寒暑驚勞四證余以是推而廣之怒氣所至為嘔血為飱泄為煎厥為薄厥為陽厥為胸滿脇痛食則氣逆而不下為喘渇煩心為焇癉為肥氣為日暴盲耳暴閉筋縱發於外為疽癰喜氣所至為笑不休為毛革焦為肉病為陽氣不收甚則為狂悲氣所至為隂縮為筋攣為肌脾為脉痿男為數溲血女為血崩為酸鼻辛頞為目昏為少氣不能報息為泣則臂麻恐氣所至為破㬷脫肉為骨痠痿厥為暴下渌水為面熱膚急為隂痿為懼而脫頥驚氣所至為潮涎為目睘為口呿為癡癎為不省人為僵仆乆則為􅍙痺勞氣所至為咽噎病為喘促為嗽血為腰痛骨痿為肺鳴為髙骨壊為隂痿為唾血為㝠視為耳閉男為少精女為不月衰甚則潰潰乎若壊都汩汩乎不可止思氣所至為不眠為嗜卧為昏瞀為中痞三焦閉塞為咽嗌不利為膽癉嘔苦為筋痿為白淫為得後與氣快然如衰為不嗜食寒氣所至為上下所出水液云云見寒門炅氣所至為喘嘔吐酸暴注下迫云云見火門凡此九者内經有治法但以五行相勝之理治之夫怒傷肝肝屬木怒則氣并於肝而脾土受邪木太過則肝亦自病喜傷心心屬火喜則氣并於心而肺金受邪火太過則心亦自病悲傷肺肺屬金悲則氣并於肺而肝木受邪金太過則肺亦自病恐傷腎腎屬水恐則氣并於腎而心火受邪水太過則腎亦自病思傷脾脾屬土思則氣并於脾而腎水受邪土太過則脾亦自病寒傷形形屬隂寒勝熱則陽受病寒太過則隂亦自病炅傷氣氣屬陽熱勝寒則隂受病熱太過則陽亦自病凡此七者更相為治故悲可以治怒以愴惻苦楚之言感之喜可以治悲以謔浪䙝狎之言娱之恐可以治喜以迫遽死亡之言怖之怒可以治思以汚辱欺㒺之言觸之思可以治恐以慮彼忘此之言奪之凡此五者必詭詐譎恠無所不至然後可以動人耳目易人視聽若胸中無材器之人亦不能以此五法也炅可以治寒寒可以治炅逸可以治勞習可以治驚經曰驚者平之平謂平常也夫驚以其忽然而遇之也使習見習聞則不驚矣此九者内經自有是理庸工廢而不行今代劉河間治五志獨得言外之意云云見後昔余治一書生勞苦太過大便結燥欬逆上氣時喝喝然有音唾嘔鮮血以苦劑解毒湯加木香漢防己煎服時時啜之復以木香㯽榔丸泄其逆氣不月餘而痊余又嘗以巫躍妓抵以治人之悲結者又嘗以鍼下之時使雜舞忽鼔笛應之以治人之憂而心痛者余嘗擊拍門忩使其聲不絶以治因驚而畏響魂氣飛揚者嘗治一婦人乆思而不眠余日醉而不問婦果呵怒是夜困睡又嘗以酸棗仁丸治人多憂者然惟勞而氣耗恐而氣奪者為難治喜者少病百脉舒和故也又聞莊先生者治喜樂之極而病者莊切其脉為之失聲佯曰吾取藥去數日更不來病者悲泣辭其親友曰吾不乆矣莊知其將愈慰之詰其故莊引素問曰懼勝喜可謂得𤣥關者也按此論九氣所動病機至為詳悉然七情諸證局方多用氣藥論治固然但不分其夾熱兼痰虚實之例而於寒熱二證亦似謂備於九氣兼用氣藥而治之其弊甚矣且夫七情諸證有乗逆厥中之殊人有苦樂安擾之異是以先哲就用五志相勝之理治之藥之於傷寒温暑自有其例也後世俗不能本此恃之於藥而相勝之理不行况其藥不熱即峻虚虚實實不無差悮故河間戴人者出論已上病機究所至之因以平火為主兼五志相勝之理或音樂抵戯甚至詭詐譎怪諸法為治應變亦已至矣我東垣丹溪先生更論諸氣為病有鬱痞逆滯不同隨證用藥有寒熱温凉之異如勞氣者宜補中益氣滋隂助陽或兼所挾之邪論治深備先哲㫖趣惜乎其道皆不能大行于世者由局方障之也氣中似風證論詳見中風門理氣宜𨗳痰論詳見痰飲門氣屬陽動作火論原病式曰氣為陽而主輕微諸所動亂勞傷乃為陽火之化神狂氣亂而為病熱者多矣子和云河間治五志獨得言外之意凡見喜怒悲恐思之證皆以平心火為主至于勞者傷於動動便屬陽驚者駭于心心便屬火二者亦以平心火為主今之醫者不逹此㫖遂有寒凉之謗謹按或云捍衛冲和不息之謂氣擾亂妄動變常之謂火當其和平之時外護其表復行於裏周流一身循環無端出入升降繼而有常源出中焦緫統於肺氣曷嘗病於人也及其七情之交攻五志之間發乖戾失常清者遽變之為濁行者抑遏而反止表失衛護而不和内失徤悍而少降營運漸逺肺失主持妄動不已五志厥陽之火起於馬上燔於肺氣乃病焉何者氣本屬陽反勝則為火矣河間有曰五志過極皆為火也何後世不本此議而一槩類聚香辛燥熱之劑氣作寒治所據何理且言指迷七氣湯製作者其皆用青皮陳皮三稜蓬术益智官桂甘草遂為平和可以常用通治七情所傷混同一意未喻某藥以治某氣已下諸方尤有甚焉者兹不復敘况所起之情各各不同且夫經言九氣之變未嘗略而不詳如怒則氣上等證其言治法髙者抑之下者舉之寒者熱之熱者寒之驚者平之勞者温之結者散之喜者以恐勝之悲者以喜勝之九氣之治各有分别何嘗混作寒論而類以香熱之藥通言而治諸氣豈理之謂歟若香辛燥熱之劑但可刼滯氣衝快於一時以其氣乆抑滯借此暫行開發之意藥中不佐制伏所起之氣服甚則増熾鬱火蒸熏氣液而自成積積滋長而成痰一飲下膈氣乃氤氲清虚之象若霧露之著物雖滯易散内挾痰積開而復結服之日乆安有氣實而不動氣動而不散者乎此皆人所受悮之由習俗已乆相沿而化卒莫能救升發大過香辛散氣燥熱傷氣真氣耗散濁氣上騰猶曰腎虚不能攝氣歸原遂與蘇子降氣湯四磨湯下黒錫丹養氣丹鎮墜上升之氣且硫黄黒錫佐以香熱又無補養之性藉此果能生氣而補腎乎請熟詳之夫濕痰甚者亦或當之初服未顯増變由喜墜而愈進形質弱者何以收救不悟肺受火炎子氣亦弱降令不行火無以制相扇而動本勢空虚命絶如縷積而至深丹毒濟大一旦火氣狂散喘息奔急而死吁以有形丹石丸藥重墜無形之氣將何抵受隨而降之乎譬以石投水水故未嘗沉也豈不死歟丹溪有曰上升之氣自肝而出中挾相火其熱為甚自覺其冷非真冷也火極似水積熱之甚陽亢隂微故有此證認假作真似是之禍可勝言哉内經雖云百病皆生於氣以正氣受邪之不一也今七情傷氣鬱結不舒痞悶壅塞發為諸病當詳所起之因滯於何經上下部分臟氣之不同隨經用藥有寒熱温凉之同異若枳殻利肺氣多服損胸中至髙之氣青皮瀉肝氣多服損真氣與夫木香之行中下焦氣香附之快滯氣陳皮之泄逆氣紫蘇之散表氣厚朴之瀉衛氣㯽榔之瀉至髙之氣藿香之馨香上行胃氣沉香之升降真氣腦麝之散真氣若此之類氣實所宜其中有行散者有損泄者其過劑乎用之能却氣之標而不能制氣之本豈可又佐以燥熱之藥以火濟火混同謂治諸氣使之常服多服可乎氣之與火一理而已動静之變反化為二氣作火論治與病情相得丹溪發揮論之冷生氣者出於髙陽生之謬言也身非自受寒氣口食寒物而是論寒者吾恐十之無一二也論局方用熱藥治諸氣之誤丹溪曰治氣一門有曰治一切氣冷氣滯氣逆氣上氣用安息香丸丁沉丸大沉香丸蘇子丸匀氣散如神丸集香丸白沉香散煨薑丸鹽煎散七氣散温白丸生氣湯悉用熱藥夫天地周流於人之一身以為生者氣也陽往則隂來隂往則陽來一升一降無有窮也苟内不傷於七情外不感於六淫其為氣也何病之有今曰滯氣逆氣上氣皆是肺受火邪氣得炎上之化有升無降熏蒸清道甚而至於上焦不納中焦不化下焦不滲遂展轉傳變為嘔為吐為膈為噎為痰為飲為翻冐為吞酸夫治寒以熱治熱以寒此正治之法也治熱用熱治寒用寒此反佐之法也詳味前方既非正治又非反佐此愚之所以不能無疑也觀其微意可表者汗之可下者利之滯者𨗳之鬱者揚之熱者清之寒者温之偏寒偏熱者反佐而行之挾濕者淡以滲之挾虚者補而養之何嘗例用辛香燥熱之劑以火濟火實實虚虚咎將誰執論氣無補法之誤丹溪曰氣無補法俗論也痞悶壅塞似難於補不思正氣虚者由七情内傷六淫外侵飲食不節房勞致虚脾土之隂受傷轉運之官失職胃雖受榖不能運化故陽升隂降而成天地不交之否清濁相混邪何由行此等理宜補養却厚味斷妄想逺音樂無有不安謹按氣者本腑臟天真之原也虚由七情及勞傷等因所致則正氣原氣不足也故宜補之則氣實氣化病邪漸除經曰虚則補之是也此補者補其不足也非為病邪䧟下腑臟精氣已憊天真元氣已絶而施補乎此等非虚也非不足也無補之法必矣大抵世俗拘此止謂治病攻邪不審補虚養正之理實實虚虚悮人生命蓋不思之甚矣氣證治法升散之劑局方七氣湯治七情之氣鬱結于中心腹絞痛人參甘草炙肉桂各一錢半半夏一錢右㕮咀水煎服按此出太陽例寒則氣收宜辛散之甘緩之治氣虚寒鬱藥也鹽煎散治一切冷氣攻冲胸脇刺痛不已及脾胃虚冷嘔吐泄瀉砂仁甘草炙茯苓草果肉豆蔲川芎茴香炒澄茄麥蘖㯽榔良薑枳殻厚朴炒陳皮羌活蒼术各等分右㕮咀每服四五錢入鹽些小煎按此足太陽陽明太隂經藥也木香流氣飲治諸氣痞塞不通胸膈膨脹面目虚浮四肢腫滿半夏厚朴青皮紫蘇香附子甘草各一錢陳皮二錢桂莪术丁皮大腹皮㯽榔麥門冬木香草果各六分木通八分藿香白芷各四分茯苓白术木𤓰人參石菖蒲右㕮咀每服四五錢入薑棗煎按此太陽例藥與已上方世俗多用之故收入然類以香燥非寒者氣實者不可用秘傳降氣湯治上盛下虚氣不升降頭目昏眩痰實嘔逆胸膈不快骨碎補訶子草果五加皮半夏桔梗各半錢桒白皮二錢地骨皮枳殻陳皮柴胡甘草各一錢右製服見局方按此出少陽例然怒則氣上驚則氣亂意例宜求諸此易簡參蘇飲方見熱門謹按天地六氣併人之氣分為病治例亦詳見各門故當分治也東垣升陽順氣湯治七情所傷及勞役飲食不節滿悶短氣升麻柴胡陳皮各一錢半夏人參各錢黄茋四錢甘草黄栢各半錢當歸一錢草豆蔲二錢神麯炒一錢半右㕮咀每服半兩入薑煎按此補劑也然恐則氣下宜求諸此攻下之劑戴人木香㯽榔丸散滯氣胸腹脹滿實痞氣結痛木香㯽榔青皮陳皮廣术枳殻黄連黄栢大黄各半兩牽牛香附各二兩右為末水丸梧子大每服五六十丸煎水下量虚實與之按此陽明例藥下熱之劑也局方神保丸治諸積氣為痛乾蝎七箇木香胡椒各二錢半巴豆十箇去心皮别研取霜右為末和匀湯化蒸餅丸如麻子大朱砂為衣每五十丸隨病氣例湯下按此太陽例藥下寒之劑也𨗳氣丸宣壅𨗳氣除脹滿利大膓大黄四兩煆胡椒四十九粒青皮陳皮蝎稍炒茴香炒乾薑炮甘草炙各一兩阿魏半錢用麫和炒黒牽牛取頭末二兩右為末水丸御院方木香順氣丸治諸氣不和方見積聚門按已上二方手足太隂足厥隂陽明經藥𨗳滯之劑也調理之劑局方沉香降氣湯治隂陽壅滯氣不升降胸膈痞悶噫醋吞酸沉香四錢砂仁半兩甘草炙一兩二錢香附子四兩右為末每二錢入鹽少許湯調下分心氣飲治一切氣留滯於胸膈之間不能流暢以致痞悶噎塞木香丁皮各二錢人參麥門冬大腹皮大腹子桒白皮草果桔梗厚朴白术各半兩香附子藿香陳皮紫蘇各一兩半甘草炙一兩右㕮咀每三錢入薑棗煎按此二方手足太隂陽明足少隂經藥也大七氣湯治喜怒不節憂思兼併多生悲恐致臟氣不平心腹脹滿半夏白茯苓四錢厚朴炒三錢紫蘇三錢右剉入薑煎服按此足陽明手足太隂經藥也紫沉通氣湯治三焦氣澁不能宣通腹脇脹大便澁紫蘇枳殻炒陳皮茯苓甘草㯽榔各一兩沉香木香麥門冬五味子桒白皮黄茋乾生薑薄荷枳實荆芥穂各半兩右㕮咀每半兩水煎服按此手太隂之劑也世俗調理之劑而多雜峻削之藥故並畧去然此方有發散意而不大燥烈姑存之用者自宜損益按經云氣血弱者不可服枳實以其損氣也氣血盛者不可服丁香以其益氣也於調理不可不分東垣木香順氣湯治濁氣在上則生䐜脹方見脹滿門按此亦七情所致濁隂之氣不降而為䐜脹也故出陽明承氣例然七氣之方先哲亦未見分其異者蓋氣之厥逆收緩乆而鬱變病機不同而亦不可不本其所因而治之也補養之劑東垣補中益氣湯治喜怒憂恐損傷元氣勞倦體怠方見熱門調中益氣湯方見内傷門按此二方治勞則氣耗宜益之也出少陽例清暑益氣湯治暑傷元氣食少體倦方見暑門按此所謂炅則氣泄宜益之也局方養氣丹養正丹方見和劑按已上方治元陽虧損氣短身羸氣不升降食少脉弱隂陽之氣下䧟者甚㨗然不可盡劑也論見補虚門消𨗳之劑局方異香散治胃氣不和腹脇膨脹飲食難化一切冷氣結聚石蓮肉一兩莪术三稜益智仁甘草炙各六兩青皮陳皮厚朴炙各二兩右為末每服三二錢薑棗煎服按本方云治腎氣不和腎字為胃字之悮爾出陽明例藥御院方助氣丸方見積聚門分氣丸治胸膈氣痞痰實不化並宜服之砂仁青皮陳皮白豆蔲三稜炮莪术煨澄茄蘿蔔子炒枳實木香各一兩黒牽牛炒二兩取頭末右為末湖丸如梧子大每五十丸薑湯下按已上諸方治氣積痞之劑非調理比也宜分虚實寒熱用之又皆氣中之血藥也治痰之劑二陳湯桔梗半夏湯四七湯並見痰飲門蘇子降氣湯方見欬門按此諸方散鬱和中之藥也理血之劑本事方槐角散濟生歸脾湯㧞萃門冬飲子並見血證門按氣病血從已見前論故録已上方以備其例用者自宜推格之宣劑稀涎散元戎勝金丸並見痰飲門謹按諸氣鬱或七情所滯最宜宣𨗳正木鬱逹之之意也大抵是證中夾火熱者多已上諸方恐未合宜用者自臨時通變可也通關竅之劑局方蘇合香丸治氣中或卒暴氣逆心痛鬼魅惡氣沉香麝香訶子丁香青木香安息香香附蓽撥白术白檀各二兩薫陸香蘇合油龍腦各一兩朱砂烏犀角各製右為末入研極匀用安息膏并煉蜜丸如梧子大温水化四丸按此足手太陽足陽明手足太隂足三隂藥也雜方嚴氏四磨湯治七情傷感上氣喘息妨悶不食人參㯽榔沉香天台烏藥右四味各濃磨水和作七分煎三五沸温服紺珠正氣天香湯治一切上氣湊心心胸築痛方見婦人門玉機微義卷十六
