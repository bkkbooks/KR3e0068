body:
  text: 玉機微義卷二明徐用誠原輯劉純續増痿證門諸痿因肺熱相𫝊内經曰肺熱葉焦五臟因而受之發為痿蹷心氣熱生脉痿故脛縱不任地肝氣熱為筋痿故宗筋弛縱脾氣熱生肉痿故痺而不任腎氣熱生骨痿故足不任身然治痿獨取陽明陽明者五臟六腑之海主潤宗筋宗筋主束骨而利機闗也云云故陽明虚則宗筋縱帶脉不引故足痿不用也詳見本文痿因内臟不足所致陳無擇云人身有皮毛血脉筋膜肌肉骨髓以成其形内則有肝心脾肺腎以主之若隨情妄用喜怒勞逸致内臟精血虚耗使皮血筋骨肉痿弱無力以運動故致痿躄狀與柔風脚氣相類柔風脚氣皆外所因痿則内臟不足之所致也痿因血少原病式曰病痿皆屬肺金大抵肺主氣病則其氣膹鬱至於手足痿弱不能收持由肺金本燥燥則血液衰少不能營養百骸故也治痿與治痺不同張子和曰痿因肺熱相𫝊四臟其脉多浮而大今人便作寒濕脚氣治之驟用燥藥針艾湯蒸痿弱轉甚此證與治痺頗異風寒濕痺猶可蒸湯燔灸惟痿因熱而成若作寒治是殺之也治痿大法丹溪曰内經痿論肺熱葉焦五臟因而受之發為痿躄又曰諸痿皆屬於土指病之本在肺也又曰昏惑又曰瘈瘲曰瞀悶曰瞀眛曰暴病皆屬於火又曰四支不舉曰舌本强曰足痿不收曰痰涎有聲皆屬於土又禮記注曰魚肉天産也以養陽作陽徳以為倦怠悉是濕熱之病當作諸痿治之何局方治風之方兼治痿者十居八九不思諸痿皆起於肺熱𫝊入五臟散為諸證大抵只宜補養若以外感風邪治之寧免實實虚虚之禍乎或曰諸風掉眩皆屬於肝諸暴强直皆屬於風至於振掉不能久立善暴僵仆皆以木病風者木之氣何為皆屬於火曰舌本强痰涎有聲何為皆屬於土痿論未嘗言及而吾子合火土二家之病而又與倦怠並言總作諸痿治之何也予曰按原病式曰風病多因熱甚俗云風者言末而忘其本也所以中風而有癱瘓諸證者熱甚故也又病源曰脾之脉連舌本散舌下今脾濕受邪故舌强又河間曰胃膈熱甚火氣炎上故津液湧而為痰涎潮上因甚稠粘難出故作聲也一以屬脾一以屬胃熱謂之屬火與上不亦宜乎或曰内經治痿之法獨取陽明何也曰諸痿生於肺熱只此一句便見治法大意經曰東方實西方虚㵼南方補北方此固是就生尅言補瀉而大經大法不外於此五行之中惟火有二腎雖有兩水惟其一陽常有餘隂常不足故經曰一水不能勝二火理之必然金體燥而居上主氣畏火者也土性濕而居中主四支畏本者也火性炎上若嗜欲無節則水失所養火寡于畏而侮所勝肺得火邪而熱矣木性剛急肺受邪熱則金失所養木寡于畏而侮所勝脾得木邪而傷矣肺熱則不能營攝一身脾傷則四支不能為用而諸痿之病作瀉南方則肺金清而東方不實何脾傷之有補北方則心火降而西方不虚何肺熱之有故陽明實則宗筋潤能束骨而利機關矣治痿之法無出於此駱龍吉亦曰風火相熾當滋腎水東垣先生取黄柏為君黄茋等補藥為輔佐而無一定之方有兼痰積者有濕多者有熱多者有濕熱相半者有狹寒者臨病製方其善於治痿乎雖然藥中肯綮矣若將理失宜聖醫不治也但是患痿之人若不淡薄食味吾知其必不能安全也謹按五痿等證内經特立篇目所論至詳後代諸方獨於此證槩多缺畧攷其由皆因混入中風條内故也丹溪先生痛千古之弊憫世之罹此疾者多誤于庸醫之手故叮嚀告戒極其明白有志之士必當於此究心焉若夫陳無擇謂痿因内臟不足所致誠得之矣然痿之所不足者乃隂也血也而諸方悉是補陽補氣之劑能免實實虚虚之患乎且無擇以二因立方可謂諸方之冠其餘此證猶且未明况求之於他者乎痿證治法雜方東垣清燥湯治濕熱成痿以燥金受濕熱之邪是絶寒水生化之源絶則腎虧痿厥之病大作腰以下痿軟癱瘓不能動黄茋一錢半蒼术一錢白术橘皮澤瀉各半錢五味子九箇人參白茯苓升麻各三分麥門冬當歸身生地黄麯末酒黄柏猪苓各二分柴胡黄連甘草炙各一分右咀毎半兩水煎空心熱服徤步丸治膝中無力屈伸不得腰背腿脚沉重行步艱難羌活柴胡炒滑石甘草炙𤓰蔞根酒洗各半錢防風三錢澤瀉三錢酒苦參川烏各一錢肉桂半錢酒防己一兩右為細末酒糊為丸桐子大七十丸空心煎愈風湯送下三因加味四斤丸治腎臟肝虚熱淫于内致筋骨痿弱不能勝持蓯蓉洒浸牛膝酒浸天麻乾木𤓰鹿茸燎去毛切酥炙兔絲子酒浸軟另研細熟地黄五味子酒浸各一分右為末蜜丸桐子大五十丸温酒米飲下食前按此方云熱淫于内而用温補何也然隂血衰弱血不養筋筋緩不能自勝持陽燥熱淫于内故用此養陽滋隂隂實則水升火降矣玉機微義卷二
