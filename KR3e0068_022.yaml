body:
  text: 玉機微義卷二十二明徐用誠原輯劉純續增水氣門諸經敘水氣為病所因內經曰腎者至隂也至隂者盛水也肺者太隂也少隂者冬脈也故其本在腎其末在肺皆積水也帝曰腎何以能聚水而生病岐伯曰腎者胃之關也關門不利故聚水而從其類也上下溢於皮膚故為胕腫胕腫者聚水而生病也故水病下為胕腫大腹上為喘呼不得卧者標本俱病故肺為喘呼腎為水腫肺為逆不得卧下焦溢為水王注曰下焦為分注之所氣窒不瀉則溢而為水肺移寒於腎名曰涌水云云證見後葶藶九方下諸有水氣者微腫先見於目下也針經曰水始起也目窠上微腫如新卧起之狀其頸脈動時咳隂股間寒足頸腫腹乃大其水已成矣以手按其腹隨手而起如裹水之狀此其候也肢脛者人之管以趨翔也莖垂者身中之機隂精之候津液之道也故飲食不節喜怒不時津液內溢乃下流於睪血道不通日大不休俯仰不便趨翔不能此病榮然有水不上不下也謹按內經論諸水氣皆諸臟本病也針經所引則又主飲食及七情等因皆能致之可見病機之微矣但有濕腫氣腫初皆頗相似然以手按之成凹不即起者濕也濕與水有微甚之意况有氣腫及諸水形證不同要在臨證詳審也脈經敘諸水脈證病有風水有皮水有正水有石水寸口脈沈滑者中有水氣面目腫大有熱或身體反重而酸或惡風一身悉腫脈浮不渴續自汗出而無大熱者皆為風水皮水其脈亦浮外證胕腫按之沒指不惡風其腹如鼓不渴當發其汗皮水之為病四肢腫水氣在皮膚中四肢聶聶動者防己茯苓湯主之正水其脈沈遲外證自喘石水其脈自沈外證腹滿不喘黃汗風水其脈自浮外證骨節疼痛惡風心水者其身重而少氣不得卧煩而燥其隂大腫肝水者其腹大不能自轉側脅下腹中痛時時津液生小便續通肺水者其身腫小便難時時鴨溏脾水者其腹大四肢苦重津液不生但苦少氣小便難腎水者其腹大臍腫腰痛不得溺隂下濕如牛鼻上汗其足逆冷面又瘦裏水者一身面目黃腫其脈沈小便不利故令病水也諸有水者腰以下腫當利小便腰以上腫當發汗乃愈按已上論五臟所主見證與諸經論根本不同詳見後神金散下宜並詳審論生死脈法水病脈洪大者可治微細者不可治水病脹閉其脈浮大軟者生沈細虛小者死水病腹大如鼓脈實者生虛者死論水氣生於濕熱原病式曰或云水腫者由脾虛而不能制其腎水則水氣妄行而脾主四肢故水氣遊走四肢身面俱腫者似是而實非也夫治水腫腹脹以辛苦寒藥為君而大利其大小便也經曰中滿者治之于內然則豈為脾土之虛也此説正與素問相反經曰諸濕腫滿皆屬脾土又曰太隂所主胕腫又曰濕勝則濡泄甚則水閉胕腫皆所謂太隂脾土濕氣之實甚也又經曰諸腹脹大皆屬于熱又云諸胕腫疼酸皆屬于火又曰熱勝則胕腫皆所謂心火實熱而安得言脾虛不能制腎水之實甚乎故諸水腫者濕熱之相兼也如六月濕熱太甚而庶物隆盛水腫之象明可見矣故古人制以辛苦寒藥治之蓋以辛散結而苦燥濕以寒除熱而隨其利濕去結散熱退氣和而已所以妄謂脾虛不能制其腎水者但謂數下致之又多水液故也豈知巴豆熱毒耗損腎水隂氣則心火及脾土自甚濕熱相搏則怫鬱痞膈小便不利而水腫也更宜下之者以其辛苦寒藥能除濕熱怫鬱痞膈故也若夫世傳銀粉之藥以治水腫而愈者以其善開怫鬱痞膈故也慎不可過度而加害爾况銀粉亦能傷牙齒者謂毒氣感於腸胃而精神氣血水穀能勝其毒故毒氣循經上行而至齒齦嫩薄之分則為害也上下齒縫者手足陽明之經也凡用此藥先當固濟爾或云隂水遍身而又惡寒止是寒者非也丹溪曰諸氣膹鬱皆屬於肺者諸濕腫滿皆屬於脾諸腹脹大皆屬於熱蓋濕者土之氣土者火之子故濕病每生於熱熱氣亦能自濕者子氣感母濕之變也凡病腫皆以治腫為主所挾不同治法亦異盧砥鏡治水脹辨以𨽻於腎肝胃三經而不及脾下文繼以肺金盛生水水液妄行之説豈理也哉夫脾土受病肺為之子焉有自盛而生水者哉若為腫之水果生於肺金之清氣則滋長腎隂奉行降令為生化之源何病腫之有今滲透經絡注流溪谷皆濁腐之氣窒礙津液久久灌入隧道血亦化水而欲藉脾土以制之導腎氣以利之不思脾病則肝木來侮子氣益衰木寡於畏脾欲不病不可得矣治法宜清心經之火補養脾土全運化之職肺氣下降滲道開通敗濁之氣其稍清者復回而為氣為血為津液其敗濁之甚者在上為汗在下為溺以漸而分消矣盧不明言而更曰制水燥水得非白圭以鄰國為壑乎謹按河間論水氣主於脾土濕甚為病蓋言有餘證也但脾虛受濕或濕熱自甚不足所致者為甚多故以丹溪之論併及之觀者當自審察然脈經論熱甚金衰金棄土母而歸水水藏火神土亡其子其氣衰微水為洋溢浸漬為池走擊皮膚面目浮腫歸於四肢愚醫見水直往下之虛脾空胃水逐居之云云見本文此實諸臟之本病也夫水為物元土為物母然物元物母為病則真氣危矣故不得妄下之也由是觀之則水氣之病始非氣鬱飲食濕熱諸證所致者禁不得妄下蓋恐真臟為病也是以丹溪宣明肺腎脾之意深備此理論諸證似水氣發明曰夫腳氣之疾實水濕之所為也云云見濕門河間曰結陽病主四肢脛腫四肢熱勝則腫云云論濕證似水氣詳見濕門謹按濕者水氣之漸也故治有輕重所殊爾論水氣繆刺法內經曰經脈滿則絡脈溢絡脈溢則繆刺之以調其絡脈使形容如舊而不腫故曰繆刺其處以復其形也謹按繆刺謂不分隧穴而刺之也故此水熱穴論無刺水穴分大法水溢於表或腹脹或四肢雖腫而氣稍實脈浮洪者宜行此至病氣孤危脈微弱而四肢水氣盛實者今人往往繆刺之禍不旋踵蓋不審經言脈滿絡溢宜繆刺之理也論水氣證治大法內經曰不從毫毛病生於內者隂氣內盛陽氣竭絶不得入於腹中故言五臟陽以竭也津液者水也充廓皮中隂畜於內水氣脹滿上攻於肺肺氣孤危魄者肺神腎為水害子不救母故云其魄獨居也夫隂精損削於內陽氣耗減於外則三焦閉溢水道不通水滿皮膚身體否腫故云形不可與衣相保也凡此之類皆四肢脈數急而內鼓動於肺中也肺動者謂氣急而咳也如是者皆水氣格拒於腹膜之內浮腫施張於身形之外欲窮標本其可得乎平治權衡謂察脈浮沈也脈浮為在表脈沈為在裏在裏者泄之在表者汗之故云開鬼門潔淨府也去宛陳莝謂去積久之水物猶如草莝之不可久留於身中也謹按經論水氣證治至為機密故云開鬼門潔淨府然鬼門者猶幽玄之謂有毛竅而不見其開闔邪氣感入邪與正相搏毛竅閉塞而寒熱作為病客於表故宜發汗遣邪氣以開鬼門也此亦發汗之别稱泄諸病在表之通例也淨府者謂膀胱內無入孔而外有出竅為清淨津液之府馮腎氣藏氣化水穀之精而滲入脬中氣約成溺出也夫腎主下焦司開闔關竅二隂肺脾之氣通調水道下輸膀胱氣化水行而自清淨否則便澀或濁或淋為水氣溢於腠理為膚腫諸病若宛屈陳莝壅滯於身中當泄去是物而淨潔宜此二法在表者汗之在裏者泄之權衡於治也雖然經云水病本之於肺腎二經而古今方論並不以治水獨瀉腎氣為説者何蓋腎隂奉行降令為生化之源而常不足至隂精損削於內生氣不能運化至為胕腫其氣索矣况肺弱而母氣孤危者故東垣曰若治以甘淡滲泄陽藥獨陽無隂其欲化得乎此深擷已上治例之妙也如積飲留飲傷脾若土之於雨中則為泥矣或因七情所致手足太隂俱病身面浮腫似水氣者用燥脾導氣之劑即愈一則若泥土之得和風暖日水濕去而陽化自然萬物生長一則肺氣開泄滲道通利水氣不濡於脾矣此正諸濕腫滿皆屬脾土諸氣膹鬱皆屬於肺而與隂陽為病水氣機之不同故亦不待開鬼門潔淨府而已也水氣治法發表之劑金匱越脾湯治風水惡風一身悉腫脈浮不渴續自汗出無大熱麻黃四錢石膏四錢半生薑二錢大棗二枚甘草二錢右㕮咀水煎作一服惡風加附子古今録驗加白术防己伏苓湯治皮水為病四肢腫水氣在皮膚中四肢聶聶動者防己黃芪桂枝各三錢茯苓六錢甘草二錢右㕮咀作一服水煎越脾加术湯治裏水前越脾湯加白术四錢甘草麻黃湯治裏水濟生云治水腫從腰已上俱腫宜此汗之甘草半兩麻黃一兩右㕮咀水煎作一服麻黃附子湯治水之為病其脈沈小屬少隂麻黃三錢甘草附子各二錢右㕮咀水煎黃芪芍藥桂枝苦酒湯治黃汗之為病身體腫發熱汗出而渴狀如風水脈自沈黃茋五錢芍藥桂枝各三錢右㕮咀水煎入苦酒相和作一服按已上諸方並足太陽例藥也攻裏之劑仲景十棗湯治水氣四肢浮腫上氣喘急大小便不通三因方作丸三花神佑丸方並見痰飲門按此並少隂例藥也義見痰飲例中局方神助散治十種水氣面目四肢浮腫以手按之隨手而起咳嗽喘急不得安卧小便赤澀大便不利椒目一兩半澤瀉黑牽牛末各一兩豬苓二兩葶藶三兩右為末每服三錢蔥白三莖水煎入酒調服按此太隂例藥也宣明導水丸治濕熱腫滿方見濕門按此陽明例藥也濬川散方見濕門大戟散治水腫腹大如鼓或遍身皆腫大戟白牽牛末木香等分右為細末每服三錢以豬腰子一對批開摻藥在內燒熟空心食之如食左腰子左臂塌消右消右如腫不盡於腹繞塗甘遂末飲甘草水少許其腫盡去按此並出厥隂例藥也葶藶丸治涌水證如溢囊褁裏漿或遍身腫滿按腹不堅疾行則濯濯有聲或喘咳不定葶藶炒澤瀉椒目桑白皮杏仁炒木豬苓各半兩右為末煉蜜為丸如梧子大每二三十丸蔥白湯下不拘時以利為度雄黃神金散雄黃葶藶一兩糯米和炒熟去米不用澤瀉椒目減半大戟巴戟茯苓芫花醋浸一日炒甘遂桑白皮各一兩右為末空心用井花水調下每一錢加至五錢以利為度忌鹽醋生冷油膩之物從腳腫加葶藶肚腫加椒目從隂腫加澤瀉面腫加桑白皮從四肢腫加茯苓從心腫根在助加雄黃從肢腫根在脾加甘遂從口腫根在小腸加巴戟從腰腫根在腎加大戟從膝腫根在肝加芫花按此並太陽例藥也宣明論此類方甚多宜選用之東垣續隨子丸治肺經有濕通身虛腫方見濕門按此手太隂藥也出太陽例三因消腫丸治水腫喘滿小便不利滑石木通白术黑牽牛炒通脫木茯苓茯神半夏陳皮各一錢木香瞿麥穗丁香各半錢右為末酒糊丸梧子大每五十丸燈心麥門冬湯下按此太陽例藥也已上諸方世俗多用之故收入然行者宜斟量其證輕重深淺寒熱選使則不致少有差失也滲泄之劑五苓散方見濕門按此太陽經表之裏藥也宣明葶藶木香散方見濕門按此太陽手足二經藥又表裏藥也大橘皮湯治濕熱內甚心腹脹水腫小便不利大便滑泄方見濕門按此太陽藥又氣分藥也淡寮五皮散治面目虛浮四肢腫滿心腹脹上氣喘急陳皮桑白皮生薑皮大腹皮茯苓皮右㕮咀每服半兩水煎服按此手足太隂藥也出太陽例拔萃楮實子丸治水氣鼓脹潔淨府白丁香一兩茯苓二兩楮實一斗五升熬膏右為末用膏子為丸梧子大服至小便清利及腹脹消為度後服中治調養藥按此足太陽少隂藥也機要茯苓湯治泄瀉後通身腫或胕腫或水氣者方見泄瀉門按此足太陽陽明藥也燥濕之劑局方平胃散治脾經受濕泄而胕腫蒼术厚朴陳皮甘草炙按此足陽明太隂藥也胃苓湯治脾胃濕勝傷冷泄瀉胕腫如水氣者方見泄瀉門按此足太陽太隂藥也濟生實脾散治隂水發腫用此先實脾土厚朴薑製白术木瓜木香乾薑炮各一兩草果仁大腹子附子白茯苓甘草炙各半兩右㕮咀每四錢入薑棗水煎服按此手足太陽足三隂藥也三因復元丹治脾腎俱虛發為水腫四肢虛浮心腹堅脹小便不通兩目下腫附子炮二兩木香茴香炒川椒炒獨活厚朴白术陳皮吳茱萸炒桂枝各一兩澤瀉一兩半肉果煨檳榔各半兩右為末糊丸如梧子大每五十丸紫蘇湯下按此太陽例藥也然脾為太隂腎為少隂隂氣既虛故不能化而此藥恐不合是理但宜與脾腎受寒濕為病則可故已上諸方從燥濕例庶名實不紊若前云滲泄者滲為利毛竅泄為利水竅也消導之劑金匱枳术湯枳實半兩白术二兩右二味以水五升煮取三升分溫三服楊氏消腫丸治水氣腹脹頭面四肢隂囊皆腫喘急咳嗽睡卧不安小便赤澀淡豉二兩巴豆一兩水半升煮去油京三稜泡大戟杏仁燒存性各半兩五靈脂一分右為末以生麵和杵千百下丸如菉豆大每五十丸煎桑皮白湯下東垣中滿分消丸治水氣熱脹方見痞脹門溫白丸治十種水病方見積聚門按已上諸方並太陽例藥有輕重不同宜隨證選用調理之劑三因當歸散水腫之疾多由腎水不能攝養心火心火遂不能滋養脾土故土制水水氣盈溢氣脈閉塞滲透經絡發為浮腫之疾木香赤茯苓當歸桂木通赤芍牡丹皮檳榔陳皮白术右等分㕮咀每半兩入紫蘇五葉木瓜一片煎服濟生加味腎氣丸治腎脾虛損腰重腳腫小便不利白茯苓三兩附子半兩澤瀉桂川牛膝車前子山藥山茱萸牡丹皮各一兩熟地黃四兩右為末煉蜜丸如梧子大每七十丸空心米飲下按此二方並出太陽例丹溪曰治水腫脾胃虛者宜行濕利小水使脾氣得實則自能健運自能升降運動其樞機則水自行非五苓之行水也切不可下蓋慎之也然雖無所出之法學者觀此例則思過半矣雜方嚴氏塗臍膏治水腫小便絶少地龍豬苓去皮針砂各一兩右為細末擂蔥涎調成膏敷臍中約一寸髙闊絹帛束之以小便為度日兩易玉機微義卷二十二
