body:
  text: 玉機微義醫家類提要臣等謹案玉機微義五十卷明徐用誠撰劉純續增用誠字彥純會稽人純字宗厚咸寧人用誠原本名醫學折衷分中風痿傷風痰飲滯下泄瀉瘧頭痛頭眩咳逆痞滿吐酸痓癘風癎破傷風損傷十七類純以其條例未備又益以咳嗽熱火暑濕燥寒瘡瘍氣血內傷虛損積聚消渴水氣腳氣諸疝反胃脹滿喉痺淋悶眼目牙齒腰痛腹痛心痛癍疹黃疸霍亂厥痺婦人小兒三十三類始改今名仍於目録各注續添字以相辨識或於用誠原本十七類中有所附論亦注續添字以别之是二人相繼而成本書可據明史藝文志惟著劉純之名蓋失考也其書雖皆採掇諸家舊論舊方而各附案多所訂正非餖飣抄撮者可比嘉靖庚寅延平黃焯刻於永州首載楊士竒序知二人皆明初人士竒序謂二人皆私淑朱震亨今觀其書信然又謂北方張元素再傳李杲三傳王好古南方朱震亨得私淑焉則於宗派源流殊為舛忤張李王之學皆以理脾為宗朱氏之學則以補隂為主去河間一派稍近而去潔古東垣海藏一派稍逺遺書具存可以覆按王禕青巖叢録曰李氏弟子多在中州獨劉氏傳之荆山浮圖師師至江南傳之宋中人羅知悌南方之醫皆宗之云云其宗派授受亦極明白士竒合而一之誤之甚矣乾隆四十六年十月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀玉機微義原序此編輯於會稽徐彥純吳陵劉宗厚續有增益皆明於醫者凡五十卷門分類集於論病因證治條理粲然既詳備矣夫醫家神農軒岐伊尹及秦越人張仲景之書萬世所宗不可易也歷晉唐宋代有明者近代張元素起北方蓋得神授深造閫奧再傳李明之二傳王好古南方朱彥修得私淑焉遂為醫家之正派彥純宗厚又私淑彥修者也論者謂元素醫家之王道蓋王道以養民為本元素之法厚脾土為要此知本之務也是編主素難金匱及元素一派之旨若諸家治法不倍此者亦旁采而附益之雖中醫執此施治可以成功如病者有能知之亦必不為庸醫所誤其所濟利豈小補哉東里楊士奇
