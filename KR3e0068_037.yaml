body:
  text: 玉機微義卷三十七明徐用誠原輯劉純續增心下痞滿門論痞為濕土之病内經云備化之紀其病痞又云太隂所至為積飲痞膈按原病式云痞與否同不通泰也謂精神榮衛血氣津液出入流行之紋理閉密而為痞也論傷寒心下痞成無已云傷寒心下滿者不經下後則有吐下之殊若下後則有結胸痞氣之别經曰病人手足厥冷脉乍𦂳邪結在胸中心滿而煩當吐之又云脉浮而大心下反硬有熱屬臟者攻之此二者不經汗下而心下滿或吐之或下之隨其邪氣之髙下要在泄其邪也又邪氣在表未應下而强下之邪氣乘虚結於心下實者硬滿而痛為結胸虚者滿而不痛為虚痞盖結胸是實邪大䧟胸湯主之痞是虚邪須諸瀉心湯散可也論痞為痰飲及諸氣所致詳見各門論傷寒雜病痞皆血證秘藏云内經曰備化之紀其病痞又曰太隂所致為積飲痞膈太隂者濕土也主壅塞乃土來心下為痞滿也傷寒下之太早亦為痞乃因寒傷榮血心主血邪入於本故為心下痞仲景瀉心湯數方皆用黄連以瀉心下之土邪至於酒積雜病下之太過亦作痞滿皆血證也蓋下多則亡隂亡隂者即損脾胃謂脾胃水榖之隂亡也故胸中之氣以其血虚而下䧟於心之分故致心下痞上宜理脾胃以血藥治之若全用氣藥𨗳之則其痞益甚而復下之氣愈下降必變為中滿皷脹非其治也又有虚實之殊如實痞大便秘厚朴枳實主之虚痞大便利芍藥陳皮主之飲食所傷而為痞滿者當用藥消𨗳其胸中窒塞欲吐者則宜吐之難知云傷寒痞者從血中來從外之内從無形雜病痞者亦從血中來從内之外從有形故無形以苦泄之有形以辛散之按痞之凝滯閉塞人皆知氣之不運也獨東垣指以血病言之謂下多則亡隂而損血此前人之未論也世有用氣藥治痞而不效者蓋不知此理故也論諸瀉心湯用藥寒熱不同保命集云三隂三陽之標本治各不同有用寒藥而為熱痞大黄黄連之類也有用寒熱藥者隂與陽不和而痞大黄黄連加附子之類也有用辛熱藥多而寒藥少者隂盛陽虚而痞半夏甘草生薑瀉心三方之類瀉心湯者非瀉心火之熱瀉心下之痞也通而論之其藥陽多而隂少蓋病發於隂而得之有大黄黄連瀉心湯獨為隂心下痞而脉疾一證桂枝後用從太陽浮弱所變餘皆隂陽雜用論痞為熱證直格云傷寒裏之隂分已受熱邪是病發於隂也或熱微下證未全誤下之早則裏熱除去表熱乗虚入裏而作痞也故仲景攻痞多用大黄黄連黄芩寒藥爾後或加附子乾薑之類者是以辛熱佐其寒藥欲令開發痞之怫熱結滯也非攻寒耳按前保命集論瀉心湯分隂陽寒熱多少而用藥可謂詳切矣而此論則專主於熱二者似乎不同要之各有所當葢直格是言其受病之本保命集是論其用藥之標若以為痞有隂寒之證耶則仲景瀉心五方何皆用黄芩黄連之藥若以為痞無隂陽之異耶何瀉心湯又有兼用乾薑附子半夏生薑之類者也一言其本一論其標而已謹按痞之為病由隂伏陽蓄氣與血不運而成處心下位中央䐜滿痞塞皆土之病也與脹滿有輕重之分痞則内覺痞悶而外無脹急之形脹滿則外亦有形也前人所論皆指誤下而致之葢誤下則裏氣虚故傷寒之表邪乗虚入於心下雜病則所受之邪氣亦蓄於心下因致痞也亦有不因悞下而得之如中氣虚弱不能運化精微為痞者有飲食痰積不能施化為痞者有濕熱太甚土乗心下為痞者故古方治痞用黄連黄芩枳實之苦以泄之厚朴生薑半夏之辛以散之人參白术之甘苦温以補之茯苓澤瀉之淡以滲之隨其病之所在以調之也既痞同濕治惟宜上下分消其氣如果有内實之證庶可畧與踈𨗳世人苦於痞塞喜行利藥以求速效暫時通快痞若再作益以滋甚是皆不察夫所謂下多亡隂之意也心下痞滿治法治熱之劑仲景大黄黄連瀉心湯治心下痞按之濡其脉關上浮者或寸沉關浮而有熱者大黄二兩黄連一兩右剉以麻沸湯二升漬之須臾絞去滓分温再服按此手少隂經藥也出陽明例成無已云大黄黄連以𨗳瀉心下之虚熱以麻沸湯漬服者取其氣薄而泄虚熱也又按活人云伊尹湯液論大黄黄連黄芩湯共三味今監本無黄芩脫落之也又保命集無黄芩却加甘草一兩散寒泄熱之劑仲景附子瀉心湯治心下痞而復惡寒汗出脉沉遲也大黄二兩黄連黄芩各一兩附子一枚炮去皮别煑右剉以麻沸湯二升漬之須臾絞去滓内附子汁分温再服半夏瀉心湯治汗下後身寒痞滿而嘔食飲不下脉微按之不痛非柴胡證半夏半升洗黄芩乾薑人參各三兩黄連一兩大棗十二枚甘草二兩炙右七味以水一斗煑取六升去滓再煑取三升温服一升日三服生薑瀉心湯治汗下後胃中不利乾噫食臭自利腸鳴脇下有水氣而心下痞滿比半夏瀉心湯加生薑四兩減乾薑作一兩甘草瀉心湯治下之後腹中雷鳴心下痞硬再下之痞益甚此非結熱以胃中虚客氣上逆也比半夏瀉心湯無人參加甘草作四兩按以上諸瀉心湯元戎云手少隂藥也以其心下痞故入陽明例况服梔子黄芩黄連黄栢大黄為上下通經之劑安得不例陽明乎秘藏大消痞丸治一切心下痞悶及積年久不愈者黄連炒黄芩各六錢薑黄白术各一錢炙甘草砂仁乾生薑神麯炒各一錢人參二錢枳實炒五錢橘皮二錢澤瀉三錢厚朴炒三錢猪苓一錢半半夏四錢右同為細末水浸蒸餅丸桐子大毎五十丸至百丸白湯下枳實消痞丸治右關脉浮弦心下虚痞惡食懶倦開胃進食枳實黄連各五錢乾生薑二錢半夏麯三錢厚朴炙四錢人參三錢白术三錢炙甘草二錢茯苓大麥麫各二錢右同為細末水浸蒸餅為丸毎三五十丸温水下按以上二方並半夏瀉心湯加減法也内有枳术湯四君子五苓平胃等利濕消痞補虚之藥也温中散飲之劑寳鑑枳實理中丸治中脘痞滯氣不宣通積寒停飲食不化人參乾薑炮白术枳實甘草炙各一兩右為細末煉蜜為丸如雞子黄大毎服一丸細嚼白湯下或沸湯化服活人有茯苓深師消飲丸治停飲心下痞方見痰飲門按已上二方並出陽明飲痞例理氣之劑活人桔梗枳殻湯治傷寒痞氣胸滿欲絶桔梗枳殻去穰炒各三兩右剉水二盞煎至一盞去滓分作二服按此手太隂經藥也出少隂枳殻例活人云審知是痞先用湯尤妙縁枳桔行氣下膈先用之無不驗也海藏云活人用此非治痞也審知錯下必成痞是氣將䧟於胸中故先用此使不至於痞也若已成痞而用則失之晩胸中之氣反痞矣先之一字預早之意也先用此若不應後當以仲景痞藥治之若執此治痞其害深矣宣明㯽榔散治傷寒隂證下後成痞滿而不痛按之軟虚㯽榔枳殻等分右為末毎服三錢煎黄連湯調下寳鑑三脘痞氣丸治三焦痞滯水飲停積脇下虚滿木香白豆蔲青皮炒京三稜炮各一兩㯽榔半兩半夏湯洗七次大腹子陳皮各二兩砂仁沉香各半兩右為末麫糊為丸桐子大毎服三十丸加至六十丸食後陳皮湯下按此出太隂調氣例藥也秘藏木香消痞丸治因憂氣結中脘腹皮厚微痛心下痞滿不思飲食木香半兩柴胡四錢橘皮三錢甘草炙半夏各一兩乾薑半兩當歸尾一錢紅花半錢右為細末水浸蒸餅丸服之補虚之劑加味補中益氣湯治内傷心下痞方見内傷門脉緩有痰而痞加半夏黄連脉弦四肢滿閉便難而心下痞加柴胡黄連甘草大便秘燥加黄連桃仁少加大黄歸身心下痞夯悶者加白芍黄連心下痞腹脹加五味子白芍砂仁如天寒少加乾薑或中桂心下痞中寒者加附子黄連心下痞嘔逆者加黄連生薑陳皮如冬月加黄連少入丁香藿香葉能食而心下痞加黄連半錢枳實三錢如不能食心下痞者勿加止依方服之食已心下痞别服橘皮枳术丸按難知云中滿者勿食甘不滿者當食之如自覺滿而外無脹急之形乃痞也是不滿也當以甘而撐柱之又太陽病下之腹滿時痛為脾桂枝加芍藥湯滿木也為甘所主故用芍藥之酸克其滿酸凉除滿急收能除甘所主甘温生滿緩散能除酸所主也謹按痞證有氣不運化及隂虚損血者前論已詳故收入此補虚之劑但世俗不明此理徃徃例用峻快藥下之復痞或致危篤者多矣玉機微義卷三十七
