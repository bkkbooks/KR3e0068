body:
  text: 玉機微義卷三十九明徐用誠原輯劉純續增痓門論痓病屬濕强直屬風内經曰諸痓項强皆屬於濕王注太陽傷濕又云諸暴强直皆屬於風王注陽内欎而隂行於外按内經言痓肺腎太陽督脉與夫六氣皆能為之大抵專生於濕故原病式云諸痙强直筋勁强直而不柔和也土主安靜故也隂痓曰柔痓陽痓曰剛痓亢則害承乃制故濕過極反兼風化制之然兼化者虛象實非風也又云諸暴强直皆屬於風謂筋勁强有力不柔和也然燥金主於𦂳歛短縮勁急風木為病反見燥金之化由亢則害承乃制也又況風能勝濕而為燥也愚謂土性安靜木性動搖痓病强直而安靜故主於濕風病强直而搐搦故屬於風況土氣之下木氣乗之故痓之强直有似於風又木氣之下金氣乗之金之𦂳歛勁切與土相近故風之强直有似於濕二者有本化有虛象不可不察也又按病機治痓治風之法云諸痓項强皆屬於濕寒濕同性水火同居故足太陽屬水而位下所以濕可傷也其脉下項故主項强太陽表中風加以濕客於經中内挾寒濕則筋脉抽急故痙項強而不柔和當詳有汗無汗治以流濕祛風緩發表而愈也强直屬風乃厥隂風木勢甚而成千金以强直為風治以瀉火補金木能自平矣愚謂此言痓病項强以外感風寒濕氣者言之也風病强直以風木自病者言也論傷寒剛柔二痓仲景云太陽病發熱無汗而反惡寒名曰剛痓太陽病發熱汗出而不惡寒名曰柔痓病身熱足寒頸項强急惡寒時頭熱面赤獨頭動揺卒口噤背反張者痓病也若發其汗寒濕相得其表益虚即惡寒甚按活人云太陽經先因傷風又感寒濕而致然也古人謂之痓又作痙痙者强直也古人以强直為痓外證與傷寒相似但其脉沉遲弦細而項背反張强硬如發癎狀為異耳察其有汗無汗以分剛柔二痓無汗葛根湯主之有汗桂枝加𤓰蔞湯主之剛痓胸滿口噤脚攣急咬齒當行大承氣湯愚謂剛痓柔痓並屬太陽至於項强口噤一證例太陽兼陽明也因有陽明故不冝發汗而有用大承氣湯法者難知云傷寒痓證五種皆屬太陽餘經不言聖人之大意也若頭低視下手足牽引肘膝相搆陽明痓也若一目或左或右邪視并一手一足搐搦者少陽痓也汗之止之和之下之各隨其經可使必已葢謂此也論致痓病因仲景云太陽病發汗太多因致痓風病下之則痓復發汗必拘急瘡家雖身疼痛不可發汗汗出則痓按此謂發汗下之而致痓則不專於風寒濕之外傳矣是又因壞證而成也發汗下之太過皆亡津液損血之所由也痓病脉法脉經云太陽病發熱脉沉而細者名曰痓為難治夫痓脉按之𦂳如弦直上下行痓家其脉伏堅直上下腹暴脹大為欲解脉反伏弦者痓痓病發其汗已其脉浛浛如蛇按痓證屬風寒濕所傷有汗者脉必浮緩無汗者脉必浮𦂳若其脉沉細者濕所傷也堅直上下行皆𦂳之象也發汗已如蛇亡津液而無胃氣之象也論隂陽痙活人書云隂陽二痙者陽痙屬剛痓隂痙屬柔痓以附子散桂心白术湯附子防風散八物白术湯可選而用之按仲景論剛柔二痓並屬太陽活人論隂陽二痓既以陽痙屬剛痓隂痙屬柔痓而乃以术附薑桂諸熱藥治隂痙則是以隂專為寒治矣恐非至當之論姑伺明哲其方兹不載詳見本論論風搐反張有風火之證子和書云吕君玉妻年三十病風搐目眩角弓反張數日不食諸醫皆作驚風暗風風癎治之以南星雄黄烏附用之不効戴人曰諸風掉眩皆屬肝木陽主動隂主靜由火盛制金不能平木肝木茂而自病先涌風痰二三升次以寒劑下之又以䤵針刺百㑹穴出血二盃立愈按風搐本與痓證不同而痓證屬濕土極必兼風木動搖之化風搐屬木木極必見金燥𦂳歛之形要之亦可同論故取此條以證痓病不專於風寒濕之外至亦有風火熱之内作者也論痓證屬内虛所致三因方云夫人之筋各隨經絡結束於身血氣内虛外為風寒濕熱之所中則痓以風散氣故有汗而不惡寒曰柔痓寒泣血故無汗而惡寒曰剛痓原其所因多由亡血筋無所营故邪得以襲之所以傷寒汗下過多與夫病瘡人及産後致斯疾者槩可見矣診其脉皆沉伏弦𦂳但陽緩隂急則乆乆拘攣隂緩陽急則反張强直二證各異不可不别按傷寒言痓專主外邪為病陳無擇發明血氣内虛一節實與仲景所言汗下過多者相合可謂善矣惜乎用藥未能詳明也又言隂緩陽急則太陽痓也陽緩隂急則陽明痓也論産後發痓郭稽中云産後汗出多而變痓者由産後血虛肉理不宻故多汗因遇風邪搏之則變痓冝灌小續命湯稍緩即汗出如雨手拭不及不可治也按此既云産後則血氣本虛矣汗出既多則衛氣亦虛縱有風邪乗之小續命用麻黄軰其可服乎況有虛象而實非風者哉陳無擇雖嘗論其失所用大豆紫湯大聖散亦未盡善也謹按傷寒痓病活人以太陽中風又感寒濕而致則專於外邪所傷然仲景亦有汗下過多之戒則又出於壞證所成矣葢外邪所傷者通冝解散仲景言剛柔活人分隂陽難知論經絡等諸方詳矣至於治壞證補虚救失之法諸方則亡也又千金謂温病熱入腎中亦為痓小兒病癎熱盛亦為痓若此治法俱未之見也況此二者之外又有血氣本虚之人如産後汗出多而變痓者或因七情怒氣而發痓者或因濕熱内盛痰涎壅遏經絡而作痓者治各不同也大抵傷寒有外邪之可解宜用風藥發散風寒又風藥亦能勝濕耳至於邪熱入腎亦非風藥之所能療也其内證作痓本無外邪前人豈仍用風藥處治惟宜補虚降火敦土平木清痰去濕隨證而用不可不察也痓證治法解散之劑金匱括蔞桂枝湯治太陽病其證備身體强几几然脉反沉遲此為痓病括蔞根甘草炙各二兩桂枝芍藥生薑各三兩大棗十二枚右六味以水九升煑取三升分温三服取微汗汗不出食頃啜熱粥發之按此出太陽例藥也葛根湯治太陽病無汗而小便反少氣上衝胸口禁不得語欲作剛痓方見傷寒門海藏神术湯治剛痓加羌活獨活麻黄白术湯治柔痓加桂心黄茋白术活人舉卿舉敗散治新産血虚痓者汗後中風發搐亦然荆芥穂不以多少微炒為末大豆黄卷熟以酒沃之去黄卷取汁調細末三五錢和查飲之其效如神一方只以好酒調服按此太陽厥隂經藥也按本草荆芥能發汗破結氣下瘀血除風濕痺亦是攻邪之藥若血氣果虚之人亦非所宜也攻下之劑金匱大承氣湯治痓為强腦滿口禁卧不着席脚攣急必齘齒可與見本方按此陽明經藥也陽明揔宗筋以風寒濕熱之邪入於胃津液不行宗筋無所養故急宜用此湯下濕熱行津液宣明云痓病目置口禁背强如弓卧搖動手足搐搦通宜三一承氣湯下之亦此意也然非察證之明的有内實熱者不可輕用去風養血之劑難知防風當歸散治發汗過多發熱頭面搖卒口禁背反張者宜去風養血防風當歸川芎地黄各一兩右剉毎服一兩水煎服謹按痓證發汗過多與夫血氣内虚之人自當隨證用藥古方於此等處多缺畧姑叙此方以見意爾至於發散風寒行經之藥甚多及活人治隂痙諸温藥難知分經絡用藥兹並不載用究本書玉機微義卷三十九
