body:
  text: 玉機微義卷二十七明徐用誠原輯劉純續增喉痺門論喉痺為火熱所致原病式曰喉痺痺不仁也俗作閉猶閉塞也火主腫脹故熱客上焦而咽嗌腫脹也子和曰內經云一隂一陽結謂之喉痺王太僕曰一隂者手少隂君火心主之脈氣也一陽者手少陽相火三焦之脈氣也二脈並絡於喉氣熱則內結結甚則腫脹腫脹甚則痺痺甚而不通則死矣夫推原十二經惟足太陽别下項其餘皆湊于喉嚨然內經何為獨言一隂一陽結為喉痺蓋君相二火獨勝則熱結正絡故痛且速也豫謂一言可了者火是也故十二經中言嗌乾嗌痛咽腫頷腫舌本強皆君火為之也惟喉痺急速相火所為也夫君火者猶人火也相火者猶龍火也人火焚木其勢緩龍火焚木其勢速內經之言喉痺則咽與舌其兩間耳然其病同於火故不分也後之醫者各詳其狀強立八名曰單乳蛾雙乳蛾單閉喉雙閉喉子舌脹木舌脹纒喉風走馬喉閉熱氣上行故傳於喉之兩傍近外腫作以其形似是謂乳蛾一為單一為雙也其比乳蛾差小者名閉喉熱結於舌下復生一小舌子名曰子舌脹熱結於舌中舌為之腫名曰木舌脹木者強而不柔和也熱結於咽喉腫繞於外且麻且癢腫而大者名曰纒喉風喉痺暴發暴死者名曰走馬喉痺此八種之名雖詳若不歸之火則相去逺矣其微者可以鹹耎之而大者以辛散之今之醫者皆有其藥也如薄荷烏頭殭蠶白礬朴硝銅碌之類也至於走馬喉痺何待此乎其生死人反掌之間耳其最不誤人者無如砭針出血血出則病已易曰血去惕出良以此夫昔豫治一婦人木舌脹其舌滿口諸醫不愈令以扉針小而鋭者砭之五七度腫減三日方平計所出血幾至盈斗又治一男子纒喉風腫表裏皆作藥不能下豫以涼藥灌於鼻中下十餘行外以拔毒散傅之陽起石燒赤與伏龍肝各等分細末之日以新水掃百遍三日熱始退腫始消又嘗治一貴婦喉痺蓋龍火也雖用涼劑而不可使冷服為龍火宣以火逐之火者烹飪之火是也乃使爆於烈日之中登于高堂之上令侍婢携火爐坐藥銚于上使藥常極熱不至大沸通口時時呷之百餘次龍火自散此法以熱行寒不為熱病扞格故也大抵治喉痺用針出血最為上䇿但人畏針委曲旁求瞬息喪命凡用針而有針創者宜搗生薑一塊調以熱白湯時時呷之則創口易合銅人中亦有灸法然痛微者可用病速者恐遲則殺人故治喉痺之火與救火同不容少待內經火鬱發之發謂發汗然咽喉中豈能發汗故出血者乃發汗之一端也後之君子毋執小方而曰吾藥不動臟腑又妙於出血若幸遇小疾而獲效不幸遇大病而死矣毋遺後悔可也論喉痺為傷寒所致龎氏曰經云伏氣之病古方謂之腎傷寒謂非時有暴寒中人伏毒氣於少隂經始衰不病旬月乃發脈微弱法當咽痛以傷寒非喉痺之病次必下痢謹按少隂傷寒一二日病乃不自太陽傳也因是經不足而卒中寒寒邪抑鬱內格陽氣為熱上行於咽門經會之處寒熱相搏而痛或成喉痺為醫不察脈證虛實即用寒涼之劑攻治卒致殞沒而患者自謂其分嗚呼寃哉殊不察少隂病咽痛及生瘡不能言聲不出者藥用甘苦辛溫制其標病以通咽嗌至若傷寒伏氣內發咽痛兼下利清榖裏寒外熱面赤脈微弱者用辛熱之藥攻其本病以順隂陽利止則水升火降而咽痛自無也此非雜病一隂一陽結為喉痺之比不可妄施針砭及寒涼之藥且夫火熱之動為病急速子和論治已詳然傷寒伏氣為病咽痛或腫本隂寒厥甚逼熱上行其喉為痺逼熱下行必便膿血此標熱而本寒也仲景自有治例故子和略之不議若是則火熱喉痺腫甚者急用藥吹點或刺少商合谷豐隆湧泉關衝等穴以解脈絡之結輕者內與甘辛涼劑降火制其標本亦不可便用苦寒之藥攻治倘有內寒格熱為病吾恐反增其勢矣論喉痺為痰飲所致詳見痰飲門論喉痺為氣逆所致詳見氣門論喉痺為風燥所因陳無擇云風燥皆使喉痺咽腫則不能吞乾則不能咽多因飲啖辛熱或復嘔吐咯傷致咽系乾枯之所為也與喉門自别又有懸門暴腫閉塞喉嚨亦如喉閉但懸壅在上腭俗謂鶯翁又謂之鵝聚俗語聲訛不可不備識喉痺治法點吹藥濟生二聖散治纒喉風急喉痺鴨嘴膽礬二錢半白殭蠶炒去絲嘴半兩右為末每用少許以竹管吹入喉中白礬散治急喉閉白礬一錢巴豆二箇去殼作六瓣右將礬於銚內慢火熬化為水置巴豆其內候乾去巴豆取礬研為末每用少許吹入喉中立愈楊氏一字散治時氣纒喉風漸入咽塞水榖不下牙關緊急不省人事者雄黃研蝎梢白礬枯藜蘆豬牙皂角炙各等分右為末每用一豆大鼻內嗅之立效三因玉鑰匙治風熱喉閉及纒喉風焰硝一兩半硼砂半兩白殭蠶一錢腦子一字右研勻以竹管吹半錢許入喉中立愈或加雄黃二錢名金鑰匙宣劑三因解毒雄黃丸治纒喉風及喉痺卒然仆倒失音不出聲或牙關緊急者雄黃一兩巴豆去油十四箇鬱金一錢右研醋糊丸菉豆大熱茶清下七丸吐出頑涎即蘇省未吐再服至如死者亦以物斡開口灌之下咽無有不活者吐泄些小不妨丹溪方用射干汁和逆流水吐之用桐油以鵝翎蘸探吐之用燈火油腳吐之治熱之劑局方龍腦雞蘇丸治上焦熱咽腫嗌痛方見熱門淡寮牛蒡子散治風熱上壅咽喉腫痛或生乳蛾牛蒡子研玄參升麻桔梗犀角黃芩木通甘草各等分右㕮咀每半兩水煎入生薑二片拔萃桔梗湯治熱腫喉痺桔梗甘草連翹梔子薄荷黃芩右為㕮咀入竹葉煎百一選方治咽喉腫閉山豆根洗淨新汲水浸少時右以一塊入口中含之咽下苦汁未愈再用治火之劑局方碧雪涼膈散方並見火門絳雪見下御藥院麝香朱砂丸治咽喉腫閉或作瘡或舌根腫痛者馬牙硝生用七錢鉛白霜三錢硼砂三兩龍腦三錢寒水石燒一斤麝香二錢朱砂一兩半甘草十兩熬膏右研極細用膏子和丸如桐子大朱砂為衣每含化一二丸一法減鉛霜麝甘草只五味名絳雪散龍麝聚聖丹治心脾客熱毒氣攻衝咽喉腫赤疼痛或成喉痺或結硬不消愈而復發經久不差或舌本腫脹滿口生瘡川芎一兩生地黃犀角屑羚羊角屑南琥珀南玄參連翹各半兩人參赤茯苓馬牙硝腦子麝香各三錢桔梗升麻鉛白霜研各半兩朱砂牛黃各研二錢南硼砂研一兩金箔五十片右為末煉蜜丸每兩作十丸金箔為衣以薄荷湯化下或細嚼或含化之按已上諸方有輕重之分宜隨證選用治風之劑局方如聖勝金錠子治咽喉急閉腮頷腫痛并單蛾雙乳蛾結喉重舌木舌並皆治之硫黃細研川芎臘茶薄荷葉川烏炮硝石生地黃各等分右為末生蔥汁搜和為錠每服先用新汲水灌嗽次嚼薄荷五七葉却用藥一錠同嚼極爛以井花水咽下甚者連進三服并含之即安本事方利膈湯治脾肺有熱虛煩上壅咽喉瘡腫薄荷葉荆芥穗防風桔梗人參牛蒡子炒甘草各等分右㕮咀每半兩食後水煎服治寒之劑仲景半夏湯治傷寒寒相搏咽痛或聲不出者半夏桂枝甘草炙等分右㕮咀每七八錢或半兩水煎放冷細細咽之按本論咽中傷生瘡不能言聲不出者少隂證用苦酒湯或桔梗等方皆可選用三因蜜附子治腑寒咽閉吞吐不利大附子一箇去皮臍切作大片蜜塗炙令黃右每含咽津甘味盡更以附片塗蜜炙用治痰之劑王隱君礞石滚痰丸治痰熱咽嗌腫痛不利桔梗半夏湯治痰氣不降咽腫欲成喉痺者方並見痰飲門三因玉粉丸治寒痰壅結咽喉不利語聲不出者半夏洗五錢草烏一字炒桂一字右末生薑自然汁浸蒸餅丸如雞頭大每大人一丸至夜含化多年不愈亦有效針經中説寒氣客於會厭卒然如啞此藥主之玉機微義卷二十七
