body:
  text: 玉機微義卷四十七明徐用誠原輯劉純續增厥門內經論厥證所因論曰陽氣衰於下則為寒厥隂氣衰於下則為熱厥人質壯以秋冬奪於所用下氣上爭不能復精氣溢下邪氣因從之而上也氣因於中由陽氣衰不能滲營其經絡陽氣曰損隂氣獨在故手足為之寒厥也隂氣衰於下則為熱厥由醉飽入房內亡精氣中虛熱入腎氣日衰陽盛隂虛故手足為之熱也隂氣盛於上則下虛下虛則腹脹滿腹滿則下氣重而邪氣逆逆則陽氣亂陽氣亂則令人暴不知人或至半日逺一日乃知人也名曰尸厥按本論敘六經厥狀與六經厥逆甚詳宜玩本文大抵六經之厥陽證至為㫬仆為顛疾為妄見隂證至為䐜脹大小便不利或嘔或心痛之類皆素多痰氣因虛所乘之為病也惟有輕重之殊爾如成無已注傷寒論云厥者手足冷也四逆者四肢不溫也邪在三陽則手足必熱傳到三隂則手足厥冷厥者逆也而有隂陽之殊熱極而成厥逆者陽極似隂也寒極而成厥逆者獨隂無陽也論卒厥脈法脈經曰脈至如喘名曰氣厥氣厥者不知與人言金匱方論曰寸脈沈大而滑沈則為實滑則為氣實氣相搏血氣入臟唇口青身冷即死如身和汗自出為入腑即愈此為卒厥按腑者為傳道出內之所其氣通故入腑即愈也論諸厥證寒熱不同陳無擇曰經論粗分六經殊不出寒熱二證所因欲求備治當歷明之寒厥則因多欲而奪其精故致陽衰隂盛熱厥則因醉飽入房精虛則熱入故致隂虛陽盛考其厥因多以不勝乘其所勝氣不得行遂致厥逆如腎移寒於脾則水乘於土水既不行乃成寒厥如心移熱於腎則火乘於水火既不行乃成熱厥六經皆然可次第論也尸厥亦然正由臟氣相刑或與外邪相忤則氣遏不行閉於經絡諸脈匿伏昏不知人唯當隨其臟氣而通之寒則熱熱則寒閉則通經中以數醉為熱厥之因學者不可拘此蓋傷寒溫病皆有熱厥仲景所謂熱深厥深經意以酒能發百脈熱故舉此以為例耳寒厥者初得之四肢冷脈沈微而不數多惡寒引衣自覆下利清穀外證多惺惺熱厥者初得之必發熱頭疼脈雖沈伏按之必數其人或畏熱喜冷揚手掉足煩躁不眠大小便祕赤外證多昏冒傷寒亦然謹按寒熱發厥固宜隨其隂陽勝負為治如其厥逆者不外乎傷寒寒熱二證求隂陽厥逆之淺深餘寒熱厥證是沈寒積熱發厥至若隂陽竭閉尸厥卒厥又非已上寒熱厥證之比也陳論雖稍闖其頥何治例殊未少具爾論寒熱厥證宜吐下子和曰云云謹按厥證寒熱亦有隂陽虛實不同如形氣稍實者宜從子和之法吐下之虛甚者惟宜隨其所因而調理之可也陳氏論臟氣相刑或與外邪相忤氣遏不行閉經絡脈伏昏不知人至為尸厥今世俗多作風治鮮不致斃如傳引華陀治虢太子尸厥為陽脈下墜隂脈上爭會氣閉而不通上有絶陽之絡下有破隂之紐破隂絶陽之色已發脈亂故形靜如死狀此與經言隂陽之氣盛衰為厥之旨甚微後人安能得證治之倣佛乎而以隂陽證治之可驗者較之若傷寒手足厥逆昏不知人邪正已極溫下之間稍或遲緩禍不旋踵或汗不解暴衄不知人而厥或雜病得吐衄血而厥不知人者一二日或三日必間間則為愈矣蓋隂氣尚實必身不熱熱則不厥厥則為血溫身熱主死矣暴氣厥而形實者七情所致痰飲內鬱而厥必半日或一二時必間形虛而氣逆甚者多致不救此又可見氣血為厥隂陽暴逆之甚也故不可斷作風治厥證治法通關竅之劑蘇合香丸治卒暴厥不知人未辨風痰氣厥宜與此膏化濃湯灌之惺後却議脈證用藥吐劑瓜蒂散方見痰飲門口噤者或先用搐鼻藥升發之劑三因追魂湯治卒厥暴死及主客忤鬼擊飛尸氣絶不覺口噤麻黃湯方見寒門右㕮咀水煎灌之不下者分病人髮左右捉搦按肩引之令服取效千金方加桂按此治感中邪氣之劑也治寒之劑四逆湯治寒厥表熱裏寒下利清穀食入則吐脈沈伏手足冷方見寒門按此治寒熱之劑並出寒暑例然內因氣血之劑詳見各門宜對證選用茲不詳録治熱之劑白虎湯治熱厥腹滿身重難以轉側靣垢譫語遺溺手足厥冷自汗脈沈滑方見暑門玉機微義卷四十七
