  text: 欽定四庫全書
  hash: sha256:64d9ff2e7643d8cd3464e7f4c9e75c7d6d85eb6ee80c540d6dcbeeab187b9ddc
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3e0068_WYG_033-1a, image: WYG0762/WYG0762-0402c.png}
body:
  text: 玉機微義卷三十三明徐用誠原輯劉純續增心痛門胃腕痛附諸經敘心痛所因內經曰五臟卒痛何氣使然曰寒氣客於背俞之脈則血脈泣脈泣則血虛血虛則痛其俞注於心故相引而痛按之則熱氣至則痛止矣重感於寒則痛久矣針經曰足太隂之脈其支者復從胃别上鬲注心中是動則病舌木強食則嘔胃脘痛腹脹善噎心下急痛胃病者腹䐜脹胃脘當心而痛上支兩脅鬲咽不通厥心痛者乃寒邪客於心包絡也真心痛者寒邪傷其君也手足青至節甚則旦發夕死夕發旦死脈經曰愁憂思慮則傷心傷心則苦驚喜忘善怒心傷者其人勞倦即頭面赤而下重心中痛徹背其脈弦此心臟傷所致也諸蟲痛者如心腹痛懊憹發作腫聚往來上下行痛有休作心腹中熱善渴涎出面色乍青乍白乍赤嘔吐清水者蛔咬也以手緊按而堅持之無令得移以針刺之久持之蟲不動乃出針也脈法脈經曰脈隂弦為心痛心脈微急為痛微大為心痺引背短而數心痛澀則心痛脈浮大弦長者死沉細者生論心痛有熱厥寒厥不同病機機要曰諸心痛者皆少隂厥隂氣上衝也有熱厥心痛者身熱足寒痛甚則煩躁而吐額自汗出知為熱也其脈浮大而洪當灸太溪及崑崙謂表裏俱瀉之是謂熱病汗不出引熱下利表汗通身而出者愈也灸畢服金鈴子散則愈痛止服枳术丸去其餘邪也有大實心中痛者因氣而食卒然發痛大便或祕久而注悶心胸高起按之愈痛不能飲食急以煮黃丸利之利後以藁本湯去其邪也有寒厥心痛者手足逆而通身冷汗出便溺清利或大便利而不渴氣微力弱急以术附湯溫之寒厥暴痛非久病也朝發暮死急當救之是知久病無寒暴病非熱也按此論寒厥熱厥與夫大實心痛及治法已詳然亦有病久氣血虛損及素作勞羸弱之人患心痛者皆虛痛也故錢氏曰心虛者炒鹽補之觀圖經衍義中具蠣治心痛則蠣粉與鹽實得之矣但世俗莫知其妙而先哲不言此例者欲人自求之爾論心痛分三因陳無擇云十二經絡外感六淫則其氣閉塞鬱于中焦氣與邪爭發為疼痛足厥隂心痛兩脅急引小腹連隂股相引痛手心主痛徹背心煩掌中熱咽乾目黃赤協滿足太隂心痛腹脹滿澀澀然大便不利膈閉咽塞手太隂心痛短氣不足以息季脅空痛遺失無度胸滿煩心足少隂心痛煩劇面黑心懸若飢胸滿腰脊痛背輸諸經心痛心與背相引心痛徹背背痛徹心諸腑心痛難以俯仰小腹上衝卒不知人嘔吐泄瀉此皆諸經諸俞諸腑涉邪所致病屬外所因若五臟內動汩以七情則其氣痞結聚于中脘氣與血搏發為疼痛肝心痛者色蒼蒼如死狀終日不得安息真心痛者云云見前脾心痛者如針錐刺其心腹藴藴然氣滿肺心痛者若從心間起動作痛益甚色不變腎心痛者與背相引善瘛如物從後觸其心身傴僂胃心痛者腹脹滿不下食食則不消皆臟氣不平喜怒憂鬱所致屬內因飲食勞逸觸忤非類使臟氣不平痞膈于中食飲遁注變亂腸胃發為疼痛或飲啖生冷果實中寒不能消散結而為積遇食還發名積心痛及其臟寒生蛔致心痛者所謂九種心痛曰飲飲曰食曰風曰冷曰熱曰悸曰蟲曰疰曰去來痛者除風熱冷屬外所因餘皆不內外更婦人惡血入心脾經發作疼痛尤甚於諸痛更有卒中客忤鬼擊尸疰使人心痛亦屬不內外因按此具三因病機甚詳但欠諸經病及九痛治例欲人自擴充爾然臟病連心心病連臟及胃脘病結胸之不同久新淫鬱之異隨其所甚者為療故宜其無所定之法也矧有七情九種之致者丹溪先生亦曰凡心膈之痛須分久新若明知身受寒氣口食寒物而病於初得之時當用溫散或溫利之藥若其病得之稍久則成鬱矣鬱則蒸熱熱久必生火原病式中偹言之矣若欲行溫利溫散寧無助火添病耶由是古方中多以山梔為熱藥之鄉導則邪易伏病易退然向安之後若縱恣口味病必復作凡治此病必要先問平日起居何如假如心痛有因平日喜食熱物以致死血留於胃口作痛者用桃仁承氣湯下之若此等例皆前人所未舉也學者識之心痛治法治寒之劑金匱赤石脂丸治心痛徹背背痛徹心烏頭一分炮附子半兩炮蜀椒乾薑赤石脂各一兩右末密丸如梧子大食後湯下一丸日三服九痛丸治九種心痛兼卒中惡腹脹痛附子三錢炮生狼牙二錢炙巴豆一錢去皮心熬研如脂人參乾薑吳茱萸各一錢右六味為末煉蜜丸梧子大酒下強者初服三丸三因倉卒散治氣自腰腹間攻心攣急痛不可忍腹中冷白汗如洗手足冷山梔四十九箇連皮燒半過附子一箇炮去皮臍右為末每二錢酒一盞入鹽少許煎溫服元戎术附湯治寒厥暴痛脈微氣弱甘草炙一兩白术四兩附子炮去皮臍切片一兩半右㕮咀每三錢入薑棗煎服宣明神砂一粒丹治一切厥心痛附子炮鬱金薑紅各半兩右為末醋麵糊丸如酸棗大以朱砂為衣每服一丸男子酒下婦人醋湯下按已上出少隂例藥也機要藁本湯治大實心痛大便已利宜此服之藁本半兩蒼术一兩右為粗末水煎服按此足太隂太陽藥也東垣麻黃豆蔻丸治客寒犯心胃大痛不可忍麻黃不去節一錢草豆蔻五錢益智仁八分炒麯二錢升麻半夏麥蘖砂仁黃茋白术陳皮柴胡炙甘草吳茱茰當歸身各半錢木香青皮厚朴畢澄茄各四分蘇木三分紅花二分右為末湯浸蒸餅為丸如桐子大每三十丸溫水下或細嚼按此出太陽例又氣血之劑也治熱之劑大陷胸湯治熱結胸中脈沉而緊心下痛按之石硬大黃六錢芒硝半合甘遂一分右先煮大黃後下硝遂末取溫服按此陽明例藥也機要金鈴子散治熱厥心痛或發或止久不愈者金鈴子玄胡各一兩右為末每服二三錢酒調下溫湯亦得瑞竹堂方應痛丸治心氣痛不可忍者好茶末四兩揀乳香二兩右為末用臘月兔血和丸如雞頭大每服一丸溫醋湯下按此二方少隂經藥也調血之劑元戎四神湯治婦人血虛心腹㽱痛本方減地黃加乾薑濟生愈痛散治急心痛胃脘痛五靈脂玄胡索炒莪术良薑當歸右等分為末每一錢熱醋湯調下不拘時候服錢觀文方治心脾疼當歸八兩白术一分右為末沸湯點服一二錢丹溪方治死血胃脘痛者玄胡一兩半桂滑石紅花紅麯各半兩桃仁三十箇右為末湯浸蒸餅丸按已上並厥隂例藥也治血虛血實例各不同宜選用理氣之劑局方蘇合香丸治疰忤鬼氣卒心痛方見氣門按此厥隂例藥也然世俗多用蟠䓤散方見疝門宜較輕重選使元戎立應散治心腹急痛香附子炒良薑等分右細末每二錢湯點服濟生加味七氣湯治七氣為病及外感風寒為心痛半夏五兩桂玄胡炒各一兩人參甘草各半兩乳香三錢右㕮咀每四錢入薑煎按已上太隂例藥也理氣調血之劑楊氏方郤痛散治心氣冷痛不可忍五靈脂蒲黃炒一兩半當歸桂石菖蒲木香胡椒各一兩川烏炮七錢半右㕮咀每四錢入鹽醋少許煎按此出厥隂例藥也百一選方手拈散治心脾疼草果玄胡五靈脂沒藥右等分每三錢溫酒調下宣明沒藥散治一切心肚疼痛不可忍者沒藥乳香各三錢穿山甲炙五錢木鱉子四錢右為末每半錢至一錢酒大半盞同煎溫服消導之劑元戎厚朴丸治大實心痛方見積聚門百一選方薑橘丸治中酒惡心心脾痛嘔逆生薑一斤青鹽一兩淹一宿青皮砂仁木香各三分莪术一兩甘草炙陳皮一兩半右末煉蜜丸杵千下丸如櫻桃大每丸鹽湯下易簡感應丸治酒積食積痰積為患心腹㽱痛丁香木香豆蔻乾薑巴豆杏仁百草霜右用見成丸子半兩入巴豆十個去殼研成膏用烏梅三箇蒸過去肉三件一處研令極勻丸如菉豆大每三五丸溫水下丹溪方治痰飲積胃脘痛螺螄殼墻上年久者燒滑石炒蒼术山梔香附南星各一兩枳殼青皮木香半夏砂仁各半兩右為末生薑汁浸蒸餅丸如菉豆大每三四十丸薑湯下春加川芎夏加黃連秋加芍藥冬加吳茱茰半兩按已上出太隂例藥也治蟲之劑三因集效丸治臟腑虛弱或多食甘肥致蛔動作心腹絞痛木香鶴虱炒檳榔訶子煨去核蕪荑炒附子炮乾薑炒各七錢半大黃一兩半炒右為末密丸如梧子大每三十丸食前橘皮湯下婦人醋湯下按此陽明例藥也姑録此以備其例雜方衍義方銅青一味淡醋湯調些小服之集録方荔枝核一味燒存性為末用醋湯調下一錢失笑散治心腹痛百藥不效五靈脂蒲黃等分右為末先以釅醋調二錢熬成膏入水一盞食前溫服玉機微義卷三十三
