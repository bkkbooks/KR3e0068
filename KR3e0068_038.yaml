body:
  text: 玉機微義卷三十八明徐用誠原輯劉純續增吐酸門吞酸附論吐酸屬熱内經云諸嘔吐酸皆屬於熱又云少陽之勝嘔酸原病式云酸者肝木之味也由火勝制金不能平木則肝木自甚故為酸也如飲食熱則易於酸矣是以肝熱則口酸也或言為寒者但謂傷生硬冷物而喜噫醋吞酸故俗醫主於温和脾胃豈知人之傷於寒也則為病熱蓋寒傷皮毛則腠理閉宻陽氣怫欎而為熱故傷寒熱在表以麻黄湯熱藥發散使腠理開通汗泄熱退而愈也凡内傷冷物者或即隂勝陽而為病寒或寒熱相搏而致腸胃陽氣怫欎而為熱亦有内傷冷物而反病熱得汗泄身凉而愈也或微而吐為中酸俗謂之醋心法宜温藥散之亦猶解表之義若久喜酸不已則不宜溫之宜以寒藥下之後以凉藥調之結散熱去則氣和也所以中酸不宜食粘滑油膩者謂能令氣欎不通暢也宜食糲食菜蔬能令氣通利也論雜病吐酸與病機外邪不同發明云病機諸嘔吐酸皆屬於熱此上焦受外來客邪也胃氣不受外邪故嘔仲景以生薑半夏治之以雜病論之嘔吐酸水者甚則酸水浸其心不任其苦其次則吐出酸水令上下牙酸澁不能相對以大辛熱藥療之必减吐酸水嘔出也酸味者收氣也西方肺金旺也寒水乃金之子子能令毋實故用大醎熱之劑瀉其子以辛熱為之佐而瀉肺之實以病機作熱攻之誤矣葢雜病醋心濁氣不降欲為中滿寒藥豈能治之乎按吐酸原病式為熱而此作寒論治者葢東垣以内傷不足之病末傳寒中濁氣不降不宜用寒藥治療乃指為寒却以素問病機之説作外感客邪論與諸腹脹大論分寒熱脹義相同以下文丹溪之論觀之其説方備辯素問東垣論酸不同丹溪云或曰吐酸素問明以為熱東垣又言為寒何也予曰吐酸與吞酸不同吐酸是吐出酸水如醋平時津液隨上升之氣欎積而成欎積之乆濕中生熱故從火化遂作酸味非熱而何其有欎積之乆不能自湧而出伏於肺胃之間咯不得上咽不得下肌表得風寒則内熱愈欎而酸味刺心肌表溫煖腠理開發或得香熱湯丸津液得行亦可暫解非寒而何素問言熱者言其本也東垣言寒者言其末也但東垣不言外得風寒而作收氣立説欲瀉肺金之實又謂寒藥不可治酸而用安胃湯加减二陳湯俱犯丁香且無治濕熱欎結之法為未合經意予嘗治吞酸用黄連茱萸各炒隨時令迭其佐使蒼术茯苓為輔佐湯浸炊餅為小丸吞之仍教以糲食蔬菜自養則病易安謹按吐酸一證以病機言之則屬於熱以臟腑論之則脾胃受病以内邪言之則痰飲宿食之所為故治法熱者寒之脾惡濕以苦燥之有痰飲者清之散之分利之有宿食者消之𨗳之驅逐之局方不察斯故以噫醋吞酸醋心吐酸水之證並入於諸氣門中率用溫熱之藥豈吐酸專主於寒而無他證也故此一門以叙河間東垣丹溪之論其病源治法無餘蘊矣吐酸治法治寒溫胃之劑發明藿香安胃散治脾胃虚弱不進飲食嘔吐不待腐熟藿香丁香人參各二錢半陳皮五錢右為細末毎服二錢水煎入生薑按此手太隂足陽明太隂經藥也加减二陳湯治痰飲為患嘔吐頭眩心悸或因食生冷脾胃不和丁香一兩半夏陳皮各五兩茯苓三兩甘草一兩半右㕮咀四錢水煎入生薑煎服按此出太隂嘔噦例藥也三因麹末丸治中脘宿食留飲酸蜇心痛口吐清水神麯炒三兩蒼术泔浸三宿洗淨日乾炒一兩半陳皮一兩右為末生薑汁别煑神麹糊為丸薑湯送下按此足陽明足太隂經藥也謹按吐酸諸方前人作寒藥治之甚多兹不詳載至於治熱之藥前人既以斯證為寒所以絶無其方也若夫消痰去食解外寒治欎熱之法又當隨證用焉玉機微義卷三十八
