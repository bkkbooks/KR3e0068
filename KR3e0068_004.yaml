body:
  text: 玉機微義卷四明徐用誠原輯劉純續増痰飲門痰飲脉法要畧云脉雙弦者寒也皆大下後善虚脉偏弦者飲也肺飲不弦但苦喘氣短又云脉浮而細滑者傷飲脉弦數有寒飲冬夏難治脉沉而弦者懸飲内痛其人短氣四支歴節痛脉沉者有留飲陳無擇云飲脉皆弦㣲沉滑或云左右闗脉大者膈上有痰也可吐之病人百藥不效闗上脉伏而大者痰也眼皮及眼下如灰烟黒者痰也仲景四飲要畧云四飲者懸飲留飲支飲痰飲是也其人素盛今痩水走腸間瀝瀝有聲謂之痰飲飲後水流在脇下欬唾引痛謂之懸飲飲水流於四支當汗出而不汗身體重痛謂之溢飲欬逆倚息短氣不得卧其形如腫謂之支飲又有留飲者背寒如手大或短氣而渴四支歴節疼脇下痛引缺盆欬嗽則轉甚又有伏飲者膈滿嘔吐喘咳發則寒熱腰背痛目泪出其人振振惡寒身瞤惕病溢飲者當發其汗懸飲者法當下之痰飲者當以温藥和之按古方謂四飲生六證者即四飲加伏飲留飲也或云五飲者即留飲伏飲合為一證也三因為痰飲用温藥從小便去之支飲則隨證汗下以補四飲之治法愚嘗觀仲景治飲諸方之意在表者汗之在裏者下之挾濕則分利之寒熱温涼隨其所屬以治之何必拘此四證痰分三因陳無擇云人之有痰飲者由榮衛不清氣血濁敗凝結而成也内則七情汩亂臟氣不行鬱而生涎涎結為飲為内所因外則六淫侵冐𤣥府不通當汗不泄蓄而為飲為外所因或飲食過傷色慾無度運動失宜津液不行聚為痰飲屬不内外因其為病也為喘為欬為嘔為泄為眩暈嘈煩忪悸愪㦜寒熱疼痛腫滿攣癖癃閉痞鬲如風如癲未有不由痰飲所致按此分三因為病之状至為切當而其論中所引三因之藥有外因而用裏藥者有内因而用表藥者其意詳見方後論中論治痰理氣之論嚴氏云人之氣道貴乎順順則津液流通决無痰飲之患古方治飲用汗下温利之法愚見不若以順氣為先分導次之氣順則津液流通痰飲運下自小便中出矣按嚴氏謂氣順則痰自下之說葢以人之七情鬱結氣滯生涎聚為痰飲治者能使氣道通利則痰自降下也然有病人元有痰積其氣因痰而結滯者豈但理氣而痰能自行耶必先逐去痰結則滯氣自行豈可専主一說又云人身無倒上之痰天下無逆流之水此乃齊東之語夫水性潤下搏而躍之則可使過顙痰性順下被火泛上亦可至巔今庸醫莫察其義又毎口誦以語人良可悲夫論痰為諸病王隱君論云痰證古今未詳方書雖有五飲痰諸飲之異而莫知其為病之源或頭風眩目運耳鳴或口眼蠕動眉稜耳輪俱痒或痛或四支游風腫硬而似疼非疼或為齒頰痒痛牙齒浮而痛痒不一或噫氣吞酸心下嘈雜或痛或噦或咽嗌不利咯之不出嚥之不下其痰似墨有如破絮挑膠蜆肉之狀或心下如停冰鐡心氣冷痛或夢寐竒怪之狀或足腕酸軟腰腎骨節卒痛或四支筋骨疼痛難名並無常所乃至手麻臂疼狀若風濕或脊上毎日一條如線之寒起者或渾身習習如卧芒刺者或眼粘濕痒口縻舌爛喉痺等證或遶項結核狀若瘰􅊓或胸腹間如有二氣交紐噎塞煩悶有如烟火上衝頭面烘熱或為失志顛狂或中風癱瘓或勞瘵荏苒之疾或風毒脚氣或心下怔忡如畏人捕或喘𠻳嘔吐或嘔冷涎緑水黒汁甚為肺癰腸毒便膿攣跛葢内外為病百般皆痰所致其狀不同難以盡述葢津液既凝為痰不復周潤三焦故口燥咽乾大便秘面如枯骨毛髪焦槁婦人則因此月水不通若能逐去敗痰自然服餌有效余嘗用一藥即衮痰丸以愈諸疾不可勝數矣今特相𫝊於世云脉經云病人一臂不遂時復移在一臂其脉沉細非風也必有飲在上焦活人書云中脘有痰亦令人憎寒發熱惡風自汗胸膈痞滿有類傷寒但頭不痛項不强為異按所叙病證患者十居八九足見痰之為病誠多也何則人血氣流行無一息間斷纔有壅滯津液凝閉鬱而成熱痰遂生焉人於六滛七情飲食起居之際豈能一一中節而無所壅滯乎故余特叙脉經活人二條以證隱君之說有所本也但所製衮痰丸一方難以通治諸疾論飲専主於濕原病式曰積飲留飲積蓄而不散也水得於燥則消散得濕則不消以為積飲土濕主痞故也論痰證有五子和云凡人病痰者有五一曰風痰二曰熱痰三曰濕痰四曰酒痰五曰食痰葢風痰者形寒飲冷熱痰者火盛制金濕痰者停飲不散酒痰食痰者飲食過傷所致按痰乃積飲所化故原病式列於太隂濕土之條又子和有五痰之說葢其實一出於濕而所挾所因有五者之異故王隱君之方書論痰有五曰風痰寒痰熱痰氣痰味痰夫味痰者因飲食酒醪厚味而然也氣痰者因事逆意而然也熱痰者因飲食辛辣炙煿重䄄厚服而然也寒痰者因冐寒凉而然也風痰者因感風而發或風熱拂鬱而然也此皆素抱痰氣因風寒氣熱味而作非别有此五種之痰也愚謂治法當以痰為本以所挾之氣為標也論痰清濁王隱君云論痰清白者為寒黄而濁者為熱殊不知始則清白久則黄濁清白稀薄漬於上黄濁稠粘凝於下嗽而易出者清而白也欬而不能出則黄濁結滯者也若咯唾日久濕熱所鬱上下凝結皆無清白者也甚至帶血血敗則黒痰為闗格異病人所不識又清白者氣味淡日久者漸成惡味酸辣腥臊焦苦不一按此以痰之新乆分清濁可謂得病機之情矣飲當去水温補轉劇論子和云留飲一證也古人有四飲五飲之分皆觀病之形狀而定名也予論飲之所得其來有五有憤鬱而得之者有因乏而得之者有思慮而得之者有痛飲而得之者有熱而傷冷得之者飲證雖多其因無出於此夫水隂物也但積水則生濕停酒則發燥久則成痰在左脇者同肥氣在右脇者同息賁入肺則多嗽入大腸則為瀉入腎則為湧水在太陽則為支飲皆由氣逆而得之故在上則面浮在下則胕腫在中者支滿痞鬲痰逆在陽不去者久則化氣在隂不去者久則成形今之用方者例以飲為寒積皆用温熱之劑以補之燥之水濕未除反増心火况留飲無補法氣方補則轉増豈知内經所謂留者攻之也且白术參苓服之尚加閉塞况燔針艾火其痞可知前人處五飲丸用礬石巴豆烏附雖是下攻終同燥熱今劉河間以十棗湯加大黄牽牛製三花神祐丸新得之疾服之氣流飲去而愈昔有病數年不愈予診之左手皆微小右手皆滑而大微小為寒滑大為燥以𤓰蒂散湧其寒痰數升汗出如沃次以導水丸禹功散去腸中燥垢亦數升其人半愈然後以痰劑流濕降火開其胃口不踰月而差按此論飲乃水濕所為發為諸證不宜温補可謂詳明但専以三花神佑丸為說則失之太峻也詳見總論中論局方用熱藥治諸氣痰飲嘔吐膈噎之誤丹溪曰夫氣之初病也其端甚微或因飲食不謹或外觸風兩寒暑或内感七情或食味過厚偏助陽氣藴為膈熱或資禀充實表密無汗津液不行清濁相干氣為之病或痞或痛或不思食或噫腐氣或吞酸或嘈雜或膨滿不求病原便認為寒遽以辛香燥熱之劑投之數貼時暫得快以為神方厚味仍前不節七情又復相仍舊病被刼暫開濁液易於攢聚或半月或一月前證復作如此延曼自氣成積自積成痰此為痰為飲為吞酸之由也良工未遇謬藥又行痰挾瘀血遂成窠囊此為痞為痛為嘔以為噎鬲反胃之次第也飲食湯液滯泥不行滲道蹇濇大便或秘或溏下失𫝊化中焦愈停醫者不察猶執為冷翻思前藥隨手得失至此賔主皆恨藥欠燥熱顒俟久服可以温脾壯胃消積行氣以兾一旦豁然之效不思胃為水糓之海多血多氣脾為消化之器氣清和則徤而運行不息今久得香熱之味偏助氣血沸騰其始也胃液凝聚其久也脾氣耗散𫝊化漸遲醫者又曰虚而積寒非尋常草木可療徑以烏附助佐丹劑専意服之積而久也血液俱耗胃脘乾槁遂成鬲噎亦曰反胃仲景論飲有六分别五臟諸證可表者汗之可下者利之滯者導之鬱者揚之熱者清之寒者温之偏熱偏寒者反佐而行之挾濕者淡以滲之挾虚者補而養之治法至矣第恨醫者不善處治病者不守禁忌遂使藥助病邪展轉深痼去生漸逺深可哀憫按此論嘔吐痞滿噫腐吞酸噎鬲反胃致病之由皆以氣之初病誤服燥熱結為痰飲所致故列於痰飲門中而於彼諸證内不詳載宜於此通考焉謹按痰之為病仲景論四飲六證無擇叙内外三因俱為切當葢四飲則叙因痰而顯諸證者三因則論其因有所傷而生痰者也唯王隱君論人之諸疾者悉出於痰此發前人所未論可謂深識痰之情狀而得其奥者矣製衮痰丸一方總治斯疾固為簡便較之仲景三因有表裏内外而分汗下温利之法則疎濶矣况又有虚實寒熱之不同者哉夫痰病之原有因熱而生痰者亦有因痰而生熱者有因風寒暑濕而得者有因驚而得者有因氣而得者有因酒飲而得者有因食積而得者有脾虚不能運化而生者若熱痰則多煩熱風痰多成癱瘓竒證冷痰多成骨痺濕痰多倦怠軟弱驚痰多成心痛癲疾飲痰多成脇痛臂痛食積痰多成癖塊痞滿其為病狀種種難名王隱君論中頗為詳盡學者但察其病形脉證則知所挾之邪隨其表裏上下虚實以治也若夫子和謂飲無補法必當去水故用吐汗下之三法治人常愈又論熱藥治痰之誤固為精切亦有挾寒挾虚之證不可不論夫久痰凝結膠固不通狀若寒凝不用温藥引導必有拒格之患况有風寒外束痰氣内鬱者不用温散亦何以開鬱行滯也又有血氣虧乏之人痰客中焦閉塞清道以致四支百骸發為諸病理宜導去痰滯必當補接兼行又難拘於子和之三法也大凡病久淹延卒不便死者多因食積痰飲所致何以然葢胃氣亦賴痰積所養飲食雖少胃氣卒不便虚故也亦有治痰用峻利過多則脾氣愈虚津液不運痰反又生而愈盛法當補脾胃清中氣則痰自然運下此乃治本之法世謂醫中之王道者正此類也論痰證有似邪祟詳見補虚門痰飲治法解表之劑仲景大青龍湯小青龍湯並治溢飲者當發其汗二方並見傷寒門按二方太陽經發散風寒之藥辛温之劑也小青龍用乾薑細辛半夏以治水氣葢傷寒表未解心下有水飲水寒相搏乃為喘欬諸證故用此發汗散水金匱要畧借為治飲之方也三因參蘇飲治痰積停積胸膈中脘閉嘔逆痰涎眩暈嘈煩或頭痛發熱狀如傷寒方見局方按此出少陽柴胡例藥治感冐異氣挾痰飲之病本方云前胡葛根但能解肌枳殻橘紅輩自能寛中快膈毋以性凉為疑愚觀藥性非凉亦是辛平之劑局方金沸草散治風化痰除頭項強寒熱欬嗽旋覆花荆芥麻黄去節前胡各一兩甘草炙赤芍半夏製各三錢右咀薑棗煎活人金沸草散去麻黄赤芍加茯苓細辛按此出陽明旋覆花代赭石例解利治痰之藥也局方氣味辛平活人則辛温攻下之劑金匱十棗湯治懸飲内痛芫花熬甘遂大㦸各等分右搗篩以水一升半煑大棗十枚至八合去柤内藥末強人一錢匕羸人半錢平旦服之不下更加半錢快下後以糜粥自養按此出少隂水氣例藥芫花之辛以散飲二物之苦以泄水甘遂直達水氣所結之處乃泄水之聖藥性有毒不可輕用下同三因控涎丹凡人忽患胸背手足頸項腰胯隱痛不忍筋骨牽引釣痛時時走易不定乃是痰涎在心鬲上下變為此疾或手足冷痺氣脉不通誤認癱瘓非也甘遂去心紫大㦸去皮真白芥子各等分右為末糊丸桐子大晒乾食後臨臥淡薑湯或熟水下五七丸至十丸痰猛加丸數一方妙應丸亦只上三味驚痰加硃砂痛者加全蝎酒痰加雄黄全蝎臂痺加木鱉子去油殻驚氣成塊者加穿山甲鱉甲𤣥胡索蓬术熱痰加盆硝寒痰加丁香胡椒桂宣明三花神祐丸十棗湯加牽牛大黄輕粉詳見下劑按以上二方仍十棗湯加減法也並出少隂水氣例前方去芫花加白芥子本草主上氣發汗胸膈痰冷葢胸有痰非此不達此方加牽牛大黄大瀉血氣之濕熱而輕粉又去涎積也虚家不可輕用金匱厚朴大黄湯治支飲脇滿者厚朴一尺大黄六兩枳實四枚右水五升煮二升温服按此即小承氣湯陽明可下例藥也王隱君衮痰丸括曰甑裏翻身甲掛金于今頭戴草堂深相逢二八求斤正硝煆青礞倍若沉十七兩中零半兩水丸桐子意常斟千般怪證如神效水瀉雙身却不任按此以大黄黄芩為君大瀉陽明濕熱之藥礞石以墜痰沉香則引諸氣上而至天下而及泉為使也有實熱者可用脾胃論蠲飲枳實丸逐飲消痰導滯清膈枳實半夏陳皮去皮各二兩黒牽牛半斤取末二兩右末水煮麪糊丸桐子大毎五十丸薑湯下瑞竹堂方神仙墜痰丸皂角不蛀者去皮弦酥炙黄色去子净一兩六錢黒牽牛一斤取頭末四兩生白礬一兩二錢右為細末清水丸桐子大毎五十丸空心温酒下寳鑑大利膈丸風痰實滿喘嗽風氣上攻黑牽牛四兩生用半夏皂角青皮各二兩槐角一兩炒木香半兩加㯽榔大黄各五錢右為細末薑汁糊丸桐子大食後薑湯下五十丸滌痰丸治三焦氣塞下痰飲酒食黒牽牛二兩炒取末木香㯽榔青皮陳皮三稜大黄煨枳殻半夏各一兩右末糊丸桐子大毎服五十丸食後薑湯下按以上四方所用牽牛皂角木香㯽榔者並出厥隂例藥也牽牛以大黄引之則入血以諸氣藥引之則入氣本瀉氣中濕熱之藥大能脫人元氣用者戒之透羅丹治痰實欬嗽胸膈不利皂角酥炙去皮弦一兩黒牽牛微炒一兩杏仁麪炒黄去皮尖一錢巴豆去油另研一錢半夏一兩大黄一兩紙裹水浸慢火焙乾右為細末生薑自然汁為丸桐子大食後薑湯下三十丸按此仲景備急丸加減法也破堅積結聚寒熱兼用之藥也三因破飲丸治五飲停蓄結為癥癖支滿胸脇搶心疼痛畢撥丁香胡椒砂仁青皮烏梅肉巴豆去皮木香蝎稍各等分右以青皮同巴豆漿水浸一宿次日漉出同炒橘皮焦去巴豆將所浸水淹烏梅肉炊一熟飯細研為膏如菉豆大毎服五十丸臨臥薑湯下津咽亦得按此破堅積寒癖大熱之藥也局方妙香丸治一切久逺沉積巴豆膩粉硇砂硃砂牛黄水銀腦麝右分兩修製見本方按此用巴豆􅔈砂削堅破癖加以腦麝等辛香飛竄通達五臟入骨透肌之藥也錢氏白餅子巴豆二卜四箇去皮膜水一斗煮水盡為度半夏湯浸七次焙為末輕粉滑石天南星各一錢右研勻巴豆後入衆藥以糯米飯為丸小豆大捻作餅子煎葱白湯下按此錢氏用治小兒風痰驚涎癲癎驚搐下痰之藥也以上所用巴豆等方葢以痰飲癖積結聚堅固非此不能除故易老號斬關奪門之將然大宜詳審不可輕用古方巴豆加減寒熱温凉五色佐使之藥甚多用之各隨其宜並見元戎吐劑仲景𤓰蒂散子和三聖散並見吐劑稀涎散猪牙皂角碌礬晉礬藜蘆元戎勝金丸薄荷𤓰蒂藜蘆硃砂猪牙皂角按以上用𤓰蒂藥並出三陽可吐藥例古今吐法以病在頭或在胸中但在上焦者皆可用也在經絡者亦可用吐法中就有發散之義焉諸亡血虚家不可用此分利之劑仲景五苓散治痩人臍下悸吐涎沫而癲眩者水也方見濕門治濕和中之劑金匱苓桂术甘湯治心下有痰飲胸脇支滿目眩茯苓四兩桂枝白术各二兩甘草二兩右水六升煮取三升三服小便即利按此太陽經藥也茯苓湯治胸中有痰飲自吐出水後心胸間虚氣滿不能食消痰氣令能食茯苓人參白术各三兩枳實二兩橘皮二兩半生薑四兩右水六升煮取一升八合分温三服按此足太隂陽明經藥也枳术湯治心中堅大如盤水飲所作方見水氣門按此足太隂陽明經藥也澤瀉湯治心下有支飲其人苦眩冐澤瀉五兩白术二兩右以水二升煑取一升分温再服按此足太隂陽明太陽少隂經藥也小半夏湯治心下水支飲嘔吐不渇半夏一升生薑半斤右以水七升煮取一升半分温再服按此足太隂陽明經藥也小半夏加茯苓湯治卒嘔吐心下痞隔間有水眩悸者三因名半夏湯半夏一升生薑半斤茯苓三兩右同煎服如前按此足太隂陽明太陽手太隂經藥也按以上諸方並出太隂痰飲例藥也白术除濕益燥和中益氣半夏治寒痰和胃勝濕茯苓澤瀉逐水利小便上下分消其濕也局方橘皮半夏方方見本方局方二陳湯治痰飲為患嘔吐惡心頭眩心悸等證方見本方桔梗半夏湯治胸痞痰涎不利氣逆嘔噦桔梗半夏陳皮右等分細末生薑水煎薑糊丸亦可加枳實減半名桔梗湯嚴氏導痰湯治一切痰飲頭目眩暈或痰飲留積不散方見本方右剉薑煎按以上所用橘半等乃足太隂陽明經藥也出太隂嘔噦例許學士神术丸治痰飲茅山蒼术一斤米泔浸一宿去皮切片焙乾為末生油麻半兩水二盞研細取漿大棗十五箇煮取肉研旋入麻漿拌和藥右末為丸桐子大日晒乾毎服五七十丸温酒空心下按此足陽明太隂經藥治濕發散之藥也仁齋加味二陳湯治痰攻眼腫痛并酒家手臂痛重成麻痺二陳湯中加蒼术片子薑黄製枳殻各少許芎夏湯逐水利飲二陳湯加川芎白术青皮枳殻右剉薑五片煎葢川芎半夏能逐水也按此二方乃二陳湯加蒼术川芎等藥是亦治濕帶表之藥也治風痰之劑局方青州白丸子方見小兒門按此足太隂經藥出厥隂例治風痰行經通痺之熱藥也局方玉壺丸南星半夏天麻白麪辰砂化痰丸南星半夏辰砂白礬右主治修製並見本方易老水煮金花丸治風痰脉弦欬嗽南星半夏各一兩生用天麻五錢白麪三兩雄黄一錢寒水石一兩燒存性右為細末滴水為丸小豆大毎服五七十丸至百丸煎漿水沸下藥煮浮為度漉出淡漿水浸另用生薑湯下或通聖加半夏局方川芎丸防風丸皆可用也按以上三方並出太隂嘔噦例治痰挾風之凉藥也良方天南星丸治婦人風疾半夏麯一兩天南星一兩炮晉礬半兩枯白附子炮皂角仁炒黄各一兩按此足太隂厥隂經藥也熱痰之劑仲景小䧟胸湯半夏黄連括蔞實右先以水二􅊦煎括蔞實至一􅊦半下諸藥煎八分温服未利再服嚴氏半夏丸治肺熱痰嗽𤓰蔞仁另研半夏湯洗焙各一兩右件和勻薑汁打糊丸按此小䧟胸加减法也機要小黄丸治熱痰人參黄芩南星半夏生薑右薑汁糊為丸一方南星半夏黄芩只三味宣明茯苓半夏湯治風熱痰涎二陳湯中加黄芩按此手足太隂經藥也人參半夏丸化痰治涎止欬定嗽諸痰不可盡述人參茯苓南星各半兩半夏乾生薑生白礬寒水石各一兩薄荷葉半兩蛤粉二兩藿香葉一分一法加黄連半兩黄栢二兩右為末麪糊丸如小豆薑湯下二三十丸食後治寒痰之劑深師消飲丸治停飲胸滿嘔逆腹中水聲不思飲食白术二兩枳實炒乾薑各七錢茯苓半兩右細末蜜丸桐子大温水下三十丸寳鑑温胃化痰丸治膈内有寒脾胃傷飲胸膈不快痰涎不已陳皮乾薑白术各一兩半夏三兩右為末薑汁糊丸桐子大薑湯下二十丸局方温中化痰丸治停痰留飲青皮良薑乾薑陳皮右主治修合見本方局方丁香五套丸治脾胃虚弱不能宣行水穀故為痰飲結聚胸膈嘔吐不食方見本方按以上諸方乃温胃燥濕治寒痰温裏之藥也若久痰凝滯内藴濕熱悮服燥熱多成吞酸膈噎等病用者審之發明半夏温肺湯治中脘痰水冷氣心下汪洋嘈雜多唾清水脇脹不食此胃虚冷所致其脉沉弦細遲旋覆花細辛桂心人參甘草陳皮桔梗芍藥半夏各半兩赤茯苓三分右咀四錢薑七片煎丁香半夏丸治心下停飲冷痰㯽榔三分丁香半夏各一兩細辛乾薑人參各半兩右細末薑汁糊為丸毎服三十丸薑湯下機要薑桂丸治寒痰南星半夏官桂各一兩右細末糊丸桐子大毎服五七十丸薑湯下按以上三方治寒燥痰温中散表寒之藥也理氣之劑局方四七湯治七情氣鬰結聚痰涎狀如破絮或如梅核在咽喉之間咯不出咽不下并治中脘痞滿痰涎壅盛上氣喘急紫蘇葉二兩厚朴三兩茯苓四兩半夏五兩右剉生薑棗煎服百一選方三仙丸治中脘氣滯痰涎不利南星半夏各五兩用薑汁作麴香附五兩右末糊丸桐子大毎服四十丸薑湯下機要去香附加橘皮名玉粉丸治氣痰指迷茯苓丸治中脘留伏痰飲臂痛難舉半夏二兩茯苓一兩枳殻炒半兩風化硝二錢半右末薑汁糊丸薑湯下三十丸按以上三方用南星半夏所以勝痰而兼用諸氣藥即嚴氏順氣則痰自下之意然紫蘇枳殻肺氣藥也厚朴脾胃氣藥也香附肝氣藥也隨臟氣而用不可不分降氣墜痰温補之劑局方蘇子降氣湯治虚陽上攻氣不升降上盛下虚痰涎壅盛俞山人降氣湯治同前黒錫丹治痰氣壅盛上盛下虚心火炎熾腎水枯竭靈砂丹治上盛下虚痰涎壅盛此藥最能鎭墜升降隂陽四方並見本方按以上諸方並係類聚温熱之藥而出證皆云治上盛下虚氣不升降夫所謂盛者即心火之炎虚者即腎水之弱火炎水弱則有升無降故津液湧而為痰涎於上今以金石丹藥濕熱香燥之藥而欲補下焦之虚如抱薪救火爾若以為下焦陽虚而議治者亦非也夫陽火之虚則隂水必盛痰涎津液自然隨氣而降又何必用此藥也金匱腎氣丸治短氣有微飲當從小便去之方見補虚門按仲景以腎虚有飲故用此補腎逐水以其中有澤瀉茯苓故也而嚴氏以此方治腎虚寒而不能攝養腎水使邪水溢上多吐痰唾夫腎既虚寒則陽火必盛未審所録攝養腎水者何物耶夫腎水乃天一所生人之根蒂痰涎乃津液敗濁而成豈可直指腎水不攝而邪水溢上耶若云腎水虚弱隂虧難降使津液敗濁而為痰水故用此藥於義則明白矣謹按痰病多生於濕故古方多用南星半夏之類然亦有所挾之邪故藥有風寒暑濕之異又人身體叚有上下表裏故在表者汗之在裏者下之在上者湧之在下者分利之治飲之法可謂詳矣或曰陳無擇以大小青龍五苓承氣為外因參苓八味參蘇為内因十棗葶藶大小半夏控涎破飲為不内外因今吾子所編諸方意不侔此何也予曰大小青龍外因之表藥五苓承氣外因之裏藥也參苓八味内因之裏藥參蘇飲内因之表藥也十棗葶藶控涎破飲不内外因之下藥也大小半夏不内外因和中藥也彼以三因立論故叙藥止以所因為主而不分其表裏内外之異今予以表裏内外分類諸方則難拘其所因也玉機微義卷四
