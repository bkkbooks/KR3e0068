body:
  text: 玉機微義卷十五明徐用誠原輯劉純續增瘡瘍門內經論瘡瘍之因生氣通天論云膏粱之變足生大丁又云營氣不從逆於肉理乃生癰腫隂陽應象論云地之濕氣感則害人皮肉筋脉脉要精微論云諸癰腫筋攣骨病痛者此寒氣之腫八風之變也至真大要論云諸痛癢瘡瘍皆屬心火河間原瘡瘍之病原病式云諸痛癢瘡瘍皆屬心火者蓋人近火氣者微熱則癢熱甚則痛附近則灼而為瘡皆火之用也或癢痛如針輕刺者猶飛迸火星灼之然也癢者美疾也故火旺于夏而萬物蕃鮮榮美也炙之以火漬之以湯而癢轉甚者微熱之所使也因而癢去者熱令皮膚縱緩腠理開通陽氣得泄熱散而去故也或夏熱皮膚癢而以冷水沃之不去者寒䏻收斂腠理閉密陽氣欎結不能散越怫熱內作故也癢得爬而解者爬為火化微則亦能令癢甚則癢去者爬令皮膚辛辣而屬金化辛能散故金化見則火力分而解矣或云痛為實癢為虛者非謂虛為寒也正謂熱之微甚也或疑瘡瘍皆屬火熱而反腐出膿水者何也猶穀肉果菜熱極則腐爛而潰為汙水也潰而腐爛者水之化也所謂五行之理過極則勝己者反來制之故火熱過極則反兼水化又如鹽能固物令不腐爛者鹹寒水化制其火熱使不過極故得久固也萬物皆然癰淺而大也經曰熱勝血則為癰也三因方曰癰者壅也疽深而惡也三因方曰疽者沮也癤者節也瘍有頭小瘡也疹浮小癮疹也瘤氣赤瘤丹熛熱勝氣也火之色也結核火氣熱甚則欎結堅硬如果中核也不必潰發但令熱氣散則自消也瘡瘍脉證身重脉緩濕勝除濕身熱脉大心燥時腫乍來乍去遂熱諸痛眩暈動搖脉弦去風氣澀氣滯乾燥亡津液脉澀瀉氣補血寒勝則浮食不入便溺多惡寒脉緊細宜㵼寒水丹溪論相火能動為諸病瘡瘍亦然詳見火證門癰疽當分經絡論丹溪云六陽經六隂經有多氣少血者有多血少氣者有多氣多血者不可一槩論也少陽經多氣少血理宜預防肌肉難長驅毒利藥亦難輕用豫從叔多慮神勞年近五十左膊外側紅腫如栗豫曰勿輕視且先與人參濃湯得數升乃佳與數貼而止旬餘值大風拔木瘡上起一紅線繞背抵右肋豫曰大料人參湯加芎术補劑與之兩月而安李兄年三十連得憂患且好色又作勞左腿外側臁生紅腫如栗一醫與承氣兩貼下之矣又一醫教與解毒下之豫視之脉大實後果死或曰生臀癰者何如豫曰臀在少腹之後居其下此隂中之隂也其道逺其位僻雖太陽多血氣運雖及血亦罕來中年後生者須預補之若無積補之功其禍多在瘡成痂之後或半年以來乃病粗工不察或致失手慎之戒之病機機要云瘰癧者結核是也或在耳後或在耳前或在耳下連及頥頷或在頸下連缺盆皆謂瘰癧或在胸及胸之側或在兩脅皆謂之馬刀手足少陽主之按此謂分經用藥則不致有犯禁壞逆之失也然手少陽三焦少隂心太隂肺足少陽膽少隂腎太隂脾多氣少血手厥隂心包絡太陽小腸足太陽膀胱厥隂肝多血少氣手陽明大腸足陽明胃多氣多血也故不可一槩論治况已上病例不係膏粱丹毒火熱之變因虛勞氣鬱所致止宜補形氣調經脉其瘡當自消散蓋不待汗之下之而已也其不詳脉證經絡受病之異者下之先犯病禁經禁故致失手如此丹溪又曰才得腫痛參之脉證但有虛弱便與滋補血氣無虧可保終吉若用尋常驅熱拔毒及氣藥虛虛之禍如指諸掌且夫火熱為病亦有微甚所謂君火相火是也瘡瘍所發而有癰疽癤癧輕重淺深或止發於一經或兼二經者止當求責於一二經則不可干擾餘經也若東垣處方用藥是矣矧有兼風兼濕兼痰兼氣兼血兼隂虛等證者病本不同治當求責前論雖略比之世俗外科等書圖人形瘡樣而不分經絡者此則大有徑庭矣治瘡大要三法病機機要云瘡瘍者火之屬須分內外以治其本若其脉沉實當先踈其內以絶其源也其脉浮大當先托裏恐邪氣入內也有內外之中者邪氣至盛遏絶經絡故發癰腫此因失托裏及失踈通又失和榮衛也治瘡之大要須明托裏踈通榮衛之三法內之外者其脉沉實發熱煩躁外無焮赤痛深於內其邪氣深矣故踈通臟腑以絶其源外之內者其脉浮數焮腫在外形證外顯恐邪氣極而內行故先托裏也內外之中者外無焮惡之氣內亦臟腑宣通知其在經當和榮衛也用此三法之後雖未差必無變證亦可使邪氣峻减而易愈瘡宜發汗論內經云汗之則瘡已東垣云東南二方者在人則為丙小腸熱甲膽風小腸與膽皆居其下其性炎上其瘡外有六經之形證內無便溺之阻隔飲食如故清便自調知不在裏非疽瘡也止癰癤也小則為癤大則為癰其邪所受於下風濕之地氣自外而來侵加於身者也經云榮氣不從逆於肉理乃生癰腫諸痛癢瘡皆屬心火此瘡自外而入是丙小腸左遷入於膽作痛而非癢也此二方皆主血血為病必痛此元氣不足營氣逆行其瘡初出未有傳變在於肌肉之上皮毛之間只於風熱六經所行經絡地分出矣宜瀉其風濕熱醫者只知隂覆其陽則汗也此宜發汗者乃濕熱鬱其手足少陽致血脉凝逆使榮衛周身元氣消弱也其風熱鬱滯於下其面色必赫赤而腫微黯色東方清埋沒之色也風木之性上衝顔必忿色其人多怒其瘡之色亦赫赤腫硬微帶黯色其瘡之形勢亦奮然髙起結硬而作痛也其脉止在左手左手主表左寸外洪緩左關洪緩而弦是客邪在於血脉之上皮膚之間宜急發其汗而通其榮衛則邪氣去矣以托裏榮衛湯主之謹按前論大要三法即此瘡宜汗之及先托裏恐邪氣入內言外因也宜先踈內以絶其源言內因也當和榮衛謂不內外因之證也故瘡之發於皮表者因大略言汗其汗下和之間然亦有外治之次第焉如郭氏治驗云一婦人五十九嵗右耳下天容穴間患一疔瘡其頭黑黶四邉泡起黃水時流渾身麻木發熱譫語時時昏沉六脉浮洪用烏金散汗之就以鈚針先刺瘡心不痛周遭再刺十餘下紫黑血出方知疼痛就將寸金錠子絍入瘡內外用提丁錠子放於瘡上膏藥貼護次日汗後精神微爽却用破棺丹下之病即定其疔潰動後用守效散貼塗紅玉錠子絍之八日其疔自出矣兹所謂審脉證汗下之間外治次第如此殊勝不察脉證但見發熱譫語便投凉劑與下或兼以香竄之藥遂致悮人者逺矣瘡辨五善七惡外科精要云熱發於皮膚之間浮腫根小至大不過三二寸者為癤六腑積熱騰出於外肌肉之間其發暴盛腫皮光軟侵展廣大為癰五臟風毒積熱攻焮肉骨風毒猛暴初生一如䔒蕾形自焦枯觸之應者乃疽也夫五善七惡者動息自寧飲食知味一善也便利調勻二善也膿清腫消不臭三善也神采精明語聲清爽四善也體氣和平五善也煩躁時嗽腹痛渴甚或泄痢無度小便如淋一惡也膿血大泄腫焮尤甚膿色敗臭痛不可近者二惡也喘粗短氣恍惚嗜卧三惡也目視不正黑睛緊小白睛青赤瞳子上看者四惡也肩背不便四肢沉重五惡也飲食不下服藥而嘔食不知味六惡也聲嘶色敗鼻青赤面目四肢浮腫七惡也五善見三則差七惡見四則危然則病有源同七惡者乃皮緊急而知善也病有源同五善者乃皮緩虛而知惡也知是者豈凡醫之所知哉此事難知論中定癰疽死之地分一伏莵二腓腨三背四五臟俞五項上六腦七髭八鬢九頥謹按素間靈樞諸篇具瘡瘍之由生死之要針治之法甚詳宜玩本文大抵已上所言地分皆脉絡所㑹內系腑臟然患者得而早言醫者審證按法治之則皆為不死矣設不早治治不對證雖發於不死之地分乃恐亦致死矣論瘡瘍攻補法元戎云陷脉為瘻留連肉腠營氣不從逆於肉理乃生癰腫榮逆血鬱血鬱則熱聚為膿正理論曰熱之所過則為癰腫營氣不從亦有不熱者乎答曰膏粱之變芳草之美金石之過氣血不盛榮衛之氣充滿而抑遏不能行故閉塞血氣腐而為癰也當泄之以奪盛熱之氣若其人飲食踈精神衰氣血弱肌肉消薄榮衛之氣短促而澀滯故寒薄腠理閉鬱而為癰腫也當補之以接虛怯之氣亦當以脉浮沉别之既得盛衰泄之則連翹大黃補之則內托之類是也按此辨瘡瘍因熱因寒及氣血鬱而成當攻補之法不同宜與前後諸篇兼看殆無餘藴矣但世俗昧此理而云是瘡不是瘡且服五香連翹湯然或中或否致悮者多蓋不審形氣虛實瘡毒淺深發表攻裏所因不同故也今以丹溪先生外科精要發揮諸法之義附于後方例之下庶學者幸有所鑑焉論瘡瘍宜灸元戎云瘡瘍自外而入者不宜灸自內而出者宜灸外入者托之而不內內出者接之而令外故經云陷者灸之灸而不痛痛而後止其灸灸而不痛者先及其潰所以不痛而後及良肉所以痛也灸而痛不痛而後止其灸灸而痛者先及其未潰所以痛而次及將潰所以不痛也按此亦約法也因以東垣等法附于左宜參用之凡人初覺發背欲結未結赤熱腫痛先以濕紙覆其上立視候之其紙先乾處即是結癰頭也取大蒜切成片如當三錢厚薄安於頭上用大艾炷灸之三壯即換一蒜片痛者灸至不痛不痛灸至痛時方住最要早覺早灸為上一日三日十灸十活三日四日六七活五六日三四活過七日則不可灸矣若有十數頭作一處生者即用大蒜研成膏作薄餅鋪頭上聚艾於蒜餅上燒之亦能活也若背上初發赤腫一片中間有一片黃粟米頭子便用獨蒜切去兩頭取中間半寸厚薄正安於瘡上著艾灸十四壯多至四十九壯按此謂癰疽所發宜灸之也然諸瘡患久成漏者常有膿水不絶其膿不臭內無歹肉尤宜用附子浸透切作大片厚三二分於瘡上著艾灸之仍服內托之藥隔三二日再灸之不五七次自然肌肉長滿矣至有膿水惡物漸潰根深者郭氏治用白麵硫黃大蒜三物一處搗爛看瘡大小捻作餅子厚約三分於瘡上用艾炷灸二十一壯一灸一易後隔四五日方用翠霞錠子并信效錠子互相用之絍入瘡內歹肉盡去好肉長平然後貼收斂之藥內服應病之劑調理即瘥矣蓋不止宜灸於瘡之始發也大抵始發宜灸要汗下補養之藥對證至灸冷瘡亦須內托之藥切當設有反逆不唯不愈恐致轉生他病之患也瘡分三因陳無擇云發背癰疽者該三因而有之論曰癰疽瘰癧不問虛實寒熱皆由氣鬱而成經亦云氣宿於經絡與血俱澀而不行壅結為癰疽不言熱之所作而後成癰者此乃內因喜怒憂思有所鬱而成也身有熱被風冷搏之血脉凝泣不行熱氣壅結而成亦有隂虛陽氣湊襲寒化為熱熱成則肉腐為膿者此亦外因寒熱風濕所傷而成也又服丹石及灸􅏼酒麵溫床厚被所致又盡力房室精虛氣節所致者此乃因不內外所傷而成也故知三因備矣按此所分三因雖備但未具瘡瘍之邪在經在表在裏之異故其治法亦不能詳備也論隂滯陽則生癰陽滯隂則生疽丹溪曰精要云陽滯於隂脉浮洪弦數隂滯於陽脉沉細弱澀陽滯以寒治之隂滯以熱治之切詳其意陽滯隂滯當作熱治寒治求之寒熱固可作隂陽論於隂於陽分明是於氣於血他無可言也熱滯於氣固無寒滯耶寒滯於血固無熱滯耶何寒不能傷氣熱不能傷血耶以豫觀之氣為陽行脉外血為隂行脉內相並分𣲖周流循環一身無停止謂之脉一呼脉行三寸一吸脉行三寸呼吸定息共得六寸一身通行八十一丈得熱則行速而太過得寒則行遲而不及五味之偏七情之厚過氣為滯津液稠厚積而久也為飲為痰滲入脉內血為所亂因而凝濁運行沍泣或為沸騰此隂滯於陽也正血滯於氣也氣病今入或以藥助邪病上生病血之病日增溢出脉外墜道隘塞升降有妨運化失令此陽滯於隂也正氣滯於血也病分寒熱者當是禀受之素偏虛邪之雜合豈可以陽為熱隂為寒耶浮洪弦數氣病之脉也豈可遽此作熱論沉細弱澀血病之脉豈可遽此作寒論此萬病之根本豈止疥癬瘡瘍癰疽而已幸相評其是否明瘡瘍之本末東垣曰生氣通天論云營氣不從逆於肉理乃生癰腫又云膏粱之變足生大丁受如持虛隂陽應象論云地之濕氣感則害人皮肉筋脉是言濕氣外傷則營氣不行榮衛者皆營氣之所經營也營氣者胃氣也運氣也榮氣為本本逆不行為濕氣所壞而為瘡瘍也膏粱之變亦是言厚滋味過度而使營氣逆行凝於經絡為瘡瘍也此邪不在表亦不在裏惟在其經中道病也已上內經所說俱言因營氣逆而作也遍看諸瘡瘍論中多言二熱相摶熱化為膿者有只言熱化為膿者又言濕氣主瘡寒化為熱而為膿者此皆瘡疽之源也宜於所見部分用引經藥并兼見證中分隂證陽證先㵼營氣是其本本逆助火濕熱相合敗壞肌肉而為膿血者此治次也宜逺取諸物以比之一嵗之中大熱無過夏當時諸物皆不壞爛壞爛者交秋濕令大行之際也近取諸身熱病在身止顯熱而不敗壞肌肉此理明矣標本不得邪氣不服言一而知百者可以為上工矣營氣不從逆於肉理乃生瘡癰且營氣者胃氣也飲食入於胃先輸於脾而朝於肺肺朝百脉次及皮毛先行陽道下歸五臟六腑而氣口成寸矣今富貴之人不知其節以飲食肥醲之類雜以厚味日久太過其氣味俱厚之物乃陽中之陽不能走空竅先行陽道反行隂道逆於肉理則濕氣大勝則子能令母實火乃大旺熱濕既盛必來尅腎若雜以不順又損其真水腎既受邪積久水乏水乏則從濕熱之化而上行其瘡多出背出腦此為大丁之最重者也若毒氣行於肺或脾胃之部分毒之次也若出於他經又其次也濕熱之毒所止處無不潰爛故經言膏粱之變足生大丁受如持虛如持虛器以受物物無不受治大丁之法必當㵼其營氣以標本言之先受病為本非若寒之劑為主為君不能除其若楚疼痛也諸瘡瘍有痛往往多以乳香沒藥雜以芳香之藥止之必無少减之理若使經絡流通臟腑中去其壅滯必無痛矣苦寒之劑除其疼痛藥下於咽則痛立已此神品藥也瘡瘍食肉乃自棄也瘡瘍者乃營氣而作也今反補之而自棄何異雖用藥施治而不能愈地之濕氣自外而入內者瘡癤當先服藥而用針如瘡癤小不欲飲藥或嬰兒之瘡先當溫衣覆蓋令其凝泣壅滯血脉溫和則出血立已者不如此血脉凝滯便針則邪毒不瀉反傷良肉又益其瘡勢也瘡瘍及諸病面赤雖伏大熱禁不得攻裏為陽氣怫鬱邪氣在經宜發表以去之故曰火鬱則發之雖大便數日不見宜多攻其表以發散陽氣少加潤燥之藥以潤之如見風脉風證只可用發表風藥便可以通利得大便行也若只乾燥祕澀尤宜潤之慎不可下也瘡瘍鬱冒俗呼昏迷是也宜汗之則愈驗瘡名色治之當從素問針經聖濟揔録易老瘡論及諸家治瘡用藥法度此為緊要臨病之際宜詳審焉謹按聖濟總録能悉諸瘡之名色但其用藥則多主寒凉而無通變之法惟已上易老東垣等言深擷針經之大法陳脉病治例之要學者能熟此等議論則臨證處方便自胸中了然明白論腸癰陳無擇云癰疽初無定處隨其所發即命名在外則為發背發腦在內則為腸癰內癰心癰肺癰臍癰等證得其法則生失其法則死外證易識內證難明不可不備述也腸癰為病身甲錯腹皮急按之濡如腫狀腹無聚積身無熱脉數此為腸內有膿久積隂冷所成也故金匱有用附子溫之小腹腫痞按之狀如淋小便自調發熱身無汗復惡寒其脉遲緊者膿未成可下之當有血洪數者膿已成不可下此以內結熱所成也故金匱有用大黃利之甚者腹脹大轉側聞水聲或繞臍生瘡或膿從臍出或大便出膿血不治必死其如五內生瘡亦止分利隂陽而已不比外癰須依四節八事之次第也脉經引官羽林婦病醫診之其脉滑而數滑則為實數則為熱滑則為榮數則為衛衛數下降榮滑上升榮衛相干血為濁敗少腹痞堅小便或澀或時汗出或復惡寒膿為已成設脉遲緊即為瘀血血下即愈更內經所載有息積病此見有得之二三年遍身微腫續乃大腸與臍連日出膿遂致不救此亦腸癰之類也不可不審按此言內癰腸癰等候語約而精脉經與此大同小異宜並詳審可也瘡瘍治法純早年居淮南於陳復初契家齊堂得東原郭文才甫家傳瘡科心要二卷持行四方按法每擇用之多獲竒效故不敢湮沒其道因取東垣先生諸試效法雜以古今名方於下每附丹溪先生外科精要發揮之㫖以為通變之義亦學者之一助云辛涼發散之劑東垣黃連消毒散治癰疽發於腦項或背太陽經分腫勢外散熱毒焮發麻木不痛者宜先灸之或痛而發熱並宜服此黃連製羌活各一錢黃芩黃柏各半錢酒製生地黃知母製獨活防風當歸尾連翹各四分藁本防己桔梗各半錢黃茋蘇木陳皮澤瀉各二分人參甘草各三分右㕮咀水煎按元好問記云素飲酒於九月中患腦之下項之上出小瘡後數日腦項麻木腫勢外焮瘍醫遂處五香連翹至八日不下而云不可速療十八日得膿俟膿出用藥或砭刺三月乃可平四月如故豫記醫經凡瘡見膿九死一生果如醫言則當有束手待斃之悔矣乃請明之診視且謂膏粱之變不當投五香五香已無及當先用火攻之䇿然後用藥以大艾炷如兩核許者攻之至百壯乃痛覺次為處方云是足太陽膀胱之經其病逆當反治脉中得弦緊按之洪大而數又且有力必當仗其所主而先其所因其始則同其終則異可使破積可使潰堅可使氣和可使必已必先嵗氣無伐天和以時言之可收不可汗經與病禁下法當結者散之醎以䎡之然寒受邪而禁醎諸苦寒為君為用甘寒為佐酒熱為因用為使以辛溫和血大辛以解結為臣三辛三甘益元氣而和血脉淡滲以𨗳酒濕扶持秋令以益氣瀉火以入本經之藥和血且為引用既以通經為主用君以黃芩連柏生地黃知母酒製之本經羌活獨活防風藁本防己當歸連翹以解結黃茋人參甘草配諸苦寒者三之一多則滋營氣補土也生甘草瀉腎之火補下焦元氣人參橘皮以補胃蘇木當歸尾去惡血生地黃補血酒製防己除膀胱留熱澤瀉助秋去酒之濕熱凡此諸藥必得桔梗為舟楫乃不下沉投劑之後疽當不痛不拆食進體健如言服之投床大鼾日出乃寤以手捫瘡腫减七八至瘡痂斂都十四日而已世醫用技豈無取效者至於治效之外乃能歷數體中不言之祕平生所見惟明之一人而已詳見試效方內托羌活湯治足太陽經中左右尺脉俱緊按之無力尻臀生癰堅硬腫痛大作羌活黃柏酒製各二錢防風藁本當歸尾各一錢肉桂三分連翹甘草炙蒼术陳皮各半錢黃茋一錢半右㕮咀水酒各半煎食前溫服取汗白芷升麻湯治手陽明經分臂上生癰左右寸部脉皆短中得之俱弦按之洪緩有力此得之八風之變者也白芷一錢半升麻桔梗各一錢甘草炙半錢黃茋黃芩酒製各四錢生黃芩三錢紅花半錢右㕮咀作二服每水酒各半煎食後溫服內托黃茋柴胡湯治瘡生腿內近膝股或癰或附骨癰初起腫痛勢大此足大隂厥隂之分脉細而弦按之洪緩有力黃茋二錢柴胡一錢羌活半錢連翹一錢半肉桂三分土瓜根酒製一錢生地黃二分黃柏二分當歸尾七分右㕮咀作一服水二分酒一分煎食前服內托黃茋酒煎湯治瘡生腿外側或因寒濕得附骨癰於足少陽經分微侵足陽明經堅硬漫腫行步作痛或不能行柴胡一錢半連翹肉桂大力子炒各一錢黃茋當歸尾各二錢黃柏半錢升麻七分炙甘草半錢右㕮咀水酒各半煎食前服按已上諸方有脉病證治之例立方之㫖皆東垣試效法也學者識之則臨病處方當有所據矣當歸拈痛湯治一切風濕熱毒浸淫瘡瘍下注濕毒腳膝生瘡赤腫裏外臁瘡膿水不絶或癢或痛脉沉緊實數動滑者並宜服之羌活半兩人參苦參酒製升麻葛根蒼术各二錢炙甘草黃芩酒製茵陳葉酒炒各半兩防風當歸身知母酒製澤瀉猪苓各三錢白术一錢半右㕮咀每服一兩水煎空心服臨睡再服之按此足太陽陽明三隂藥也東垣本處為治腳氣濕熱之劑然世人用治已上諸瘡甚驗故録之內托升麻湯治婦人兩乳間出黑頭瘡瘡頂陷下作黑眼子其脉弦洪按之細小宜服之并乳癰初起亦治升麻葛根連翹各一錢半肉桂三分黃茋一錢當歸身錢黍粘子半錢黃柏二分炙甘草一錢右㕮咀作一服水二分酒一分同煎食後服按此足陽明厥隂藥也散腫潰堅湯治馬刀瘡結硬塊子堅如石者在耳下至缺盆中或至肩上或入脅下皆手足少陽經中及瘰癧遍於頦或至頰車堅硬如石在足陽明經中所出或二證瘡已破流膿水並皆治之柴胡四錢升麻三分草龍膽半兩酒製炒黃芩八錢二半酒炒炙甘草三錢桔梗半兩連翹三錢瓜蔞根半兩酒製當歸尾白芍各二錢黃柏酒製去皮知母酒製各半兩葛根二錢黃連一錢京三稜酒製微炒廣术製如上各三錢昆布净半兩右件㕮咀每服六錢或七錢水二盞八分先浸多半日煎至一盞去柤熱服於卧處身腳在髙處頭低垂每含一口作十次咽服畢依常安卧取藥在膈上停蓄故也另攢半料作極細末煉蜜為丸如菉豆大每服百丸或百五十丸用此湯一口送下食後服之藥多少量病人虛實應服藥皆效此例升麻調經湯治頦下或至頰瘰癧此證出足陽明胃之經中來也若瘡深逺隱曲肉底是足少隂腎中來也乃戊傳癸腎是夫胃傳妻俱作塊子堅硬大小不等並皆治之或作丸服亦得升麻八錢葛根五錢草龍膽酒製炒黃芩酒製各半兩當歸尾三錢桔梗連翹各半兩芍藥三錢黃柏酒炒一錢知母酒炒一兩黃連廣术酒炒甘草炙京三稜酒炒各半兩生黃芩四錢右件另稱一半作末蜜為丸如菉豆大每服百丸或百五十丸一半多作㕮咀每服稱半兩若能食便硬可旋加至七八錢服如潰堅湯法此制之緩也連翹散堅湯治耳下至缺盆或至肩上生瘡堅硬如石動之無根名曰馬刀從手足少陽經中來也或生兩脅或已流膿作瘡未破皆治之柴胡一兩二錢連翹當歸尾酒製芍藥生黃芩各半兩炙甘草三錢土瓜根酒炒草龍膽酒製四次各一兩蒼术二錢黃芩酒炒二次二錢黃連酒炒二次二錢廣术京三稜細切各半兩同廣术酒製一次微炒乾右件另稱一半蜜丸如菉豆大如上法服㕮咀和勻每服半兩服如上法亦緩治之按已上三方本於經分用藥潰堅散鬱之劑也消腫湯治馬刀瘡柴胡二錢連翹三錢當歸尾甘草各一錢生黃芩二錢紅花少許黃連黍粘子炒各半錢瓜蔞根黃茋各一錢半右件每服半兩或一兩水煎熱服食後按此足少陽例藥也柴胡通經湯治小兒項側有瘡堅而不潰名曰馬刀柴胡連翹當歸尾黃芩生甘草黍粘子桔梗京三稜各二分紅花少許黃連五分右㕮咀作一服水煎稍熱服按此手少隂太隂足少陽厥隂藥也東垣諸法類此者甚多兹不詳録郭氏亦有治瘰癧數方本攻裏內消之劑故附于後雜方內郭氏升麻牛蒡子散治時毒瘡疹脉浮洪在表者瘡發於頭面胸膈之際升麻牛蒡子甘草桔梗葛根𤣥參麻黃各一錢連翹二錢右㕮咀薑三片水二盞作一服中和湯治時毒脉弦洪在半表裏者菖蒲牛蒡子羌活川芎防風漏蘆荆芥麥門冬前胡甘草右㕮咀每服一兩水煎按此並出足太陽陽明例藥也機要方治結核耳前後或耳下頷下有者皆瘰癧也桑椹二斗極熟黑色者以布裂取自然汁砂器內文武火慢熬成薄膏子每日白湯㸃一匙食後日三服辛平發散之劑良方升麻和氣飲治瘡腫癤疥癢痛甘草陳皮各一兩半芍藥七錢半大黃半兩煨乾葛蒼术桔梗升麻各一兩當歸半夏茯苓白芷各二錢乾薑枳殼各半錢三因方有厚朴半錢右㕮咀每服一兩水煎按此手足太隂陽明經藥也五積散加减法世俗多用之故收入蓋欲燥脾胃勝濕和氣為治瘡之劑然臨證而不通變恐未合宜也當歸飲子治瘡疥風癬濕毒燥癢瘡當歸白芍川芎生地黃白蒺䔧防風荆芥各一兩何首烏黃茋甘草各半兩右㕮咀每服一兩水煎或為末每服一二錢亦得按此踈風熱之劑手足三隂藥也血虛者不可缺此聖濟總録金針散治發背諸瘡腫皂角針春取一半新採一半黑者右一味不拘多少晒乾為末食後酒調二三錢服按丹溪曰此藥治癰疽已破未破皆用直􅗴領到潰處意謂當入羣隊中用也辛溫發散之劑局方托裏十補散黃茋人參當歸各二錢厚朴桔梗川芎防風桂心甘草白芷各一錢右㕮咀水煎謹按衛生寶鑑曰諸痛癢瘡瘍皆屬心火言其常也如瘡盛形羸邪高痛下始熱終寒此反常也固當察時下之宜而權治故曰經者常也法者用也醫者意也隨其宜而治之可收十全之功矣故此方用之於癰疽初發或已發或內托然瘡證脉緩澀或身倦惡寒熱少脉弦或緊細者宜用之散風寒助陽之劑也表裏氣血之藥若施之於積熱焮毒更不分經絡時宜不能不無悮也丹溪曰精要謂排膿內補十宣散治未成者速散已成者速潰誠哉是言也若用之於些小癰疽與冬月時令儘用內托之功若於冬月腫瘍用之亦可轉重就輕移深於淺若潰瘍於夏月用之其桂朴之溫散佐以防風白芷吾恐雖有參茋難為倚仗比見世人用此者不分癰疽冬夏無經絡無前後如盲人騎瞎馬半夜臨深池危哉十六味流氣飲治無名惡腫癰疽等證川芎當歸芍藥防風人參木香黃茋官桂桔梗白芷檳榔厚朴烏藥甘草紫蘇枳殼右㕮咀水煎按此表裏氣血藥也復以踈風助陽之劑世俗多用之故收入非脉之洪緩沉遲緊細者不宜用此每見外科諸家載此往往不分經絡脉證不具時宜但云化毒消腫有云不退者加以補氣血之藥蓋又使人不能無疑也用者當觸類而長之可矣郭氏神效烏金散治癰疽疔腫時毒附骨疽諸惡瘡等證若瘡黑陷如石堅四肢冷脉細或時昏冒譫語循衣煩渴危篤者服此汗之瘡起蒼耳頭五月五日午時收小草烏頭火麻頭火日收採木賊去節蝦蟇頭樺皮節酥炙麻黃去根節右晒乾各等分同入磁器內鹽泥固濟炭火內從早煆至申分如黑煤色為度碾為末每服二錢病重者三錢用熱酒調下未汗再一服如汗乾却服解毒踈利之藥如修合此藥必選天晴好日於靜室中勿令雞犬猫畜及隂人見也又名首功𤣥黑散奪命丹治諸般腫毒疔疽惡瘡蟾酥輕粉各半錢朱砂三錢白礬枯寒水石銅緑各一錢蝸牛二十一箇别研乳香沒藥麝香一錢右件為細末將蝸牛别研一處丸如丸不就用好酒糊和丸如菉豆大每服一丸生葱三五莖嚼極爛吐于手心包藥在內熱酒和葱送下如重車行五七里汗出為效重者再服一二丸蟾酥丸治疔黃一切惡瘡川烏蓮花蘃硃砂各一錢半乳香沒藥各二錢輕粉蟾酥各一錢麝香半錢右為細末糊丸菀豆大每服一丸病重者二丸依前法服取汗按已上三方郭氏稱為首藥皆主乎發散散出太陽例後二方出少隂例然皆劫劑也智者當較輕重隂陽之分取擇用之東垣托裏榮衛湯治證見前瘡宜發汗論黃茋紅花桂枝各五錢蒼术三錢柴胡連翹各二錢羌活防風當歸身炙甘草黃芩各一錢半人參一錢右㕮咀每服一兩水酒各半煎按此足三陽太隂經藥出桂枝例表裏氣血之劑也辛熱發散之劑托裏溫中湯治瘡為寒變而內陷者膿出清解皮膚凉心下痞滿腸鳴切痛大便微溏食則嘔氣短吃逆不絶不得安卧時發昏憒羌活三錢附子炮去皮四錢乾薑炮三錢益智仁丁香沉香木香茴香陳皮各一錢炙甘草二錢右㕮咀作一服水三盞生薑五片煎服衛生寶鑑曰經云寒淫于內治以辛熱佐以苦溫以薑附大辛熱溫中外發陽氣自裏之表以為君羌活苦辛溫透關節炙甘草溫補脾胃行經絡通血脉胃寒則嘔吐吃逆不下食益智丁沉大辛熱以散寒為佐瘡氣內攻氣聚而為滿木香陳皮苦辛溫治痞散滿為使按此手足太陽陽明三隂經藥也辛涼攻裏之劑機要內踈黃連湯治瘡皮色腫硬發熱而嘔大便閉脉洪實者黃連芍藥當歸檳榔木香黃芩梔子薄荷桔梗甘草各一兩連翹二兩大黃二兩半右㕮咀每服一兩入薑煎按此本黃連湯加大黃手足少陽足陽明太隂手三隂之藥也丹溪曰精要以大黃治癰疽之要藥以其宣熱拔毒第二論曰瘡始作皆須以大黃等藥極轉利之又排日不廢繼又自言患癰疽者每有瀉泄皆是惡候此又不能無疑者也借曰前說用大黃恐因病體實而大腑祕結有積熱沉痼之疾者發也止可破結𨗳滯推令轉動而已豈可謂極轉利之而且排日不廢若利下之後又與利藥恐非防微杜漸之意瘡之始作即周禮腫瘍之時也腫在肌肉若非大滿大實堅之證自當行仲景發表之法借五香湯為例散之於外何必遽以峻下之藥奪其裏自取其禍切詳河間謂地之濕氣感則害人皮肉筋脉其在外盛而內行其脉沉實當先踈其內以絶其源又謂嘔啘心逆發熱而煩脉沉而實硬腫發悶皮肉不變色根深而大病在內臟腑祕結當急踈利之宜黃連湯先服一二貼次加大黃未效再加二錢以利為度如有熱證只與黃連湯無熱證少煎內托復煎散時時呷之如此則內外皆通血氣流行彼加大黃者自因體實而腑祕也未當如此之多聖濟射干散治癰疽發背諸瘡腫痛脉洪實數者射干犀角升麻𤣥參黃芩麥門冬大黃各一兩山梔半兩右㕮咀每服五錢加竹葉芒硝一錢以利為度按此足陽明手太隂經藥也托裏散治一切惡瘡發背丁疽便毒始發脉洪弦實數腫甚欲作膿者三服消盡大黃牡蠣瓜蔞根皂角針朴硝連翹各三錢當歸金銀花各一兩赤芍黃芩各二錢右為粗末每半兩水酒各半煎服按此足厥隂太隂陽明經藥也破棺丹治諸熱腫一切風熱瘡證發熱多汗大渴便閉譫語結陽之證大黃二兩半半生半熟芒硝甘草各二兩右為末煉蜜丸彈子大每服半丸病重一丸至二丸食後童便入酒半盞化服之或白湯合酒化服按此仲景正陽陽明經藥也瀉心湯治瘡毒癰腫發躁煩渴脉實洪數者大黃四兩黃連山梔漏蘆澤蘭連翹黃芩蘇木各二兩犀角一兩右㕮咀每服三五錢水煎服按此手少隂太隂少陽藥也出足陽明例辛平攻裏之劑郭氏瑞效丸治腸癰胃癰內積兼男子婦人積聚證當歸京三稜檳榔木鱉子川山甲炒各一兩牡蠣為末炒山甲都用連翹枳殼炒各一兩半􅀈砂焙琥珀各一兩巴豆二十一粒去油麝香少許右為末酒糊丸桐子大每服十丸至二三十丸溫酒下臨卧再服如利動臟腑减丸數大小便有膿血出者却用别藥調治之萬靈奪命丹郭氏又名延夀濟世膏如意金丹廣效保命丹朱砂備急膏三教濟世膏仙授靈寶膏聖僧慈救膏蓋實一藥也治一切瘡腫疔疽初起脉沉實及服汗藥後毒氣在裏不盡者宜此下之硃砂鹽花各二錢半雄黃明礬生用楓香各二錢黃丹赤石脂琥珀輕粉各一錢半麝香片腦各一錢巴豆去殼水煮十沸萆麻另研各四十九粒右為末用巴豆萆麻子膏和藥為丸如和不就加煉蜜就成膏收磁器內如用時旋丸如雞頭大每服一丸井花水下或湯亦得忌熱物半日大人小兒以意加减與服謹按郭氏用藥格式云凡人患一切瘡腫若脉在表者先服首功𤣥黑散或奪命丹蟾酥丸之類選用汗之繼服廣效保命膏或化毒凉劑下之若脉在裏者便只服延夀濟世膏或破棺丹下之病屬裏不必汗之故也如是有頭瘡疽就便用硃砂備急膏一丸如黃豆大安於瘡頭上却用軟粘膏藥蓋護之其瘡必破如瘡暈紫黑色外用宣毒散周圍敷住毒氣如瘡暈赤紅色用水澄膏敷之次日用緊峻碧雲錠子開了瘡口次用緊緩碧霞錠子去其歹肉稍净却用緩慢碧玉錠子生肌揔名青金錠子不拘日數直待歹肉去净單用膏藥貼之候膿水盡肌肉平方許貼生好肌斂口之藥若依此法免教人受刀剪針烙之苦如是無頭癰腫待膿成用針刺破方依法收功也愚詳瘡之汗後或始有頭癰疽便用是藥後施錠子雖有次第然病體亦有積熱或風毒氣鬱等證若待開潰次第用藥及無頭癰腫待膿成用法而又不及東垣法之通變神速也如瘡潰動或結歹肉疔疽堅硬却次第用外治之法方可辛熱發表攻裏之劑飛龍奪命丹治一切疔瘡惡腫癰疽初發或發而黑陷毒氣內陷者天南星雄黃巴豆各一錢硇砂黃丹信石乳香各半錢斑猫十六箇去翅足麝少許右為末取蟾酥和為丸如黃黍米大每服十一二丸或十四五丸看瘡上下食前後以好酒送下量人虛實與之忌油膩魚肉葷物七日按此方世俗多用之故收入然香竄燥毒之劑蓋無經不至者故能宣泄備汗吐下三法病因食一切禽畜毒發所致及瘡脉沉緊細數毒藴在裏并濕毒用之神效但世人多不分此更不審瘡之大熱大渴毒氣焮發而脉浮洪在表及膏粱積熱之人未宜輕舉况有以半夏代雄黃殊不知雄黃治諸瘡及百節中大風中惡者之意此與郭氏二方皆手少隂例藥兹則表裏法也辛平發表攻裏之劑五香連翹湯治諸瘡腫初覺一二日便厥逆喉咽塞發寒熱沉香木香麝香連翹射干升麻丁香獨活桑寄生炙甘草各一兩大黃一兩半木通乳香各二兩右㕮咀每服五錢水一盞半煎七分溫服取利按丹溪曰精要第一論云不問癰疽瘡癤虛實冷熱先與內托散五香連翹湯沉麝湯等諸方不冷不熱不問老幼少壯隂陽虛實冷熱多服為妙夫癰疽瘡癤臟腑隂陽有淺深虛實冷熱用藥有補瀉溫凉老幼少壯其禀受厚薄形志苦樂隨年嵗而增損奈何欲以不冷不熱四五方而通治之又以多服為妙此不能無疑也學者當審經絡察病機而處治大抵豈可仗此為通治之法辛涼發表攻裏之劑千金漏蘆湯治積熱丹毒無名惡腫脉洪實弦滑發熱煩熱者漏蘆麻黃升麻赤芍黃芩甘草白斂白芨枳殼各四兩大黃十二兩右㕮咀每服一兩入薑煎按此出陽明例藥也驅積熱藴於表裏之劑防風通聖散方見中風門按此表裏氣血之藥也治一切風毒積熱瘡腫脉候弦洪實數浮緊氣血盛實者不可缺此見近有祕傳外科家方以是藥加人參赤茯苓黃茋蒼术金銀花名消腫托裏散雖以參茋為主復云人參無亦可蓋使人不能無疑而難用也且臨證加减須較表裏之法如表證多者當從此方以辛甘為主散之也裏證多者方可從變故此分辛溫辛平辛凉之異內托之劑機要內托復煎散托裏健胃地骨皮黃芩茯苓白芍人參黃茋白术桂甘草防己當歸各一兩防風右㕮咀先以蒼术一斤水五升煎至三升去术入前十二味再煎至三四盞取清汁分三四次終日飲之又煎蒼术查為湯去查依前又煎前十二味查分飲之五香湯治毒氣入腹托裏若有異證於內加减丁香木香沉香乳香各一兩麝三錢右為末水煎空心服若嘔者去麝加藿香一兩渴者加參一兩按丹溪曰或問內托之法古人有行之者乎曰河間治腫焮于外根盤不深形證在表其脉多浮病在皮肉非氣盛則必侵于內急須內托以救其裏宜復煎散除濕散鬱使胃氣和平如或未已再煎半料飲之如大便祕及煩熱少服黃連湯如微利及煩熱已退却與復煎散半兩如此使榮衛俱行邪氣不能內傷也然世俗多用十補散論已見前聖濟托裏湯治諸疔腫發背曽經汗下毒氣投心迷悶嘔吐而痛可服二三次又名內托散乳香明者一兩真菉豆粉四兩一方止用二兩右二味合勻每服一錢或二錢甘草煎湯調下按丹溪曰精要謂內托散一日至三日之內進十數服防毒氣攻衝臟腑名護心散切詳菉豆解丹毒又言治石毒味甘入陽明性寒能補為君以乳香去惡腫入少隂性溫善竄為佐甘草性緩解五金八石及百藥毒為使想此方專為服丹石而發疽者設不因丹石而發疽恐非必用之劑又次與五香連翹湯射干散散結氣消瘀血夫善於驅逐以五般香竄佐之與漏蘆湯相間大黃為佐雖各有黃茋漏蘆甘草之補果能免驅逐之禍乎况大黃入陽明太陽性走而不守瀉諸實熱以其峻捷有將軍之名癰疽因積毒在臟腑非一朝夕今發於外宜以標重為治當先助氣壯胃使根本堅固而行經活血為佐參以經絡時令使毒氣外發此正仲景解表用麻黃桂枝之意治施之早可以內消此乃內托之本意與夫年老者病深者證備者體虛者菉豆雖補將有不勝重任之患矣嘗治一婦人年將七十形實性急而好酒腦生疽才五日脉緊急且澀急用大黃酒煨細切酒拌炒為末又酒拌人參炒入薑煎調一錢重又兩時再與得睡而上半身汗睡覺病已失此亦內托之意又一男子年五十餘形實色黑背生紅腫及胛骨下痛其脉浮數而洪緊食亦嘔正冬月與麻黃桂枝湯加酒黃柏生附瓜蔞子甘草節羌活青皮人參黃芩半夏生薑六貼而消此非內托之意歟如此者非一不敢悉具郭氏定疼托裏散治一切瘡腫疼痛不可忍如少壯氣實先用踈利後服此藥粟殼去蒂炒三兩當歸白芍川芎各半兩乳香沒藥桂各三錢右㕮咀每服五錢水煎乳香止痛散治一切瘡腫疼痛不止栗殼六兩製白芷三兩炙甘草陳皮各二兩乳香沒藥各一兩丁香半兩右㕮咀每服三錢水一盞半煎按丹溪曰精要第十三論云初覺則宣熱拔毒既潰則排膿止痛豈瘡之初作無痛耶已潰之後痛又甚耶每見瘡之作也先發為腫氣血鬱積蒸肉為膿故其痛多少瘡之始作時也膿潰之後腫退肌寬痛必漸减而反痛者此為虛也宜補之亦有穢氣所觸者宜和解之亦有風寒逼者宜溫散之審此則已上二方因有所取擇矣東垣黃茋人參湯治諸瘡破後食少無睡及有虛熱并穢氣所觸者人參麥門冬陳皮白术蒼术各半錢黃茋一錢黃柏四分炒升麻六分當歸身半錢炒麯三分炙甘草半錢五味子九箇右㕮咀作一服水煎按此手足太隂例藥也聖濟竹葉黃茋湯通治疔腫諸瘡發熱而渴淡竹葉二兩生地黃八兩麥門冬黃茋當歸川芎甘草黃芩芍藥人參半夏石膏各二兩右㕮咀每服一兩水煎按此于少隂太隂足陽明藥也托裏黃茋湯治諸瘡發渴脉虛綿黃茋一兩炙甘草一錢右㕮咀水煎東垣聖愈湯治諸瘡血出多而心煩不安不得眠睡此亡血也熟地黃生地黃川芎人參各半錢當歸身黃茋各一錢右㕮咀水煎按已上二方手足太隂之劑一氣分一血分藥也內補黃茋湯治諸瘡腫發背已破後虛弱無力體倦懶言語食無味少睡脉澀自汗口乾並宜服之黃茋麥門冬各一兩熟地黃人參茯苓炙甘草各三錢白芍川芎官桂逺志當歸各半兩右㕮咀或為末每服三錢入薑棗煎按此手太隂例藥也補氣血滋隂助陽之劑聖濟透膿散治諸般癰瘡及貼骨癰不破者宜此不用針刀大蠶繭兒一箇燒灰酒調服即透切不可用兩三箇恐瘡口亦作兩三孔也按瘡腫有於皮肉厚處發者此法恐不能及用者審之外治之劑郭氏青金錠子銅緑三錢青􅈨膽􅈨輕粉砒霜白丁香苦葶􅏣各一錢腦子麝香各少許右將葶􅏣研細次下餘藥同研極細打稠糊為錠子或煉蜜加白芨末一錢為錠如麻黃粗細二三寸長看瘡口深淺絍入疼者可治不疼難治第一般緊峻碧雲錠子砒霜生開瘡口用第二般緊緩碧霞錠子砒霜煆去死肉用第三般緩慢碧玉錠子去砒加枯􅈨生好肉用翠霞錠子治年深冷瘻日久惡瘡有歹肉用之銅緑寒水石煆滑石各三錢明􅈨膩粉砒霜雲母石研如粉各一錢二分半右研細末糊為錠子如麻黃粗細長短不拘量瘡口深淺絍之如修合此候天色晴明則可信效錠子治一切惡瘡紅娘子黃丹砒霜鷹屎土硝白芨各一錢半銅緑二錢半腦子麝香各少許右研細末厮兒乳汁和為錠子用中病即止寸金錠子治疔毒惡瘡硃砂二錢黃丹明􅈨枯砒霜輕粉花醎白芨各一錢半蟾酥腦子麝香少許右研極細末稠糊和為錠子用之紅玉錠子去歹肉生肌用乾胭脂白􅈨枯各三錢輕粉砒霜黃丹腦子麝香少許右研極細末稠糊和錠子用之提丁錠子又名透肉錠子治疔瘡危篤發昏兼治瘰􅕅雄黃硃砂各二錢青鹽砒霜生白丁香輕粉斑猫去翅足各一錢半蟾酥麝香各一錢黃蠟萆麻子三七粒右為細末於銀器內或磁器內先將蠟溶開和前藥丸如桐子大捻作餅子用針刺破疔瘡放一餅於瘡頭上又刺四邉五七下惡血出為妙却用軟膏藥貼之立驗內服首功𤣥黑散或蟾酥丸翠青錠子又名善效錠子治腦疽發背惡瘡并潰爛追膿水長肌銅青四錢明􅈨枯韶粉乳香另研青黛各一錢半白斂輕粉各一錢麝半錢杏仁三七粒另研去皮尖如有死肉加白丁香一錢半右研細末稠糊為錠子或糯米飯和亦得看淺深絍之直至瘡平復尤可用之大有神效如前數方不可多用謂犯生砒也此藥無毒恐病家猜疑是毒藥請口內嘗之為憑也搜膿錠子先用追蝕等錠子蝕去歹肉惡物止有膿水皆宜用之自然銅川芎白芷各半兩黃連白斂各二錢半木香一錢半麝香少許右為極細末糯米飯和為錠子用之或作散末乾上亦佳守效散㸃疔瘡惡肉砒生白丁香松香輕粉川烏生􅈨各一錢蜈蚣一條焙右為極細末鈚針刺破瘡口令血出唾津調藥貼之瘡上其根自潰時效針頭散追蝕惡瘡歹肉兼治瘰􅕅赤石脂半兩乳香白丁香各二錢砒生黃丹各一錢輕粉麝各半錢蜈蚣一條焙乾右為極細末摻於瘡口歹肉自去矣若動刀針其瘡雖可有瘢神聖換肌散去瘰􅕅頑瘡白殭蠶二錢白􅈨一錢半砒生斑猫去翅足草烏頭青黛各一錢麝少許右研極細末乾摻些小於瘡口內用膏藥蓋護其惡肉化為膿水雄黃散治癰疽發背紫暈疼痛不止粟米小粉三兩炒草烏南星絡石百合各一兩白芨二兩乳香沒藥雄黃黃丹各半兩右極細末溫水調敷之水澄膏治風熱腫毒赤紅色攻焮疼痛不止白芨白斂四錢鬱金一對大黃黃柏黃藥子榆皮各七錢半乳香沒藥雄黃各半兩右細末用新汲水一碗藥末不以多少澄於水內藥定去水敷於腫處上用白紙封之用雞翎掠水濕潤金黃散治熱毒丹流遊走不定疼痛不止寒水石二兩鬱金一對藍實大黃黃柏黃連景天各一兩右細末用雞子清調敷水亦可乳香散治諸疳浸蝕日久不愈下注膁瘡內外踝生瘡頑瘡等證枯􅈨白膠香赤石脂各半兩黃丹乳香沒藥各二錢輕粉二錢右細末加麝些小如瘡濕乾上乾則香油調敷之輕粉散治下注疳瘡蝕臭腐爛疼痛不可忍者黃柏蜜炙蜜陀僧黃丹高末茶乳香各三錢輕粉一錢半麝少許右末用葱湯洗瘡後次貼此藥兼治小兒疳瘡竒功散治瘰􅕅馬刀頑惡等瘡野糞尖乾一兩蜜陀僧無名異各半兩皂角乳香沒藥各三錢右糞用鹽泥封固炭火燒之去泥取出同藥五味研為末加麝香少許用清油調勻漫敷上濕即乾摻其功神妙立應散治金瘡血出不止并諸瘡久不生肌寒水石一兩半煆花蘂石龍骨黃丹沒藥各半兩黃藥子七錢半一方加白芨乳香輕粉右為細末如一切金刃刀鐮傷者用藥敷上絹帛扎之不作膿血瘡膿水乾貼生肌定疼已上並郭氏方祛風散治一切風毒腫痛天南星二兩白􅈨草烏各半兩右為末酒調敷生薑汁亦可聖濟方治疔瘡蜣蜋心腹下肉稍白者右捕取不以多少貼瘡上半日許未可再上之血盡根出神效走馬散圍一切惡瘡諸腫神效大黃三兩黃柏當歸白芨赤小豆黃芩各二兩荆芥穗半夏各一兩半白芷白斂南星各一兩檀香雄黃各三錢乳香七錢沒藥五錢紅花一兩右為細末以水調敷如瘡色黯薑汁調瘡未成膿者好米醋調敷乳香善應膏治一切腫毒惡瘡大黃黃茋赤芍杏仁各一兩當歸七錢半川山甲猪牙皂角各二錢半木鱉子三錢乳香沒藥各半兩血竭輕粉各二錢半黃丹七兩香油一斤右除黃丹乳沒血輕五味外其餘銼於油內浸十餘日砂鍋內熬藥色微黑用槐柳條攪之瀘去柤物净用油入丹熬成膏滳水中不散然後入乳香等四味攪勻為度攤紙上貼瘡至寶玉連膏治一切瘡腫黃連二兩黃柏黃芩大黃生地黃赤芍川椒杏仁白芷桂猪牙皂角當歸尾各半兩葱白七根净髮一拳大槐柳榆桑梔柏桃枝條各三錢已上用真香油二斤春浸五日夏三秋七冬十日如上法熬微焦黑瀘去柤入松香四兩黃丹碾篩净十兩用藥油熬成膏滴入水中不散然後入下項藥乳香沒藥朴硝龍骨枯􅈨血竭各半兩輕粉膽􅈨麝香各二錢共為細末入膏內右用净磁器盛頓旋攤紙上貼收斂之劑生肌散白􅈨枯檳榔各一兩蜜陀僧一錢半黃丹血竭各一錢輕粉半錢紅玉散軟石膏半兩煆黃丹一錢半炒完肌散定粉枯􅈨黃連乳香龍骨各二錢黃丹輕粉各一錢右各料為極細末貼瘡口生肌長肉看輕重選用之雜方脂調散治疥瘡膿窠瘡神效蛇床子二兩䕡茹草烏花椒苦參荆芥各一兩雄黃硫黃􅈨各半兩右為細末猪脂調搽羌活散治頑癬疥癩風瘡成片流黃水久不差者羌活獨活明􅈨硫黃狼毒白鮮皮白附子蛇床子各一兩輕粉黃丹右細末香油調成膏搽之雄黃散治癬桎皮剪草各一兩􅈨白芨各半兩雄黃二錢半斑猫七箇去翅足草烏頭尖四箇右為末水調敷津唾亦可楓實膏治風瘡燥癢癬疥大楓子肉半兩輕粉枯􅈨各些小右搗為膏擦瘡上一上散治風癢裂折燥瘡苦參一兩白芷熖硝枯􅈨各半兩荆芥穗三錢寒水石二兩煆白芨三錢右為末油調搽聖濟烏蛇丸治一切風癬多年不效者烏蛇酒浸去骨天麻各二兩槐花半斤附子小便浸宿白附子炮各一兩全蝎炒殭蠶炒羌活乳香各一兩半苦參十兩右為細末生薑汁和蜜各一斤熬成膏入藥和為丸桐子大每三四十丸空心溫酒下夜荆芥湯下宣風換肌散治一切風癬疥瘡疙瘩風瘡炙甘草黃茋當歸各一兩黃連黃芩各酒浸炒大力子炒防風白芷荆芥穗川芎烏蛇肉各半兩羌活蒼术何首烏各三錢全蝎十箇炒右為細末酒調服茶清亦可下二錢東垣內托升麻湯治婦人乳中結核瓜蔞仁三錢連翹二錢甘草節青皮各一錢右作一服水煎食後細細呷之連翹飲子治乳癰青皮瓜蔞仁桃仁橘葉川芎連翹甘草節皂角針各等分右㕮咀每服七八錢水煎食後細細呷之已破者加參茋當歸未破者加柴胡消毒飲治便毒初發三四日可消皂角針金銀花防風當歸大黃甘草節瓜蔞仁各等分右㕮咀水酒各半煎食前溫服仍頻提掣頂中髮立效下疳瘡洗藥黃連黃柏當歸白芷獨活防風朴硝荆芥右等分水煎入錢五十文烏梅五箇鹽一匙同煎溫洗日五七次用下藥敷木香檳榔黃連銅青輕粉枯􅈨螵蛸麝各等分右為極細末洗後至夜敷上法製靈雞彈治瘰􅕅馬刀腋下生者斑猫七箇去頭翅足右將雞子一箇頂上敲開些小入藥在內紙封固了於飯上蒸熟取出去殼切開去藥五更空心和米飯嚼服候小便通如米泔水狀如脂即驗也如大小便不通却服琥珀散三二貼催之然後常服後二藥猶佳妙靈散服前藥後却將此散與連翹丸相間常服瘡愈方止木香三錢沉香二錢牛膝何首烏當歸螵蛸桑寄生各一兩海藻二兩青葙子昆布海𢃄甘草節各半兩右末每服三二錢食後溫酒調下內消連翹丸連翹三兩射干白芨夏枯草土瓜漏蘆沙參澤蘭胡桃仁各一兩半右末入桃仁研勻酒糊丸桐子大每服三五十丸空心食前鹽酒下琥珀散治諸般瘡癤表裏有熱小便赤澀白茯苓黃芩茵陳紫草瞿麥茅根石韋烏藥琥珀連翹車前子右各等分為極細末每二三錢燈心湯調下無時聖濟總録治漆瘡諸方生柳葉三斤冬用皮煎湯適寒溫洗之芒硝五兩湯化浸洗之猪膏一味熬去滓停冷塗貼之生螃蟹一味取黃塗傅日三五次荷葉燥者一斤煮水洗之以貫衆末摻之乾則油和塗雞子黃塗瘡上乾則易之不過三次黃櫨木煎湯頻洗之一方榖精草煎湯洗甚速經驗方治腿膝生瘡有膿治金刃傷亦妙五倍子細碾摻之玉機微義卷十五
