body:
  text: 玉機微義卷二十六明徐用誠原輯劉純續増脹滿門諸經敘脹所因鍼經曰夫脹者皆在于臟腑之外排臟腑而廓胸脇脹皮膚故命曰脹或厥氣在下榮衛留止寒氣逆上真邪相攻兩氣相搏乃合為脹也按論中備五臟六腑發脹為諸證宜玩本文内經曰諸腹脹大皆屬於熱腹滿䐜脹支鬲胠脇下厥上冒過在太隂陽明乃寒濕鬱遏也原病式曰腹脹大皷之如皷氣為陽陽為熱氣甚則如是也脈法針經曰其脈大堅以濇者脹也脈經曰關上脈虚即脹内遲而滑者脹脈盛而𦂳者脹嚴氏曰脹脈浮者易治虚者為難論脹分三因陳無擇云臟氣不平勝乗相因為病如怒傷肝肝尅脾脾氣不正必脹於胃名曰勝尅怒乗肺肺氣不傳必脹於大腸名曰乗尅憂思結聚本臟氣鬱皆内所因或冒寒暑風濕隨經絡傳至陽明致脹者屬外因飲食饑飽生冷甜膩聚結不散或作胚塊膨脹滿悶屬不内外因也按此論肝木勝乗脾肺為脹滿即東垣所謂脾胃之上不足火木大勝致脹也此不言火况怒傷肝者豈無火動耶所出大半夏湯以桂附中加參歸以調血氣言其脈弦遲恐非肝氣尅脾臟閉腑鬱病也論腹脹屬濕内經云太隂所至為畜滿又云太隂所至為中滿霍亂吐下又云諸濕腫滿皆屬脾土按發明辨云脾為隂中之太隂又云脾為隂中之極隂乃為坤元亘古不遷之土天為陽也火也地為隂也水也在人則為脾同隂水之化脾有餘則腹脹食不化故無陽則不能化五榖脾盛乃大寒為脹滿故脈經云胃中寒則脹滿大抵此病皆水氣寒濕為之也治宜大辛熱之劑如土久於雨水中則為泥矣豈能生化萬物必待和風暖日濕去陽生自然長生矣脾濕有餘無陽則不能化五榖所以宜辛熱治之必愈然亦有輕重論腹脹有熱有寒屬外感東垣曰經云諸腹脹大屬熱此乃八益之邪有餘之證自天外而入感風寒之邪𫝊入于裏寒變為熱作胃實日晡潮熱大渴引飲譫語是太陽陽明倂病大實大滿者大承氣湯下之少陽陽明微滿實者小承氣湯下之五常正大論云下之則脹已是也假令痎瘧為脹滿亦有寒脹熱脹是天之邪氣傷暑而得之不即時發至秋暑氣衰絶而瘧病作矣知其寒也局方交加飲子是也豈不聞素問及靈樞經中說内虚不足中寒濕令人中滿及五臟六腑俱有脹滿更以脹家寒熱多少較之胃中寒則脹滿隂陽應象論云濁氣在上則生䐜脹針經云脹取三陽三陽者足太陽膀胱寒水為脹與通評虚實論中說腹暴滿按之不下取太陽經絡者胃之募正同五臟生成論云腹滿䐜脹云云見前胃中寒濕菀遏故也脈經所謂胃中寒則脹滿也又厥論云太隂之厥則腹滿䐜脹後不利不欲食食則嘔不得臥按所說寒脹多如此湯液醪醴論中說中滿治法當開鬼門謂發汗也潔淨府利小便也又云中滿者瀉之於内謂脾胃有病當今上下分消其氣下焦如瀆氣血自然分化不待泄滓穢如或大實大滿大小便不利從權以寒熱藥下之論腹脹屬内傷所致東垣曰或傷酒濕麫及味厚之物膏粱之人或食已便臥使濕熱之氣不得施化致令腹脹滿此亦是熱脹調經篇云因飲食勞倦損傷脾胃始受熱中末𫝊寒中皆由脾胃之氣虚弱不能運化精微而致水榖聚而不散而成脹滿此寒濕鬱遏而脹也醪醴論中治法謂先瀉其血絡後調其真經氣血平陽布神清此治之正也或曰諸腹脹大皆屬於熱者何也此乃病機總辭假令外傷風寒有餘之邪自表𫝊裏寒變為熱而作胃實腹滿仲景以承氣湯治之亦有膏粱之人濕熱鬱於内而成脹滿者此熱脹之謂也大抵寒脹多而熱脹少治之者宜詳辯之論皷脹屬濕熱丹溪曰心肺陽也居上腎肝隂也居下脾居中亦隂也屬土經曰飲食入胃逰溢精氣上輸於脾脾氣散精上歸於肺通調水道下輸膀胱水精四布五經並行是脾具坤靜之徳而有乾健之運故能使心肺之陽降腎肝之隂升而成天地交之泰是為一平人今也七情内傷六淫外侵飲食不節房勞致虚脾土之隂受傷轉運之官失職胃雖受榖不能運化故陽升隂降而成天地不交之否清濁相混隧道壅塞鬱而為熱熱留為濕濕熱相生遂成脹滿經曰皷脹是也以其外雖堅滿中空無物有似於皷膠固難治又名曰蠱若蟲侵蝕之義理宜補脾又須養肺金以制木使脾無賊邪之患滋腎以制火使肺氣得清却厚味斷妄想逺音樂無有不安醫者不察急於作效病者苦於脹急喜行利藥以求通快不知覺寛得一日半日其腫愈甚病邪甚矣真氣傷矣古方惟禹餘糧丸又名石中黄丸又名紫金丸制肝補脾殊為切當亦須隨證加減用之予友俞仁叔連得家難年近五十得此疾自製禹餘糧丸服之其脈弦濇而數予曰此丸新製煅煉之火邪尚存温熱之藥太多宜自加減不可執方俞笑曰此方不可加減服之一月口鼻見血色黒骨立而死又楊兄年近五十性嗜酒病瘧半年患脹診其脈弦而濇重則大瘧未愈手足痩而腹大如蜘蛛狀予教以參术為君當歸川芎芍藥為臣黄連陳皮茯苓厚朴為佐生甘草些小作濃湯飲之一日定三次彼亦嚴守戒忌一月後瘧愈又半年小便長而脹愈中間須稍有加減大意只是補氣行濕又陳氏年四十餘性嗜酒大便時見血春間患脹色黒而腹大形如鬼狀脈數而濇重似弱以四物湯加連芩木通白术陳皮厚朴生甘草作湯與之一月而安一補氣一補血餘藥大率相出入皆獲安或曰氣無補法今何補氣而獲安予曰氣無補法俗論也痞悶壅塞似難於補不思正氣虚者不能自運經曰壯者氣行則愈弱者則著而成病若不補氣邪何由行或曰子之藥審矣何効之遲也病者將厭子之迂而求速效矣予曰此病之起或三五年或十餘年根深勢篤難求速効知王道者能治此病或曰脹病將終不利耶予曰灼知其不虚病淺胃壯積滯不痼而又有可下之證矣按此論七情内傷六淫外侵致脹合東垣所謂八益之邪有餘之證自外入也内傷勞倦虚損脾胃等致不足之證自内生也可見虚實之殊寒熱病機互有則用藥當有所據矣論脹為諸氣所致詳見氣證門論脹為諸積所致陳無擇云五積久而必心腹脹滿但内所因不待成積即致也亦當隨其臟氣而平治之謹按脹滿屬寒或内傷或諸氣或因病數服通利藥脾胃虚而致者為甚多屬濕熱者少至積成者亦甚有之但古方多不分治如禹餘糧丸類燥熱氣血之劑於内鬱之火豈得不反有所助耶夫治是疾遇大實滿燥實痞閉氣滯或始由内傷脈洪實者非下之不可然有服下劑過多或瀉痢後所至或素脾胃虚弱不能運化而成者皆宜補脾行濕盖此際正氣已衰矣况積而脹乎故云平治之又如血畜血瘀致者當從血藥治之寒者熱之熱者寒之結者散之清濁混者分消之或升降其氣或消導皆宜適事為故可也論濁氣在上則生䐜脹内經云清氣在下則生飱泄濁氣在上則生䐜脹此隂陽反作病之逆從也發明曰夫䐜脹者以寒熱温凉論之此何脹也曰此飲食失節為脹乃受病之始也濕熱亦能為脹右關脈洪緩而沉弦脈浮於上是風濕熱三氣相合而為病也是脾胃之令不行隂火亢甚乗於脾胃盛則左遷而陽道不行是六腑之氣已絶於外大盛能令母實風氣外絶風氣外絶者是榖氣入胃清氣營氣不行便是風氣也異呼同類即胃氣者是也經云虚則兼其所勝土不勝者肝之邪也是脾胃之土不足火木大勝者也經云濁隂出下竅濁隂走五臟濁隂歸六腑濁隂歸地此平康不病之常道反此則為脹也經云飲食不節起居不時者隂受之隂受之則入五臟入五臟則䐜滿閉塞調經論云下脘不通則胃氣熱熱氣熏胸中故内熱下脘者幽門也人身之中上下有七衝門皆下衝上也幽門上衝吸門吸門者㑹厭也衝其吸入之氣不得下歸於腎肝為隂火動相拒故咽膈不通致濁隂之氣不得下降而大便乾燥不行胃之濕與客隂之火俱在其中則腹脹作矣治在幽門使幽門通利泄其隂火潤其燥血生益新血幽門通利則大便不閉吸門亦不受邪其膈咽得通䐜脹腹滿俱去矣是濁隂得下歸地矣故經曰中滿者瀉之於内此法是也論下之則脹巳發明曰西北二方地形高寒經曰隂者其精奉於上其寒在外故曰寒則氣浮知隂之寒凉西北二方之氣為主用也異法方宜論云北方之人臟寒生滿病亦謂適寒凉者脹皆秋冬之氣也在人則為肺腎冬天之時寒凉在外六陽在於坤土之中坤土者人之脾胃也五臟之病外寒則必内熱脈經所謂五臟脈小皆為消癉之病消癉者消榖善饑北方之地無不能食者此也隂勝陽虚下之則愈正謂此也病機云諸腹脹大皆屬於熱下之則脹巳此理悉矣謹按脹主下之一法亦大畧言爾故出方宜之論若泛用之多往往腹脹是失運化之職也然是證雖主於下盖病因寒熱積濕氣血機本不同於治可不為分例云脹滿治法調理之劑局方紫沉通氣湯治三焦氣澁不能宣通腹脹便澁方見氣證門濟生紫蘇子湯治憂思多度致傷脾胃心腹脹滿喘促煩悶腸鳴氣走漉漉有聲大小便不利脈虚𦂳而濇蘇子一兩大腹皮草果仁半夏厚朴製木香陳皮木通白术枳實人參甘草各半兩右㕮咀每四錢入薑棗煎按此二方手足太隂之劑也三因大半夏湯治肝氣不平勝尅於脾脾鬱不行結聚涎沫閉於臟氣腑氣不舒胃則脹滿其脈弦遲故知中虚胃冷脹滿服此可下氣進食半夏洗桂心各五錢附子人參甘草炙厚朴製當歸茯苓枳實炒各三錢川椒炒八十粒右剉每四大錢入薑棗煎禹餘糧丸治中滿氣脹喘滿及水氣脹蛇含石三兩煅真針砂五兩禹餘糧三兩同上砂炒已上三物為主其次量人虚實入下項藥木香牛膝蓬术炮白蒺䔧桂心川芎白豆蔲茴香炒三稜羌活茯苓乾薑青皮陳皮附子炮當歸各半兩右為末拌勻以湯浸蒸餅去水搗勻丸如梧子大每五十丸空心温酒下按此治寒脹消積藥也氣血之劑隂陽之氣下陷者可用故存之與前方並足太隂例東垣木香順氣湯治濁氣在上則生䐜脹木香三分厚朴四分青皮陳皮益智仁茯苓澤瀉乾生薑半夏吳茱茰湯洗各二分當歸五分升麻柴胡各一分草豆蔲煨三分蒼术三分右㕮咀水煎按此足太陽陽明厥隂藥也木香塌氣丸治中焦腹脹蘿蔔子炒陳皮去白各五錢胡椒草豆蔲煨木香青皮各三錢蝎梢去毒二錢半右為細末水糊為丸梧子大每三十丸温米飲下忌服油膩白粥百日量人大小與服隂囊腫用青鹽乾薑白麫為末水調貼之中滿分消湯治中滿寒脹寒疝大小便不通隂躁足不收四肢厥逆食入反出下虚中滿腹中寒心下痞下焦躁寒沉厥奔豚不收並宜服之益智仁半夏茯苓木香升麻各三分吳茱茰草豆蔲黄芪各五分川烏頭澤瀉人參青皮當歸生薑麻黄柴胡乾薑黄連畢澄茄黄栢各二分為熱因寒用右㕮咀只作一服水煎按此二方治寒脹之劑也廣茂潰堅湯治中滿腹脹内有積塊堅硬如石令人坐臥不安大小便澁滯上氣喘促通身虚腫厚朴黄芩益智仁草豆蔲當歸各五錢黄連六錢半夏七錢廣茂升麻紅花吳茱萸各二錢甘草生柴胡澤瀉神麯青皮陳皮各三錢渴者加乾葛四錢右㕮咀每七八錢水煎食前温服中滿分消丸治中滿皷脹氣脹水氣脹大熱脹黄芩黄連枳實炒半夏製各五錢薑黄白术人參甘草炙猪苓各一錢生乾薑白茯苓砂仁各一錢厚朴一兩知母四錢澤瀉陳皮各三錢右為細末水浸蒸餅為丸梧子大每百丸焙熱白湯下食後寒因熱用故焙服按此並治熱脹之劑也又濕熱之藥攻下之劑三因七物厚朴湯治腹滿發熱脈浮數飲食如故脹滿者為熱脹厚朴炒一兩甘草炙大黄煨各三錢枳實炒半兩桂心一分右為末每四大錢入薑棗煎嘔者加半夏按此治熱之劑陽明例藥也簡易是齋推氣丸治三焦痞塞氣不升降腹脹檳榔陳皮黄芩大黄枳實黒牽牛等分右為末煉蜜丸梧子大每五七十丸臨睡湯下量虚實與服楊氏消脹丸木香黒牽牛蘿蔔子炒檳榔右等分為末水糊丸梧子大每三十丸宣明肉豆蔲丸治食痼腹脹如皷不食者病可下肉豆蔲檳榔輕粉各一錢黒牽牛一兩半服頭末右為末糊為丸如菉豆大每服十丸二三十丸煎連翹湯下食後日三服按此並氣分藥也雞屎醴散治心腹脹滿旦食不能暮食致令胃逆皷脹證大黄桃仁雞屎醩乾者等分右為末每一二錢水煎入薑食前服按此血分藥也東垣沉香海金砂丸治一切積聚脾濕腫脹肚大青筋羸瘦海金砂一錢半沉香二錢牽牛末一兩輕粉一錢右為末獨蒜如泥為丸如梧子大每三十丸煎白沸燈心通草湯量虚實與服海金砂散治脾濕太過腹脹如皷方見濕門按此二方治濕之劑也沉香交泰丸治濁氣在上干擾清陽之氣菀而不伸以為䐜脹沉香白术當歸各三錢厚朴製五錢枳實炒吳茱萸洗白茯苓澤瀉陳皮青皮木香各二錢大黄酒浸一兩右為末湯浸蒸餅為丸梧子大每五十加至七十丸温湯送下按此分消之劑也氣血之藥三花神佑丸治一切腫病大腹實脹喘滿方見濕門按此治濕熱之藥也治積聚之劑澹寮三稜煎丸治心腹堅脹脇下𦂳硬胸中痞塞喘滿京三稜半觔為末以酒三升銀器内熬成膏青皮蘿蔔子炒神麯炒各二兩麥蘖炒三兩􅔈砂一兩乾漆炒杏仁炒各半兩右為末以膏子丸如梧子大每三十丸食後温米飲下𨗳氣丸治諸氣痞塞關膈不通腹脹如皷大便虚秘青皮用水蛭炒莪术蝱蟲炒三稜乾漆炒檳榔斑猫炒茱茰牽牛炒乾薑碙砂炒附子鹽炒赤芍川椒炒胡椒茴香炒石菖蒲桃仁炒右各剉與所同炒藥熟去水蛭等不用只以青皮等十件為末酒糊為丸如梧子大每五丸至七丸空心紫蘇湯下塌腫神應丸治諸蠱毒腹脹方見積聚門按此並治積聚𨗳氣散鬱之劑也又能入血分謹按已上攻治諸方皆有輕重所宜之製宜對證選用不得少差致有實實虚虚之失也發明曰禁服論云約方猶約囊也囊滿弗約則輸泄方成弗約則神與氣俱未滿而知約之可以為工不可以為天下師此聖人所以退太過而進不及以平為期也大凡氣味者有毒無毒固宜常制矣是以大毒治病十去其六常毒治病十去其七小毒治病十去其八無毒治病十去其九餘以榖肉果菜食養盡之至如君一臣二竒之制也君二臣四耦之制也近而竒耦制小其服逺而竒耦制大其服大則數少小則數多矣多則九之少則二之補上治上制以緩補下治下制以急急則氣味厚緩則氣味薄下不以耦汗不以竒隨其邪之所在高下淺深輕重虚實影響無間萬舉萬全是謂中行故可為師也假如病大而湯劑小則邪氣少屈而藥力已乏欲不復治其可得乎猶一杯之水救一車薪之火竟不能滅是謂不及故不可為師而可以為工矣小而湯劑大則邪服已盡而藥有餘力欲不傷正何所容哉猶火炎崑岡玉石俱焚莫之能止是謂太過此又不可以為工是乃粗醫也三者之論惟中而已過與不及皆為偏廢然而太過尤甚於不及何以明之盖失之於姑息邪復勝正者止於勞而無益猶可勉而適中或失於苛暴則正氣被傷因而羸瘠者有之危殆者有之滅亡者有之非徒無益而又害之此所謂尤甚也可不戒哉嘗見仲景之書於承氣條下攻裏則曰若更衣止後服於桂枝湯後發表乃云漐漐微汗益佳不可令如水淋漓本乎軒岐之微㫖有所得耳玉機微義卷二十六
