body:
  text: 玉機微義卷十七明徐用誠原輯劉純續增血證門諸經敘血證所因內經厥論云陽明厥逆喘咳身熱善驚衄吐血溫淫汗出􅍠衄生氣通天論云陽氣者大怒則形氣絶而血菀於上氣厥論云脾移熱於肝則為驚衄胞移熱於膀胱則癃溺血舉痛論云怒則氣逆甚則嘔血故氣上矣陰陽别論云結陰者便血云云見下針經云厥氣生足悗悗生脛寒後則血云云見積聚門脈經云下血先見血後見便此近血也先見便後見血此逺血也脈法內經云脈來懸鈎為衄血常脈脈至而搏血衄身熱者死腸癖下膿血脈弦絶則死滑大則生血溫身熱者死脈經曰脈得諸澀濡弱為亡血脈來輕輕在肌肉尺中自浮目睛暈黃衄必未止太陽脈大而浮必衄吐血病人面無血色無寒熱脈沈沈弦衄也脈浮弱手按之絶者下血脈芤為失血澀為少血尺脈滑而疾為血虛脈弦而緊脅痛臟傷有瘀血吐血唾血脈滑小弱者生實大者死唾血脈緊強者死滑者生腎脈小搏沈為腸癖下血心肝癖亦下血論血證分三因陳無擇云衄者因傷風寒暑濕流傳經絡湧泄于清氣道中而致者皆外所因積怒傷肝積憂傷肺煩思傷脾失志陽腎暴喜傷心皆能動血隨氣上溢清氣道中而致者屬內因飲酒過多啖炙煿辛熱或墜墮車馬傷損致者為不內外因吐血者或因四氣傷于外七情動于內及飲食房勞墜閃傷損致榮血留聚膈間滿則吐溢世謂妄行或吐瘀血此名內傷便血或清或濁或鮮或黑或在便前便後或與泄物並下此由內外有所感傷疑停在胃隨氣下通亦妄行之類尿血因心腎氣結所致或憂勞房室過度此得之虛寒不可專以血得熱而淖二者皆致尿血與淋不同謹按衄血下血傷寒邪氣壅迫於經而致者故有之雜證見者多火熱所致或吐溢於空竅皆五志所動或陰分鬱熱或內外有所傷而成有寒邪者少如尿血因房勞者實由精氣滑脫陰虛火動榮血妄行爾已上論為虛寒恐未必然也若便血清者屬榮虛有熱濁屬熱與濕色鮮者屬火黑者火極與泄物並下屬有積或絡脈傷也並宜分治論下血為內傷絡脈所致詳見積聚門論嘔唾血溢為氣逆所致東垣曰經云怒氣逆甚則嘔血暴疸內逆肝肺相搏血溢鼻口取天府穴又足少隂腎之脈從腎上貫肝入肺中循喉嚨其病則飢不欲食面黑如地色咳唾則有血夫氣者陽也血者隂也氣主詬之血主濡之今血妄行上出於鼻口者皆氣逆也故經言陽明厥逆怒則氣逆暴疸內逆者是也謹按悲氣勞氣等皆能致血證詳見氣門但怒氣致血證者則暴甚故經曰抑怒以全隂者是矣否則五志之火動甚火載血上錯經妄行也論衄吐血泄為火熱所致原病式曰衄者陽熱怫鬱干於足陽明而上熱則血妄行鼻衄也血溢者上出也心養于血故熱甚則血有餘而妄行或謂嘔吐紫凝血為寒者誤也此非冷凝由熱甚銷爍以為稠濁而熱甚則水化制之故赤兼黑而為紫也血泄熱客下焦而大小便血也衄衊血汙血出也汙者濁也心火熱極則血有餘熱氣上甚則為血溢熱勢亢極則燥而汙濁害承乃制則色兼黑而為紫也論衄血下血為傷寒所致成無已曰傷寒衄者為邪氣不得發散壅盛於經逼迫於血則因致衄也桂枝湯麻黃湯治衄者非治衄也即是發散經中邪氣爾至畜血者血在下焦結聚而不行畜積而不散者是也血菀於上而吐血者謂之薄厥留於下而瘀者謂之畜血此由太陽隨經瘀熱在裏血為熱所搏結而不行畜於下焦之所致經曰太陽病七八日表證仍在脈微而沈反不結胸其人如狂者以熱在下焦少腹當鞕滿小便自利者下血乃愈傷寒例少陰證下利便膿血者桃花湯以固脫散寒補正許氏治少隂誤汗衄血及臍中出血用薑附湯治少陰之本陰證略例治三焦出血色紫不鮮此重沓寒濕化毒凝泣浸漬而成治要用黑錫丹見直指方按所論已上證皆寒邪之變病也至又有甚者如論云服桂枝湯吐血其後必吐膿血又厥陰證傷寒六七日大下後寸脈沈而遲手足厥冷下部脈不至咽喉不利唾膿血泄利不止者為難治宜麻黃升麻湯火邪亦咽燥唾血陽毒亦吐血皆變證之極者也非衄證之比大抵傷寒畜血下血為傳變故下血衄血身涼乃愈其不傳變入裏邪氣不得發散逼迫於血因致妄行於下者為逆下血必多不能止為難治也論結陰便血衛生寶鑑云真定史十年四十二形體本瘦秋時因勉強飲酸酒數杯少時腹痛次傳下利無度待十餘日便後見血或紅或紫腹鳴時痛諸醫以為血熱用芍藥柏皮丸治之未效仍不欲食食則嘔酸形體愈瘦面色青黃不澤心下痞惡冷物口乾時有煩燥不得安臥診時脈弦細而微遲手足稍冷經曰結陰者便血一升再結二升三結三升又邪在五臟則陰脈不和陰脈不和則血留之結陰之病陰氣內結不得外行無所稟滲入腸間故便血也外灸中脘三里氣海等穴內服平胃地榆湯而愈按此治例實內傷法也宜與積聚門敘積之始兼看血屬陰難成易虧論丹溪曰經云人年至四十陰氣自半而起居衰矣又曰男子六十四而精絶女子四十九而經斷夫以陰氣之成止供給二十年之運用已先虧矣人之情欲無涯此難成易虧之陰氣若之何而可以縱欲也謹按或曰經云榮者水穀之精也和調五臟灑陳於六腑乃能入於脈也源源而來生化於脾總統於心藏受於肝宣布於肺施泄於腎灌溉一身目得之而能視耳得之而能聽手得之而能攝掌得之而能握足得之而能步臟得之而能液腑得之而能氣是以出入升降濡潤宣通者由此使然也注之於脈少則澀充則實常以飲食日滋故能陽生陰長取汁變化而赤為血也生化旺則諸經恃此而長養衰耗竭則百脈由此而空虛可不謹養哉故曰血者神氣也持之則存失之則亡是知血盛則形盛血弱則形衰神靜則陰生形役則陽亢陽盛則陰必衰又何言陽旺而生陰血也蓋謂血氣之常陰從乎陽隨氣運行於內苟無陰以羈束則氣何以樹立故其致病也易調治也難以其比陽常虧而又損之則陽易亢陰易乏之論可以見矣諸經有云陽道實陰道虛陰道常乏陽常有餘陰常不足以人之生也年至十四經行至四十九而經斷可見陰血之難成易虧如此陰氣一傷所變之證妄行於上則吐衄衰涸於外則虛勞忘反於下則便紅稍熱膀胱則癃閉溺血滲透腸間則為腸風陰虛陽搏則為崩中濕蒸熱瘀則為滯下熱極腐化則為膿血火極似水血色紫黑熱勝於陰發為瘡瘍濕滯於血則為痛癢癮疹皮膚則為冷痺畜之在上則人喜忘畜之在下則人喜狂墮恐跌仆則瘀惡內凝若分部位身半以上同天之陽身半以下同地之陰此特舉其所顯之證者治血必血屬之藥欲求血藥其四物之謂乎河間謂隨證輔佐謂之六合湯者詳言之矣余故陳其氣味專司之要不可不察夫川芎血中氣藥也通肝經性味辛散能行血滯於氣也地黃血中血藥也通腎經性味甘寒能生真陰之虛也當歸分二治血中主藥也通肝經性味辛溫全用能活血各歸其經也芍藥陰分藥也通脾經性味酸寒能和血治虛腹痛也若求陰藥之屬必於此而取則焉脾胃論有云若善治者隨經損益摘其一二味之所宜為主治可也此特論血病而求血藥之屬者也若氣虛血弱又當從長沙血虛以人參補之陽旺則生陰血也若四物者獨能生血分受傷為氣不虛也輔佐之屬若桃仁紅花蘇木血竭牡丹皮者血滯所宜蒲黃阿膠地榆百草霜棕櫚灰者血崩所宜乳香沒藥五靈脂凌霄花者血痛所宜蓯蓉瑣腸牛膝枸杞子益母草夏枯草敗龜板者血虛所宜乳酪血液之物血燥所宜乾薑桂者血寒所宜生地黃苦參血熱所宜特取其正治大略耳以能觸類而長可謂應無窮之變矣論治血證大法東垣曰傷寒家衄血者仲景言不可發汗蓋為脈微也若浮緊者麻黃湯浮緩者桂枝湯脈已微者二藥俱不可用宜黃芩芍藥湯主之雜病見血多責其熱如衄血出於肺以犀角升麻梔子黃芩芍藥生地黃紫參丹參阿膠之類主之咯唾血者出於腎以天門冬麥門冬貝母知母桔梗百部黃柏逺志熟地黃之類主之痰涎血者出於脾葛根黃茋黃連芍藥當歸甘草沈香之類主之嘔吐血出於胃也實者犀角地黃湯主之虛者小建中湯加黃連主之血證上行或唾或嘔或吐皆逆也若變而下行為惡痢者順也血上行為逆其治難下行為順其治易故仲景云畜血證下血者當自愈也與此意同若無病之人忽然下痢其病進也今病血證上行而復下行惡痢者其邪欲去是知吉也經曰諸見血身熱脈大者難治是火邪勝也身涼脈靜者易治是正氣復也故脈訣云鼻衄吐血沈細宜忽然浮大即傾危此之謂也血證治法婦室經血諸證詳見婦人門治風之劑敗毒散治風熱流入大腸經下血不止若因酒毒加黃連方見咳門按此出少陽例表裏藥也本事方槐花散治腸風臟毒下血槐花炒柏葉杵荆芥穗枳殼等分右為末每服二錢空心米飲送下拔萃方結陰丹治腸風下血臟毒下血枳殼炒葳靈仙黃茋陳皮椿根何首烏荆芥穗等分右為末酒糊丸桐子大每五七十丸米飲下入醋少許按此二方手太陰陽明藥也濟生加減四物湯治腸風下血不止側柏葉生地黃當歸川芎各一兩枳殼荆芥穗槐花炒甘草各半兩炙右咀每四錢入烏梅薑同煎按此手足厥陰太陰藥也大抵此藥主補血涼血而以風為虛象者蓋非風客於腸間也東垣黃茋芍藥湯治衄多歲面黃眼澀多眵手麻黃茋三兩甘草炙二兩升麻葛根芍藥各一兩羌活半兩右㕮咀每三錢水煎溫服按此手足太陰陽明藥也然血虛久則陽分亦虛矣故血不足則麻木陰虛火動變證百出亦實非風也此出升陽滋陰例治寒之劑東垣麻黃桂枝湯治感寒發衄脈微弱者麻黃黃茋白芍甘草各一錢桂枝當歸各半錢人參一分麥門冬三分五味子五箇右㕮咀作一服水煎按此太陽例藥也傷寒論有例兹不詳録濟生斷紅丸治臟腑虛寒下血不止面色痿黃羸瘦側柏葉炒川續斷酒浸鹿茸醋煮附子炮黃茋阿膠炒當歸各一兩白礬枯一兩右為末醋煮米糊丸如梧子大每七十丸空心米飲送下按此厥陰例藥也寶鑑平胃地榆湯治結陰便血白术陳皮茯苓厚朴葛根各半錢地榆七分乾薑五分炙甘草當歸炒麯白芍人參益智仁各三分蒼术升麻附子炮各一錢右㕮咀作一服水煎加薑棗按此少陰例藥也治暑之劑局方黃連香薷飲治伏暑純下鮮血方見暑門按此手少陰足太陰藥心主血脾裹血也枇杷葉散治水毒攻心嘔吐鮮血香薷二錢厚朴一錢半甘草炙麥門冬乾木瓜白茅根各一錢枇杷葉陳皮丁香各半錢右細末每二錢入薑煎按此手足太陰經藥中熱者慎之治濕之劑胃風湯治風濕乘虛入於腸胃下瘀血者方見滯下門拔萃升陽和血湯治腸癖下血作派其血唧出有力而逺射四散如篩春二月中下二行腹中大作痛乃陽明氣衝熱毒所作也當去濕毒和血而愈生地黃牡丹皮生甘草各半錢炙甘草黃茋各一錢當歸身熟地黃蒼术秦艽肉桂各三分陳皮二分升麻七分芍藥一錢半右㕮咀作一服水煎當歸和血散治腸癖濕毒下血槐花青皮各六分當歸身升麻各二錢川芎四分荆芥穗熟地黃白术各六分右為末每服三二錢米飲調下按此諸方疏風勝濕藥也然濕熱者多宜從滯下法擇用治熱之劑局方龍腦雞蘇丸治膈熱咳嗽或吐血衄血方見熱門甘露飲治男女血妄流溢或吐或咯衄血齒齦臭出血並治之方見熱門簡易選竒黃茋散治咳血成勞黃茋麥門冬熟地黃桔梗白芍各半兩甘草四錢右㕮咀每服半兩水煎按此手太陰足少陰藥也濟生犀角地黃湯治鬱熱不解干經絡隨氣湧泄為衄血或清道閉塞流入胃脘吐出清血如鼻衄吐血不盡餘血停留致面色痿黃大便黑者並宜服犀角生地黃白芍牡丹皮等分右㕮咀每四錢水煎按此足太陰藥也良方四生丸凡吐衄血陽乘於陰血熱妄行宜此生荷葉生艾葉生柏葉生地黃等分右爛研丸如雞子大每一丸水煎服或用鹽湯化下河間生地黃散治鬱熱衄血咯血吐血枸杞柴胡黃連地骨皮天門冬白芍甘草黃芩黃茋生地黃熟地黃等分右㕮咀水煎服下血者加地榆按此二方手足少陰太陰藥也局方槐角丸治五種腸風下血痔瘻脫肛下血並宜服之槐角炒一兩地榆黃芩當歸防風枳殼麵炒各半斤右為末酒糊丸如梧子大每三四十丸空心米飲下按此雖有治風例而性味辛苦寒故從熱劑少陽藥也祕方枳殼湯治便血下血枳殼一兩麵炒黃連一兩以槐花四兩同炒去花不用右二味水煎取濃食前溫服按此又氣例藥也治火之劑黃連解毒湯大金花丸方並見火門理氣之劑三因茯苓補心湯治心氣虛耗不能藏血以致面色黃瘁五心煩熱咳嗽唾血半夏前胡紫蘇茯苓人參枳殼炒桔梗甘草乾葛各半兩當歸一兩三錢川芎三分陳皮白芍各二兩熟地黃一兩半右㕮咀每半兩入薑棗煎本事槐角散治腸胃不調脹滿下血蒼术厚朴陳皮當歸枳殼各一兩槐角二兩甘草烏梅各半兩右㕮咀每五錢水煎服按已上又氣血藥也然三因方雖云補劑而雜以發表之藥姑存之收入此理氣例補劑濟生雞蘇散治勞傷肺經唾內有血咽喉不利雞蘇葉黃茋生地黃阿膠炒貝母白茅根各一兩桔梗麥門冬蒲黃甘草各半兩炒右㕮咀每四五錢入薑煎歸脾湯治思慮傷脾不能統攝心血以此致妄行或吐血下血白术茯神黃茋龍眼肉酸棗仁各一兩人參木香各半兩甘草炙二錢半右㕮咀每四五錢入棗薑煎東垣麥門冬飲子治吐血久不愈者五味子十箇麥門冬去心黃茋各一錢當歸身人參生地黃各半錢右㕮咀水煎服金匱赤豆當歸散治先血後糞此近血也赤豆浸出芽當歸右二味為散漿水調服三因伏龍肝湯治先糞後血此逺血也伏龍肝半斤甘草炙白术阿膠黃芩熟地黃各三兩右㕮咀每四五錢水煎服髮灰散治小便尿血或便前便後亦逺近之謂也髮灰右一味每二錢以米醋二合湯少許服井花水調亦得玉屑膏治尿血黃茋人參等分右為末用蘿蔔大者切一指厚四五片蜜淹少時蘸蜜炙乾盡蜜二兩為度勿令焦點藥末喫不以時仍以鹽湯送下按已上諸方平補藥也然病體亦有寒熱氣積等因不同用者自宜求責止澀之劑三因龍骨散治衄過多龍骨不以多少研為末以少許吹入鼻中凡九竅出血皆可用御藥院方麝香散治衄不止白礬枯龍骨粘舌者各另研半兩麝香半字右拌勻每先將冷水洗淨鼻內然後用藥吹入孔內或以濕紙蘸入尤妙濟生烏梅丸治便血不止烏梅三兩燒存性為末用好米醋打糊丸如梧子大每七十丸米飲下經驗方治㵼血百藥煎一兩半兩燒為灰右和飯丸如梧子大每三四十丸空心米飲下或作末服三二錢又方乾柿燒灰飲調下二三錢雜方試效方治吐血不止以三稜針於氣衝出血立愈鼻衄不止或素有熱而暴作諸藥無驗者以紙一張作八牒或十牒於極冷水內濕過置項中不止仍以熱尉斗於濕紙上尉之立止灸法便血不止宜灸等穴勞宫手厥陰經大白足太陰經會陽足太陽經三里足陽明經按血證宜灸等穴詳見資生等經兹不備録然火熱脈盛實者非所宜也通利之劑拔萃犀角地黃湯治熱鬱血結上焦寸脈芤犀角生地黃二兩黃芩一兩半黃連一兩大黃半兩右㕮咀每兩水煎食後服之桃仁承氣湯治血結胸中心下手不可近為中焦畜血無寒熱胸滿嗽水不欲咽喜妄昏迷其人如狂桃仁半兩大黃一兩甘草二錢半桂芒硝各三錢右㕮咀每兩入薑煎服抵當湯治下部畜血即臍下手不可近或其人發狂少腹滿硬小便自利大便反黑如狂者在中發狂者在下也大黃水蛭炒各半兩虻蟲三錢去翅足桃仁三錢右製每五錢水煎服如作丸煉蜜和當歸導滯湯治跌搏墮擊損傷血滯於中大黃當歸等分右㕮咀每一兩或半兩水煎服按已上血滯證諸方也蓋畜血有上中下之分故藥亦隨而輕重之也至血熱血積陰虛等證例見各門兹不詳録解鬱之劑丹溪越鞠丸治血鬱桃仁香附子紅花撫芎青黛等分右為末糊丸每四五十丸食前服玉機微義卷十七
