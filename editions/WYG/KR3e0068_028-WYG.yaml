body:
  text: 玉機微義卷二十八明徐用誠原輯劉純續増淋閟門小便不禁附胞痺附淋閟脈證脈經曰少隂脈數婦人則隂中生瘡男子則氣淋熱結下焦則令人淋閟不通淋之為病小便數如粟狀小腹弦急痛引臍中論淋證主熱原病式曰淋小便澁痛也熱客膀胱鬱不能滲泄故也或曰小便澁而不通者為熱遺尿不禁者為冷豈知熱甚客于腎部干於足厥隂之經廷孔鬱結極甚而氣血不能宣通則痿痺而神無所用故液滲入膀胱而旋溺遺失不能收禁也經云目得血而能視臟得血而能液腑得血而能氣夫血隨氣運氣血宣行則其中神自清利而應機能為用矣又靈樞經曰腎主二隂然水衰虚而怫熱客其部分二隂鬱結則痿痺而神無所用故溲便遺失而不能禁止然則熱證明矣是故世𫝊方論雖曰冷淋復用榆皮黄芩瞿麥茯苓通草雞蘇郁李仁梔子之類寒藥治之而已其說雖妄其方乃是由不明氣運變化之機宜乎認是而為非也或謂患淋而服茴香益智滑石醇酒温藥而愈者然則非冷歟不知此皆利小便之要藥也盖醇酒益智之性雖熱而茴香之性温滑石之性寒所以能開發鬱結使氣液宣通熱散而愈也按此只是論熱因處治然寳鑑曰小便不利其治有三不可槩論津液偏滲於腸胃大便洩瀉而小便澁少者宜分利而已熱𫝊下焦津液則熱熱而不行者必滲泄則愈脾胃氣澁不能通調水道下輸膀胱而化者故可順氣令施化而出矣可見非止於熱因也况有標本不同有論見後大抵三因謂大率有五者總病機言也以氣為本者氣行而水自化也亦氣血之謂然有得之於胎氣者丹溪云鄭憲使子年十六生七箇月後得淋病五七日必一作其發則大痛水道下如漆和粟者一盞方定脈之輕則濇重則弦視其形瘦而長色青如蒼意其必因其父服下部藥遺熱在胎留於子之命門而然遂以紫雪和黄栢末丸梧子大晒及乾熱湯下百丸半日又下二百丸食物壓之又半日痛大作連腰腹水道乃行下漆和粟者椀許痛減十之八後張子中與陳皮一兩桔梗木通各半兩又下一合許而安父得燥熱尚能病子况母得之者乎書此以證東垣紅絲瘤之事云云見婦人門論淋澁主寒寳鑑曰痺論云胞痺者小腹膀胱按之内痛若沃以湯澁於小便上為清涕夫膀胱為州都之官津液藏焉氣化則能出焉今風寒濕邪客於胞中則氣不能化出故胞滿而水道不通其證小腹膀胱按之内痛若沃以湯澁於小便以足太陽經其直行者上交額上入絡腦氣下灌於鼻竅則為清涕也按此則知淋閟有寒熱之殊宜參脉理分治論淋閟分三因陳無擇云淋古謂之癃名稱不同也癃者罷也淋者滴也古方皆云心腎氣鬱致小腸膀胱不利復有冷淋濕淋熱淋等屬外所因既言心腎氣鬱與夫驚思恐憂即内所因况飲啖冷熱房室勞役及乗急忍溺多致此病豈非不内外因也大率有五曰冷曰熱曰膏曰血曰石五種不同皆以氣為本嚴氏曰五淋氣石血膏勞是也氣淋為病小便澁常有餘瀝石淋莖中痛尿不得卒出膏淋尿似膏出勞淋勞倦即發痛引氣衝血淋遇熱即發甚則溺血候其鼻頭色黄者小便難也大抵此證多由心腎不交積藴熱毒或酒後房勞服食熱燥七情鬱結所致癃閉淋閟為病皆一類也按此云五淋名各不同故兩存之然石淋世俗又名沙石淋子和曰世人多為服金石燥熱之劑得之常見農家有此證豈是服金石之人也大抵是膀胱畜熱而成此疾如湯瓶久在火中煮瓶底白碱而不能去沙石淋之證與此理同其論最為得矣内經云少腹熱溲出白液亦甚似之也論小便不利氣病血病之異發明曰難經云脈有關有格何謂也然關則不得小便格則吐逆關者甚熱之氣格者甚寒之氣是關無出之由故曰關格無入之理故曰格也按寒在胸中遏絶不入熱在下焦填塞不便内經曰人迎大四倍於氣口名曰格氣口大四倍於人迎名曰關關則不得小便格則吐逆夫小便者是足太陽膀胱所主長生於申申者西方金也故金能生水金者肺也肺中伏熱水不能出是絶小便之源也人輔相天地膀胱之源自頭項下至於足故曰陽中之隂如渴而小便不通者不得降是也故聖人立法皆用清燥金之正化氣薄之藥茯苓猪苓澤瀉琥珀燈心通草車錢子瞿麥萹竹之類皆為滲淡之藥能瀉肺火而清肺金滋水之化源也若熱在下焦是絶其流而溺不泄也須用氣味俱厚隂中之隂藥治之長安王善夫病小便不通漸成中滿腹大堅硬如石壅塞之極腿脚堅脹裂裂出黄水雙睛凸出晝夜不得眠飲食不下痛苦不可名狀伊戚趙謙甫詣予求治視歸從夜至旦耿耿不寐究記素問有云無隂則陽無以生無陽則隂無以化又云膀胱者州都之官津液藏焉氣化則能出矣此病小便癃閉閉是無隂而陽氣不化也凡利小便之藥皆淡味滲泄為陽止是氣藥陽中之隂非北方寒水隂中之隂所化者也此乃奉養太過膏粱積熱損北方之隂腎水不足膀胱腎之室久而乾涸小便不化火又逆上而為嘔噦非膈上所生也獨為關非格病也潔古云熱在下焦填塞不便是治關格之法今病者内關外格之病悉具死在旦夕但治下焦可愈隨處以禀北方寒水所化大苦寒之味者黄栢知母桂為引用丸如桐子大沸湯下二百丸少時來報服藥須㬰如刀刺前隂火燒之痛溺如瀑泉湧出臥具皆濕床下成流顧盼之間腫脹消散予驚喜曰大哉聖人之言豈可不遍覽而執一者也其證小便閉塞而不渴時見躁者是也凡諸病居下焦皆不渴也二者之病一居上焦在氣分而必渴一居下焦在血分而不渴血中有濕故不渴也二者之殊至易分别耳謹按或問肝主小便淋溲今治法主腎何也然大凡病便數者多腎經氣虚而然淋閟者有標本之分氣熱鬱結則膀胱津溢主約不利為本病小腹痛不得便下焦氣脈實而不利是客約不行為標病傷寒變極者遺溲直視是少隂腎先絶也故此三經干於下部為病非獨肝也或脾肺之氣不能通調水道下輸膀胱清氣不降皆能為癃閟腎氣虚而濁氣不升虚熱干於厥隂之絡隂廷痿痺而神無所用乃旋溺頻數人老年來多有此患矣腎虚極則水涸火熾真氣散而死也或曰若久寡居之人病便數者豈腎氣虚之不為約乎然是金為火鑠土為水濡腑臟兼體相資之道失濕熱甚而經脈縱緩亦成斯疾也觀先哲用腎氣丸等以收精氣之虚脫為養氣滋腎伐火導水使機關利而脾土健實之意是焉若全指為虚寒處治者是則一槩論也論小便不禁或癃為下焦虚實不同内經曰胞移熱於膀胱則癃溺血膀胱不利為癃不約為遺溺注曰膀胱為津液之腑水注由之然足三焦脈實約下焦而不通則不得小便足三焦脈虚不約下焦則遺溺也靈樞經曰足三焦者太陽之别也並太陽之正入絡膀胱約下焦實則閉癃虚則遺溺王海藏曰因有盧氏醫鏡見薑附石脂硃砂丹一藥味數分兩皆同惟丹砂一味用伏火者及治病有差所治者小便數而不禁怔忡多忘魘夢不已之不同耳其不同者審而詳之乃得此之治决不差耳泛舉之言腎主大便肝主小便淋溲難經云小腸為赤腸是面赤色及便溺赤色者皆出心與小腸南方赤色顯於外也經言下焦如瀆者正謂大小便也大便為隂為有形乃下焦之下者也腎臟為病主大便不言大腸者明矣子行父之道小便為氣所化乃下焦之高者也謂肝主小便淋溲亦是子行父道為腑病諸氣化者皆腑諸有形血化者皆臟病所主此腑言膀胱病此二證俱在下焦則同藥有形無形及在臟在腑有殊俱是丹田衰憊不言心火者以其相火化行君之令故也細分之則膀胱壬水勝丙小腸者是不𫝊隂則隂不病何為有形病此為隂之體也為腑之用也天地隂陽反為體用以斯可見是明五臟者為六腑所用六腑者為五臟所用明矣是有形皆為𫝊隂也夫小便不禁是膀胱不約為遺溺此不𫝊隂也是丹田胞絡受寒為壬所尅大抵諸腑皆盛有形物有形病皆在腑責其所來皆在臟也用伏火硃砂者去其寒邪耳治法同者以其俱在下焦補諸無形同在胞絡耳以其胞與腎相對有時相連故也腎主大便肝主小便所治安得不殊按此論遺溺為經虚之本病也然亦有悞服凉劑太過而致者如東垣曰立夏前悞用白虎湯過多致遺溺者宜温藥升陽以解之是也故用藥者當審誅罰無過之戒謹按丹溪先生曰淋證多主於氣虚亦有死血作淋者小便不通實熱者當利之因氣者宜吐之以提其氣氣升則水自下盖氣承載其水也痰多者用二陳湯先服後吐痰氣閉塞者二陳加木通香附探吐一男子病小便不通醫用利藥而加劇先生曰此積痰病也積痰在肺肺為上焦膀胱為下焦上焦閉則下焦塞譬如滴水之器必上竅通而後下竅之水出焉乃以法大吐之吐已病如失然此可見癃淋又不獨主於經病也淋閟治法小便不禁附治淋澁之劑金匱腎氣丸治腎虚小便淋澁及婦人子淋方見補虚門錢氏導赤散治心經藴熱小便赤澁或成淋痛方見熱門局方五淋散治膀胱有熱水道不通淋澁不出或尿如豆汁或成沙石或如膏或熱怫便血赤茯苓六錢赤芍山梔子各二錢當歸甘草各五錢右㕮咀每半兩入燈心水煎本事火府丹治小便赤少及五淋澁痛木通黄芩各一兩生地黄二兩右為末煉蜜丸如梧子大每五十丸木通湯下濟生小薊飲子治下焦結熱尿血成淋生地黄小薊根通草滑石山梔仁蒲黄炒淡竹葉當歸藕節甘草右等分為㕮咀每半兩水煎空心服琥珀散治五淋澁痛小便膿血琥珀海金砂沒藥蒲黄各研右各一兩和勻每三錢食前煎萱草根湯調下日二服按已上諸方並血分藥也局方八正散治小便熱淋澁痛清心蓮子飲治小便濁或澁方並見熱門立効散治下焦熱結小便黄赤淋閟疼痛或有血出瞿麥穗一兩甘草三分山梔炒去皮半兩右為末每五錢入葱白燈心薑煎食前時時服濟生地膚子散治諸病後體虚觸熱熱結下焦遂成淋病小便赤澁數起少出猪苓地膚子知母黄芩海藻通草瞿麥枳實炒升麻葵子右㕮咀每半兩水煎入薑按已上方又氣中之血藥也海金砂散治小便淋瀝及下焦濕熱氣不施化或五種淋疾癃閉不通海金砂研木通瞿麥穗滑石通草各半兩杏仁去皮尖一兩右為末每五錢水煎入燈心二十根寳鑑茯苓琥珀湯治小便數而欠淋澁脈沉緩時時帶數五苓散加琥珀半兩滑石七分甘草三分右細末每五錢長流水煎服食前按以上方並氣分藥也局方石葦散治膀胱有熱水道不通淋瀝不出臍腹急痛蓄作有時勞倦即發或尿如豆汁或出沙石芍藥白术滑石葵子當歸瞿麥各三錢石葦木通各二錢甘草王不留行右為末每二錢空心小麥湯調下按此血中之氣藥也與已上並治熱之劑三因生附散治淋而脈沉微小便秘澁數起不通竅中痛附子滑石各半兩瞿麥木通半夏各一兩半右為末每二錢入薑三片燈心二十莖蜜半匙水煎食前服按此治竅之劑也治癃閟之劑東垣滋腎丸治下焦隂虚脚膝無力隂汗隂痿足熱不履地不渴而小便閉黄栢酒洗焙知母酒洗焙各一兩肉桂二錢右為末水丸如桐子大每服百丸加至二百丸煎百沸湯送下白花散治小便不通膀胱藴熱朴硝右為末每二錢煎茴香湯調下食前服按已上並血分藥也清肺散治渴而小便閟或黄或澁五苓散加琥珀半錢燈心一分木通七分通草一分車前子炒一分瞿麥半錢萹蓄七分右為細末每五錢水煎食前服作湯亦可紅秫散治小便不通止喘紅秫黍根一兩萹蓄一兩半燈草一百根三寸長右㕮咀每五錢長流水煎服按已上並氣分藥也黄芩清肺飲治肺燥而小便不通黄芩一錢梔子三箇打破右㕮咀長流水煎服不利加鹽䜴二十粒滋隂化氣湯治因服熱藥過多小便不利諸藥不效或臍下悶痛難忍黄連黄栢各炒甘草炙等分右㕮咀毎五錢水煎食前服如不通加知母按此二方助隂藥也治胞痺之劑千金方茯苓丸治胞痺小便内痛赤茯苓防風細辛白术附子炮澤瀉官桂各半兩天花粉紫苑牛膝酒浸黄芪芍藥甘草炙各三分生地黄山茱茰山藥獨活半夏各一分右末蜜丸梧子大每十丸温酒送下食前服巴㦸丸治胞痺臍腹痛小便不利巴㦸去心一兩半桒螵蛸麩炒黒逺志去心山芋生地黄附子炮續斷肉蓯蓉酒浸各一兩杜仲炒石斛鹿茸酥炙龍骨五味子兎絲子酒浸山茱茰桂各二分右十六味細末蜜丸梧子大每三十丸空心酒下腎瀝湯治胞痺小腹急小便不利麥門冬木通桔梗桒白皮杜仲炒犀角屑五加皮各一兩赤芍五錢右㕮咀每五錢水煎加羊腎一箇竹瀝少許宣明腎著湯治胞痺證小腹膀胱按之内痛若沃以湯澁於小便上為清涕不止者赤茯苓白术各四兩甘草炙三兩乾薑炮二兩右為末每五錢水煎温服日三按此四方當分寒熱之異選使然腸痺亦有腹痛飱泄小便秘澁者宣明論有證治例詳見本論又可見小便不利非止胞痺為患也治淋瀝不禁之劑局方二氣丹治内虚裏寒膀胱積冷陽漸微小便不禁硫黄研肉桂各一分乾薑炮朱砂為衣各二錢附子一枚大者炮去皮臍為末半兩右為末糊丸如梧子大每五十丸鹽湯下食前服薑附赤石脂朱砂丹治小便數而不禁怔忪多忘魘夢不已附子生乾薑各半兩赤石脂一兩半水飛朱砂一兩研右為細末酒糊為丸如菉豆大每十五至二三十丸大便有病米飲下小便不禁茯苓湯下按此二方助陽之劑也御藥院方秘元丹治内虚裏寒自汗時出小便不禁白龍骨三兩訶子十箇砂仁一兩靈砂二兩右為末煮糯米粥丸如梧子大每五十丸空心鹽酒下按此固陽之劑也濟生兎絲子丸治小便多或致失禁兎絲子二兩牡蠣煅附子炮五味子鹿茸酒炙各一兩蓯蓉酒浸二兩雞䏶胵炙乾桒螵蛸酒炙各半兩右為末酒糊丸如梧子大每七十丸空心鹽湯温酒任下三因家韭子丸治下元虚冷小便不禁或成白濁家韭子六兩炒鹿茸四兩酥炙蓯蓉酒浸牛膝熟地黄當歸各二兩巴㦸去心兎絲子酒浸各一兩半杜仲石斛桂心乾薑炮各一兩右為末酒糊丸如梧子大每百丸空心湯酒任下按此一方助陽滋隂之劑也茯苓丸治心腎俱虚神志不守小便淋瀝不禁赤茯苓白茯苓等分右為末以新汲水挼洗澄去新沬控乾别取熟地黄汁與好酒同於銀石器内熬成膏搜和丸如彈子大空心鹽酒嚼下一丸按此滋隂固真之劑也雜方澹寮桒螵蛸散治小便頻數或如稠米泔色桒螵蛸鹽水炙逺志菖蒲鹽炙龍骨人參茯神當歸鱉甲醋炙各等分右為末每二錢臨臥人參湯調服五子丸治小便頻數時有白濁兎絲子酒蒸家韭子炒益智仁茴香炒蛇床子去皮炒等分右為末酒糊丸如桐子大每七十丸米飲鹽湯任下治小便不通諸藥無效或轉胞至死此法用之便自出用猪尿胞一箇底頭出箇小竅兒著翎筒通過放在竅内根底細線繫定翎筒口子細杖子堵定上用黄蠟封尿胞口頭吹滿氣七分繫定了再用手捻定翎筒根頭放了黄蠟堵塞其翎筒放在小便頭放開翎筒根頭手其氣透裏自然小便即出大有神效灸小便淋澁法炒鹽不以多少熱填滿病人臍中是神闕穴也却用筯頭大艾炷灸七壯良驗或灸三隂交穴一法小水閟澁以猪膽連汁籠住小便少時汁入自出婦人用藥末貯袋子安入隂户中必通玉機微義卷二十八
