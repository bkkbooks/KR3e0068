body:
  text: 玉機微義卷二十四明徐用誠原輯劉純續増諸疝門小腸氣附諸經敘疝脈證内經曰厥隂脈滑則病狐疝少隂脈滑則病肺風疝太隂脈滑則病脾風疝陽明脈滑則病心風疝太陽脈浮則病腎風疝少陽脈浮則病肝風疝針經曰心脈微滑為心疝引臍少腹鳴肝脈滑甚為㿗疝腎脈滑甚為癃㿉按發明云夫滑脈關已上見者為大熱盖陽與陽併也故大熱脈滑尺部見為大寒生㿗疝滑脈者命門包絡之名也為丙丙丁熱火併於下盖丙丁不勝壬癸從寒水之化也故生㿗疝然滑屬隂脈也病自内因寒亦與已上證同難經曰任之為病其内苦結男子為七疝按滑氏本義曰任脈起胞門行腹故病苦内結男為七疝女為瘕聚也脈經曰腎脈大急沉為腎疝肝脈大急沉為肝疝心脈搏滑急為心疝肺脈沉搏為肺疝三隂急為脾疝三隂脾脈也寸口脈弦而𦂳弦𦂳相搏則為寒疝趺陽脈虚遲為寒疝寒疝繞臍痛若發則白汗出手足厥寒諸經敘小腸氣内經曰小腹控睾引腰脊上衝心唾出清水及為噦噫甚則入心善忘善悲甲乙經曰邪在小腸也小腸病者小腹痛引腰脊貫肝肺其經虚不足則風冷乗間而入邪氣既入則冷之證上衝肝肺客冷散於胸結於臍控引睾丸上而不下痛而入腹甚則衝於心胸盖其經絡所係屬也啟𤣥子曰控引也睾丸隂丸也謹按寒邪始客於小腸因經絡並於厥隂故下控引睾丸為痛雖亦如疝然止言小腸氣所以古人治法往往相類但自有所兼之證殊爾論疝氣屬寒原病式曰㿗疝少腹控卵腫急絞痛也寒主拘縮故也寒極而土化制之故腫滿也經言丈夫㿗疝謂隂器連少腹急痛也故言婦人少腹腫皆肝足厥隂之脈也經注曰寒氣聚而為疝也又按經言五臟皆主疝但脈急也注言脈急者寒之象也然寒則脈當短小而遲今言急者非急數而洪也由𦂳脈主痛急為痛甚病寒雖急亦短小也所以有痛而脈𦂳急者脈為心之所養也凡六氣為痛則心神不寧而𦂳急不得舒緩故脈亦從之而見也欲知何氣為其病者適其𦂳急相兼之脈而可知也如𦂳急洪數則為熱痛之類也又經言脾傳之腎病名曰疝瘕少腹煩寃而痛出白蠱注言少腹痛溲出白液也一作客熱内結銷爍脂肉如蠱之食故名白蠱也然經之復言熱為疝瘕則亦不可止言為寒當以脈證别之論疝氣屬濕熱丹溪曰疝痛之甚者睾丸連小腹急痛也或有形或無形或有聲或無聲自素問以下皆以為寒盖經絡得寒收引不行所以作痛世有得寒而無疝者又必有說以通之可也予屢踢氷徒渉不曽病此以予素無熱也因而思此病始於濕熱在經鬱遏至久又感外寒濕熱被鬱而作痛若只作寒論恐為未備或曰此證多客厥隂一經濕熱之積何由而致予曰夫勞則火起於筋醉飽則火起於胃房勞則火起於腎大怒則火起於本經火鬱之久濕氣便盛濁液凝聚并入血隧流於厥隂肝屬木性速急火性暴為寒束宜其痛甚而暴也愚見古方以烏頭梔子等分作湯用之其效亦速後因此方隨形證加減無有不應又須分濕熱多少而治之但腫多為濕㿗是也却有水氣而腫又有挾虚而發者當以參术為君而佐以踈導診其脈沉𦂳而豁大者是也若不以補劑而行决裂之法禍不旋踵論疝證有寒有熱發明曰經云三陽為病發寒熱下為壅腫及為痿厥腨㾓其𫝊為索澤其𫝊為㿗疝夫熱在外寒在内則累垂此九夏之氣也寒在外熱在内則卵縮此三冬之氣也足太陽膀胱之脈逆上迎手太陽小腸之脈下行至足厥隂肝之脈不得伸其任脈並厥隂之脈逆則如巨川之水致陽氣下墜是風寒濕熱下出囊中致兩睾腫大謂之曰疝太甚則為㿗足厥隂肝之脈與大腸膀胱寒水之脈同至前隂之末傷寒家說足厥隂肝經為病煩滿囊縮急下之宜大承氣湯以瀉大熱靈樞經云足厥隂肝經筋中以為寒則筋攣卵縮為大寒前說囊縮為大熱此說為大寒此說囊縮垂睾下引㿗疝脚氣為大寒風濕盛下垂為寒與上二說不同按釋云以平康不病之人論之夏暑大熱囊卵累垂冬天大寒急縮收上與前三說又不同何也是相乖耶不相乖耶荅曰傷寒家囊卵縮大熱在内宜承氣湯急下之與經筋說囊卵縮大寒在外亦是熱在内與傷寒家同故再引平康之人以證之冬天陽氣在内隂氣在外人亦應之故寒在外則皮急皮急則囊縮夏月隂氣在内陽氣在外人亦應之故熱在外則皮緩皮緩則囊垂此㿗疝之象也三說文殊皆一理也用藥者詳而審之故已上三論各有所主兼此考訂則脈證隂陽寒熱虚實之異判然矣論疝分三因陳無擇曰經云七疝諸疝等更不見名狀但出寒疝㿗疝而已唯太竒論列五臟脈為五疝云云見前大抵血因寒泣則為瘕氣因寒聚則為疝但五臟脈理不同不可不辨且腎脈本沉心脈本滑受寒則急於理乃是肝脈本弦肺脈本濇並謂之沉未為了義又脾不出本脈但云急為疝亦文義之缺也凡云急者𦂳也𦂳為寒亦可類推且賊風入腹亦為疝冒暑履濕皆能為疝當隨四氣改易急字風則浮弦暑則洪數濕則緩細於理明要知疝雖兼臟氣皆外所因也寒泣風散暑鬱濕著絞刺擊搏無有定處倉卒之際痛不堪忍世人稱為横弦竪弦膀胱小腸氣賊風入腹等名義不同證狀則一按此辨脈證之異頗詳但温寒散風利暑燥濕之方未積備然陳氏具此意盖欲學者自擴充爾論疝氣不宜預補許學士云大抵此疾因虚得之不可以虚而驟補經云邪之所凑其氣必虚留而不去其病則實故必先滌所畜之熱然後補是以諸方多借巴豆氣者盖謂此也謹按疝證雖始為因虚而得必邪實迫痛而未下故當先瀉而後補也至有虚甚迫痛上為吐逆或下有遺精者此邪實正虚之甚矣此欲不補可乎但恐補之則無益瀉之則正氣轉陷幸而獲生者鮮矣論疝本肝經宜通勿塞子和曰疝有七前人論者甚多非靈樞素問銅人之論余皆不取非余好異也但要窮其原耳俗工不識因立謬名或曰膀胱或曰腎俞或曰小腸氣立名既謬併䘮其實何哉盖醫者既斷為膀胱腎俞小腸氣必曰虚寒所致其藥之用也不附子烏頭則乾薑官桂之類餌之曽無殊效浸成大錯曽無覺者豈知諸疝皆歸肝經其奈庸流歸之小腸脬囊夫膀胱水府専司滲泄小腸水道専主通流腎為少隂總統二水人之小溲自胃入小腸滲入膀胱膀胱者脬囊也氣化則水出莖端此常道也及其為疝乃屬足厥隂肝經盖環隂器而上入小腸者足厥隂肝經也夫肝腎皆屬于下與衝任督相附然靈樞經言足厥隂肝經病則有遺溺癃閉狐疝主腎與膀胱小腸三經則不言疝是受疝之處乃肝之部分也且内經男子宗筋為束骨之㑹也而肝主筋睾者囊中之丸雖主外腎非厥隂環而引之與玉莖無由伸縮在女子則為篡戸其内外為二其一曰廷孔其二曰窈漏此是厥隂與衝任督之所㑹也靈樞言足厥隂之經筋聚于隂器其病傷於寒則隂縮入傷於熱則縱挺不收治在行臥漬隂器故陽明與太隂厥隂之筋皆㑹于隂器惟厥隂主筋故為疝者必本之厥隂靈樞又言足厥隂之别名曰蠡溝去内踝五寸别走少陽循脛上睾結於莖其病氣逆睾腫卒疝實則挺長虚則暴痒取之所别矣豈非厥隂為受病之處耶靈樞又言邪在小腸連睾係屬於腎貫肝絡肺心系氣盛厥逆上衝腸胃燻肝散於肓結於臍故取之肓原以散之刺太隂以平之取厥隂以下之取巨虚下亷以去之按其所遇之經以調之此其初雖言邪在小腸至其治法必曰取厥隂以下之乃知諸疝關於厥隂可以無疑以脈考之素問論六疝雖見於他脈中皆言風疝者足厥隂肝經之氣也靈樞亦云三臟脈之疝皆以滑為疝也三隂急為疝三陽急為瘕王太僕云太陽受寒血凝為瘕太隂受寒氣聚為疝此言太隂受寒傳之肝經也可以温藥逐之不可以温藥補之若補之者是欲病去而強挽留之也歴考素問三陽為病發寒熱其傳為㿗疝此亦言膀胱非受病之處必傳於厥隂部分然後為疝也又言病在少腹腹痛不得大小便病名曰疝得之寒言脈急者曰疝瘕少腹痛凡言少腹者豈非厥隂之部分耶又言脾風傳胃名曰疝瘕此謂非肝木不能為風氣名曰厥疝盖脾土虚而不能制水又為肝木所凌也又言督脉為衝疝盖厥隂與衝任督俱㑹於前隂也豈不明哉又嘗遍閱銅人俞穴亦相表裏惟厥隂言疝獨多為疝之主也其它經穴雖亦治疝終非受疝之地但與足厥隂相連耳如運氣或在泉寒勝木氣攣縮禁於此經或司天燥勝木氣抑鬱於此經或忿怒悲哀憂抑頓剉結於此經或藥淋外固閉尾縮精壅於此經其病差别如此且夫遺溺閉癃隂痿脬痺精滑白淫皆男子之疝也不可妄歸之腎冷血涸不月月罷腰膝上熱足躄嗌乾癃閉少腹有塊或定或移前隂突出後隂痔核皆女子之疝也但女子不謂七疝而謂之瘕若年少而得之不計男子婦人皆無子故隱蔽委曲之事了不干脬腎小腸之事乃足厥隂肝經之職也奈俗方止言脬腎小腸殊不言肝木一句惑人甚矣且肝經乙木也木屬東方為心火之母也凡疝者非肝木受邪則肝木自甚也不可便言虚而補之難經所謂東方實西方虚瀉南方補北方此言瀉火木自平金自清水自王也七疝下去其病之後可調則調可補則補各量病勢勿拘俗法經所謂隂盛而腹脹不通者㿗癃疝也不可不下七疝名狀寒疝其狀囊冷結硬如石隂莖不舉或控睾丸而痛得於坐臥濕地或寒月渉水或置雨雪或坐臥磚石或風冷處使内過勞宜以温劑下之久而無子水疝其狀腎囊腫痛隂汗時出或囊腫而狀如水晶或囊痒而操其黄水或少腹中按之作水聲得於飲水醉酒使内過勞汗出而遇風寒濕之氣聚於囊中故水多令人為卒疝宜以逐水之劑下之有漏針去水者人多不得其法筋疝其狀隂莖腫脹或潰或膿或痛而裏急筋縮或莖中痛痛極則痒或挺縱不收或白物如精隨溲而下久而得於房室勞傷及邪術所使宜以降心之劑下之血疝其狀如黄𤓰在少腹兩傍横骨兩端約中俗云便癰得於重感春夏大燠勞於使内氣血流溢滲入脬囊留而不去結成癰腫膿少血多宜以和血之劑下之氣疝其狀上連腎區下及隂囊或因號哭忿怒則氣鬱之而脹怒哭號罷則氣散者是也有一治法以針出氣而愈者然針有得失宜以散氣之藥下之或小兒亦有此疾俗曰偏氣得於父已年老或年少多病隂痿精怯強力入房因而有子胎中病也此疝不治惟築賓一穴言之狐疝其狀如瓦臥則入小腹行立則出小腹入囊中狐則晝出穴而溺夜則入穴而不溺此疝出入上下往來正與狐相類也亦與氣疝大同小異今人帶鉤鈐是也宜以逐氣流經之藥下之㿗疝其狀隂囊腫縋如升如斗不痒不痛是也得之地氣卑濕所生故江淮之間湫溏之處多感此疾宜以去濕之藥下之女子隂户突出雖亦此類乃熱則不禁固也不可便謂虚寒而澁之燥之補之本名曰瘕宜以苦下之以苦堅之按已上所論病本經絡之原至為詳盡但七疝名固不同治法當異然俱用攻下之法愚竊疑馬雖仲陽亦曰肝為相火有瀉無補丹溪有曰肝只是有餘腎只是不足夫厥隂一經受疝宜通勿塞固宜亦當視其淺深而行之可也况有邪氣止客於膀胱小腸之經者若干於少隂腎經則宜通勿塞之法可例用乎諸疝治法治寒之劑金匱烏頭桂枝湯治寒疝腹中痛逆冷手足不仁若身疼痛灸刺諸藥不能治者烏頭蜜一觔煎減半去滓三箇桂枝湯煎解蜜半兩右每服三合不知二合其知者如醉狀得吐者為中病也若自汗出脈沉弦者止用烏頭煎按此用桂枝因身疼痛兼表有寒也太陽例藥三因大烏頭桂枝湯治風寒疝氣腹中刺痛手足不仁身體拘急不得轉側或致隂縮大烏頭五箇去皮尖蜜煎過洗切桂心白芍各三錢甘草一錢右㕮咀每四錢入薑棗煎補腎湯治寒疝入腹小腹疼痛時復泄瀉胸膈痞塞人參茯苓黄芪附子炮白术各一兩沉香四錢木𤓰一兩半羌活半兩甘草炙川芎各二錢紫蘇三錢右㕮咀每三四錢入薑棗煎局方奪命丹治逺年日近小腸疝氣偏墜搐疼臍下撮痛以致悶亂及外腎腫硬日漸滋長隂間濕痒抓成瘡吳茱萸浄一觔四兩用酒醋湯童便各浸過一宿焙乾澤㵼二兩右為細末酒煮麫糊丸如梧子大每五十丸空心鹽湯下茱茰内消丸治腎經虚弱膀胱為邪氣所搏結成寒疝隂㿗偏大山茱萸去核陳皮吳茱茰馬藺花木香肉桂山藥川楝子青皮茴香右為末酒糊丸如梧子大每五十丸空心温酒送下百一選方十補丸治小腸寒疝附子一兩用防風一兩剉鹽四兩黒豆一合同炒取附子去皮尖用葫蘆巴木香巴㦸肉川楝肉官桂𤣥胡蓽澄茄舶上茴香破故紙炒各一兩右為末糯米粉酒打糊丸梧子大朱砂為衣每五十丸空心酒下葫蘆巴丸治小腸氣蟠腸氣奔豚疝氣偏墜隂腫小腹有形如卵上下來去痛不可忍或絞結遶臍攻刺嘔吐者葫蘆巴炒一觔大巴㦸炒六兩川楝子炒一觔二兩吳茱茰湯洗七次炒十兩川烏炮去皮六兩茴香二十兩炒右末酒糊丸梧子大每十五至二十丸空心温酒下按此與前方加減不同故兩存之寳鑑沉香桂附丸治中氣虚弱其脾胃虚寒臟腑積冷心腹疼痛手足厥逆冷便利無度七疝引痛不可忍喜熱熨少緩者沉香附子炮川烏炮乾薑炮良薑官桂吳茱茰湯炮去苦水茴香炒各一兩右為末好醋煮糊丸梧子大每五十丸至七八十丸空心米飲下按已上諸方並太陽例藥然初感寒邪所至或素虚寒之人宜此劫之皆可但久病者多有濕熱寒濕血虚等證之變而用者自宜詳審治濕之劑元戎加味五苓散治疝氣卒痛小便澁本方加川楝一分右為末空心米飲調下一二錢按此滲洩之劑也攻下之劑局方三白散治膀胱藴熱濕熱相乗隂囊腫脹大小便不利白牽牛二兩桑白皮炒木通白术陳皮各半兩右末每二錢薑湯調下空心服復元通氣散舶上茴香川山甲蛤粉炒各二兩陳皮牽牛末炒𤣥胡甘草炒各一兩木香一兩半右細末每一大錢熱酒食前調下戴人禹功散黒牽牛頭末四兩茴香炒一兩右為末以生薑自然汁調一二錢臨睡服或加白术一兩寳鑑控引睾丸治小腸病結上而不下痛引心臆茴香川楝實各炒石茱茰陳皮馬藺花醋炒各一兩芫花醋炒半兩右為末醋糊丸梧子大每十丸至二十丸空心温酒送下茴香楝實丸治隂疝痛不可忍及小腸氣痛川楝炒茴香炒山茱茰石茱茰吳茱茰青皮陳皮芫花醋炒馬藺花各等分右為末醋糊丸梧子大每二十丸温酒送下食前服天台烏藥散治小腸疝氣牽引臍腹疼痛烏藥木香茴香炒青皮良薑炒各半兩檳榔二箇川楝十箇巴豆七十粒右先以巴豆微打破同川楝麩炒黒去麩及巴豆不用外餘藥同末酒調下一錢甚者薑酒亦得按已上諸方並下氣之藥也治寒之例宜隨輕重取擇濕熱之劑濟生葵子湯治膀胱實熱腹脹小便不通口舌乾燥赤茯苓猪苓葵子枳實瞿麥木通黄芩車前子滑石甘草等分右㕮咀每半兩入薑煎空心服按此八正散加減法也永類鈐方例為治疝之劑頗有理故收入子和𨗳水丸方見濕門按此陽明例藥也然濕熱鬱結於下焦非此莫能療氣血皆可用冷熱之劑寳鑑蒺莉湯治隂疝疼痛蒺莉去刺附子炮梔子去皮各半兩右為末每三錢水煎食前温服丹溪方定疝氣疼痛速效枳殻山梔子唐毬子吳茱茰皆炒過荔枝核右為末用長流水調下一二錢空心服又方治陽明受濕熱傳入太陽惡寒發熱小腹連毛際結核悶痛不可忍梔子炒桃仁炒枳殻炒唐毬子等分右為末於砂鉢内入薑汁用水一鍾盪起煎熱服按已上太陽例藥也理氣之劑局方蟠葱散治寒疝氣疝衝心疼痛𤣥胡蒼术甘草各半觔茯苓蓬术三稜青皮六兩丁皮砂仁檳榔各四兩桂乾薑二兩右為末毎服二錢入連鬚葱一莖水煎空心服鹽煎散治冷疝寒氣卒痛草果砂仁檳榔厚朴肉豆蔲羌活蒼术陳皮蓽澄茄枳殻良薑茯苓茴香大麥蘖川芎甘草各二兩右㕮咀或散每半兩水煎入鹽少許按此二方並燥脾𨗳氣之藥劫劑也世俗多用之故收入寳鑑川苦楝散治小腸氣痛不可忍廣木香茴香鹽一捻炒去鹽各一兩大川楝子一兩剉用巴豆十粒破皮同炒黄去巴豆右為細末每二錢温酒一盞空心調下按此𨗳手太陽寒氣之藥較之前二方治疝此殊有理理血之劑金匱當歸生薑羊肉湯治寒疝腹中痛及脇痛裏急當歸三兩生薑五兩羊肉一觔右三味以水八升煮取三升温服七合日三若寒多加生薑嘔者加陳皮二兩白术一兩蜘蛛散治隂狐疝氣偏有大小時時上下蜘蛛十四枚􅆈焦桂枝半兩右二味為散取八分匕飲和服日再服蜜丸亦可三因失笑散治小腸氣痛五靈脂蒲黄等分右為末每二錢先用醋一合熬成膏水一盞煎理氣血之劑本事方立效散川芎川楝子青皮舶上茴香牽牛炒桃仁各一兩右為末每二錢無灰酒一盞煎食前温服三因葱白散治一切冷疝疼痛川芎當歸枳殻炒厚朴炒官桂青皮乾薑茴香炒茯苓川楝子麥蘖炒神麯炒三稜炮莪术煨熟地黄白芍木香人參各一兩右㕮咀每三錢葱白二寸鹽少許水煎空心服東垣丁香楝實丸治男子七疝痛不可忍婦人瘕聚帶下皆任脈所主隂經也乃腎肝受病故治同法當歸附子炮茴香炒川楝各一兩右剉細用好酒三升同煮盡為度焙乾作細末每藥末一兩入丁香木香各半錢𤣥胡索五錢全蝎十三箇右為末入在前藥末内拌勻酒糊丸梧子大每三十丸加至百丸空心温酒送下按已上方與前理血之劑並厥隂例藥也然諸經論疝主於風盖指厥隂風木之氣爾故疝病則多痛痛亦木氣之實即風象也但古今方多主寒主氣論治然行者不察氣寒淺深之異以分治則不能不無差悮也觀東垣之法庶幾近理大抵亦不可視為常例盖腎惡燥恐久則反増其勢矣熨法嚴氏云鹽半觔炒極熱以故帛包熨痛處一法用葱白泥一握置臍中上用熨斗熨之或上置艾灼之妙玉機微義卷二十四
