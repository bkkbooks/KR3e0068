body:
  text: 玉機微義卷五明徐用誠原輯劉純續増滯下門腸澼生死脉法内經曰腸澼便血身熱則死寒則生腸澼下白沫脉沉則生浮則死腸澼之屬身不熱脉不懸絶滑大者生懸濇者死以臟期之又曰隂陽虚腸澼死又曰泄而脫血脉實皆曰難治按此云生死亦是大槩言之必須更兼證以詳審之下同脉經云腸澼下膿血脉沉小流連者生數疾且大有熱者死又腸澼筋攣其脉小細安靜者生浮大𦂳者死嚴氏云凡下利之脉微小者生浮洪者難治腸澼下膿血者脉宜滑大若弦急者死仲景治痢大法下痢脉沉弦者下重脉大者為未止脉微弱數者為欲自止雖發熱不死下痢手足厥冷無脉者灸之不温若脉不還反㣲喘者死下痢有㣲熱而渴脉弱者令自愈下痢脉數有微熱汗出令自愈設脉𦂳為未解下痢脉數而渴者令自愈設不差必清膿血以有熱故也下痢反弦發熱身汗者自愈下痢氣蔽者當利其小便下痢腹脹滿身體疼痛先温其裏乃攻其表温裏宜四逆攻表宜桂枝湯下痢脉滑而數者有宿食也當下之下痢脉遲而滑者實也痢為未止急下之下痢脉反滑當有所去下之安下痢不欲食有宿食者當下之下痢腹滿痛為寒實當下之下痢腹堅者當下之下痢譫語有燥屎當下之下痢三部脉皆平按之心下堅急下之下痢己差至其時復發者此為下未盡更下之安下痢脉大浮弦下之當自愈風寒下痢者不可下下後心下堅痛脉遲此為寒宜温之下痢脉浮大此為虚強下之故也設脉浮革者因而腸鳴當温之下痢脉遲𦂳痛未欲止當温之下痢心痛急當救裏可與理中四逆附子輩下痢大孔痛宜温之按丹溪曰仲景治痢可下者十法可温者五法或解表或利小便或待其自己區别易治難治不治之證至為詳密但與泄痢衮同立論而未分今載於滯下門内故於瀉痢條内不載宜於此通考焉東垣治痢法病機機要云後重則宜下腹痛則宜和身重則除濕脉弦則去風膿血稠粘以重劑竭之身冷自汗以毒藥温之風邪内縮宜汗之鶩溏為利當温之又云在外者發之在裏者下之在上者湧之在下者竭之身表熱者内疎之小便濇分利之又曰盛者和之去者送之至者止之兵法曰避其銳氣擊其惰歸此之謂也秘藏云假令傷寒飲食䐜脹滿而𫝊飱泄者宜温熱之劑以消導之傷濕熱之物而成膿血者宜苦寒之劑以内疎之風邪下䧟者升舉之濕氣内勝者分利之裏急者下之後重者調之腹痛者和之洞泄腸鳴無力不及拈衣其脉弦細而弱者温之收之膿血稠粘至圊而不能便其脉洪大而有力者寒之下之按此分風寒濕熱表裏温補寒下等治至為切當學者尤宜熟玩但其裏急後重腹痛之義未詳今别論於左太隂受濕𫝊腎為膿血痢機要云有太隂經受濕而為水泄虚滑身重㣲滿不和榖味久則防變而為膿血脾經𫝊腎謂之賊邪故難愈者若先利而後滑謂之微邪故易痊此皆脾土受濕之所為也再有風寒二證在泄痢條下論風寒暑濕皆能作痢陳無擇云滯下之證内經所載血溢血泄血便注下古方則有清膿血近世呼為痢疾其實一也多由脾胃不和飲食過度停積於腸胃不能尅化又為風寒暑濕之氣干之故為此疾傷熱則赤傷冷則白傷風則純下清血傷濕則下如豆汁冷熱交併赤白兼下治法當先用通利之藥疎滌臟腑嚴氏云以巴豆等劑推其積熱後辨以冷熱風濕之證用藥調治熱赤者清之冷白者温之傷風而下清血者則祛逐之傷濕而下豆汁者分利之冷熱相併温凉以調之仍須先調胃氣切不可驟用罌粟訶子之藥止之澁之使停滯不泄多致危殆按赤白分冷熱之說河間論之甚詳其云風下清血濕下豆羮汁者葢謂風喜傷肝肝主血故下清血者為風也濕喜傷脾脾胃為五穀之海無物不受常兼四臟葢豆汁之色如五色之相雜故下豆羮汁者為濕也又云治法當先通利此迎而奪之之義若有虚者亦宜審之使果有積滯在腸胃者方所當通利然嚴氏謂巴豆等藥使用之於傷冷物則可若用之於熱者為害非輕又云風則祛逐所謂祛逐者果何法何藥與若以邪氣當祛逐則豈獨於風而寒濕熱為不可耶此又失於明白論滯下分三因陳無擇云古方風停膚腠下瘀血或下鮮血濕毒下如豆羮汁皆外所因之明文也古方有五洩因臟氣鬱結隨其所發使利膿血作青黄赤白黒色一一不同即内所因也又飲食冷熱酒醴醯醢縱情恣慾房室致傷精血腸胃粘溢久積冷熱遂成毒痢皆不内外因治之先推其嵗運以平其外察其鬱結以調其内審其所傷以治不内外條然明白不致妄投也按此所分三因治法其理甚當但外因六􅁋所傷者古方用藥則多有之内因臟氣鬱結與夫飲食房勞而得者諸方則未之見也凡三因所傷皆能干犯腸胃而為痢今陳無擇立論有三因之分而用藥無三因之别此又所當分而治者失於開示焉時疫作痢大全良方云有一方一家之内上下𫝊染長幼相似是疫毒痢也治法雖當察運氣之相勝亦不可狎泥當先察其虚實冷熱首用敗毒散加人參甘草陳皮隨證用之按時疫作痢嵗常有之其謂當察其運氣之相勝與病冷熱虚實之不同誠為確論葢欲學者知五運六氣有太過不及勝負之不同以分風寒暑濕燥火為病而平治之也然首專用敗毒散之義何其自狎泥也論食毒作痢陳無擇云飲服冷熱酒醴醯醢腸胃粘溢久積冷熱遂成毒痢嚴用和云或有飲服冷酒寒物房室勞傷精血而成久毒痢則宜化毒以保衛之按人之飲食過傷恣食辛熱寒冷之物皆能致傷腸胃腸胃一傷不能運化𫝊送遂蓄積停滯而為痢經日飲食不節起居不時者隂受之隂受之則入五臟䐜滿閉塞下為飱泄久為腸澼是也治法當先消化食毒或可攻伐然後隨寒熱温凉以調之此二論本諸内經而世所未言者也論裏急後重病機云裏急後重脉大而洪實為裏熱甚而閉是有物結墜也若脉浮大甚不宜下雖裏急後重而脉沉細弱者謂寒在内而氣散也可温養自愈裏急後重閉者大腸經氣不宣通也宜加㯽榔木香宣通其氣原病式云下廹後重裏急窘迫急痛也火性急速而能燥物故也按裏急者窘迫急痛是也後重者大腸墜重而下也夫裏急後重其證不一有因火熱者所謂火性急速而能燥物是也有因氣滯此大腸經氣壅而不宣通也有因積滯壅盛者是有物結墜也有氣虚者此大腸氣降而不能升也有血虚者所謂虚坐努責是也治法火熱者寒之清之氣滯者調之積滯者去之氣虚而降者升之舉之血虚者補之各察其所因也切觀前論未為詳盡論泄痢而嘔病機云如痢或泄而嘔者胃中氣不和也上焦不和治以生薑橘皮中焦不和治以芍藥當歸桂茯苓下焦不和而寒治以輕熱甚以重熱藥按此云泄痢而嘔謂胃氣不和所致葢亦有胃中火逆衝上而嘔者有胃虚而嘔者有積滯毒氣上攻而嘔者有隂虚而嘔者豈可一於胃氣之不和而不他及耶論泄痢腹痛機要云腹痛者和之如發熱惡寒腹不痛藥加黄芩為主腹痛甚者加當歸倍芍藥按泄痢腹痛其證甚多皆因内氣鬱結不行所致理宜行氣散鬱為先然亦有挾寒有挾火熱者有因積滯者有血虚者又宜隨證處治為當也今機要云和之一字總言之耳葢加當歸倍芍藥之法惟血虚可用論禁口痢百一選方云禁口痢是毒氣上衝心肺所致用石蓮肉以通心氣按痢而能食知胃未病也若脾胃濕熱之毒薰蒸清道而上以致胃口閉塞而成禁口之證理宜除胃口之邪熱而此云毒氣上衝心肺其毒不知指何者之邪然亦有脾胃虚而得者亦有誤服利劑藥毒犯胃者又有服濇熱之劑太早而邪氣閉遏於胃口者必當求責論下痢吃逆丹溪曰吃病氣自下衝上屬火之象古方悉以胃弱言之殊不知胃弱者隂弱也虚之甚也滯下之久多見此證乃因久下而隂虚也詳見吃逆本門辨痢色分五臟原病式曰瀉白為寒青黄紅赤黒皆為熱也葢瀉白者肺之色也由寒水制火不能平金則金肺自甚故色白也痢色青者肝木之氣由火甚制金不能平木故色青也或言痢色青為寒者誤也仲景少隂病下痢清水色純青熱在裏也大承氣湯下之及小兒熱甚急驚痢色多青為熱明矣痢色黄者由火甚則水必衰而脾土自旺故色黄也痢色紅為熱心火之色也或赤熱深甚也至若痢色黒亦言熱者由火熱亢甚則反兼水化制之故色黒也故傷寒陽明病云云法當大承氣下之大便不黒者難恐作易治諸痢同法按世人多以瀉痢之青白黒三色為寒黄赤二色為熱今觀河間分五臟之論煥然耳目而知世人之非也或曰内經視絡脉之色曰寒多則凝泣凝泣則青黒熱多則淖澤淖澤則黄赤又曰黄赤則熱多白則寒世俗之論豈非本於此與愚曰内經論經脉之常色心赤肺白肝青脾黄腎黒也隂絡之色應其經但陽絡之色隨四時而行應無常色遇天氣之寒則經絡凝泣故其色多青黒遇天氣之熱則經絡淖溢故其色多黄赤此葢因外氣之寒熱而浮絡相應而然凡人之在冬月炎天與夫久坐逺行其面色相應亦皆然非痢色之出於臟腑隨内氣所感而生也况滯下之證多因濕熱所致内經曰肺熱者色白而毛敗心熱者色赤而經絡溢肝熱者色蒼而爪枯脾熱者色黄而肉蠕動腎熱者色黒而齒槁此雖論痿亦可見五臟之内熱皆能顯此五色今滯下之論五色意實相同然此不可與浮絡之因外氣相應者同語也辨赤白分冷熱之誤原病式曰或言下痢白為寒者誤也若果為寒則不能消穀何由反化為膿也所謂下痢穀反為膿血如世之穀肉果菜濕熱甚則自化腐爛潰發化為膿血也其熱為赤熱屬心火故也其濕為黄濕屬脾土故也燥鬱為白屬肺金也經曰諸氣憤鬱皆屬於肺謂燥金之化也然諸瀉痢皆兼於濕今反言氣燥者謂濕熱甚於腸胃之内而腸胃拂鬱結而又濕至於否以致氣液不得宣通因以成腸胃之燥使煩渴不止也假如下痢赤白俗言寒熱相兼其說尤誤豈知水火隂陽寒熱者猶權衡也一高則必一下一盛則必一衰豈能寒熱俱甚於腸胃而同為痢乎如熱瘡瘍而出白膿者豈可以白為寒與其在皮膚之分屬金故色白也次在血脉之分屬心火故為血也在肌肉屬脾土故作黄膿在筋部屬肝木故其膿色帶蒼深至骨屬腎水故紫黒血出也各隨五臟之部而見五色是其標也本則一出於熱但分淺深而已大法下迫窘痛後重裏急小便赤澁皆屬燥熱而下痢白者必多有之然則為熱明矣按河間謂赤白不當分冷熱乃屬肺金心火之化又謂五色各屬五臟本則一出於熱其論至當但世患此疾者赤白居多今既以不當分冷熱為治若専以辛苦寒退熱此則治本之法所謂心火肺金之化者抑有别與葢心主血肺主氣白屬肺金此氣受病也赤屬心火此血受病也赤白相雜血氣俱受病也知此則肝青脾黄腎黒之說亦可得而互明矣論熱藥治痢之誤原病式云或曰白痢既為熱病何故服辛熱之藥亦有愈者耶葢辛熱之藥能開發腸胃鬱結使氣液宣流通濕潤燥氣和而己葢病微者可愈甚者鬱結不開其病轉加而死矣凡治熱甚吐瀉亦然夫治諸痢者莫若以辛苦寒藥治之或㣲加辛熱佐之則可葢辛能發散開通鬱結苦能燥濕寒能勝熱使氣宣平而巳如錢氏香連丸之類是也故治諸痢者黄連黄栢為君以其至苦大寒正主濕熱之病乃若世𫝊辛熱金石毒藥治諸吐瀉下痢或有愈者以其善開鬱結故也然雖亦有驗者或不中效反更加害按治痢用辛苦寒之劑開鬱燥濕勝熱三法俱備世之用辛熱金石毒藥者誠非也然亦有久痢腸胃虚滑者亦當求責治痢通因通用之法子和云夫下痢膿血腹痛不止可用調胃承氣湯加薑棗煎更下藏用丸瀉訖以五苓益元散調下又一男子瀉痢不止如傾不敢冷坐諸醫皆以為寒治延二十載兩手寸脉皆滑余不以為寒所以寒者水也以茶調散湧寒水五七升又以無憂散泄積水數十行乃通因通用之法也次以淡劑利水道按此用吐下以治痢本内經通因通用之說使腸胃虚滑者其可下乎中氣虚弱者其可吐乎今云可下者謂有積滯在腸胃壅不通者也可吐者謂有痰飲在膈上氣不能降以致大腸不能收斂者也丹溪曰積濕成痰在肺中宜大腸之不固也清其源則流自清矣正是此意論局方用熱藥澁藥之非丹溪曰洩痢一證局方用鍾乳徤脾丸朝真丹訶藜勒丸大温脾丸等藥皆用熱藥為主治澁藥為佐使當為腸虚感寒而成滑者設也彼瀉痢者將無熱證耶將無積滯耶内經曰痢有膿血多屬滯下夫瀉痢證其類尤多先賢曰濕多成泄此確論也然有挾風者固不可得而同矣况風與濕之外又有雜合受邪似難例用澁熱之藥局方出證有兼治裏急者有兼治後重者有兼治裏急後重者此豈非滯下病乎今瀉痢與滯下衮同論治實實虚虚之患將不俟終日矣經曰暴注下迫皆屬於熱又曰暴注皆屬火又曰下痢清白屬於寒屬火熱者二屬水寒者一瀉痢一證似乎屬熱者多屬寒者少局方専以澁熱為用若用之於下痢清白為寒者或可矣所謂下迫者即裏急後重之謂也其病屬火相火所為其毒甚於熱矣投以澁藥非殺而何滯下亦有挾虚挾寒丹溪曰或問河間之言滯下似無挾虚挾寒者乎否乎予曰洩痢之病水穀或化或不化並無努責惟覺困倦若滯下則不然或膿或血或膿血相雜或腸垢或無糟粕或糟粕相混雖有痛不痛大痛之異然皆裏急後重逼迫惱人似乎皆熱證實證也予近年涉歴亦有大虚大寒者不可不知敢筆其畧以備采覧予從叔年踰五十夏間患滯下病腹微痛所下褐色後重頻併穀食大减時有微熱察其脉皆弦而澁似數而稍長却喜不甚浮大兩手相等視其神氣大減予曰此滯下憂慮所致心血虧脾氣弱耳遂以參术為君當歸陳皮為臣川芎炒芍藥茯苓為佐使時暄熱甚加少黄連兩月而安婁長官年三十餘奉養厚者夏秋間患滯下腹大痛有人教服單煮乾薑與一貼則痛定少頃又作又與之定由是服乾薑至三斤八日視之左脉弦而稍大似數右脉弦而大稍減亦似數重取之似𦂳予曰此必醉飽後吃寒凉太過而當作虚寒治之因其多服乾薑遂教用四物湯去地黄加人參白术陳皮酒紅花茯苓桃仁煎入生薑汁飲之至一月而安金氏婦年近四十秋初尚熱患滯下腹但隱痛夜重於晝全不得睡食亦稍減口乾不飲已得治痢靈砂二貼矣予觀之兩手脉皆澁且不勻神思倦甚飲食全減因與四物湯倍加白术以陳皮佐之與十數貼而安此三病者若因其逼迫而用峻劑豈不悞人按滯下之證古人多與泄瀉同論至三因方始能另立條目葢實有不同夫病有從外感而得者須分六氣之異外既受傷腸胃鬱結遂成赤白等證當隨其寒熱温凉以調之有因臟氣發動干犯腸胃而得者須察其何臓相乗以平治之又有因飲食失節而得者則又審其何物所傷以消尅之世之感此疾者其因誠不越乎是三者但其受病之後腸胃拂鬱膿血稠粘裏急後重諸方雖有寒熱虚實之論劉河間則以為一出於熱然考之内經似亦熱多而寒少也我丹溪先生則以為亦有挾虚挾寒之證深戒學者須宜識此世之局方不辨三因専用澁熱之藥其失甚矣至河間立說專用苦寒疎下之藥則亦未甚為當何則葢病有虚實治有先後若病氣暴至元氣壯實積滯膠固須宜下之病久氣脫腸胃虚滑不禁者亦宜温之澁之大抵治痢當從仲景河間之法可温則温可下則下或解表或利小便或待其自己劉河間分别在表在裏挾風挾熱挾寒等證後之作者無越於斯但氣血一條未嘗表出立論其於芍藥湯下有曰行血則便自愈調氣則後重除葢謂溲便膿血血之滯也故曰行血自愈奔迫後重氣之實也故曰調氣自除誠哉是言但膿血赤白亦有氣病血病之分後重裏急亦有氣實血虚之異學者又不可不察詳見前論滯下治法治熱之劑仲景白頭翁湯治熱痢重下者白頭翁二兩黄連三兩黄栢三兩秦皮三兩右四味以水七升煮取二升去柤服一升不愈再服按此治痢在下焦腎虚有熱也經云腎欲堅故用純苦之劑以堅之出太隂例藥也以其下痢屬太隂故也機要黄芩芍藥湯治泄痢腹痛或後重身熱久不愈脉洪疾及下痢膿血稠粘黄芩芍藥各二兩甘草五錢右咀毎服半兩水一􅊦半煎一􅊦温服按此手足太隂經之藥也仲景用芍藥甘草湯以復其隂酸以收之甘以緩之酸甘相合以補隂血也芍藥白者補赤者瀉出太陽芍藥甘草例大黄湯治泄痢久不愈膿血稠粘裏急後重日夜無度大黄一兩右細剉好酒二大􅊦同浸半日許再同煎至一􅊦半去大黄將酒分為二服頓服之痢止一服如未止再服取利為度後服芍藥湯以和之利止再服黄芩芍藥湯徹其毒也按此乃陽明調蕩滌邪熱之藥用酒煎者欲其上至頂顛外徹皮毛也芍藥湯下血調氣經曰溲而便膿血知氣行而血止也行血則便自愈調氣則後重除芍藥一兩當歸黄連各半兩㯽榔木香各二錢桂二錢半大黄三錢黄芩半兩甘草二錢炙右咀毎服半兩水煎食後温服清如利不減加大黄按此行血調氣不熱之藥也大凡用藥之雜與品味之多者難以細分經絡當觀其大體如何此則太陽桂枝例藥也白术黄芩湯服前藥痢雖除更宜此調和白术一兩黄芩七錢甘草三錢右咀勻作三服水煎服清按此去濕熱和中活血之藥也錢氏芍藥蘗皮丸芍藥黄栢各等分右為末水丸守真芍藥蘗皮丸治一切濕熱惡痢芍藥黄栢各一兩黄連半兩當歸半兩右為末水丸如小豆大按此二方補隂降火下焦之藥也出太陽例局方黄連阿膠丸治冷熱不調赤白下痢阿膠炒二兩黄連三兩茯苓二兩右水熬阿膠膏溲和二末為丸米飲服按此補虚退熱除濕之藥也出太陽例海藏云以上苦寒之劑元病不經内傷冷物者宜察亦當審人之虚實及以脉别之治寒之劑局方桃花丸治冷痢腹痛下如魚腦白物赤石脂煅乾薑炮各等分右為末蒸餅糊丸米飲下三四十丸日三服按此出陽明例藥方丹溪曰桃花丸即要畧桃花湯也仲景以治便膿血用赤石脂丸者乾薑粳米同煮作湯一飲病安便止後藥意謂病下焦血虚且寒非乾薑之温石脂之澁且重不能止血粳米味甘引入腸胃不使重澁之體少有凝滯藥行易散餘毒亦無局方不知深意改為丸藥劑以麪糊日與三服果能與仲景之意合否也嚴氏當歸丸治冷留腸胃下痢純白腹痛當歸酒洗芍藥附子炮去皮臍白术乾薑炮厚朴阿膠各一兩烏梅肉二兩蛤粉炒各一兩右為細末醋糊丸桐子大毎服五十丸米飲送下局方訶藜勒散治腸胃虚弱泄利水穀漸成痢疾青皮去穰肉豆􅅳麪裹煨肉桂五錢附子炮去皮臍一兩訶子仁各四兩右為末毎服三錢薑三片煎服按局方以白痢為寒多用辛熱燥毒之藥若用之於下痢清穀腸虚感寒者或可矣若膿血稠粘屬火之證用之非殺而何但感寒之證吾恐什百而一二也冷熱之劑古方駐車丸治冷熱下痢腸滑赤白黄連六兩乾薑當歸各二兩阿膠右先以醋煮膠令消入前三藥和勻衆手丸桐子大米飲下局方香連丸治冷熱不調下痢赤白膿血相雜裏急後重黄連去蘆二十兩用呉茱萸十兩同炒令赤色去茱萸不用木香四兩八錢不見火右為細末醋糊丸桐子大毎服二十丸空心米飲下按此出太隂例藥也戊巳丸治胃經受熱泄痢不止黄連呉茱萸去梗炒白芍各五兩右為細末麪糊丸桐子大毎服三十丸米飲下按此出厥隂已寒例以上三方出證治冷熱下痢葢冷熱異氣水火相反豈能同在腸胃為病耶論中辨之詳矣但其製方亦有暗合妙理惜乎世人莫知其深意也三方皆以黄連苦寒之藥為君正治濕熱之氣佐以辛苦温藥所以開鬱行滯氣血宣通病亦自己乾薑木香茱茰三者各隨經合宜而用要在學者臨機應變又不可拘執於此也治風之劑機要防風芍藥湯治泄痢飱泄身熱脉弦腹痛而渴及頭痛而㣲汗蒼术防風湯治泄痢脉弦頭痛良方神术散治春傷於風夏必飱泄以上三方並見泄瀉門澹寮方倉廩湯治下痢頭痛心煩不食局方敗毒散四錢加陳倉米百粒薑棗煎服按此乃發散風寒之劑出太陽例藥也治熱之劑機要白术􅆚藥湯治脾經受濕水泄注下蒼术芍藥湯同仲景五苓散宣明益元散以上四方並見泄瀉門治暑之劑局方黄連香薷飲治感暑下痢鮮血方見暑門按此解散暑熱心肺藥也出太隂厚朴例宣明桂苓甘露飲子和桂苓甘露飲方並見暑劑按此三方解表利小便大瀉濕熱氣分藥也太陽經藥也攻下之劑仲景大承氣湯方見下劑按此泄熱蕩滌腸胃之劑痞滿燥實四證者可用出陽明例藥也宣明𤣥青丸治下痢勢惡頻併窘迫或久不愈諸藥不能止須可下之以開除濕熱痞悶積滯黄連黄栢大黄甘遂芫花醋拌炒大㦸各半兩牽牛四兩取末二兩輕粉二錢青黛一兩右為末勻水丸小豆大初服十丸毎服加十丸日三以快利為度機要厚朴枳實湯治虚滑久不愈多𫝊變為痢先以此湯防其𫝊變厚朴一兩枳實炒一兩訶子皮一兩半生熟黄連甘草炙大黄各三錢木香半兩右為末毎服三五錢水煎服按以上三方逐積去熱之藥也大黄瀉血也牽牛瀉氣也甘遂大㦸芫花泄水也厚朴枳殻泄痞滿也各隨其病所宜選而用之局方蘇感丸去臟腑有積下痢以蘇合香丸與感應丸二藥和勻如粟米大毎服五丸淡薑湯空心下按局方之學多以此治痢去積故録於此然二藥之類聚温熱用於傷寒傷冷之物者則可然有熱之人積滯雖去熱毒必行其害何可勝言哉本事方靈砂丹治一切積痢硇砂硃砂並研細各二錢半右用黄蠟半兩巴豆三七粒去殻皮膜同於銀石器内重湯煮一伏時候巴豆紫色為度去二七粒止將一七粒與前藥同研極勻溶蠟和藥旋丸菉豆大毎服三丸至五丸水瀉生薑湯下白痢艾湯下赤白痢烏梅湯下空心服丹溪曰仲景治痢之法下者率用承氣加減何嘗以砒巴豆丹碙决烈燥毒之劑葢大黄之寒其性善走佐以厚朴之温善行滯氣緩以甘草之甘飲以湯液灌滌腸胃滋潤輕快無所留滯積行即止此砒丹巴碙熱毒類聚成丸其氣凶暴其體重燥積垢雖行毒氣未歇借使有愈疾之功其腸胃清淳之氣能免旁損暗傷之患乎消積之劑脾胃論聖餅子治瀉痢赤白臍腹撮痛久不愈黄丹二錢定粉三錢蜜陀僧二錢舶上硫黄三錢輕粉少許右為細末入白麪四錢滴水和如指尖大捻作餅子隂乾食前漿水磨化服之大便黒色為妙元戎聖功丸專治血痢膩粉三錢匕定粉二錢匕一法加蛤粉右研勻水浸蒸餅丸菉豆大艾湯下止澁之劑仲景桃花湯治下痢便膿血赤石脂一斤半剉一半末乾薑一兩粳米一升右三味以水七升煮米令熟去滓温七合内赤石脂末方寸匕日三服若一服愈勿再服按此方出手陽明例藥也但赤治丙而白治庚也嚴氏禹餘粮丸治腸胃虚寒滑泄不禁禹餘粮石煅赤石脂煅龍骨畢撥乾薑炮訶子麪裹煨肉豆􅅳麪裹煨附子炮去皮臍各等分右為末醋糊丸桐子大毎服七十丸空心米飲下局方真人養臟湯治冷熱不調下痢赤白裏急後重腹痛脫肛罌粟殻去蒂葢蜜炙三兩六錢人參當歸各六錢肉桂八錢訶子皮一兩二錢木香二兩四錢肉豆􅅳麪裹煨半兩白芍一兩六錢生甘草一兩八錢白术六錢右咀毎服四錢水煎服臟寒加附子水煮木香丸治一切下痢赤白膿血相雜裏急後重罌粟殻去穣一兩四錢青皮去白二兩八錢甘草二兩四錢當歸洗去蘆六兩訶子炮去核八兩木香不見火六兩右為末蜜丸如彈子大每服一丸水八分盞煎化温服祕藏訶子散治腸胃虚寒泄瀉米穀不化腸鳴腹痛脫肛及作膿血日夜無度御米殻去蒂葢蜜炒半兩訶子煨去核七分乾薑炮六分橘皮半錢右為細末分作二服水煎和滓熱服空心下十劑云澁可以去脫以米殻之酸微澁上收固氣去脫主用為君以訶子皮之㣲酸上收固血治其形脫橘皮㣲苦温益真氣升陽為之使以乾薑大辛熱除寒為臣亦為主治也按以上諸方皆行温熱之藥固氣止血𦂳澁腸胃當為腸虚感寒而成滑者設也且滯下之證多屬於熱兼有積滯局方一門専主澁熱似難例用宣明香連丸木香訶子肉麪煨黄連炒各半兩龍骨一錢右為細末飲丸黍米大毎服二十丸米飲湯下機要訶子散治泄痢腹痛漸以泄下㣲少宜此止之法云大勢已去而宜止之訶子皮一兩半生半熟木香半兩黄連三錢甘草炙三錢右為細末毎服二錢以白术芍藥湯下如止之不已宜歸而送之加厚朴一兩竭其邪氣也脾胃論訶藜勒丸治休息痢日夜無度腥臭不可近臍腹撮痛椿根白皮訶子肉半兩母丁香三十個右為細末醋糊為丸如桐子大毎服五十丸温米飲下按以上諸方用温凉之藥以上痢較之局方専用澁熱則變法矣夫脫則用澁理所當然脫而挾寒温之熱之可也脫而挾熱凉而澁之可也寒熱各隨所宜而用似難偏執一說宣明三聖散治産後下血痢不止烏魚骨燒綿灰血餘灰各等分右細末毎服一錢煎石榴皮湯調下熱服按此專主止血之劑收斂之劑嚴氏烏梅丸治熱留腸胃下痢純血臍腹㽲痛烏梅肉二兩當歸枳殻各一兩黄連二兩右為細末醋糊丸桐子大毎服七十丸食前米飲下元戎烏梅散治下痢津少大渴引飲不休烏梅焙乾半兩茯苓一兩木𤓰一兩一法加桂三錢半右咀毎服五錢生薑三片煎按仲景烏梅丸治傷寒吐蚘後人用治下痢此皆酸收之義出太陽桂苓例藥也血劑局方胃風湯治風冷乗虚入客腸胃水穀不化泄瀉注下及腸胃濕毒如下豆汁或下瘀血日夜無度人參白茯苓芎藭桂當歸白芍白术各等分右粗散毎服二錢入粟米數粒同煎食前服按此方名為治風而實非治風乃補血和血益胃氣之藥下血痢而挾虚者實可倚仗出太陽桂苓例藥也良方加味四物湯治血痢四物加阿膠艾葉保命集一方四物内加槐花黄連御米殻等分按此補血温血之藥出厥隂例藥也宣明白术湯治孕婦痢膿血白术黄芩當歸各等分右為末毎服三二錢水煎食前服補劑良方十全大補湯治一切婦人病痢四十日諸藥不愈六脉沉弱大凡痢脉宜沉宜弱但服此藥而愈方見補劑右薑棗煎成加白蜜半匙再煎數沸服良方治妊娠下痢腹痛小便澁糯米一合當歸炒黄茋各一兩右細切和勻水煎服按此二方不分經絡補血之劑今人治痢而用此者葢鮮矣殊不知血氣虚脫之人與夫胎前産後之證此法不可無也故特立條目以表章之雜方良方治疫毒痢敗毒散多加人參甘草陳皮薑棗煎服按此方詳見論中嚴氏茜根丸治一切毒痢及蠱注利血下如雞肝心煩腹痛茜根洗川升麻犀角地榆當歸黄連枳殻白芍右等分為末醋煮米糊為丸如桐子大毎服七十丸空心米飲下按此方消化死血解飲食毒之藥百一選方治禁口痢石蓮去殻留心并肉碾為細末毎二錢陳皮飲調下此是毒氣上衝心肺借此以通心氣便覺思食澹寮方治禁口痢毒氣上衝心肺者敗毒散四錢陳倉米一百粒薑三片棗一枚煎右方治脾胃虚弱禁口痢用山藥一味剉如小豆大一半銀器内炒熟一半生用同為末米飲調下按禁口痢古人論之者少故留此三方以備急然石蓮之通心氣敗毒散散表邪山藥之補脾胃果能開胃口而進食乎導氣湯治下痢膿血裏急後重腹疼作渴日夜無度黄連黄芩大黄白􅆚當歸木香㯽榔右㕮咀水煎此方即前芍藥湯加減桂甘草二味今人多如此用故收入玉機微義卷五
