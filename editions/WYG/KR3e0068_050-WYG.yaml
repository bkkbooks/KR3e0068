body:
  text: 玉機微義卷五十明徐用誠原輯劉純續增小兒門論色脉法脉經曰小兒四五嵗脉呼吸八至細數者吉小兒脉呼吸八至者平九至者傷十至者困診小兒脉法多雀鬭要以三部脉為主若緊為風癎沈者乳不消弦急者客忤氣小兒是其日數應變蒸之時身熱而脉亂汗不出不欲食食輙吐哯者脉亂無苦也小兒脉沈而數者骨間有熱欲以腹按冷清也小兒大便赤青瓣飱泄脉小手足寒難已脉小手足温易已小兒病困汗出如珠著身不流者死小兒病其頭毛皆上逆者必死耳間青脉起者瘈痛小兒病而顋限其口唇乾目皮反口中氣出冷手足四垂其卧如縛掌中冷皆死不治脉訣啟蒙曰凡診小兒脉當大指按三部一息六七至為平和八九至為發熱五至為内寒弦脉為風癎沈緩為傷食促急為虛驚弦急為氣不和沈細為冷浮為風大小不調為鬼祟浮大數為風熱伏結為物聚單細為疳癆風腸痛多喘嘔而脉洪為有蟲浮而遲潮熱者胃寒也按此本錢氏脉法也頗詳虎口脉歌曰紫風紅傷寒青驚白色疳黒時因中惡黄即困脾端按全嬰等書云小兒三嵗已前虎口第二指上寅夘闗有脉紋見者可驗病狀男左女右視之脉紋從寅闗起不至卯闗者病易治若連於卯闗者有病難治如寅連卯卯侵過辰闗者十難救一若脉紋小或短者病易治也宜叅視之錢氏曰面上證左腮為肝右腮為肺額上為心鼻為脾頦為腎赤者熱也隨證治之目内證赤者心熱導赤散主之淡紅者心虚熱生犀散主之青者肝熱瀉青丸主之淺淡者補之黄者脾熱瀉黄散主之無精光者腎虚地黄丸主之潔古曰青是腹痛桂􅆚藥潔古曰肝病面白肺病面赤脾病面青腎病面黄心病面黒若肝病驚搐而又加面白痰涎喘急之類此皆難治餘皆倣此推之叔和云春得秋脉定知死亦此意也按錢氏云者本病也潔古則兼勝已制化言之故後五臟形證不容不辯也論五臟形證虛實所主錢氏曰肝主風實則目直大呌呵欠項急頓悶虚則咬牙多欠氣熱則外生氣溫則内生肝熱手尋衣領及亂捻物瀉青丸主之壯熱飲水喘悶瀉白散主之肝有風目連劄不搐得心熱則搐治肝瀉青丸治心導赤散風甚身反張直不搐心不受熱也當補腎治肝肝有熱目直視不搐得心熱則搐治與有風同凡病或新或久皆引肝風風動而止於頭目目屬肝風入於目上下左右如風吹不輕不重兒不能任故目運劄也若熱入目牽其筋脈兩眥俱緊不能轉視故目直也若得心熱則搐以其子母俱有實熱風火相搏故也潔古曰肝主謀勇熱則尋衣捻物目連劄直視不能轉視或極則身反强直折皆風熱也目者肝之竅屬木木性急故如是錢氏曰心主驚實則呌哭發熱飲水而搐虚則困卧悸動不安心病多呌哭手足動揺驚悸心氣熱則心胷亦熱欲言不能而有就凉之意故合面卧心熱視其睡口中氣温或合面睡及上竄揺頭咬牙皆心熱也導赤散主之心實則氣上下澁合卧則氣不得通故喜仰卧則氣得上下通也瀉心湯主之錢氏曰脾主困病則困睡洩㵼不思食實則困睡身熱飲水虚則吐瀉生風肺主喘實則悶亂喘促有飲水者有不飲水者虚則哽氣長出氣肺熱手搯眉目鼻面肺盛復有風冷胸滿短氣氣急喘嗽上氣當先散肺後散風冷肺只傷寒則不胸滿肺虚熱唇深紅色治之散虚熱肺臟怯唇白色當補若悶亂氣麄喘促哽氣者難治肺虚損故也脾肺病久則虚而唇白脾者肺之母也母子皆虚不能相營故名曰怯肺主唇白白而澤者吉如枯骨者死潔古曰肺主氣燥熱則壯熱飲水喘悶鼻乾燥手捫眉面瀉白散胸滿短氣氣急喘𠻳上氣皆是肺氣有餘復感風邪之所傷謂之微邪先瀉而復發散之錢氏曰腎主虛無實也惟瘡疹腎實則黒䧟腎虚兒本虚怯由胎氣不成則神不足目中白睛多其顱即解自開也面色㿠白此皆難養縱長不過八八之數若恣色慾多不及四旬而亡或有因病而致腎虚者非也又腎氣不足則下竄蓋骨重惟欲墜下而縮身也腎水隂也腎虚則畏明宜補之潔古曰下竄者腎氣不足兩足熱不喜衣覆足然此者臍以下皆腎之所主縁心氣下行於腎部也此乃腎不足而心有餘宜地黄丸論五臟相勝虚實之邪錢氏曰五臟相勝輕重肝臟病見秋木旺肝強勝肺也宜補肺瀉肝輕者肝病退重者唇白而死肺病見春金旺肺勝肝當瀉肺輕者肺病退重者目淡青必發驚更有赤者當搐為肝怯當目淡青色也心病見冬火旺心強勝腎當補腎治心輕者病退重者下竄不語腎怯虚也腎病見夏水勝火腎勝心也當治腎輕者病退重者悸動當搐也脾病見四旁皆倣此治之順者易治逆者難治脾怯當面目赤黄五臟相反隨證治之又曰如肺病又見肝證咬牙多呵欠者易治肝虚不能勝肺故也若目直大呌哭項急煩悶者難治葢肺病久則虚冷肝強實而反勝肺也視病之新久虚實虚則補母實則瀉子潔古曰肝勝肺則肝病身熱發搐又見肺虚喘而氣短病見於申酉戌時是肝真強也内經曰受所制而不能制謂之真強法當補脾肺而後瀉肝𨗳赤散瀉黄散肺勝肝則肺病喘嗽氣盛見於寅卯辰時木之位又以見肝怯少力正為鬼賊所尅法當補肝瀉肺若肺病嗽久虚羸無實不得瀉肺只宜用地黄丸補之不可服瀉白散何謂也經云虚則補實則瀉之按此謂五臟相勝病機不離五行生尅制化之理者盖小兒初在襁褓未有七情六慾只是形體脆弱血氣未定腑臟精神未完所以有臟氣虚實勝乘之病但世俗不審此理往往遇是率指為外感内傷而用藥致枉死者多矣悲夫矧錢論脫畧幸而潔古補之今特叅附誠所謂無窮之惠也潔古曰五臟子母虚實鬼賊微正若不逹㫖意不易得而入焉在前者為實邪子能令母實拒鬼賊不敢傷於母其子又引母所尅者妻相助故曰實邪也在後者為虚邪母引子之鬼賊至由此母能使子虚也内經曰子能令母實母能令子虚此之謂也妻來乗夫為㣲邪夫來乗妻為賊邪法當瀉鬼補本臟本臟自病為正邪法當虚則補之實則瀉之内經曰滋苗者必固其根伐下者必枯其上逆其根則伐其本伐其本則敗其真矣按此以五行生尅之道論也義見難經五十難及後五臟治要論宜參考之心主熱自病或大熱㵼心湯主之實則煩熱黄連瀉心湯主之虚則驚悸生犀散主之肺乗心微邪喘而壮熱瀉白散肝乘心虚邪風熱煎大羌湯下大青丸脾乗心實邪洩瀉身熱瀉黄散腎乗心賊邪恐怖惡寒安神丸按乗者猶乗車之乗也大抵五臟之病相乗伏匿隠顯莫測已上但言本病乗勝之道故以五臟治要附于左宜叅攷焉凡心臟得病必先調其肝腎兩臟腎者心之鬼肝氣通則心氣和肝氣滯則心氣乏此心病先求於肝清其源也五臟受病必傳其所勝水能勝火則腎之受邪必傳於心故先治其腎逐其邪也故其退腎也益肝氣兩方或診其脉肝腎兩臟俱和而心自生疾然後察其心家虚實治之肺主燥自病則喘嗽燥則潤之實則喘而氣盛瀉白散虚則喘而少氣先益黄散而後阿膠散心乗肺賊邪熱而喘𠻳先地黄丸中導赤散後阿膠散肝乗肺微邪惡風眩冒昏憒𠻳羗活散腎乘肺實邪增寒𠻳清利百部丸脾乗肺虚邪體重吐痰泄瀉𠻳人參白术散凡肺之得疾必先觀心之虚實若心火炎盛鑠金即當先抑心氣後喫肺藥若心氣和即更看脾脉若脾氣虚冷即不能相生而肺家生氣不足則風邪易感故患肺寒者皆脾虚得之若脾氣盛實則亦痞隔中焦而大腸與肺表裏不能相通夫中焦熱隔則肺大腸不通其毒熱之氣必上蒸於肺而生疾故患肺熱者多脾實得之心氣盛瀉之脾氣虚者益之脾氣實者通之然後隨其肺之寒熱以治之故有抑心氣益脾氣通脾氣三藥若診其脉氣心脾兩臟俱和而肺自生疾則但察肺家虛實而治之肝主風自病則風搐拘急肝苦急急食甘以緩之佐以酸苦以辛散之實則風搐力大㵼青丸虚則風搐力少地黄丸心乗肝實邪壯熱而搐利驚丸凉驚丸主之肺乘肝賊邪氣盛則前晨呵欠微搐法當㵼肺先補本臟補肝地黄丸主之㵼肺㵼白散主之脾乗肝微邪多睡體重搐先當定搐瀉青丸主之搐止再見後證則别立法治之腎乗肝虚邪增寒呵欠搐羌活膏凡肝得病必先察其肺腎兩臟根其病之所起然後復其肝家本臟之虚實方可治療然腎者肝之母金者木之賊今肝之得病若非腎水之不能相生必是肺金之鬼來相攻擊不得不詳審而求之故其來在肺先治其肺攻其鬼也其來在腎先補其腎滋其根也然後審其肝家本臟之虚實而寒溫之脾主濕自病則泄㵼多睡體重昏倦脾苦濕急食苦以燥之實則泄㵼赤黄睡不露睛㵼黄散虚則泄㵼白色睡露睛白术散肝乘脾賊邪風瀉而嘔茯苓半夏湯主之心乗脾虚邪壯熱體重而㵼羌活黄芩蒼术甘草湯主之肺乗脾實邪能食不大便而嘔𠻳煎檳榔大黄湯下葶藶丸腎乘脾㣲邪惡寒泄理中丸之類凡脾之得病必先察其肝心兩臟之虚實根其源之所起然後救療葢肝是脾之鬼心是脾之母肝氣盛則鬼勝心氣虧則脾家生氣不足盛者抑之則退虧者益之則不乏故有抑肝氣益心氣兩藥診其脉肝心兩臟俱和則是脾自生疾察其虚實而治腎主寒自病則足脛寒而逆人之五臟惟腎無實小兒瘡疹變黒㗖則是腎實水尅退心火是以水能制火也心乗腎微邪内熱不惡寒桂枝丸肺乗腎虚邪喘𠻳皮澁寒百部丸肝乗腎實邪拘急氣搐身寒理中丸脾乘腎賊邪體重泄㵼身寒理中丸本臟虚弱是自己正令不行乃鬼賊之所尅害當補本臟之正氣假令肺病喘嗽時於初春見之法當補腎見於夏救肺見於秋瀉肺見於冬補心瀉本臟乃名寒嗽大抵五臟各至本位即氣盛不可更補到所尅位不可更瀉五行之間惟腎之一臟母盛而子反受邪而物之性有不可一槩論者肺腎是也何則肺屬金射於皮毛所主者氣腎屬水主於骨髓所藏者精氣之輕浮能上而不能下精之沈重能下而不能上此物性之然今肺之盛葢熱之作也氣得熱而上蒸則肺不能下生於腎而腎受邪矣急食凉藥解之使臟氣溫和自能下生於腎此腎之病必先求之於肺若肺臟安和而腎忽然受病者不過脾之濕相刑於腎而生疾所以有解肺熱去脾邪兩藥若脾肺兩臟俱和而腎自生疾亦察其本臟而治之論外感風寒錢氏曰傷風貪睡口中氣熱呵欠頓悶當發散與大青膏解不散有下證當下大黄丸大飲水不止善食者可㣲下餘不可下也傷風手足冷脾臟怯也當先和脾後發散和解傷風自利脾虚怯也傷風腹脹脾虚也補脾必不喘後發散仍補脾去脹蹋氣丸傷風兼臟兼心則驚悸兼肺則悶亂喘息哽氣長出氣𠻳兼腎則畏明各隨補母臟虚見故也肝外感風呵欠頓悶口中氣熱當發散若能食飲水不止當㣲下之餘不可下謹按傷風亦有六經不止詳見傷風門潔古曰小兒外傷於風秋冬用溫熱藥春夏用凉寒藥若大熱飲水能食不大便用大黄丸作散子服之如身表無大熱而小便不利是為有濕熱結膀胱仍用勝濕藥白术茯苓之類利小便則其熱自退如清便自調慎不可妄下恐外熱逐於内而變結胸危證多矣又曰傷寒依四時隂陽升降順剛柔而施治氣升則順發之氣收則下之有汗發熱惡風脉浮緩者風傷衛桂枝湯無汗發熱惡寒不當風而自增寒脉浮緊者寒傷榮麻黄湯有汗發熱惡風脉浮緊無汗惡寒脉浮緩謂之榮衛俱傷青龍湯桂枝麻黄各半湯無汗發熱不惡風寒脉沈洪者可下之更詳認其厥與不厥量寒熱淺深而治之有汗四肢厥脉沈㣲者名隂厥四逆湯無汗四肢厥脉沈滑者名陽厥大承氣湯加膩粉如四肢不厥身熱内外皆陽不動凉藥三五服下之論諸熱證病本不同全嬰方論曰夫潮熱者發歇有時或血氣盛實臟腑生熱或傷寒時疫觸受邪氣隂陽相勝也驚熱顛呌恍惚夜熱夕發旦止餘熱者寒邪未盡或傳經之遺熱也食熱者肚背先熱疳熱者骨蒸盜汗壯熱一向不止錢氏云不已甚則發驚癎也煩熱心躁不安喘麄甚則發癎也積熱頰赤口瘡下盛則腰腿癰腫表裏實則身熱便澁虚則汗下後仍熱也風熱汗出身熱呵欠面赤虚熱困倦少力其有久𠻳久瀉久痢久血久瘧以致諸疾之後成者皆虚熱也客熱來去不定為陽邪干於心也心受邪則熱形於額故先起頭面身熱多驚由真氣虚而邪氣勝也癖熱涎𠻳飲水由乳食不消伏結於中致成癖塊也或痰𠻳而驚或嘔逆不定日中嗞煎夜則啼呌乍熱乍凉如潮熱也寒熱者如瘧狀隂陽相勝也先寒而後熱陽不足先熱而後寒隂不足寒多而熱少隂勝陽也熱多而寒少陽勝隂也寒熱相半隂陽交攻也血熱者每日已午間發熱遇夜則凉疹熱耳鼻尖冷錢氏曰胎熱者生下有血氣時呌哭身熱如淡茶色目赤大便赤黄糞稠急食乳浴法主之按已上辯諸證可謂詳悉但血熱證東垣謂夜則發熱晝則明了此血熱也葢晝陽夜隂也食熱者手心熱噯氣吐乳嘔吐者多宜隨證推格兼玩本文論變蒸身熱全嬰方論曰夫變蒸者以長氣血也變者上氣蒸者體熱變蒸有輕重輕者體熱虚驚耳冷微汗唇中白泡狀如珠子重者寒熱脉亂腹疼啼呌不能乳食輙吐哯其輕者三日重者五日古法以黒散子紫丸子主之其有不熱不驚或無證候暗變者多矣葢受胎氣壯實故也按本論註云嘗攷錢氏與寳鑑論變蒸互說差殊錢氏云一變腎二變膀胱三變心四變小腸五變肝六變膽七變肺八變大腸九變脾十變胃故稱水數一先變也寳鑑云初變肝二變肺三變心四變脾五變腎二者所論皆五行顛倒相生者却逄相尅相尅者又逄相生大扺隂陽造化相生者順相尅者逆變蒸者是長養血氣滋榮五臟相生之法此理昭然相生者有母子之道相尅者有夫婦之義相生所以相繼相尅所以相治原夫胎者得水火既濟隂陽造化五行相治而成形故始於腎氣之初生也小兒變蒸者當隂陽升降從五臟相繼而成人故始於肝之初變也雖二說互有所長大扺小兒所禀胎氣壯怯不同况所變之證不一古方用已上二藥非本病通變法也故不録論傷寒瘡疹同異錢氏曰傷寒男體重面黄女面赤喘急憎寒口中氣熱呵欠頓悶項急也瘡疹則腮赤躁多噴􅅉悸動昏倦四肢冷傷寒當發散之治疹行温平有大熱者解毒餘見前説潔古曰凡傷風則皮澁拘急鼻塞㿀疹則睡中發驚悸呵欠嚏噴是為易識矣論急慢驚風錢氏曰急驚因聞大聲或大驚而發搐發過則如故此無隂也當下利驚丸主之此證本因熱生於心身熱面赤引飲口中氣熱大小便黄赤劇則搐也葢熱甚則風生風屬肝此陽盛隂虚也故利驚丸主之以除其痰熱不可與巴豆及温藥大下之恐搐虚熱不消也小兒熱痰客于心胃因聞聲非常則動而驚搐矣若熱極雖不聞聲及驚亦自發搐慢驚因病後或吐㵼脾胃虚損遍身冷口鼻氣出亦冷手足時瘈瘲昏睡露睛此無陽也𤓰蔞湯主之凡急慢驚隂陽異證切宜辯而治之急驚合凉瀉慢驚合温補如不分别則誤甚矣閻孝忠曰急慢驚風古人無之惟曰隂陽癎陽動而速故陽病曰急驚隂静而緩故隂病曰慢驚此隂陽虚實寒熱之别治之不可誤也急驚猶有熱熱即生風又或因驚而發則目為連劄涎潮搐搦身體口中氣皆熱及其發定或睡起即了了如故此急驚證也當其搐熱漸减食與鎮心退熱藥候定以藥即下其痰熱心神安寜即愈慢驚得大病之餘吐㵼之後或悞取轉泄致脾胃虚損風邪乗之似搐而不甚搐似睡而不似睡四肢與口中氣皆冷睡露睛或胃痛而啼哭如鴉聲此則危證脾胃虚損故也潔古曰急驚陽證也俱腑受病爾小兒客痰熱於心膈是少陽相火旺經云熱則生風因聞大聲而作葢謂東方震卦得火氣而發搐火本不動得風而動當用利驚丸𨗳赤散瀉青丸地黄丸主之搐止服安神丸慢驚隂證也俱臟受病爾葢小兒吐㵼病久脾胃虚損若不早治則成慢驚名曰瘈瘲似搐而不甚搐也因脾胃虚損故大便不聚當去脾間風先以宣風散𨗳之後用史君子丸益黄散則其利自止既已失治則脾肺俱虚致被肝木所乗是為慢驚也當用溫補羗活膏全嬰方云驚證因風則目青面紅發搐因驚其病在心忽然呌聲發搐因食則其證噯吐氣即發搐皆陽癎也肺胃經虚則生粘痰痰者肺胃所出也痰則凝滯在於咽喉如牽鋸之聲時復瘈瘲或因吐㵼所致脾虚則肺亦虚涎痰流溢其證亦然皆隂癎也身熱脉浮精神恍惚或吐或㵼不思乳食發搐即是半隂半陽合病身凉脉沈精神倦怠不吐不㵼又能乳食發搐者亦是半隂半陽合病正如傷寒半是表半是裏也亦有急驚凉㵼而不愈或與吐下藥太過變為慢驚慢驚溫補而不愈變為急驚互相更變者多矣按已上諸家所論殆盡證治之要矣但錢云慢驚用栝蔞湯恐傳寫誤耳大抵驚主風木甲木屬陽腑病故急易治乙木屬隂臟病故慢難治如大人驚恐即後洩盖甲木尅戊土也况小兒五臟之氣未實神氣未完而自病乎證非病後及吐瀉脾胃虛損得者中有夾火夾熱夾痰夾食病因不同至風邪内䧟入腑入臟亦與外中風相似故治此者當本錢氏虚實補瀉法則不致犯禁之悞藥有太過不及之失論發搐有風有熱有痰有食補瀉不同驚癎發搐錢氏曰男發搐目左視無聲右視有聲女發搐目右視無聲左視有聲相勝故也潔古曰男為木左視木位右視金位相撃則有聲男反右視女反左視亦皆有聲早辰發搐錢氏曰因潮熱寅卯辰時身體壯熱上視手足動揺口内生熱涎項頸急此肝旺當補腎治肝也潔古曰潮熱於寅卯辰木之位是肝旺也當補水以制心火瀉肝木以止其搐日午發搐錢氏曰因潮熱巳午未時發搐心神驚悸目上視白睛赤色牙闗緊口内涎手足動揺此心旺也當補肝治心潔古曰巳午未火之位而發潮搐者心熱也𨗳赤散及凉驚丸日晩發搐錢氏曰因潮熱申酉戌時不甚搐而喘目㣲邪視身體似熱睡露睛手足冷大便淡黄水是肺旺當補脾治心肝潔古曰肺之位而肝強法當補脾恐被木之賊所尅害先瀉心肝以剉其勢瀉心𨗳赤散瀉肝瀉青丸而後補脾益黄散夜間發搐錢氏曰亥子丑時不甚搐而卧不穏身體溫壯目睛緊斜視喉中有痰大便銀褐色乳食不消多睡不省補脾治心𨗳赤凉驚主之潔古曰皆因大病之後脾胃虚損多有此疾法當補脾凉心傷寒後發搐錢氏曰傷風後得之口中氣出熱呵火頓悶手足動揺當發散大青膏主之小兒本怯者多此病也潔古云因傷風而得已上證者同大人傷風寒之類當辯有汗無汗陰陽二證用大青膏仲景小續命之類開發則愈傷食後發搐錢氏曰因食得之身體温多唾多睡或吐不思食而發搐當先定搐搐退白餅子下之後與安神丸潔古曰傷食發搐謂不因他病忽然而搐此因飲食過度致損脾胃故見多睡或吐不思飲食脾胃既虚引肝風則發搐當先定其搐加羗活防風煎下瀉青丸後用白餅子下其食漸漸用調中丸異功散養其氣百日内搐錢氏曰真者不過三兩次必死假者發頻不為重真者内生驚癎假者外傷風冷葢血氣未實不能勝任乃發搐也欲知假者口中氣出熱也治之可發散大青膏及用塗􅇟浴體法錢氏曰惟㿀疹能作搐風火相爭故也治當瀉心肝補母雜病目赤兼青者欲發搐咬牙甚者發搐全嬰方曰凡身體壯熱耳輪鼻尖及手足稍俱冷忽發搐者此非驚是豆搐也夫驚搐有隂陽兩證隂者拇指在内陽者拇指在外陽拳者順隂拳逆也凡目鮮目貶目白目青目斜目鬭目轉目瞪聲焦聲嗄聲顫聲輕咂口弄古捲舌露筋嘘氣哽氣噎氣撮唇噎乳噎食忽然定睛吐涎吐沬抝頸仰身揺頭擦面藏頭畏明手攣手顫脚彎不伸忽撩忽亂恍惚精神失張失志眠睡不寧睡中喜笑困戞齒齦心煩躁熱啼哭咬人面臉弄色或紅或青伸舒用力㣲㣲作聲有已上證候驚搐先證也預防之驅風膏琥珀散更擇對證藥閻孝忠曰似搐而不甚搐此名瘈瘲按此所論諸臟旺實或傷風因食所致發搐旺者當瀉實補虚傷風者當發散食宜下之此則與因驚發搐所異也大抵驚病發搐多自外感自内因者如吐瀉後脾虚所致或熱極生風之類是也餘證發搐已上亦備所因不同但世俗罕能分於臨證用藥不無實實虚虚之失反為害耶論咳嗽錢氏曰𠻳者肺感㣲寒八九月間肺氣大旺病𠻳者其病必實非久病也其證面赤痰盛身熱法當以葶藶丸下之若久者不可下也十一十二月𠻳者乃傷風咳也風從背脊第三椎肺俞穴入也以麻黄湯汗之有熱證面赤飲水涎熱咽喉不利者宜兼甘桔湯治之若五七日之間其證身熱痰盛唾粘者以褊銀丸下之有肺盛者咳而後喘面腫欲飲水有不飲水者其身即熱以瀉白散瀉之若傷風咳𠻳五七日無熱證而但𠻳者亦葶藶丸主之後用化痰藥有肺虚者咳而哽氣時時長出氣喉中有聲此久病也以阿膠散補之痰盛者先實脾後以褊銀丸㣲下之涎退即補肺如上法有𠻳而吐水或青緑水者以百祥丸下之有𠻳而吐痰涎乳食者以白餅子下之有𠻳而咳膿血者乃肺熱食後服甘桔湯久𠻳者肺亡津液阿膠散補之咳而痰實不甚喘而面赤時飲水者可褊銀丸下之治𠻳大法盛即下之久即補之更量虚實以意增損按此論小兒欬證既有外感内因之殊虚實之異治法外此宜與欬門諸方約之論吐瀉有傷乳食有風有熱有寒有虚錢氏曰吐乳瀉黄傷熱乳也吐乳瀉青傷冷乳也有初生三日内或至十日吐瀉壯熱不思食大便乳不消或白色是停食當下之後和胃下用白餅子或食乳不消身溫涼不思乳大便青白色此上實下虚也更有兼見證吐瀉因傷風得之身溫乍凉乍熱睡多氣麄大便黄白色嘔吐乳食不消時咳𠻳更有五臟兼見證當煎入臟君臣藥先大青膏後服益黄散如先曽下或無下證慎不可下也此乃脾肺受寒不能入食也傷風吐瀉身熱多睡能食乳飲水不止吐痰大便黄水此為胃虚熱渇吐瀉也當生胃中津液以止其渇止後用發散藥止渇多服白术散發散大青膏傷風吐瀉身凉吐沫瀉青白色悶亂不渇哽氣長出氣睡露睛此傷風任冉輕怯因成吐瀉當補脾後發散此二證多病於春冬也吐瀉於五月二十五日以後身壯熱此熱也小兒臟腑十分中九分熱也或因傷熱乳食吐乳不消瀉深黄色玉露散主之六月十五日以後吐瀉身溫似熱臟腑六分熱四分冷也吐嘔乳食不消瀉白黄色似渇或食乳或不食乳食前少服益黄散食後多服玉露散七月七日以後吐瀉身溫凉三分熱七分冷也不能食乳多似睡悶亂哽氣長出氣睡露睛唇白多噦欲大便不渇食前多服益黄散食後少服玉露散八月十五日以後吐瀉身冷無陽也不能食乳乾噦瀉青褐水當補脾益黄散主之不可下也虚羸脾胃不和不能食乳致肌痩亦因大病或吐瀉後脾胃尚弱不能傳化榖氣也有冷者時時下利唇口青白有熱者溫狀身熱肌肉㣲黄此冷熱虚羸也冷者木香丸主之夏月不可服如有證則少服之熱者胡黄連丸主之冬月不可服如有證則少服之潔古曰夏月心火用事治吐瀉不可用溫暖藥秋用溫藥秋深用煖藥更有五臟兼見證如有風瀉防風羌活有熱瀉黄芩大黄有寒瀉附子有濕瀉白术茯苓有肺瀉􅆚藥桂定喘荆芥人參如甚加檳榔木香大便不通則加大黄更詳看病新舊新則止之乆則腸風之患宜推陳致新法當宣風散導過以用入臟君臣藥調之益黄散凡大瀉引飲者其病不以新久皆宜服白术散痢病亦同身熱吐瀉咳𠻳是風木入於脾母虚其子亦弱法當煎檳榔豆䓻湯下大青膏後服益黄散身熱吐瀉大渇大便必少是熱入膀胱亡失津液此為大逆是隂陽相乗也五苓散主之身凉吐瀉不渇則知為寒瀉當補之煎附子桂枝湯下大青膏隂陽相乘肝入于胃故發熱而嘔當服白术散後煎檳榔木香湯下大青膏閻孝忠曰凡小兒吐瀉當温補之予每用理中丸以温其中以五苓散𨗳其逆連與數服兼用異功散等温藥調理之徃徃便愈若已虚損當速生其胃氣宜與其四味理中丸并研金液丹末煎生薑米飲調灌之惟多服乃效候胃氣已生手足漸暖隂退陽囬然猶瘈瘲即减金液丹二分增青州白丸子一二分兼用異功散羗活膏溫白丸鈎藤飲子之類調理至安依此治之仍頻與粥雖至危者徃徃死中得生十救八九金液丹治小兒吐瀉虚極最妙沈存中良方論金液丹云親見小兒吐利劇氣已絶服之復活者數人真不妄也湏多服方驗按此證錢論傷乳食所致分冷熱傷風辨兼見證明寒熱因而治可謂究其緒矣閻主温中兼用金液丹之類葢是治寒證濕證及升提下䧟之法至潔古更分時令備兼見證而用藥治法殆無餘藴但吐瀉止作一證然有吐而不瀉瀉而不吐則當别議若吐而不瀉傷冷者宜溫胃瀉而不吐傷冷而脉㣲者宜灸之亦不可不分葢病本之不一也論疳證虚實錢氏曰疳者皆脾胃病亡津液之所作也云云疳在内目腫腹脹利色無常或沬青白漸痩弱此冷證也疳在外鼻不赤爛自揉鼻頭上有瘡不著痂漸遶耳生瘡治鼻瘡爛蘭香散諸瘡白粉散治之五臟疳筋疳骨疳形證詳見本論潔古曰疳者小兒病癖或久吐瀉醫者妄投轉過之藥小兒易為虚實致之胃虚而亡失津液内發虚熱外消肌肉一臟虚則諸臟皆弱其病目胞腫腹脹利色無常漸加痩瘁久不痊可是腸胃有風積法當用宣風散𨗳之後各依本臟補其母大抵小兒疳病肌羸血氣不足同大人癆瘵之疾按疳證惟錢氏論中最詳宜玩本文論腹痛所因錢氏曰積痛口中氣温面黄白目無精光或白睛多及多睡畏食或大便酸臭者當磨積宜消積丸甚者當白餅子下之後和胃蟲痛面㿠白心腹痛口中沬及清水出發痛有時安蟲散主之小兒本怯者多此病積痛食痛虚痛大同小異惟蟲痛當口淡而沫自出按小兒腹痛亦有傷冷食乳物及濕熱欲作痢而痛或發痧疹痛者皆宜詳悉論小兒癖積錢氏曰腹中有癖不食但飲乳是也當漸用白餅子下之小兒病癖由乳食不消伏在腹中乍凉乍熱飲水或喘𠻳與潮熱相類不早治必成疳以其有癖則令兒不食致脾胃虚而發熱故引飲水過多即蕩滌脾胃亡失津液脾胃不能傳化水榖其脉沈細益不食脾胃虚衰四肢不舉諸邪遂生羸瘦而成疳矣論痘瘡輕重錢氏曰凡瘡疹一發便出盡者必重也瘡夾疹者半輕半重也出稀者輕裏外肥紅者輕外黒裏赤者㣲重也外白裏黒者大重也瘡端裏黒㸃如針孔者勢劇也青乾紫䧟睡昏汁出不止煩躁熱渇腹脹啼喘大小便不通者困也凡瘡疹當乳母慎口味凡飢及風寒歸腎變黒難治也有大熱當利小便有小熱宜解毒若黒紫乾䧟者百祥丸下之不黒者慎勿下看時月輕重大抵瘡疹屬陽出則春夏為順秋冬逆冬月腎旺又盛寒病多歸腎變黒又當辨春膿疱夏黒䧟秋㿀冬疹亦不順也黒者無問何時十難救一其候寒戰噤牙或身黄腫紫宜急以百祥丸下之復惡寒不已身冷出汗耳骫反熱者死腎氣大旺也下後身熱飲水可治脾旺勝腎寒去而温熱也先發膿胞後發疹子者順後發㿀子者逆先發水疱後發疹子者逆先發膿疱後發水泡多者順少者逆先水泡後㿀子多者逆少者順先疹子後㿀子者順凡瘡疹只出一般者善潔古曰一發便宻如針頭形勢重者合輕其表而凉其内連翹升麻湯若㿀已發宻重㣲喘飲水者有熱證則去風藥㣲下之若出不快清便自調知其在表不在裏當㣲發散用升麻葛根湯若青乾黒䧟身不大熱大小便澁則是熱在内煎大黄湯下宣風散若身表大熱表證未罷不可下若㿀疹已出見小熱小便不利當利之已發後有餘毒未散復有身熱瘡腫之類當用茶粉下解毒丸瘡疹已出後有聲音者乃形病氣不病也瘡疹未出先聲音不出者乃形不病而氣病也若瘡疹出而聲音不出者是形氣俱病也當清其肺氣當用八風湯并凉膈散去硝黄亦可論痘瘡用熱藥之悞丹溪曰讀前人之書當知其立言之意茍不知其意求適於用不可得也痘瘡之論錢氏為詳歴舉源流明經絡分表裏虚實開其治法證以論辨深得著書垂教之體使後人如求方圎於䂓矩較平直於凖繩引而伸之觸類而長之可謂無窮之應用也今人不知致病之因不求立方之意倉卒一試設有不應并其書而棄之近因局方之學行素問之道不明類皆喜温而惡凉喜補而惡解利忽得陳氏方論遂以為錢氏不及也雖然陳氏亦可謂善求病情者大率歸重於太隂一經葢以手太陰屬肺主皮毛足太陰屬脾主手足肺金惡寒而易於外感脾土惡濕而無物不受觀其用丁香官桂所以治肺之寒用附木半夏所以治脾之濕也使脾與肺果有寒與濕而兼有虚也中病則己何傷之有今徒見其出遲者身熱者泄利者驚悸者氣急者渇思飲者例與木香散異功散者間有偶中之効不思一偏之禍若錢氏方固未嘗廢細辛丁香白术參茋軰率有監制輔佐之藥但有寒凉者多而補助一法畧爾端緒痴人不可說夢錢氏之慮深矣亦將俟逹者推充而用之夫渇者用温藥痒塌者用補藥自陳氏發之逈出前軰然其多用燥熱或未適中恐其立方之際必有挾寒而痘者余嘗㑹諸家之粹而用之聊陳一二從子六七嵗時出痘身熱㣲渇自利或欲用木香散加丁香十粒煎予觀其出遲固因其自利而氣弱察其所下皆臭滯因熱蒸而下恐未必寒急止之已投一貼矣與黄連解毒湯加白术近十貼以解之利止痘出其後肌常㣲熱手足生癰又與凉劑補一月安一人年七十嵗發熱而昏倦其脉大而似數與參茋歸术陳皮大料濃湯飲之二十貼痘出又二十貼膿胞成身無全膚或欲用陳氏本方與之予曰但虚無寒也又與前方至六十貼而安至正甲申春邑間痘瘡不越一家率與陳氏方童㓜死者百餘雖曰天數吾恐人事亦或未之盡也謹按錢氏論痘瘡形色輕重困劇而用藥已具其端緒矣至潔古又辨所兼之證及候音聲察形氣為病而處治治法可謂詳悉但世俗不深求其意反有疑似丹溪先生所以言之諜諜也大抵世俗喜温而惡凉將錢氏之法不去推充至多疑似如云不可妄下葢妄之一字戒慎之意當有可下之理也若瘡疹初發有因裏實而出不快渇而脈數便秘煩躁不下可乎有將懨之際裏實而渇便秘身熱不下可乎或云首尾俱不可下或指為上吐下瀉不可下皆非也但自病體虚實不等時令中治法之異要當適中病情爾故錢氏云看時月此句闗係甚妙如冬月盛寒便難例用凉劑且小兒痘瘡本五臟之毒所發非止屬諸痛痒瘡皆出心火之比故陳氏方一出亦多獲效今人用錢氏方亦有致悞者葢不善用其法之過非製法者之過也宜求乎立方本㫖矧嵗氣時臨災𤯝淺深不同小兒體有虚實之異用藥不可輕舉詳潔古以㣲下法中佐以風劑是兼升發之意亦慎之也何熱劑與香竄之藥豈可例用乎然有毒入闗竅肌骨間邪氣下䧟用此而獲生者或有之恐千百而一二也論㿀疹證治王海藏云夫㿀之為病皆由子在母腹中時浸漬食母血穢藴而成毒皆太隂濕土壅滯君相二火之所作也因小兒真氣既盛正氣又旺邪無所容或因天寒傷表或傷裏㿀由是而生焉治當外者外治内者内治中外皆和其㿀自出至於惡寒者發之表大熱者奪之渇者清之秘者通利之驚者安之泄者分之不可執一大抵傷寒同治隨經用藥最為髙論假如五日以裏諸病與㿀疹不能别辨者不可疑似必湏發之但各從其所傷應見治之皆不妨㿀出若強發之其變不可勝數矣前人言首尾俱不可下者何也曰首不可下者為㿀未顯於表下則邪氣不得伸越此脉證有表而無裏故禁首不可下也尾不可下者為㿀毒已顯於外内無根蒂大便不實無一切裏證下之則㿀氣逆䧟故禁尾不可下也又言温煖不令通風㿀若已出身熱天暄何必葢覆不使之通風乎後人執此二句不知天令人事通變致悞者多大抵以脉為主浮中沈之診平舉按之候察其虚實定其中外則可以萬全矣論未顯㿀證所用之藥外傷升麻湯内傷枳實丸大便䎡者枳术丸傷冷者温之神應丸惡寒者發之防風蒼术湯表大熱者奪之此表者通言三陽也夫陽盛則氣必上行言奪者治之不令上行也大便秘結者下之桃仁承氣四順飲柴胡飲選用察其在氣在血渇者清之大渇者白虎湯小渇者凉膈散小便不通者利之導赤散八正散之類當求上下三焦何經而用藥驚者分輕重安之泄者察寒熱分之已顯㿀證所用之藥出不快化毒湯出太多犀角地黄湯地骨皮鼠粘子湯咽不利桔梗甘草粘子湯煩者桔梗甘草梔子湯肺不利紫草甘草枳殻湯太陽出不快荆芥甘草防風湯陽明出不快升麻加紫草湯少陽出不快連翹防風湯四肢出不快防風􅆚藥甘草湯小兒治法治風之劑小續命湯一名寛筋湯治小兒吐瀉之後因虚生風瘈瘲神昏涎盛不利麻黄去節半兩防風一分半􅆚藥附子人參川芎白术防己各一兩黄芩一分桂枝甘草各半兩右為粗末每三嵗一錢水煎入薑棗有汗者去麻黄錢氏大青膏治小兒熱盛生風欲為驚搐血氣未實不能勝邪故發搐也大小便依度口中氣熱當發之天麻末一錢白附子一錢半蝎梢半錢硃砂一字麝一字烏蛇肉酒浸焙乾半錢青黛一錢天竺黄一字右同為末生蜜和成膏每服半皂子大月中兒粳米大天麻防風丸見後按已上三方風自内因者宜此汗之可見裏之表證與外因不同矧有驚風痰熱食熱等類者臨證並宜選擇驅風膏瀉青丸加辰砂蝎尾按此表裏藥也浴體法天麻末二錢蝎尾硃砂各半錢烏蛇肉酒浸為末白礬各三錢麝一字青黛三錢右同研勻毎三錢水煎入桃枝一握并葉五七枝温洗之勿浴背塗􅇟法麝一字蝎尾半錢薄荷葉半錢蜈蚣末牛黄末青黛末各一字右研勻熟棗肉劑為膏新綿上塗匀貼􅇟上四方可出一指許火上炙手頻熨百日裏外兒用此法謹按世俗週嵗上下小兒諸風搐證用浴體搯洗法得汗立效殊勝火灸葢艾有悞加於風熱陽癎也慎之局方敗毒散治小兒傷風身熱鼻塞方見熱門拔萃防風蒼术湯治小兒邪熱在表惡風風寒所傷防風半兩蒼术石膏各一兩甘草炙半兩川芎黄芩各二錢半右為粗末每二錢入薑薄荷葉煎升麻黄芩湯治小兒中風身熱頭項強自汗表不和也升麻葛根黄芩芍藥各五錢半甘草二錢半右㕮咀毎二錢水煎按此二方陽明經藥也大羌活湯治風熱方見寒門錢氏塌氣丸治脾風腹脹胡椒一兩蝎尾半兩右糊丸粟米大每五七丸至一二十丸按此宣風補脾藥也羌活膏見後驚劑全嬰方加減惺惺散治小兒傷風風熱及傷寒鼻塞發熱驚悸頭痛咳𠻳時行風熱蒼术川芎細辛羗活防風白芷天花粉甘草赤芍桔梗麻黄荆芥當歸薄荷右等分水煎一錢入薑按此太陽例藥也已上諸方宜隨諸經輕重選用殭蠶散治小兒中風不語失音闗鬲不通精神昏憒殭蠶半兩羌活一兩麝半錢右為末二嵗半錢薑汁少許調和湯浸服又以菖蒲末於舌根上頻用之桂菖散治小兒急中風失音不語桂心一兩石菖蒲一分右為末三嵗一錢水煎服若大病後不語者用猪膽汁調下未語再服按此二方出太陽例可見中風傷風例不同故録之治寒之劑仲景桂枝湯治感冐風寒身熱惡寒自汗麻黄湯治冐風寒身熱鼻塞寒慄無汗桂枝麻黄各半湯小青龍湯治感風寒脉緩發熱腹痛或利理中湯治感寒腹痛方並見寒門謹按世俗治傷寒多不本仲景初法矧小兒乎惟近代鄭友端集全嬰方於傷寒多採其例言桂枝湯自西北二方居人四時行之無不驗江淮間惟冬及春可行之自春末及夏以前桂枝證加黄芩一分謂之陽旦湯夏至以後有桂枝可加知母石膏各半兩或加升麻一分若病人素虚寒者正用古方不在加減也可謂得其㫖趣故兹寒例與夫變證法並見本論今不詳録但以變法一二附于左葛根升麻湯方見升麻湯右㕮咀水煎按此方陽明藥也世俗用治小兒傷風及發㿀瘡疑似之間者皆用之故收入然亦須審諦而行之可也故王海藏云活人言傷寒頭痛如破者連鬚葱白湯次又不已者葛根升麻湯恐太陽流入陽明用斷其路故以此湯主之地黄湯内如無犀角以升麻代之是知陽明藥非太陽藥也人或初病太陽證便與此湯是遺太陽不惟遺經反引太陽邪氣入陽明不能解也其變可勝言㢤故不可不慎之况小兒乎麻黄黄芩湯治小兒傷寒頭痛身壯熱無汗鼻塞目澁小便清者知不在裏可汗之麻黄三錢赤􅆚黄芩各一錢半甘草炙桂枝各半錢右為粗末水煎按此太陽例藥也惺惺散治傷寒時氣風熱痰壅欬𠻳氣不和桔梗細辛人參甘草炙白茯芩白术𤓰蔞根各一兩右為末每二錢水煎入薄荷五葉一方加防風川芎各一分按此少隂例藥也東垣麻黄升麻湯治小兒寒欎而喘喉鳴臍中鳴腹滿鼻流清涕脉沈急而數麻黄草荳䓻各一錢半益智仁一分半厚朴吳茱茰各二分甘草一分當歸尾升麻麯末蘇木各半分柴胡黄芩各一分紅花少許蝎二箇右㕮咀作二服水煎稍熱服按此太陽例藥也然有所兼之證故用是變法隨證加減之也治熱之劑錢氏瀉青丸治肝熱搐搦脉洪實當歸龍膽山梔川芎大黄羌活防風右等分蜜丸雞頭大毎服一丸按此瀉乙木之隂火藥也治風熱表裏之劑瀉心湯治心經實熱按此瀉丁火藥也瀉黄散治脾熱目黄口不能吮乳按已上治已土濕熱之藥風勝濕甘寒瀉火也與已上並治實熱之劑瀉白散治肺熱目黄口不能吮乳喘𠻳按此瀉肺邪之有餘補辛金之不足也導赤散治内熱小便赤黄心躁睡語按此治丙火藥也安神丸治邪熱驚悸面黄頰赤按此治心肺胃熱氣分藥也清鎮之劑已上方並見熱門地黄丸治疳熱腎虚瀉血失音身瘦目翳生疥解􅇟不合長大不行可服取效方見補虚門按此治癸水不足藥也地骨皮散治小兒肌熱白虎湯治小兒發熱而渇方並見熱門生犀散治小兒肌熱生犀地骨皮赤芍柴胡葛根甘草右㕮咀水煎按此少陽陽明藥也鱉甲飲治小兒骨熱潮熱盜汗鱉甲炙地骨皮秦芁柴胡枳殻炒知母當歸等分右㕮咀三嵗一錢水煎加桃栁枝各三寸烏梅一箇按此少陽厥隂藥也氣血之劑鎮心丸治内熱生驚痰盛甜硝一兩人參一兩甘草炙寒水石燒一兩半山藥茯芩各二兩硃砂一兩腦麝各一錢右為末蜜丸雞頭要紅入臙脂量兒大小與服按此手太隂少隂足陽明太陽藥也化毒丹治心胃内熱驚悸生熟地黄各五兩天門冬麥門冬去心焙各三兩𤣥參二兩甘草炙甜硝各二兩青黛一兩半右為末入硝煉蜜丸如雞頭大每半丸或一丸水下按此手足太隂少隂藥也甘露飲子治心胃熱咽痛口苦生瘡上攻牙齦腫方見熱門大黄丸方見傷風門絳雪丹治小兒諸熱陽盛發狂躁不安目赤煩渇芒硝一兩硃砂一兩右為末浸蒸餅為丸雞頭大三嵗兒一丸沙糖水化下無時按已上二方陽明例藥也易老羌活黄芩蒼术甘草湯治壯熱體重而瀉羌活黄芩蒼术甘草右等分㕮咀水煎服按此太陽陽明藥也陳氏人參清膈散治小兒潮熱自汗骨蒸人參柴胡當歸􅆚藥知母桑白皮白术黄茋紫苑地骨皮茯苓甘草桔梗各一兩黄芩半兩石膏滑石各半兩右為粗末每三錢水煎入薑按此手足太隂足少陽厥隂陽明藥也虚熱煩熱氣血皆可用謹按已上諸方姑隨輕重例因舉其槩至於食熱痰熱驚熱等候宜于後方内選用治濕熱攻下之劑錢氏牛黄奪命散治小兒肺脹喘滿胸高氣急兩脇扇動䧟下鼻張悶亂𠻳渇聲嗄痰涎潮塞俗謂之馬脾風者黒白牽牛各一兩半一半炒大黄檳榔各一兩右為末三嵗兒每服二錢冷溫水調下涎多加膩粉少許無時通膈丸大黄牽牛木通等分右為細末水丸粟米大每三五十丸量大小虚實與服按已上二方陽明例藥也治驚之劑宜與風癎門兼看錢氏凉驚丸草龍膽防風青黛各三錢鈎藤二錢牛黄麝各一字黄連五分龍腦一字右糊丸粟米大每三五丸金銀湯下按此治風熱之劑也局方天麻防風丸治小兒驚風身熱喘麄多睡驚悸手足搐搦精神昏憒天麻防風人參各一兩蝎尾炒半兩甘草硃砂雄黄各二錢半牛黄麝各一錢殭蠶炒半兩右為末煉蜜丸櫻桃大朱砂為衣每一丸薄荷湯化下按此治風癎通闗竅藥也三因方治陽癎驚風熱證面赤身熱發搐直視牙緊朱砂一錢膩粉麝半錢蘆㑹白附子甘草各二錢胡黄連一錢蝎梢七箇殭蠶七箇金箔七片赤脚蜈蚣一條炙右為末二嵗已上服半錢金箔薄荷湯下按此治風熱痰之劑透闗通經絡藥也全嬰方睡紅散治小兒急慢驚風手足搐搦目瞪神昏牛黄硼砂腦子真珠水銀砂子各半錢青黛蝎尾炒京墨燒南星半夏同上姜製一夕蛇含石淬各一錢金銀箔各十片麝香一字烏蛇尾并項下七寸並酒浸一宿取出去皮骨炙一錢右為末三嵗一字薄荷湯下按此治風熱痰藥通闗透肌骨之劑也非風邪下䧟者不可輕用東垣硃砂安神丸方見熱門按此寧心清神凉血之劑也謝氏奪命丹治急驚不省人事眼定不動牙闗不開唇白并黒者南星半夏各四錢為末並以生姜汁和作餅子晒乾真珠新白者二錢巴豆去油浄一錢硃砂四錢金箔銀箔各十片輕粉麝各半錢右九味各為末和匀飛羅麫打糊為丸如黍米大毎一嵗兒一丸燈心湯下比金丸治小兒風熱丹毒急慢啞驚前奪命丹中减去金銀箔加真欎金末三錢丸如上法利驚丸前比金丸中去欎金加腦子半錢白頸蚯蚓一條用刀截斷首尾兩頭齊跳者用之去土秤二錢丸服如上法按此三方導痰藥也白餅子加減法按已上諸方治陽癎之藥不問急慢但係陽證諸熱者宜隨表裏輕重擇用之錢氏温驚丸天南星為末入臘月牛膽中百日隂乾為末四兩硃砂一錢天竺黄一兩坯子臙脂片腦各一錢右用牛膽汁和丸雞頭大每一丸小者半丸沙糖水化下羌活膏治脾胃虚肝氣熱盛生風或吐瀉後成慢驚者羌活川芎人參白附子赤茯芩各半兩天麻一兩殭蠶炒乾蝎炒白花蛇酒浸焙各一分川附子炮防風麻黄各三錢肉豆􅅳母丁香藿香葉沈香木香各弍錢輕粉一字真珠末牛黄各一錢半龍腦半字麝一錢雄黄辰砂各一分已上七味各另研右為細末熟蜜劑旋丸大豆大每服一二丸食前薄荷湯或麥門冬湯下三因方治隂癎慢驚黒附子剉去皮南星生半夏各二錢白附子一錢半右研細井花水浸七日每日換水浸控乾入朱砂二錢麝一錢拌匀毎服一字薄荷湯下量大小與服或丸如粟米大每二十丸薄荷湯下此白丸子方也因分兩不同故兩存之經驗方保生錠子治急慢驚風蛇含石四兩火煆醋淬十數次研為極細末南星一兩先泡細切再炒白附子去皮一兩硃砂三錢另研極細麝一錢右為細末用糯米粉煑作餅搗和前藥令匀作錠子臨用薄荷湯濃磨汁服一二口全嬰方麝香餅治小兒急慢驚風進退不定荏苒經日乍靜乍動嘔吐痰涎潮搐甚者宜此麝香蝎尾去毒蜈蚣二條酒浸酥炙南星炮川烏炮白花蛇酒浸一夕去骨皮焙已上各半兩乳香鉄粉硃砂牛黄各一錢右為末酒煑糊丸如雞頭大拈作餅子三嵗兒一餅用薄荷湯下按此厥隂例藥也非風在闗竅肯綮者不可用義見中風門通闗透骨例全蝎散治小兒急慢驚風潮作不定心肺中風蛇頭一箇酒浸蜈蚣一條酥炙蝎一錢草烏一箇去皮尖麻黄去節一錢朱砂一錢腦麝各一字右為末一嵗一字薄荷湯下奪命散治小兒急慢驚風諸藥無効者一服見效白附子黒附子炮南星炮天麻防風半夏炮麻黄去節朱砂蝎新薄荷葉褁姜汁蘸炙三兩次各一錢右入麝香半錢為末三嵗半錢薄荷薑汁更入酒些小熱湯共調下按此二方太陽例藥也鈎藤飲子治吐利脾胃氣弱虚風慢驚鈎藤三分蟬殻防風人參麻黄去節殭蠶炒天麻蝎尾炒各半兩甘草炙川芎各一分麝一錢另研右同為細末每服二錢水煎量多少與之寒多者加附子半錢按此升陽越脾氣藥也寧心膏治小兒精神不定恍惚不寜恐畏多哭驚魘人參白术白茯芩茯神山藥羌活甘草炙各一錢朱砂一錢腦麝各一字右為末煉蜜丸如雞頭大二嵗一丸薄荷湯化下按此養氣䟱風清神之藥也寳鑑天麻散治小兒急慢驚風其效如神半夏七錢天麻二錢半甘草炙白茯芩白术各三錢右水一盞入磁器内煑水乾將生薑三錢同煑候乾為末每服一錢半薑棗湯調下按此溫脾養胃之劑非止於䟱風勝痰藥也大抵小兒血氣未充體虚者多或因病後致者宜與此調理而不為峻劑下䧟轉成壊證者此三方則庻㡬矣謹按已上諸方治隂癎不問急慢驚但係隂證宜隨表裏輕重選用則半隂半陽慢脾之法例在其中矣經驗方啑驚開闗散牙闗緊急者用之㗜鼻并擦牙蜈蚣一條炙直殭蠶炒南星各一錢麝一字猪牙皂角一定畧燒存性右各為末研極細少許搐鼻如欲擦牙者用生薑汁蘸藥擦牙上全嬰方探生散治小兒急慢驚風諸藥無效者吹鼻定死生沒藥䧺黄各一錢乳香半錢麝一字右為末少許吹鼻如眼泪鼻涕俱出者可治按此二方捷啑藥也吐風散治小兒急中風口噤不開不省人事全蝎一箇炒𤓰蒂十箇炒赤小豆三十粒右為末一嵗一字温米飲調下未吐再服碧雲散治小兒急風卒中涎潮氣粗不省人事石碌四錢輕粉一錢右為末每一字薄荷湯下酒少許同調下良久先吐後利一方以銅青為末醋糊丸如雞頭大每一丸薄荷湯磨下須㬰吐涎似膠以手拽出神效天霜散治小兒急中卒風并急驚口噤搦搐涎盛昏塞不語辰砂粉霜輕粉南星炮各半兩蝎尾白附子藿香葉各一錢右為末一嵗半字薄荷湯調下茶亦得未吐再服按已上三方宣劑也宜選用然此方吐中兼汗下也錢氏利驚丸治小兒急驚風涎盛發熱潮搐青黛輕粉各一錢牽牛半兩天竺黄二錢右為末白糊丸如小豆大二十丸薄荷湯下按此下濕熱痰之劑也全嬰驅風膏治小兒肝風筋脉拘急面紅目青眼上驚搐及胎風辰砂蝎尾當歸龍膽草川芎山梔大黄羌活防風甘草各一錢右為末入麝香一字煉沙糖丸如雞頭大三嵗一丸薄荷竹葉蜜湯化下按此下風熱之劑也珍珠丸治小兒急慢驚風發搐涎潮壯熱及痰嗽壅塞白附子滑石巴豆十五箇去油輕粉南星各一錢右為末糊丸如小豆大三嵗一二丸葱白湯下按此下食痰𨗳滯之劑也白餅子加減法通闗散治小兒驚風已退聲不能言右以南星大者炮為末三嵗一錢猪膽汁調下嚥入喉中便能言灸驚風法附臍風撮口法寳鑑云小兒急驚風灸前頂一穴在百㑹前一寸若不愈須灸兩眉頭及人中一穴各三壯如小麥大小兒慢驚風灸尺澤穴各七壯在肘中横紋上動脉中炷如小麥大初生小兒臍風撮口諸藥不效者取然谷穴在内踝前踝骨下䧟中可灸三壯針入三分不宜見血立效小兒癲癎瘈瘲脊强互相引灸長强穴二十壯在脊骶端跌地取之乃得小兒癲癎驚風目眩灸神庭一穴七壯在鼻直上入髮際五分小兒風癎者先屈手指如數物乃發也灸鼻柱入髮際宛宛中灸三壯如小麥大小兒驚癎先啼怖啼呌乃發也灸頂上旋毛中三壯及耳後青脈旺如小麥大治痰涎之劑青州白丸子南星三兩半夏七兩白附子二兩川烏半兩各生用右為末絹袋盛井水擺盡為度别換水浸三五日晒乾糯米粉丸按此治寒痰風痰藥也抱龍丸治風痰壅盛驚搐昏睡雄黄辰砂天竺黄各四錢麝香一錢牛膽南星八錢入臘月牛膽中隂乾百日内用如無生者水浸二日焙用右為末煑甘草糊丸如皂子大三嵗一丸量大小與服薄荷湯下按此治風痰熱痰藥也宣風散㯽榔二箇陳皮甘草各半兩牽牛四兩半生半熟右為末每一錢量大小與服湯調下按此下濕痰之劑也褊銀丸治風涎膈實上熱及乳食不消脹氣喘巴豆半兩去油研好墨八錢燒醋碎水銀半兩黒鉛一錢半與水銀結砂子麝香半錢别研右將巴豆末并墨再研和勻入砂子等陳米粥和丸如菉豆大捻作餅子一嵗一丸薄荷湯下按此下食痰癖積藥也謹按小兒多痰熱宜用抱龍丸與化毒丹等兼服故兹例不多錄治内傷及癖積之劑錢氏白餅子治腹中有癖但飲乳𠻳而吐痰涎方見痰飲門按此下痰積食積藥也義見痰飲門消積丸丁香九箇砂仁十二箇巴豆二箇去油烏梅肉三箇右為末麫糊丸黍米大三嵗已上三五丸已下三二丸温水下消堅丸消乳癖及下交妳又治痰熱膈實取積硇砂末巴豆去油淨輕粉各一錢水銀砂子兩皂子大黄明膠末五錢右同研勻入麫糊丸如麻子大倒流水下一嵗兒一丸食後服按此二方有寒熱輕重之分宜選用後法同寳鑑三稜煎丸治小兒飲食過多痞悶疼痛宿食不化久而成癖廣术黒角者荆三稜二味濕紙褁煨為末各一兩大黄去皮八兩右將大黄為末石器内以好醋浸令透慢火熬成膏和二藥為丸麻子大或菉豆大每一二十丸食後温水下鱉甲猪肚丸治癖發熱鱉甲九肋者七錢醋煑黄色青蒿黄連各七錢青皮枳實炒木香各半兩柴胡一兩右細末猔猪肚一箇去脂貯藥蒸熟同和梧子大毎一三十丸食後人參湯下廣术化癖丸治乳食不消心腹飽脹壯熱喘麄嘔吐痰逆食癥乳癖代赭石醋淬當歸朱砂研枳殻炒廣术炮荆山稜炮各半兩木香一兩麝香巴豆去油各一分右末研勻糊丸如麻子大毎一嵗兒二丸米飲下灸癖積法寳鑑云治小兒癖氣久不瘥中脘一穴章門二穴在大横外直臍季脇端側卧屈上足舉臂取之各灸七壯臍後脊中灸二七壯治小兒脇下滿瀉利體重四肢不收痃癖積聚腹痛不嗜食寒熱取脾俞二穴在第一顀下兩旁相去各一寸五分可灸七壯又治腹脹黄疸可灸三壯治瀉痢之劑錢氏白术散藿香葉白术木香白茯苓甘草人參各一錢乾葛二錢右為末每一錢至二錢水煎服異功散四君子湯加陳皮一方只用參术甘草三味名温中湯按此二方補脾湯加減法也益黄散陳皮一兩青皮訶子肉甘草炙丁香二錢右為細末每二錢水煎服沒石子丸木香黄連各二分沒石子一箇豆蔲仁二箇訶子肉三箇右為末飯丸麻子大米飲下十五丸量大小與之按此二方兼止澁藥也五苓散治瀉而渇方見濕門羌活膏治小兒洩瀉發搐方見前温白丸治小兒脾氣虚困洩瀉瘦弱冷疳洞利或驚天麻半兩殭蠶炒白附子乾蝎南星浸各一錢右為末浸寒食麫為丸如菉豆大每五七丸至二三十丸姜湯下仍於寒食麫内養七日取出迴生散治小兒吐瀉大南星八九錢已上者右用地坑子一箇深三寸燒赤入好酒半盞下南星卻用炭火三兩條盖候南星㣲裂取出剉再炒放冷為細末每半錢或一字濃煎生薑防風湯調下按此二方升肺脾之氣藥也金液丹治吐利日久脾胃虚損手足厥逆神昏睡多露睛口鼻氣冷欲成慢驚或身冷脉㣲自汗小便不禁舶上硫黄十兩去砂石為末砂合子盛八分滿水和赤石脂封縫塩泥固濟晒乾再入水罐内泥固濟火煆過候冷右於乳鉢内研為細末水浸蒸餅丸桐子大或如菉豆大每五十丸至百丸米飲下按此厥隂例藥也玉露散治傷熱吐瀉黄色寒水石石膏堅白者各半兩生甘草一分右同為細末每服半錢或一錢温湯調下按此陽明例藥也豆􅅳香連丸治洩瀉腹痛腸鳴黄連三分炒肉豆􅅳木香各一分右為細末粟米飯丸米粒大每服十丸至二三十丸日夜各四五服米飲下二聖丸治小兒臟腑或瀉或好久不愈黄連黄栢去皮各一兩右為末入猪膽内煑熟丸如菉豆大每二三十丸米飲下按此解毒湯變法也與前方不同宜選用羌活黄芩蒼术甘草湯治壯熱體重而瀉方見前茯苓半夏湯治風瀉而嘔方見痰飲門東垣升陽益胃湯方見補虚門湯氏助胃膏治小兒氣虚乳食不進腹痛洩瀉腸鳴陳皮山藥各四兩甘草炙砂仁白茯苓藿香桂各二兩肉果人參木香丁香白豆蔲各一兩右為末煉蜜丸和成膏每服雞頭大量大小與之按此出太陽例冬月時令中藥局方水浸丹治伏暑傷冷冷熱不調霍亂吐利煩渇巴豆大者二十五箇去皮研細去油盡黄丹一兩炒右研勻用黄蠟鎔汁為丸如梧子大每一丸以水浸少頃别以新水吞之量大小與服按此足陽明藥也小香連丸治熱痢腹痛木香訶子各一分黄連半兩右為末飯和丸菉豆大米飲下十丸至二三十丸頻服之胃風湯方見洩瀉門全嬰方訶梔散治小兒純下血痢腹痛訶子半兩燒去核梔子仁一錢半右為末三嵗半錢米湯調下食前按此治熱之劑也桃花丸治小兒赤白痢腹痛赤石脂川乾薑炮等分右為末糊丸如小豆大三嵗三十丸米湯下按此治寒之劑也澁腸丸治小兒下痢赤白後重頻併龍骨海螵蛸訶子炮去核等分右為末糊丸如小豆大三十丸米湯下按此止澁之劑也東垣厚腸丸治小兒乳食不能尅化或生腹脹瘦弱痢瀉無常色橘皮三分大麥麫半錢半夏三分枳實半錢蒼术三分青皮二分人參三分厚朴二分麯末半錢右為細末煑糊為丸如麻子大每二十丸温水下食前按此足陽明太隂藥也按已上諸方姑偹其例宜兼㸔㵼痢二門而分治之治咳𠻳之劑麻黄湯治傷風咳嗽喘急無汗方見寒門按此治風寒之劑也敗毒散治時氣咳𠻳方見前按此治風温之劑也紫苑散治小兒咳𠻳上氣喉中水雞之聲射干紫苑欵冬花各三錢麻黄四錢細辛二錢半夏一錢五味子六錢右㕮咀三嵗兒一錢水煎入薑棗少許百部飲治小兒喘𠻳日夜不得睡目鮮如突出之狀百部生薑各八錢細辛甘草各三錢貝母白术五味子各二錢桂心四錢麻黄二錢右㕮咀三嵗兒一錢水煎按此二方太陽例藥宜分輕重選用紫蘇子散治小兒欬逆上氣因乳哺無度内挾風冷傷肺氣或啼未定與乳乳與氣相逆不得下蘇子訶子蘿白子杏仁炒木香人參各二錢青皮甘草各一錢半右為末每一錢水煎入薑量大小與服按此下氣𨗳痰藥也葶藶丸治乳食衝肺咳嗽面赤痰喘甜葶藶隔紙炒黒牽牛炒漢防己杏仁炒各一錢右為末入杏仁泥取蒸陳棗肉和再搗為丸如麻子大每五丸至七丸生薑湯下按此下濕之劑也全嬰方雄朱丸治小兒咳嗽有痰潮熱雄黄一錢半巴豆七粒半夏半兩右為末糊丸小豆大一嵗二丸姜湯下按此𨗳風痰濕痰乳癖藥也潤肺散治小兒涎𠻳不已氣急煩渇麻黄二錢甘草一錢人參知母各二錢半陳皮一分桔梗阿膠炒百部各半錢右為末三嵗一錢水煎按此手太隂足太陽藥也人參丸治小兒欬嗽有痰氣急惡心人參半夏白术川姜南星炮右等分為末姜糊丸小豆大三十丸姜湯下按此手足太隂藥也參杏膏治小兒久新咳𠻳氣急惡心有痰咯血人參阿膠杏仁炒欵冬花五味子甘草訶子貝母右等分為末煉蜜丸雞頭大三嵗兒一丸白湯下補肺散治小兒久患欬嗽氣急有痰阿膠糯米各一兩馬兠鈴甘草各半兩杏仁七十粒大力子一分右㕮咀三嵗兒一錢水煎服按此二方手太隂之的藥也瀉肺散治小兒肺氣熱盛而欬方見熱門瀉白散治嘔吐之劑茯苓半夏湯方見前瀉劑迴生散治小兒吐瀉方見前異功散方見前瀉劑藿香散治脾胃虚有熱面赤嘔噦麥門冬半夏甘草炙石膏各半兩藿香一分右為末每半錢至一錢水煎入薑全嬰方消食丸治小兒生冷傷脾腹痛惡心即局方小七香丸拔萃定吐紫金核半夏末製人參白术木香丁香藿香各二錢半右為末稀糊為丸如李核大後用沈香硃砂各一錢研勻為衣隂乾每一丸棗湯磨下謝氏燒針丸専主吐逆府丹不拘多少右件研極細去皮小棗肉和劑為雞頭大每用針簽於燈上燒灰為末乳汁下一丸按此亦刼劑也已上方唯藿香散出陽明例藥餘温劑宜隨輕重選擇出理中例治疳之劑錢氏木香丸治小兒疳瘦腹大木香青黛㯽榔豆蔲各一分麝香一錢半續隨子一兩蝦蟇三箇燒存性右為末蜜丸菉豆大每三五丸至一二十丸薄荷湯下按此手足太隂藥也六味地黄丸治小兒疳瘦不行解顖骨熱方見補虚門全嬰方蘆薈丸治小兒疳氣腹急骨熱蘆薈木香檳榔各一分黄連一兩蕪荑去皮青皮陳皮各半兩巴豆三七粒同上四味炒黄去豆蝦蟇酒浸炙黄去骨一兩右為末猪膽丸小豆大三嵗三十丸米湯下按此手少隂手足太隂藥也蒸雞丸治小兒疳癆骨蒸潮熱盗汗瘦弱腹急面黄食不生肌肉黄連二兩柴胡一兩蕪荑鶴虱各半兩秦芁知母紫芩史君子去殻炒各一兩右為末黄雄雞一隻重一斤籠之専以大麻子飼之五日後去毛及腸肚淨入前末子以綫縫之取小甑子先以黒豆鋪甑底三寸安雞四旁及上黒豆葢之早蒸至晩取肉研和硬入酒糊丸如小豆大二嵗二十丸加減與之米飲下忌猪肉按此手少隂足少陽藥也肥兒丸截疳殺䖝治腹脹消食史君子肉蘿白子各二兩小紅棗肉一兩糖毬子末飛羅麫各二兩右取好黄土和作一爐墩子内底下蘿白片鋪一層次將史君子肉鋪在當中次又鋪蘿白一層上安棗肉葢於上以泥封固其外以炭火煆至内三物熟爛了取出以飛麫毬子末和勻丸如麻子大量兒大小與服米飲下按此足陽明太陽藥也五疳消食丸消疳殺䖝退熱磨積進食史君子肉炒麥蘖炒陳皮麥麯炒蕪荑草龍膽黄連炒糖毬子等分右為細末陳米飯為丸如黍米大每十丸米飲下按此手少隂太隂藥也然疳證自有虛實積熱等致不同已上諸方未能以盡其變學者自宜推格治之治瘡疹之劑升麻湯治小兒瘡疹未出發熱升麻葛根芍藥甘草右㕮咀水煎按此足太陽陽明藥也錢氏四聖散治瘡疹出不快紫草木通甘草炙枳殻炒右等分為粗末每一錢水煎服陳氏加黄茋按此足陽明手太隂藥也調肝散治瘡疹大盛宜服此令瘡不入眼生犀二錢半龍膽草一錢黄茋半兩大黄二錢桑白皮半兩炒鈎藤子各一錢石膏半兩麻黄𤓰蔞甘草右為粗末每二錢水煎服食後按此手太隂足陽明藥也内外實者非此不可化毒湯治豆瘡已出不快紫草茸升麻甘草炙等分右㕮咀入粳米五十粒水煎按此足陽明藥也鼠黏子湯治豆瘡欲出未能得透皮膚熱眼赤心煩咽嗌不利鼠黏子炒四錢荆芥穗二錢甘草一錢防風半錢右為細末沸湯㸃服去防風名消毒散按此太陽少陽藥首論温平者此也活血散治豆瘡出不快白􅆚藥炒一錢右為末酒調服腹痛温熱水調下按此正的太隂藥也海藏云張和之治四肢出不快加防風大效犀角地黄湯治瘡疹出太盛便血或鼻衂犀角一兩生地黄二兩赤􅆚三分牡丹皮一兩右㕮咀三歲兒一二錢水煎服按此足太隂少隂手太隂藥也葛根麥門冬散治小兒熱毒班瘡出多心神煩悶葛根麥門冬各三錢人參二錢石膏半兩升麻甘草茯苓各二錢赤􅆚一錢右㕮咀每三錢水煎服按此足陽明手太隂藥也連翹散治瘡痘發熱連翹防風梔子甘草右為末水煎按此治熱在外而不厥少陽藥也如聖飲子治瘡疹毒攻咽嗌腫痛桔梗甘草鼠黏子炒各一兩麥門冬半兩右為末竹葉同煎二三錢按此手太隂少隂藥也解毒防風湯防風地骨皮黄茋􅆚藥荆芥枳殻鼠黏子各半兩右為粗末每服四五錢水煎按此手足太隂藥也真牙湯治㿀瘡黑陷者人牙二枚燒存性入麝香少許右為末用紫草升麻湯調下御藥院方無價散治㿀瘡不出黑陷欲死者人猫猪犬糞臘月内燒為灰右為末每一字蜜湯調服量大小與之按此二方刼劑也當歸丸治瘡疹能食而大便秘當歸半兩甘草一錢黄連大黄各二錢半右將歸熬膏子入下三味末為丸漸加服至利為度按此足陽明厥隂藥也棗變百祥丸紅牙大戟去骨一兩青州棗去核三十箇右用水一碗同煎至水盡為度去大㦸不用將棗焙乾可和作劑從少至多服至利為度按此足少隂藥也陳氏異功散治小兒痘瘡欲靨之際頭温足指冷或腹脹㵼渇氣促或身不壯熱悶亂不寜臥則哽氣煩渇咬牙木香三錢半官桂二錢當歸三錢半人參二錢半茯苓二錢陳皮厚朴二錢半白术二錢半夏一錢半丁香肉豆􅅳二錢半附子一錢半右為粗末每二三錢水煎入薑棗按此足太陽少隂厥隂手足太隂藥也謹按已上瘡疹諸方有升散補脾凉血㵼火清神攻下温中補刼之法不同學者自宜取擇局方凉膈散治瘡痘已出發熱作渇脈實悶亂便實者方見火門謹按瘡瘍已發有寒熱温凉不同形氣虛盛之異己上二方宜對脈證選用有起死迴生之効也足陽明藥地骨皮鼠黏子湯本方加地骨皮桔梗甘草鼠黏子湯桔梗甘草梔子湯防風􅆚藥甘草湯並三味治證見前升麻加紫草湯升麻湯加紫草荆芥甘草防風湯三味治證見前紫草甘草枳殻湯四聖散减木通連翹防風湯前連翹散减梔子並治證見前論玉機微義卷五十
