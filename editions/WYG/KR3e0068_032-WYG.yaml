  text: 欽定四庫全書
  hash: sha256:64d9ff2e7643d8cd3464e7f4c9e75c7d6d85eb6ee80c540d6dcbeeab187b9ddc
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3e0068_WYG_032-1a, image: WYG0762/WYG0762-0397c.png}
body:
  text: 玉機微義卷三十二明徐用誠原輯劉純續増腹痛門内經敘腹痛所因舉痛論云寒氣入經而稽遲泣而不行客於脉外則血少客於脉中則氣不通故卒然而痛其痛或卒然而止者或痛甚不可按或按之痛止或按之無益或喘動應手者或脇肋與少腹相引而痛者或腹痛引隂股者或卒然痛死不知人少間復生者或痛而嘔者或腹痛而後泄者或痛而閉不通者各不同形按本論具已上病形異候皆寒氣所因甚詳宜玩本文唯痛而閉不通為熱氣留於小腸腸中痛癉熱焦渴則堅乾不得出為熱痛此述病機寒熱皆能為痛也蓋寒痛者多熱痛者少脉法脉經曰脉細小𦂳急病速進在中腹中刺痛隂弦則腹痛弦急小腹痛尺脉𦂳臍下痛尺脉伏小腹痛癥疝尺脉實小腹痛當利之心腹痛痛不得息脉細小遲者生堅大疾者死腹痛脉反浮大而長者死傷寒論曰傷寒脉陽澁隂弦腹中急痛裏有虚寒論傷寒腹痛成無已云隂寒為邪者則腹滿而吐食不下自利益甚腹自痛太隂證也發汗不解醫反下之因而腹滿時痛者屬太陽也桂枝加芍藥湯主之大實痛者桂枝加大黄湯主之東垣曰腹中諸痛皆因勞役過甚飲食失節中氣不足寒邪乗虚而入客之故卒然而作大痛經言得炅則止炅者熱也以熱治寒治之正也然腹痛有部分臟位有高下治之者宜分之按已上脉證言諸虚痛矣然邪傳入裏熱結下焦實滿血結硬痛皆實痛也脉經云腹滿按之不痛為虚痛者為實此述病機虚實之異又兼部分高下言也論腹痛為隂毒所致詳見寒門論腹痛屬熱原病式曰熱鬱于内而腹滿堅結痛者不可言為寒也按丹溪曰腹痛有積熱者或死血食積濕痰皆能作痛脉弦者食脉滑者痰清痰多作腹痛宜分治之詳已上蓋言寒熱之分故此論及已後病例皆不之及論腹痛屬血成無已曰邪氣聚於下焦則津液不得通血氣不得行或溺或血畱滯於下是生脹滿而鞕痛也若從心下至少腹皆鞕滿而痛者是邪實也須大䧟胷湯下之若但少腹鞕滿而痛小便利者則是畜血之證小便不利者則是溺澁之證論腹痛為疝所致見疝門論腹痛為瀉痢詳見滯下等門論腹痛為積聚所致見積聚門論腹痛為腸癰所致見瘡瘍門論治腹痛大法此事難知曰傷寒中脘痛太隂也理中建中黄茋湯之類臍腹痛少隂也四逆真武附子湯之類少腹痛厥隂也重則正陽囬陽丹之類輕則用當歸四逆湯太隂連少隂痛甚者當變下利不止雜證而痛四物苦楝湯酒煮當歸丸之類夏月腹痛肌熱惡熱脉洪疾手太隂足陽明主之黄芩芍藥湯秋腹痛肌寒惡寒脉沉疾足太隂足少隂主之桂枝芍藥湯四時腹痛芍藥甘草湯主之按此治法本傷寒與夫寒疝時行治例也然學者觀已上諸病機則脉治思過半矣腹痛治法温散之劑桂枝加芍藥湯治腹滿時痛脉弱按此太隂例藥也理中丸治霍亂頭疼身寒腹痛方並見寒門小建中湯治傷寒陽脉濇隂脉弦腹中急痛者方見補虚門按已上太陽例藥也真武湯治腹痛下利四肢沉重方見寒門四逆湯治傷寒下利腹痛四肢逆冷甘草二錢附子數大片乾薑三錢右㕮咀水煎服霹靂散治腹痛脉欲絶附子一枚炮取出用冷灰培之取半兩入真臘茶一大錢同研細分二服每水煎臨熟入蜜半匙候温冷服桃花湯治腹痛下利膿血小便不利赤石脂一兩乾薑一錢粳米一合右末水煎服按已上少隂例藥也當歸四逆湯治傷寒小腹急痛方見寒門按此厥隂例藥也踈下之劑仲景桂枝加大黄湯治腹滿時痛煩躁桂枝生薑各三錢芍藥六錢大黄一錢甘草二錢大棗二枚右㕮咀水煎大陷胷湯治潮熱煩渴從心下至少腹硬滿而痛不可近大黄六錢芒硝一合甘遂一分右先煮大黄去滓内硝再煮後下甘遂末温服按已上太陽例藥也大承氣湯治闗脉實腹滿大便秘按之痛或繞臍痛大黄厚朴枳實芒硝右㕮咀水煎按此陽明例藥也和解之劑黄連湯治胷中有熱胃中有邪氣腹中痛欲嘔吐者用此升降隂陽黄連甘草炙乾薑桂枝各三錢人參二錢半夏半合右㕮咀水煎入大棗二枚芍藥甘草湯白芍藥甘草炙右等分㕮咀水煎入生薑元戎云腹痛脉弦傷氣用本藥脉洪傷金加黄芩脉緩傷水加桂枝脉濇傷血加當歸脉遲傷火加乾薑按已上並太陽例藥也加減小柴胡湯治寒熱脉弦腹中痛本方去黄芩加芍藥四逆散治寒邪變熱傳裏小便不利腹中痛或泄利甘草炙枳實炒柴胡芍藥右等分每半兩水煎黄芩芍藥湯治腹痛脉洪黄芩白芍甘草右㕮咀水煎加生薑按已上並少陽例藥也雜方元戎四物苦楝湯治臍下虚冷腹痛四物湯四兩𤣥胡苦楝各一兩炒右㕮咀水煎服每服一兩酒煮當歸丸治小腹下痛當歸一兩茴香半兩附子良薑各七錢右四味酒煮乾再焙炒黄鹽丁香各半兩全蝎二錢柴胡二錢升麻木香各一錢苦楝半錢甘草炙半錢𤣥胡四錢右酒煑糊丸梧子大每二三十丸空心白湯下増損當歸丸治三隂受邪心腹㽲痛四物湯半兩防風獨活全蝎各五錢續㫁茴香各一兩苦楝𤣥胡各七錢木香丁香各二錢半右末酒糊丸梧子大每四五十丸白湯下苦楝丸治奔豚小腹痛苦楝茴香附子右三味酒煮焙乾末之每兩入𤣥胡半兩全蝎炒丁香各十八箇為末酒糊丸桐子大每五十丸食前温酒下熨法見寒門廻陽丹治隂毒牡蠣燒不灰木燒良薑炒川烏炮白芍各一錢麝少許右細末每用一錢男病用女唾津調塗外腎女病用男唾調塗乳上謹按已前諸方皆傷寒例法也餘屬血屬積聚屬疝等因作痛方例見各門兹不備錄玉機微義卷三十二
