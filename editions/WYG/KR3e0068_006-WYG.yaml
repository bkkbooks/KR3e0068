body:
  text: 玉機微義卷六明徐用誠原輯劉純續増泄瀉門此門宜與滯下㸔瀉痢生死脉法内經云脉細皮寒少氣泄利前後飲食不入是謂五虚死其漿粥入胃泄注止則虚者活脉經云洩注脉緩時小結者生浮大數者死又洞洩食不化不得留下膿血脉㣲小連者生𦂳急者死脉訣云下利㣲小即為生脉大浮洪無差日仲景治利大法東垣治利大法按此並見滯下門瀉分寒熱病機機要云藏府瀉利其證多種大抵從風濕熱論是知寒少熱多寒則不能乆也故曰暴瀉非陽乆瀉非隂大便完榖下有寒有熱熱者脉疾身多動音聲響亮暴注下廹此陽也寒者脉沉而細身不動作目睛不了了飲食不下鼻凖氣息者姜附湯主之若身重四肢不舉术附湯主之按此以瀉之乆暴分隂陽正如傷寒之病始為寒而終則𫝊變而為熱也然亦必以脉證參訂焉原病式曰瀉白為寒青黄紅赤黒皆以為熱也大抵瀉利小便清白不洽為寒赤色者為熱又完榖不化而色不變其利脾氣虚弱畏泠小便清白不澁身涼不渇脉遲細而㣲者寒也榖雖不化而色變非白煩渇小便赤澁者熱證也凡榖消化無問色及他證便為熱也寒泄而榖消化者未之有也或火性急速𫝊化失常榖雖不化而飱泄者亦有之矣仲景云邪熱不殺榖然熱得濕則飱泄也論瀉痢有濕有熱有風有寒機要云有太隂經受濕而為水泄虚滑身重微滿不知穀味久則防變而為膿血脾經𫝊腎謂之賊邪故難愈若先利而後滑謂之微邪故易痊此皆脾土受濕之所為也有厥隂經下痢不止其脉沉而遲手足厥逆涕唾膿血此難治宜麻黄湯小續命汗之此有表邪縮於内當瀉表邪而愈有暴下無聲身冷自汗小便自利大便不禁氣難布息脉㣲嘔吐急以重藥温之漿水散是也論暴注屬火子和云夫暴注瀉水不已内經曰注下也注下水利也暴速甚者屬火宜用氷調桂苓甘露飲五苓益元散或以長流水煎放冷服凉膈通聖亦能治之慎不可驟用嬰粟殻乾薑豆􅅳之類縱瀉止亦轉生他疾止可分隂陽利水道而已按以上所論辨寒熱風濕火等證所以明六滛之邪皆能為瀉為注者亦當各隨所滛之邪分而治之可也論胃氣下降為飱泄機要云夫脾胃同濕土之化主腐熟水穀胃氣和平飲食入胃精氣則輸於脾土歸於肺行於百脉而成榮衛若飲食一傷起居不時損其胃氣則上升精華之氣反下降是為飱泄久則太隂轉少隂而為腸澼論春傷於風夏必飱泄機要云春宜緩形形緩動則肝木乃榮反靜密則是行秋令金能制木風内臟夏至則火盛而金去獨火木旺而脾土損矣輕則飱泄脉泄穀不化重則下痢膿血稠粘良方云經云春傷於風夏必飱泄葢風喜傷肝春時木旺不受邪反移氣尅於脾土脾既受尅不能運化因成積滯夏秋之間再感暑濕風冷之氣發動而成痢也論飱泄屬風宜汗子和云飱泄不止完穀不出發汗可也桂枝麻黄湯主之此證以風為根葢風隨汗出也按飱泄證機要謂胃氣下流及春行秋令良方謂春木旺移氣尅脾二論雖殊要之皆因風木𫝊變而脾土受邪爾子和謂風隨汗解此論固是然亦須隨其𫝊變而治不可執此一法也瀉分三因三因嚴氏云泄瀉一證經中所謂洞泄飱泄溏泄溢泄濡泄米穀注下是也所因有内外不内外差殊耳經云春傷於風夏必飱泄又云濕勝則濡泄寒甚則為泄暑熱盛之亦為泄至於七情感動臓氣不平亦致溏泄其如飲食不節過食生冷而成泄瀉者乃脾胃有傷也但停滯泄瀉一證直須積滯已消然後用以斷下藥今人徃徃便固止之多成痢疾者矣治法先理中焦次分利水穀治中不效然後斷下按此三因所分甚詳但外所滛者既六而立方止有其二内之七情為證而又不詳及於治法治瀉痢用吐下汗三法子和云一僧臟腑不調三年不效此洞泄也以謀慮不决而成肝主謀慮甚則乗脾脾濕不流乃上湧痰半盆又以丹車丸濬川散下數行仍使澡浴出汗自爾日勝一日常以胃風湯白术散調養之按子和為治大率多用此三法洞泄一證縱其果有積滯鬱結之甚元氣壯實者亦不宜驟用此三法况有積滯雖甚而元氣尤虚者哉設使果當用此三法者亦當如仲景察證以辨其吐汗下者有可不可下之殊况仲景治痢又有合下合温之法焉此得非孟浪乎丹溪論局方用熱藥澁藥治痢之誤按此見滯下門謹按泄瀉一證古方率以為腸胃虚寒與風冷乗之為論故多行澁熱之劑彼瀉痢者豈無積滯豈無熱證乎今觀病機機要所論有屬寒屬風濕屬火之證此因於外而傷者也又云厥隂經動并胃氣下降為瀉痢三因所言七情感動臓氣不平亦致溏泄此則因於内而傷者也外則當調六氣内則當平五臟况又有飲食所傷腸胃停滯所致者治法各不同也然更有因胃氣下流而泄者在法則當升舉因風而成飱泄者則當解散因痰積於上焦以致大腸之不固而泄者又當去上焦之痰而不治其瀉因脾胃氣虚而泄者又當補中益氣使胃氣升騰而泄自止葢各求其本而治可也泄瀉治法治濕之劑機要白术芍藥湯治太隂脾經受濕水泄注下體重微滿困弱無力不欲飲食暴泄無數水穀不化宜此湯和之身重暴下是大勢來亦宜和也白术芍藥各一兩甘草五錢右剉毎服一兩水煎治濕瀉茯苓湯又治食瀉濕熱白术茯苓各七錢半右咀毎服一兩水煎食前服一方有芍藥三味等分名白术散按以上三方和中除濕足太隂陽明經藥也白术之甘入胃而除脾胃之濕芍藥之酸澁除胃中之濕熱四支困茯苓利水道而除濕此三味泄痢須用之藥也蒼术芍藥湯如前證蒼术二兩芍藥一兩黄芩半兩右剉每服一兩加淡味桂半錢煎服清按此解散濕熱上中二焦之劑太隂經的藥也良方胃苓湯治夏秋之間脾胃傷冷水穀不分泄瀉不止五苓散平胃散右和合薑棗煎空心服按此乃表裏除濕之劑東垣所謂上下分消其濕是也太陽太隂經藥也出陽明飲痞例仲景五苓散宣明益元散方並見濕劑按以上二方除濕利小便之劑太陽經的藥也治風之劑機要防風芍藥湯治泄痢飱泄身熱脉弦腹痛而得及頭痛微汗防風芍藥黄芩各一兩右咀毎服半兩水煎服清按此治風辛凉之劑太隂太陽經藥也蒼术防風湯治泄痢脉弦頭㣲痛蒼术二兩防風一兩一方蒼术四兩麻黄一兩防風五錢薑七片煎按此足太隂陽明經藥也良方神术散治春傷於風夏必飱泄蒼术一斤藁本川芎各六兩羌活四兩粉草細辛一兩六錢右粗末毎服三錢薑三片煎要出汗加葱白按以上三方治風勝濕辛温之劑此則太陽經藥也局方胃氣湯治大人小兒風冷乗虚入客腸胃水穀不化泄瀉注下方見滯下門按此方名曰治風其實和血之藥也治熱之劑局方戊巳丸治脾胃濕熱泄痢不止方見滯下門按泄瀉局方多以為寒至劉張始言有屬熱屬火之證故諸方中治熱瀉之方甚少然仲景治傷寒挾熱下痢用葛根黄芩黄連湯但人未之思耳治暑之劑局方來復丹治伏暑泄瀉如水方見本方易簡云硝石性寒佐以陳皮其性疎快硫黄且能利人若作煖藥以止瀉誤矣葢由啖食生冷或冒暑熱之氣中脘閉結揮霍變亂此藥通利三焦分理隂陽服之甚驗按此出厥隂硫黄例藥也香薷飲治伏暑吐瀉方見暑劑按此治暑之表藥也肺脾經藥也出太隂厚朴例宣明桂苓甘露飲治飲水不消嘔吐泄痢或下痢赤白方見暑劑按五苓散益元散加寒水石解利濕熱太陽經藥也治寒之劑機要漿水散治暴瀉如水周身汗出一身盡冷脉㣲而弱氣少不能語甚者加吐此為急病半夏一兩湯洗附子半兩泡桂五錢甘草炙五錢良薑二錢半乾薑一作乾生薑五錢右為細末毎服三五錢漿水二􅊦煎至半􅊦和滓熱服白术湯白术芍藥甘草炙各三錢乾薑半兩炮右如前服甚者去乾薑加附子三錢謂辛能發散也局方理中湯治臟腑停寒泄瀉不已方見寒劑按此出厥隂已寒例藥也以上用薑附之藥皆為暴瀉氣脫如五虚等證救急之劑所謂暴瀉非陽者也然有屬火者亦當求責治風寒濕之劑本事麴藭丸治中風或中風濕臓腑滑瀉川芎附子炮神麴白术等分右為細末麪糊丸桐子大毎服三五十丸温米飲下此藥亦治飱泄按此出太隂例藥也止澁之劑按諸方論並見滯下門去積之劑本事温脾湯治痼冷在腸胃間泄瀉腹痛宜先取去然後調治不可畏虚以養病也厚朴乾薑甘草桂心附子生各二兩大黄生四錢碎切湯一􅊦漬半日搦去滓煎湯時和滓下右細剉水二升半煎八合後下大黄汁再煎六合去滓服按泄痢腹痛其證多種有積滯者固宜取去豈但痼冷一端而已須詳證虚實寒熱隨其所宜以調之升發之劑東垣升陽除濕湯自下而上者引而竭之升麻柴胡防風神麴澤瀉猪苓各半兩陳皮三錢蒼术一兩大麥蘖麫甘草炙各三錢如胃寒腸鳴加益智仁半夏各半錢薑棗同煎非腸鳴不得而用之右作一服水煎早飯後熱服之升陽除濕防風湯如大便閉塞或裏急後重數至圊而不能便或有白膿或血慎勿利之利之則必致重病及鬱結而不通也以此湯舉其陽則隂氣自降矣蒼术泔浸去皮乾浄四兩防風二錢白术白茯苓白芍藥各一錢右咀除蒼术另作片子水一碗半煎至二􅊦内諸藥同煎至一大􅊦熱服食前按飲食入胃氣上升輸精心肺然後下降若脾胃有傷不能上升反下流腎肝而成泄痢者法宜填補中氣升之舉之不可疎下此東垣發前人所未論也調補脾胃之劑錢氏白术散治小兒泄瀉胃熱煩渴不問隂陽並宜服之人參白茯苓白术木香甘草藿香各一兩乾薑按中論即是葛根右為末水煎按此太隂經四君子例藥也治小兒陽明本虚隂陽不和吐瀉亡津液煩熱口乾以參术甘草甘温補胃和中木香藿香辛温芳香可以助脾茯苓甘平分隂陽導水濕葛根甘平倍於衆藥其氣輕浮鼓舞胃氣上行津液又解風肌熱治脾胃虚弱泄瀉之勝藥也易簡白术湯治證同前前方藿香改黄茋是也秘藏黄茋補胃湯治一日大便三四次溏而不多有時泄腹中鳴黄茋當歸身柴胡益智仁陳皮各三錢甘草炙二錢升麻六分紅花少許右咀作一服水煎食前服補腎之劑機要肉豆􅅳丸治腎泄久不愈脉沉細無力者效破故紙炒肉豆􅅳麪裹煨各等分右為末棗肉為丸桐子大飲湯下空心本事方破故紙四兩肉豆􅅳二兩名二神丸治脾腎虚弱本事五味子散治腎泄五味子二兩呉茱茰半兩細粒緑色者右二味炒香熟為度細末毎服二錢陳米飲下有一親識毎五更初曉時必溏泄一次此名腎泄服此而愈局方金鎖正元丹治腎虚泄瀉小便頻數虚冷之證五倍子茯苓各八兩硃砂别研三兩龍骨煅三兩紫巴㦸去心一斤補骨脂酒浸炒十兩肉從蓉洗焙葫蘆巴焙各一斤右為末入研藥令勻酒糊丸桐子大毎服三十丸空心温酒鹽湯任下玉機微義卷六
