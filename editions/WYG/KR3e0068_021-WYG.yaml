body:
  text: 玉機微義卷二十一明徐用誠原輯劉純續增消渇門諸經論消渇脈證所因内經隂陽别論曰二陽結謂之消脈要精微論曰癉成為消中按東垣曰二陽者陽明也手陽明大腸主津病消則目黄口乾是津不足也足陽明胃主血熱則消穀善飢血中伏火乃血不足也結者津液不足結而不潤皆燥熱為病也此因數食甘美而多肥故其氣上溢轉為消渇治之以蘭除陳氣也不可服膏粱芳艸石藥其氣慓悍能助燥熱也調逆論曰心移熱於肺傳為膈消也凡治消癉仆繫偏枯痿厥氣滿發逆肥貴人則膏粱之疾也岐伯曰脈實病久可治脈弦小病久不可治後分為三消髙消者舌上赤裂大渇引飲脈經云緊數相搏則為消渇脈軟散者當病消渇論消渇為三焦受病病機云消渇之疾三焦受病也上消者肺也多飲水而少食大便如常小便清利知其燥在上焦也治宜流濕以潤其燥消中者胃也渇而飲食多小便赤黄熱能消穀知其熱在中焦也宜下之消腎者初發而為膏淋謂淋下如膏油之狀至病成面色黧黑形瘦而耳焦小便濁而有脂液治法宜養血以肅清分其清濁而自愈也論消中三證之異陳無擇云消渇屬心故煩心致心火散漫渇而引飲諸脈軟散皆氣實血虚也消中屬脾癉熱減則為消中消中復有三有因寒中隂勝陽􅊊久必為熱中經云脈洪大隂不足陽有餘則為熱中多食數溺為消中隂狂興盛不交精泄則為强中至病强中不亦危矣消腎屬腎盛壯之時不謹而縱慾房勞年長腎衰多服金石真氣既喪口乾精溢自洩不飲而利經云腎實則消不渇而小便自利名曰腎消亦曰内消論三消之疾燥熱勝隂河間曰三消之疾本濕寒之隂氣極衰燥熱之陽氣太甚皆因乎飲食服餌失節腸胃乾涸而氣液不得宣平或耗亂精神過違其度或因大病隂氣損而血液衰虚陽氣悍而燥熱􅊊甚或因久嗜鹹物恣食炙􅏼飲食過度亦有年少服金石丸散積久實熱結於下焦虛熱血氣不能制濕熱燥甚於腎故渇而引飲若飲水多而小便多者名曰消渇若飲食多而不甚渇小便數而消瘦者名曰消中若渇而飲水不絶腿消瘦而小便有脂液者名曰腎消此三消者其燥熱同也夫經中有言心肺氣厥而渇者有言肝痺而渇者有言脾熱而渇者有言腎熱而渇者有言胃與大腸結熱而渇者有言脾痺而渇者有言小腸痺熱而渇者有因病瘧而渇者有因肥甘美食而渇者有因醉飽入房而渇者有因逺行勞倦遇大熱而渇者有因傷害胃乾而渇者有因病風而渇者雖五臟之部分不同而病之所遇各異其為燥熱亡液一也謹按先生三消之論始言天地六氣五味以配養人身六位五臟而究乎萬物之源終引内經論渇諸證以辨乎世方熱藥之誤比物立象反覆詳明非深達隂陽造化之機者孰能如是哉夫治此疾者補腎水隂寒之虚而瀉心火陽熱之實除腸胃燥熱之甚濟身津液之衰使道路散而不結津液生而不枯氣血利而不澁則病日已矣豈不以滋潤之劑養隂以制燥滋水而充液哉何故世論消渇者多不知其意謂因下部腎水虚不能制其上焦心火使上實熱而多煩渇下虚冷而小便若更服寒藥則元氣轉虚而下部腎水轉衰則上焦心火尤難治也但以暖藥補養元氣若下部腎水得實而勝退上焦心火則自然渇止小便如常而病愈也吁若此未明隂陽虚實之道也夫腎水屬隂而本寒虚則為熱心火屬陽而本熱虚則為寒若腎水隂虚則心火陽實是謂陽實隂虚而上下俱熱矣以彼之言但見消渇數溲妄言為下部寒爾豈知腸胃燥熱怫􅊊使之然也且夫寒物屬隂能養水而瀉心熱物屬陽能養火而耗水令腎水既不勝心火則上下俱熱奈何以熱藥養腎水欲令勝心火豈不闇哉彼不謂水氣實者必能制火虚則不能制火故陽實隂虚而熱燥其液小便淋而常少隂實陽虚不能制水小便利而常多此又不知消渇小便多者葢燥熱太甚而三焦腸胃之腠理怫􅊊結滯緻密壅塞而水液不能滲泄浸潤於外以養乎百體故腸胃之外燥熱大甚雖多飲水入於腸胃之内終不能浸潤於外故渇不止而小便多水液既不能滲泄浸潤於外則隂燥竭而無以自養故久而多變於聾盲瘡瘍痤疿之類而危殆其為燥熱傷隂也明矣論治消渇大法東垣曰膈消者以白虎加人參湯治之中消者善食而瘦自汗大便硬小便數叔和云口乾飲水多食饑虚癉成消中者調胃承氣三黄丸治之下消者煩燥引飲耳輪焦乾小便如膏叔和云焦煩水易虧此腎消也六味地黄丸治之總録所謂末傳能食者必發腦疽背瘡不能食者必傳中滿皷脹皆謂不治之證潔古老人分而治之能食而渇者白虎加人參湯不能食而渇者錢氏方白术散倍加葛根治之上中既平不復傳下消矣前人用藥厥有㫖哉或曰末傳瘡疽者何也此火邪勝也其瘡痛甚而不潰或赤水者是也經云有形而不痛陽之類也急攻其陽無攻其隂治在下焦元氣得强者生失强者死末傳中滿者何也以寒治熱雖方士不能廢其繩墨而更其道也然臟腑有逺近心肺位近宜制小其服腎肝位逺宜制大其服皆適其至所為故如過與不及皆誅罰無過之地也如髙消中消制之太急速過病所久而成中滿之病正謂上熱未除中寒復生者也非藥之罪失其緩急之制也處方之治宜加意焉按已上所論三消傳變可謂發病機之㫖比與陳氏三因論消中復有三證皆病傳所異大抵末傳發瘡疽者為傳外發脹滿强中為傳内亢極之甚也但三因所出治强中一方然未見其肯綮今姑存之以備其㫖且傳脹滿皆不治之證况强中乎消渇治法治熱之劑局方清心蓮子飲調胃承氣湯治消中熱在胃而能飲食小便赤黄方並見熱門三因真珠丸治心虚煩悶積熱煩渇口乾舌燥引飲無度小便或利或不利知母一兩一分黄連苦參𤣥參鉄粉牡蠣各一兩朱砂二兩麥門冬去心天花粉各半兩金箔銀箔二百片右為末煉蜜入生𤓰蔞汁少許丸如梧子大用金銀箔為衣每二三十丸先用𤓰蔞根汁下一服次用麥門冬熟水下病退日二服按此心胃經藥也已上三方有輕重之殊宜選使治燥之劑東垣當歸潤燥湯治消渇舌上白乾燥唇乾口乾眼澁黑處見浮雲大便閉澁乾燥結硬喜温飲隂頭短縮升麻一錢半柴胡七分甘草六分半一半生細辛一分杏仁六箇紅花少許小椒三箇生地黄三分黄柏知母石膏桃仁麻仁防風荆芥穗當歸身各一錢右㕮咀作一服水煎清凉飲子治消中能食而瘦口乾舌乾自汗大便結燥小便頻數羌活柴胡炙甘草知母酒製黄芪黄芩酒製各一錢生甘艸漢防已生地黄酒製各半錢紅花少許桃仁五箇杏仁十箇升麻四分防風五分石膏黄柏草龍膽製各一錢半當歸身六分右㕮咀作一服水煎入酒些小此方減黄芪黄芩防風草龍膽加麻黄根三分黄連八分名地黄飲子按已上脾心肝腎藥也清氣之劑局方人參白虎湯治髙消上焦燥渇不欲多食方見熱門東垣蘭香飲子治渇飲水極甚善食而瘐自汗大便結燥小便頻數石膏三錢知母酒製一錢生甘艸防風各一錢炙甘艸人參蘭香連翹白豆􅅳仁桔梗升麻各五分半夏二分右為細末湯浸蒸餅和匀成劑捻作薄片子日中晒半乾碎如粉每服二錢食後淡生薑湯下按已上二方主上中二消之劑肺胃經藥也滋隂之劑丹溪補隂丸方見補虚門局方加減八味丸治腎虚消渇引飲金匱腎氣丸減附子加五味子右服如本方法要畧治男子消渇小便反多仍用本方簡易地黄飲子治消渇咽乾面赤煩躁人參生地黄熟地黄黄芪天門冬麥門冬去心澤瀉石斛枇杷葉去毛炒枳殻炒甘艸炒各等分右㕮咀每三錢水煎服按此心腎脾肺藥也已上三方主下消之劑硃砂黄連丸治心虚藴熱或因飲酒過多發為消渇硃砂一兩宣連三兩生地黄二兩右為末煉蜜丸如梧子大每四五十丸燈心棗湯送下按此心脾藥也上消之例清氣滋隂之劑局方黄茋六一湯治男女諸虚不足胸中煩悸時常消渇或先渇而後發瘡或病諸瘡而後渇者並宜服方見前按此肺腎脾三焦命門之劑也東垣生津甘露飲子治髙消大渇飲水無度舌上赤澁上下齒皆麻舌根强硬腫痛食不下腹時脹痛渾身色黄目白睛黄甚則四肢痿弱無力面塵脱色脇下急痛善啑善怒健忘臀腰背寒兩尻冷甚石膏一錢二分人參炙甘艸各一錢白葵半錢麥門冬蘭香當歸身各半錢桔梗三錢生甘草山梔蓽澄茄各一錢藿香二分全蝎二箇升麻知母酒製各二錢黄連木香柴胡各三分白芷白豆䓻連翹薑黄各一錢黄柏酒拌杏仁各一錢半右為細末湯浸蒸餅和匀攤薄晒乾杵細食後每二錢抄於掌中以舌砥之隨津唾下或導以白湯少許按此肺胃心腎藥也東垣曰此制之緩也不惟不成中滿亦不傳下消矣三消皆可用宣明麥門冬飲子治膈消胸滿煩心津液乾少短氣多為消渇知母甘草炒𤓰蔞人參五味子生地黄葛根茯神麥門冬去心各等分右㕮咀每五錢入竹葉十四片煎按此肺腎脾胃藥也雜方寶鑒麥門冬湯治消渇日夜飲水不止飲下即溲麥門冬去心黄連冬瓜各二兩右㕮咀每五錢水煎服如無乾者用新者一枚重三斤去皮穰分作十二片為十二服每服一片日三次酒蒸黄連丸治消渇飲水無度至二三升小便五七十次發熱瘦弱口乾食已如饑此名消癉今用味苦無毒除熱正氣消渇厚腸消渇之人脾胃惡濕黄連為對黄連淨半斤酒一升湯重蒸伏時晒乾用右末滴水丸梧子大每五十丸食前温水下仁齋加味錢氏白术散治消渇不能食木香五味子柴胡各三分藿香一錢乾葛二錢白茯苓甘艸炙白术人參枳殻炒各半錢右㕮咀作一服水煎宣明大黄甘艸飲子治男女一切消渇不能止者大豆五升煮三沸去苦水大黄一兩半甘草四兩右三味用井水一桶同煮軟盛放冷令病人食豆渇飲汁無時候食盡病不盡再如前服不三次愈矣三因石子薺苨湯治强中多因躭嗜色慾及快意飲食或服丹真氣既脱煩渇引水飲食倍常隂氣常興不交精出故虚熱注於下焦最為難治薺苨石膏各三兩人參茯神瓜蔞根磁石煅淬知母乾葛黄苓甘艸各二兩右剉每水三盞腰子一箇去脂膜黑豆一合煮至盞半去腰子大豆入藥四錢煎服秘方用紫背浮萍搗汁每頓服半盞效丹溪方黄連末天花粉末生地黄汁生藕汁右二物汁為膏入上藥搜和入牛乳佐以薑汁和蜜湯為膏徐徐留於舌上以白湯少許送下機要方無天花粉有牛乳汁二汁熬膏和末為丸桐子大每二十丸少呷温水下日進十服玉機微義卷二十一
