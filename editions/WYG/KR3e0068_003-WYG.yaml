body:
  text: 玉機微義卷三明徐用誠原輯劉純續増傷風門叙風之為病内經曰風為百病之長又曰風勝則動又曰賊虚邪者陽受之又曰傷於風者上先受之按風本陽邪故善動善變甚傷於陽者所以各從其類也脉經云脉浮而大者風傷寒論云太陽病脉浮而緩者名曰中風又云太陽中風陽浮而隂弱論傷風與傷寒六經轉變相同陳無擇云經曰春傷於風乃四時之序也或表中風在經絡中循經流注以日𫝊變與傷寒無異但寒泣血故無汗惡寒風散氣故有汗惡風為不同仲景太陽經分傷寒傷風不同而後人纂集者不分門類但以傷寒暑濕時氣疫沴凡太陽病皆謂之傷寒今别立傷風一門且依先哲以太陽經為始分注六經學者當自知按此分傷風六經用藥可謂發諸家之未備在足太陽膀光經用桂枝湯足陽明胃經用杏子湯足少陽膽經用柴胡加桂湯足太隂脾經用桂枝芍藥湯足少隂腎經用桂附湯足厥隂肝經用八物湯其方以桂枝湯三味加以各經之藥皆是辛温解散之劑然既云與傷寒𫝊變相似此六方亦可以盡其變也學者當求仲景之法以調治之可也今不載其方詳見本文謹按傷風一證仲景與傷寒同論其藥雖有麻黄桂枝之分至於𫝊變之後亦未嘗悉分之也諸家之論皆與感冐四氣并中風條内衮同出治惟陳無擇别立傷風一方在四􅁋之首且依傷寒以太陽為始分注六經可謂詳密但以風本外邪諸方例用解表發表而治然受病之源亦有不同者且風為天地浩蕩之氣四時八風之變未嘗無也然人亦未嘗悉傷之也間有受傷者皆因不能法道清淨腠理不密表上陽虚之所致也内經曰清淨則内腠閉拒雖有大風苛毒弗之能害是也又有内挾痰熱其氣拂鬱風邪易於外束者若表虚受風専用發表之藥必致汗多亡陽之證若内挾痰熱而受風者亦宜内外交治不可専於解表也或曰此云表虚與成無已注傷寒中風表虚同與予曰不同也彼以太陽中風而於有汗無汗分虚實實者加麻黄虚者加葛根俱解表也此云表虚者當固守衛氣而散風者也傷風治法辛温解表之劑仲景桂枝湯治太陽經傷風自汗桂枝芍藥各三兩甘草一兩右咀生薑三片棗一枚煎按此發散足太陽經風邪之藥也局方神术散治傷風頭痛鼻塞聲重蒼术五兩藳本白芷細辛羌活川芎甘草炙各一兩右為末三錢水一盞薑三片葱三寸煎傷風鼻塞葱茶調下按此足太陽少隂手陽明經藥也辛平解表之劑消風百解散治頭疼發熱欬嗽鼻塞聲重荆芥白芷陳皮麻黄蒼术甘草右咀薑三片葱白三根煎按此手太隂陽明經藥也川芎茶調散治諸風上攻頭目昏疼鼻塞聲重薄荷八兩荆芥川芎各四兩羌活白芷甘草各二兩防風一兩半細辛一兩右為末毎服二錢食後茶調下按此足太陽少隂手太隂陽明厥隂經藥也消風散治諸風上攻頭目昏眩項背拘急鼻塞聲重及皮膚頑麻瘙痒癮疹婦人血風荆穗甘草炙陳皮去白厚朴各半兩白殭蠶人參茯苓防風芎藭藿葉蟬蛻去土炒羌活各二兩右為末毎服二錢荆芥茶清調下瘡癬温酒調下金沸草散治肺經受風頭目昏疼咳嗽聲重涕唾稠粘荆芥穗四兩前胡三兩旋覆花三兩麻黄三兩甘草炙赤芍半夏各一兩右咀薑三片棗一枚煎服活人書減麻黄赤芍加細辛赤伏苓按此手足太隂經藥出陽明旋覆代赭石例解利痰飲之藥也辛凉解表之劑柴胡升麻湯治頭痛壯熱惡風體疼鼻塞咽乾痰盛欬嗽涕唾稠粘柴胡前胡黄芩各六兩半荆芥七兩半赤芍石膏各十兩升麻五兩桑白皮乾葛右咀薑三片䜴十粒水煎按此足少陽陽明經藥也辛凉解表攻裏之劑錢氏大青膏發散風邪天麻一錢麝一字匕白附子末生用一錢半朱砂研一字青黛研一錢天竺黄一字七蝎尾去毒生半錢烏稍蛇肉半錢右同再研細生蜜和成膏毎服半皂子大至一皂子大月中兒粳米大大人彈子大同牛黄膏温薄荷水化下一處服之宣明防風通聖散方見中風門謹按傷風諸方俱是解表之劑蓋以風從外入之邪也其所挾有寒熱温凉之不同故此分辛温辛平辛凉之異然風雖外邪傳變入裏亦宜隨證施治錢仲陽論傷風當發散者用大青膏解不散有下證者用大黄丸可謂得仲景之奥矣諸方於此俱未曽論及也又前論表虚受風與内挾痰熱之方亦未詳備學者當自求之所謂大黄丸亦附於後大黄黄芩二味各等分水丸玉機微義卷三
