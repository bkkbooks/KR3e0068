  text: 欽定四庫全書
  hash: sha256:64d9ff2e7643d8cd3464e7f4c9e75c7d6d85eb6ee80c540d6dcbeeab187b9ddc
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3e0068_WYG_043-1a, image: WYG0762/WYG0762-0464c.png}
body:
  text: 玉機微義卷四十三明徐用誠原輯劉純續增損傷門叙堕墜為病内經云人有所堕墜惡血留内腹中脹滿不得前後先飲利藥此上傷厥隂之脉下傷少隂之絡刺足内踝下然骨之前出血刺足肘上動脉不已刺三毛各一痏見血立已左刺右右刺左靈樞云有所堕墜惡血留於内若有所大怒氣上而不下積於脇下則傷肝又中風及有所擊打若醉入房汗出當風則傷脾又頭痛不可取於腧者有所擊堕惡血惡血在於内若内傷痛不已可側刺不可逺取之也按發明經云夫從髙墜下惡血留於内不分十二經絡聖人俱作風中肝經留於脇下以中風療之血者皆肝之所主惡血必歸於肝不問何經之傷必留於脇下葢肝主血故也痛甚則必有自汗但人汗出皆為風證諸痛皆屬於肝木況敗血凝澁從其所屬入於肝也從高墮下逆其所行之血氣非肝而何以破血行經藥治之傷損脉法内經云肝脉搏堅而長色不青當病堕若搏因血在脇下令人嘔逆金匱云寸口脉浮微而澁然當亡血若汗出設不汗出者當身有瘡被刀斧所傷亡血故也脉經云金瘡出血太多其脉虚細者生數實大者死金瘡出血脉沉小者生浮大者死砍瘡出血一二石脉來大者二十日死砍刺出血不止者其脉止脉來大者七日死滑細者生從髙顛仆内有血腹脹滿其脉堅强者生小弱者死按破傷有瘀血在内脉堅强實則生虚小弱者死若亡血過多脉虚細小者生浮大數實者死皆為脉病不相應故也論傷損宜下子和云諸落馬墜井打撲傷損閃肭損折杖瘡腫發焮痛不止者可峻下二三十行痛止腫消宜以通經散𨗳水丸等藥或加湯劑瀉之後服和血消腫散毒之藥按子和於堕車落馬杖瘡閃肭者俱用峻下其有心恙牙關禁急者云是驚涎堵塞於上俱用三聖散先吐後下其法雖峻然果有驚涎瘀血停留於内焮痛腫脹發於外者亦奏㨗功但於出血過多老弱之人脉虚大者亦當求責謹按打撲金刄損傷是不因氣動而病生於外外受有形之物所傷乃血肉筋骨受病非如六滛七情為病有在氣在血之分也所以損傷一證專從血論但須分其有瘀血停積而亡血過多之證葢打撲墜堕皮不破而内損者必有瘀血若金刄傷皮出血或致亡血過多二者不可同法而治有瘀血者宜攻利之若亡血者兼補而行之又察其所傷有上下輕重淺深之異經絡氣血多少之殊唯宜先逐瘀血通經絡和血止痛然後調氣養血補益胃氣無不效也頃見圍城中軍士被傷不問頭面手足胸背輕重醫者例以大黄等藥利之後大黄缺少甚者遂以巴豆代之以為不於初時瀉去毒氣後則多致危殆至於畧傷手指亦悉以藥利之殊不知大黄之藥惟與有瘀血者相宜其有亡血過多元氣胃氣虚弱之人不可服也其巴豆大熱有毒止能破堅逐積用於此疾尤非切當所以有服下藥過後其脉愈見堅大醫者不察又以為瘀血未盡而後下之因而夭折人命可不慎歟損傷治法攻下瘀血之劑金匱治馬墜及一切筋骨損方大黄一兩切浸成湯下緋帛如手大燒灰亂髮如雞子大燒灰炊單布一尺燒灰敗蒲一把三寸桃仁四十九箇去皮尖熬甘草如中指節炙剉右七味以童子小便量多少煎湯成内酒一大盞次下大黄去滓分溫三服先剉敗蒲席半領煎湯浴衣被處斯須通利數行痛楚立差發明復元活血湯治從髙堕下惡血留於脇下疼痛不可忍柴胡五錢當歸六錢甘草二錢穿山甲炮二錢大黄酒浸一兩桃仁去皮尖五十箇紅花𤓰蔞根各二錢右件桃仁研爛餘藥剉如麻豆大毎服一兩水二盞半酒半盞煎至七分去滓食前大溫服以利為度得利後痛或不盡服乳香神應散靈樞云墜堕惡血留於脇下則傷肝肝膽之經行於脇下屬厥隂少陽宜以柴胡為引用為君以當歸活血脉又急者痛也以甘草緩其急亦能生新血陽生隂長故也為臣穿山甲𤓰蔞根桃仁紅花破血潤血為之佐大黄酒製以蕩滌敗血為之使當歸𨗳氣散治損傷瘀血大便不通紅腫暗青疼痛昏悶畜血内壅欲死大黄一兩當歸三錢麝香少許右三味除麝香另研外為極細末入麝香合匀毎服三錢熱酒一盞調下食前内瘀血去或骨節傷折疼痛接骨紫金丹治之三因雞鳴散治從髙墜下及木石所壓凡是損傷瘀血凝滯疼痛欲死兼以此藥推陳致新神效大黄一兩酒浸杏仁三七粒去皮尖右研細酒一碗煎至六分去滓雞鳴時服至晩取下瘀血即愈若便覺氣絶取藥不及急擘開口以熱小便嚾之按已上四方雖皆蕩逐惡血之藥前三方所以治血在肝經血分者也後一方所以治血在肺經氣分者也當以脉之浮沉表裏别之又海藏云若登髙墜下撞打及傷心腹胸中積血不散以上中下三焦部分分之以易老犀角地黄湯桃仁承氣抵當湯丸之類下之亦有以小便同煎治之者更有内加生地黄當歸煎服者亦有加大黄者惟智者能擇之破血止痛行經之劑秘藏破血散治乗馬損傷跌其脊骨惡血流於脇下其痛苦楚不能轉側羌活防風桂各一錢柴胡連翹當歸稍水蛭炒烟盡研各二錢麝香少許另研一方有蘇木一錢半右件分作二服毎服二大盞酒水一盞除水蛭麝香外另研如泥煎餘藥一大盞去滓上火令稍熱調二味飢服之按此太陽陽明少陽經藥也地龍散治腰脊痛或打撲損傷從髙堕下惡血留在太陽經中令人腰脊或脛腨臂腰中痛不可忍中桂地龍各四分黄栢甘草各一錢羌活二錢蘇木六分麻黄半錢桃仁六箇當歸梢一分右㕮咀毎服五錢水二盞煎一盞去滓溫服按此足太陽經藥也發明乳香神應散治從髙墜下疼痛不可忍及腹中疼痛雄黒豆桑白皮乳香没藥獨科栗子各一兩破故紙炒二兩右為末毎服五錢醋一盞沙石噐内煎至六分入麝香少許温服寳鑑有當歸一兩水蛭炒半兩聖靈丹治一切打撲折傷疼痛不可忍者乳香五錢烏梅去核五箇白米一捻秘藏作粟萵葵子一盞炒黄二兩八錢右為細末煉蜜丸彈子大毎服一丸細嚼熱酒送下一伏時痛不止冄服按此二方少隂經藥也三因加味芎藭湯治打傷敗血入胃嘔吐黑血川芎當歸白芍百合浸半日荆芥穗各等分右剉毎服四錢水酒各半煎元戎加味四物湯治虚人損傷不禁下之者四物湯加穿山甲煎服按已上二方厥隂例藥通前六方皆溫平之劑局方花蘃石散治金刄傷及打撲損傷猫狗咬傷或至死者急於傷處擦藥其血化為黄水如内損血入臟腑煎童子小便入酒少許調一錢服之立效婦人産後惡血奔心胎衣不下以小便調一錢取下惡物立效硫黄明淨者四兩花蘃石一斤右二味粗末拌令匀用紙筋和膠泥固濟丸罐子一箇入藥在内密泥封口了焙乾安在四方塼上上畫八卦五行字用炭一秤圍燒自已午時從下生火直至經宿火盡又經宿已冷取研極細磁盒内盛按此厥隂硫黄例藥也海藏云有用此藥以童便煎服或酒調服之者與寒藥正分隂陽不可不辨也補損當歸散治墜馬落車傷腕折臂疼痛服此藥疼痛即止筋骨即當相連澤蘭炒附子炮各一錢當歸炒甘草炙蜀椒炒桂心各五分芎藭炒六分右為細末毎服二錢溫酒調服日三忌生葱猪肉冷水生菓按此少隂厥隂經藥也已上二方皆溫熱之劑接骨之劑發明紫金丹定痛接骨川烏炮草烏炮各一兩靈脂去土半錢木鱉子去殻黒牽牛生骨碎補威靈仙金毛狗脊防風自然銅淬七次地龍去土烏藥青皮陳皮茴香各半錢禹餘粮淬四兩沒藥紅藥子麝香各二錢半右細末醋糊為丸如梧子大毎服十丸至二十丸温酒送下病上食後病下食前元戎接骨丹沒藥乳香當歸川椒自然銅醋淬赤芍骨碎補炙敗龜炙虎骨白芷各等分千金藤郁李仁是也各等分又方加龍骨川芎右細末化蠟半兩丸如彈子大毎服一丸好酒半升化開煎用東南桞枝攪散熱服經驗方治打攧折骨損斷服此藥自頂心尋病至下遇受病處則颯颯有聲覺藥力習習往來則愈自然銅煅醋淬七次一兩川烏去皮尖松明節乳香血竭三錢龍骨半兩生地龍半兩水蛭炒半兩沒藥蘓木降真香土狗十箇油浸焙乾右為末毎服五錢無灰酒調下病在上食後在下食前按已上三方並出少隂折傷例藥也其用毒藥以行諸經亦是瘀血已去者方可用丹溪云世以自然銅為接骨藥然此等方儘多大抵在補氣補血補土俗工惟在速効以罔利迎合病人之意而銅非煆不可服若新出火者其火毒金毒相扇挾香挾藥毒雖有接傷之功而燥散之禍甚於刀劒戒之雜方機要刀箭藥止血定痛没藥散定粉風化灰各一兩乳香半錢另研枯􅈨三錢另研没藥一字另研右件各研為細末同和匀再研摻用之本事地黄散治金瘡止血除疼痛辟風續筋骨生肌肉地黄苖地松青蒿蒼耳苖生艾汁三合赤芍各五兩入水取汁石灰三分右五月五七月七午時修合以前藥汁拌石灰隂乾入黄丹三兩更杵羅細丸金瘡出血用藥封包不可動十日差無膿腫經驗方治打撲損筋傷骨折吕顯謨傳黄栢一兩半夏半兩右為細末毎用半兩生薑自然汁調如稀糊傅用紙花貼如乾再傅骨折先以絹帛封縛次用沙木扎定良乆痛止即痒覺熱乃是血活筋骨復舊輕者三五日重者不過旬月又方治打撲損腫痛不止生薑自然汁米醋牛皮膠同熬溶入馬屁勃末不以多少調如膏以紙攤𫝊腫處治刀傷斧斫五倍子一味為末乾貼神效桑葉隂乾為末乾貼如無旋熨乾末貼之妙玉機微義卷四十三
