body:
  text: 玉機微義卷四十五明徐用誠原輯劉純續增黄疸門發黄附諸經叙黄疸脈證内經曰溺黄赤安卧者黄疸要略曰寸口脈浮而緩浮則為風緩則為痺痺非中風四肢苦煩脾色必黄瘀熱以行尺脈浮為傷腎跌陽脈緊為傷脾風寒相摶食榖即眩榖食不消胃中苦濁濁氣下流小便不通隂被其寒熱流膀胱身體盡黄名曰榖疸額上黒微汗出手足中熱薄暮即發膀胱急小便不利名曰女勞疸腹如水狀心中懊憹而熱不能食時欲吐名曰酒疸多不治脈經曰脈沈渇欲飲水小便不利者皆發黄凡黄候其寸口脈近掌無脈口鼻冷並不可治論五疸陳無擇云古方叙五種黄者其實一病立名異耳如黄汗者以胃為脾表屬陽明陽明蓄熱喜自汗汗出因入水中熱必鬰故汗黄也其後身體腫發熱不渇狀如風水汗出染衣色正黄如栢汗黄疸者由暴熱用冷水洗浴熱留胃中所致其候身面眼悉黄如金色小便如煮蘖汁榖疸者夫由肌發熱大食傷胃氣衝鬰所致其候食則腹滿眩暈榖氣不消云云見前酒疸由大醉當風入水所致唯酒變證最多熱毒流於清氣道中則眼黄鼻雝女勞疸由大熱交接竟入水水流濕入於脾因腎氣虚甚以所勝尅入致腎氣上行故有額黑身黄之證其間兼渇與腹脹者並難治發於隂必嘔發於陽則振寒面微熱雖本於胃氣鬰發土色上行然發於脾則為内疸發於腎則為黑疸若所論因外則風寒暑濕内則喜怒憂驚酒食房勞三因悉備世醫獨嚴於傷寒論中不亦濫矣按已上五疸與前要略所具不同宜兼考之陳氏治例未能以盡其變推其病體究治大抵已上五疸形證已具無所隐兼證者黄汗黄疸榖疸誠以元氣脾胃之氣為主而治之形氣榖氣稍實者則可得而復矣酒疸則元氣胃氣殊已傷甚形氣孤危榖氣與藥雜進能有斷厚味而守藥得復生者則㡬希矣女勞疸則隂陽之氣虚竭甚者為難治陳云世醫獨嚴於傷寒而不及此此則亦非傷寒家法所可髣髴施也論傷寒陽證發黄保命集云凡發黄有六有畜血發黄邪熱傳於太陽之本小便先淋而黄其人暴狂内有血也為太陽發黄本病也濕熱發黄太隂併陽明之本為小便不利風濕熱發黄併少陽也寒濕發黄太隂併少陽也結胸發黄下之早附太陽也痞氣發黄附太隂也凡六者各隨脈證標本而治之大抵發黄從太隂陽明而論脾胃皆土也故見黄色當從其脾病色黄土氣化濕非濕毒何能發黄也論隂證發黄韓秖和云病人三五曰服下藥太過虚其脾胃亡其津液渇飲水漿脾土為隂濕加之與邪熱相㑹發黄此隂黄也當以温藥治之如兩手脈沈細遲肢體逆冷皮膚有粟起或嘔吐舌上有胎遍身發黄煩躁欲於泥水中卧小便赤少皆隂候也故隂黄多以熱湯温之或湯漬布搭其胸腹或以湯盛瓢中坐於臍下熨之其病愈者曾治趙顯宗病傷寒至六七日因服下藥太過致發黄其脈沈細遲無力皮膚涼發躁欲於泥中卧喘嘔小便赤澁先投茵陳橘皮湯喘嘔止次服小茵陳湯半劑脈微出不欲於泥中卧次日又服茵陳附子湯半劑四肢發熱小便二三升當日中大汗而愈似此治愈者不一一錄凡傷寒病黄毎遇太陽或太隂司天嵗若下之太過往徃變成隂黄蓋辰戌太陽寒水司天水來犯土丑未太隂濕土司天土氣不足即脾胃虚弱亦水來侵犯多變此證也按已上論傷寒隂陽二證發黄殆無餘藴大抵本形氣虚實受證不同用藥有汗下温之禁非若雜病之比也我丹溪先生謂發黄如􅝛麯相似濕熱有微甚及兼熱兼寒瘀血所因不同故治例不可不分論内傷發黄略例云内感傷寒勞役形體飲食失節中州變寒之病生黄非傷寒壊之而得只用建中理中大建中足矣不必用茵陳也按此言内傷不足故宜補益惟其有餘新病必湏消導之乆病從榖疸施治可也論發黄治例難知云色如熏黄乃濕病也一身盡痛色如橘子黄乃黄病也一身不痛乾黄燥也小便自利四肢不沈重渇而引飲者梔子蘗皮湯濕黄脾也小便不利四肢沈重似渇不欲飲者大茵陳湯若大便自利而黄者茵陳梔子黄連三物湯往來寒熱一身盡黄者小柴胡加梔子湯按一身盡痛而黄者濕勝在表也不痛者病在裏也乾燥者熱勝也故後證皆有表裏之分殊東垣云傷寒當汗不汗即生黄邪在表者宜急汗之在表之裏宜滲利之在半表裏宜和觧之在裏者宜急下之若已上諸證及略例云男黄小便自利當與虛勞小建中湯若黄色不變欲自利腹滿而喘不可除熱除熱必噦小半夏湯皆不必拘於茵陳也黄疸治法升散之劑金匱桂枝加黄茋湯治黄汗身腫汗出出已輒輕輕乆必身瞤胸中痛腰以下無汗腰臗㢮痛如有物在皮中劇者不能食煩躁小便不利桂枝芍藥各三錢甘草二錢黄茋五錢右水煎入薑棗服後仍飲熱粥助藥力麻黄連翹赤小豆湯治身熱不去瘀熱在裏發黄小便微利麻黄連翹各一兩赤小豆右㕮咀作一服水煎局方茵陳五苓散治傷寒或伏暑發黄小便不利煩渇本方五分加茵陳一分韓氏茵陳茯苓湯治發黄脈沈細數四肢冷小便濇煩躁而渇茯苓桂枝猪苓各一兩滑石一兩半茵陳一兩右為末毎服半兩水煎服如脈未出加當歸按已上方並太陽例藥也攻下之劑金匱梔子大黄湯治酒疸心中懊憹或熱痛梔子十四枚大黄一兩枳實五枚䜴一升右水煎至二升分温三服大黄硝石湯治黄疸腹滿小便不利而赤自汗此表和裏實大黄黄栢硝石各四兩梔子十五枚右水煎服如前法硝石􅈨石散治女勞疸身黄額黑曰晡發熱惡寒膀胱急小腹滿足下熱因作黑疸其腹滿如水狀大便必黑時溏此女勞之病非水也硝石􅈨石各燒等分右二味為散以大麥粥汁和服二錢曰三重衣覆取汗隨大小便去小便黄大便黑是其候也半夏湯治酒疸身黄無熱言了了腹滿欲嘔心煩足熱或癥瘕心中懊憹其脈沈弦或緊細半夏茯苓白术各三兩前胡枳殻炒甘草大㦸炒各二兩黄芩茵陳當歸各兩右㕮咀每服四錢水煎入薑三片空心服茵陳蒿湯治身熱鼻乾汗出陽上奔小便赤而不利濕熱發黄茵陳蒿六兩梔子十四箇大黄二兩右三味每服一兩半水煎服難知茵陳大黄湯治傷寒大熱發黄面目悉黄小便赤茵陳蒿梔子柴胡柏皮黄芩升麻大黄炒各一兩龍膽草半兩右為粗末每服五錢水煎服抵當湯治太陽傷寒頭痛身熱法當汗觧反利小便熱瘀在内則身黄脈沈少腹硬小便自利其人如狂者下焦有血也宜此湯主之水蛭蝱虫各十箇大黄一兩桃仁十二箇右剉作一服水煎食前服按已上並陽明經藥也抵當湯厥隂藥輕者桃仁承氣湯主之和解之劑小柴胡加梔子湯按此手太隂足少陽藥也治熱和中之劑梔子柏皮湯治身熱不去大便利而煩熱身黄者梔子柏皮黄連各等分右㕮咀每服一兩水煎服寳鑑茯苓滲濕湯治黄疸寒熱嘔吐而渇欲飲冷身體面目黄小便不利不得安卧不思食白茯苓五分澤瀉三分茵陳六分猪苓二錢生黄芩黄連梔子防己白术蒼术陳皮青皮枳實各二分右㕮咀作一服水煎空心服酒疸兼作丸子服之按此並太陽例藥温中之劑金匱小半夏湯治黄疸小便色不異欲利腹滿而喘半夏湯泡七次右㕮咀每服三五錢水煎入薑十片韓氏茵陳橘皮湯治身黄脈沈細數熱而手足寒喘嘔煩躁不渇者茵陳橘皮生薑各一兩白术一分半夏茯苓各半兩右為末水四升煮取二升放温分作四服按此並足陽明太隂藥也小茵陳湯治發黄脈沈細遲四肢及遍身冷附子一箇八片甘草炙一兩茵陳二兩右為粗末用水二升煮一升温作三服茵陳四逆湯治發黄脈沈細遲肢體逆冷腰已上自汗甘草炙一兩乾薑炮一兩半附子一箇作八片茵陳二兩右為粗末分作四貼水煎服茵陳附子湯治服四逆湯身冷汗不止者附子二箇各作八片乾薑炮二兩半茵陳一兩半右為粗末水煎分作三服按已上並少隂經藥也茵陳茱萸湯治服茵陳附子湯證未退及脈伏者吴茱萸一兩當歸三分附子二箇作八片木通一兩乾薑炮茵陳各一兩半右為粗末分作二服水煎按此足少隂厥隂藥也吐下之劑三因苦參散治濕熱内甚小便赤澁大便時秘食飲不妨服諸藥不除因為乆黄苦參黄連瓜蒂黄柏大黄各一分葶藶半兩右為末每服一大錢飲調下當吐利随時消息加減與之服按此出太陽陽明例藥也調理之劑當歸白术湯治酒疸發黄結飲癖在心胸間堅滿骨肉沈重逆害飲食小便赤黄此因内虚飲食生冷脾胃痰結所致其脈弦濇白术茯苓各三兩當歸黄芩茵陳各一兩前胡枳實炒甘草炙杏仁炒各二兩半夏一兩半右㕮咀每服四五錢入薑煎小建中湯養榮湯治五疸腳弱心忪口淡耳鳴微寒發熱氣急小便白濁當作虚勞治之方並見虚損門消食之劑三因紅丸子治糓疸發黄方見霍亂門用生薑甘草湯下寳鑑棗􅈨丸治食勞目黄身黄者皂􅈨不以多少沙鍋内木炭燒通紅赤用米醋内㸃之右為末棗肉丸桐子大每服二三十丸食後用生薑湯下取黄水法瓜蒂散瓜蒂二錢母丁香一錢黍米四十九箇赤小豆半錢右為極細末每夜於鼻内㗜之取下黄水内服凉劑三因如神散治酒毒不散發黄乆乆浸漬流入清氣道中宜此内鼻中取黄水苦瓠子去皮苦葫蘆子去皮三七箇黄黍米三百粒安息香二皂子大右為末以一字搐入鼻中滴出黄水一升忌勿吹吹或過多即以黍穰燒灰麝香末各少許吹鼻内立止玉機微義卷四十五
