  text: 飲定四庫全書
  hash: sha256:9b678887808d9aac77b009b1979b064459172a9698fb6411286dc7cff6acd15a
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3e0068_WYG_040-1a, image: WYG0762/WYG0762-0444a.png}
body:
  text: 玉機微義卷四十明徐用誠原輯劉純續增癘風門叙癘風為病内經曰風氣與太陽行諸脉俞散於分肉之間與衛氣相干其道不利故使肌肉膹䐜而有瘍衛氣有所凝而不行故其肉有不仁也癘者有榮衛熱腑其氣不清故使鼻柱壞而色敗皮膚瘍潰風寒客於脉而不去名曰癘風癘風治法内經云病大風骨節重鬚眉墮名曰大風刺肌肉間故汗出百日王注泄衛氣之怫熱刺骨髓汗出百日泄榮氣之怫熱凡一百日鬚眉生而止針怫熱屏退隂氣内復故多汗出鬚眉生也靈樞云癘風者數刺其腫上已刺以銳針針其處按出其惡氣腫盡乃止常食方食勿食他食以犯其病論癘風屬肺生䖝屬木皆血熱之病病機云内經云脉風成為癘俗云癩病也先樺皮散從少至多服五七日灸承漿穴七壯灸瘡輕再灸瘡愈三灸之後服二聖散泄熱祛血中之風邪戒房室三年病愈藥灸同止述類象形此治肺風之法也然此疾非止肺臟有之以其病發於鼻俗呼為肺風也鼻腫凖赤脹大而為瘡乃血隨氣化也氣既不施則血為之聚血既聚則使肉爛而生䖝也生䖝者厥隂主之厥隂為風木主生五䖝葢三焦相火熱甚而制金金衰故木來尅侮宜瀉火熱利風之劑䖝自不生也故此疾血熱明矣當以藥緩疎泄之煎局方升麻湯下錢氏瀉青丸餘病各隨經治按癘風皮毛血脉先受病二者屬榮衛所主故言肺風至於内壞生䖝又陽明厥隂所屬故其用藥皆疎泄肺氣祛逐血分之邪熱其灸承漿一穴乃陽明任脉之㑹所以宣通血脉以散風也論癩風宜汗宜下宜出血子和書云内經論癩針二百日眉毛再生針同發汗也但無藥者用針一汗可抵千針故髙供奉嘗採萍治癱瘓風出汗張主薄病癩十餘年戴人曰足有汗者可治之當發汗其汗出當臭其涎當腥乃置燠室中以三聖散吐之汗出周身如卧水中其汗果臭痰皆腥如魚涎足心微有汗次以舟車丸濬川散下五七行如此數次乃瘳又一人病風面黒爬搔不已眉毛脫落到其面大出血如墨刺三次血變色毎刺自額至頥排針上下俱刺毎隔日一刺至二十餘日方已按此論内經用針同發汗至於出血亦同汗也但癘證在經在表故宜針宜汗有惡血留滯故宜出血或於腫上或於委中皆可也又腸胃有穢惡䖝積故宜下大抵皆宣泄表裏血氣邪熱之毒也論癘風所因三因之經所載癘風即風論所謂惡疾是也雖名曰風未必皆因風大率多嗜慾勞動氣血熱發汗泄不避邪風冷濕使滛氣與衛氣相干致肌肉皮膚瘍潰鼻梁塌壞千金所謂自作不仁極猥之業雖有悔言而無悔心良得其情然亦有傳染者原其所因皆不内外渉外所因而成也治之須推其所因凡因風寒濕熱兼勞役飲食與夫傳染穎然不同若例以瀉風藥治之則失矣按此云雖名曰風未必皆因風此論固善葢此疾多由嗜慾飲食積毒之所致因其病證穢惡可畏又不可不謂之風也若夫傳染之說世或有之雖因其一家血脉飲食居處氣味之相傳者本無内熱積毒亦不能染也論大風有上下之分丹溪云大風病是受得天地間殺物之風古人謂之癘風以其酷烈暴悍可畏爾人得之者須分在上在下夫在上者以醉仙散取臭涎惡血於齒縫中出在下者以通天再造散取惡物陳䖝於榖道中出所出雖有上下道路之異然皆不外乎陽明一經治此病者須知此意看其疙瘩與瘡上先見者上體多者在上也下先見者下體多者在下也上下同得者在上後在下也陽明經胃與大腸也無物不受此風之入人也氣受之則在上多血受之則在下多血氣俱受者甚重自非醫者有神病者有鉄心罕有免者夫或從上或從下以漸而來者皆可治病人見其病勢之緩多忽之雖按此法施治病已全然脫體若不能絶味絶色後必發再發則終於不救矣某曾治五人矣中間唯一婦人得免以其貧甚無物可吃也餘四人三兩年後皆再發孫真人曰吾嘗治四五百人終無一人免於死非孫真人之不能治也葢無一人能守禁忌耳此一婦治本病外又是千餘貼加减四物湯半年之上方得月經行而十分安全謹按癘風古方謂之大風惡疾以其瘡痍荼毒膿汁淋漓眉鬢墮落手足指脫頑痺痛痒鼻塌眼爛齒豁唇掲病勢之可畏耳若專以房勞嗜慾飲食積毒之所致何為遽至於是故丹溪先生亦謂之受得殺毒之風也葢其風毒之傷與夫内毒所致人皆安得而知之及其病證顯露方始歸咎於此其於外受之風内積之毒豈可得而分治之也故内經刺肌肉刺骨髓以泄榮衛之怫熱靈樞以銳針刺腫上按出惡氣惡血子和用汗吐下出血之法河間用疎風泄熱之劑俱不分病之所因隨其病之所在以調之也至於丹溪分在上在下氣血受病多少其用藥取涎下毒雖皆前人之法亦可謂深得病情而善用其法者矣學者宜細觀之若夫用藥之外守禁忌謹調養清心寡慾獨淡内觀又在乎人而不在乎醫也孫真人戒之深矣其可忽乎癘風治法驅風之劑局方樺皮散治肺臟風毒遍身瘡疥及癮疹瘙痒治之成瘡又治面上風刺及粉刺樺皮四兩燒灰荆芥穂二兩甘草炙半兩杏仁二兩去皮尖用水一碗於銀銚子内熬候水减半取出放令乾枳殻四兩去穰用炭火燒存性取出於濕紙上令冷右除杏仁外餘藥為末將杏仁另研令細次入諸藥細合匀磁盒内放之按此太隂陽明經藥出厥隂例家珎凌霄散治癘風蟬退地龍炒白殭蠶全蝎各七個凌霄花半兩右為細末毎服二錢酒調下於浴室内常在湯中住一時許服藥效元戎治風疾癩病遍身生瘡天麻七錢半荆芥二錢半薄荷二錢半白花蛇四兩酒浸右為末好酒二升蜜四兩石噐中熬成膏子毎服一盞溫服日三煎餅壓下急於煖處令汗出十日效按此已上二方厥隂例藥也子和治風疥癬及癩浮萍一兩荆芥川芎甘草麻黄各半兩或加芍藥當歸右為末毎服一兩水一碗入葱白豆豉同煎至一半無時服汗出為度寳鑑換肌散治大風疾年深乆不愈以至面毛脫落鼻梁崩壞不致踰月取效如神白花蛇黑花蛇各三兩並酒浸一夕地龍去土三兩當歸細辛白芷天麻各一兩蔓荆子威靈仙木賊荆芥穂甘菊花苦參紫參沙參沙苑蒺䔧不灰木赤芍炙甘草九節菖蒲天門冬寒風草何首烏胡麻子炒草烏頭去皮臍蒼术泔浸去皮川芎木鱉子已上各二兩右同為細末毎服五錢溫酒調下食後酒多為妙按此出少隂諸風例藥也去風養血之劑易老祛風丸治疥癩經曰脉風成病即癩也黄茋枳殻防風芍藥甘草熟地黄生地黄地骨皮枸杞子右九味木杵臼為細末煉蜜為丸桐子大白湯下五十丸按此出少隂諸風例藥也東坡四神丹醫未有專此四味者乆服可愈大風疾羌活𤣥參熟地黄當歸按此出少隂腎氣例藥也破血瀉熱補氣之劑補氣瀉營湯治叚庫使病癘風滿面連頸極痒眉毛已脫須用熱水沃之稍緩毎晝夜須數次或砭刺亦緩予記内經云癘者榮衛熱胕治者以銳針刺其腫處按出其惡氣腫盡乃止如以藥治當破惡血去熱升陽去痒瀉榮運辛溫散之甘溫補之行陽明經瀉心火補肺氣乃治之正也升麻連翹各六錢蘇木當歸黄連黄茋全蝎地龍各三分生地黄黄芩生各四分人參二分甘草一分半桔梗半錢桃仁三個麝香少許胡桐淚一分蠓䖝去翅足炒三個水蛭炒令烟盡三個白豆􅅳二分右件除連翹另剉胡桐淚研白豆􅅳為細末二味另放麝香蠓䖝水蛭三味為細末另放都作一服水二盞煎入酒一盞至一盞六分入連翹煎去滓再入豆􅅳二味并麝香等三味再熬至七分稍熱服早飯後忌酒麫及生冷硬物取涎之劑寳鑑醉仙散治大風疾遍身癮疹瘙痒麻木胡麻子牛蒡子枸杞子蔓荆子各一兩同炒白蒺䔧苦參𤓰蔞根防風各半兩右為細末毎十五錢末入輕粉一錢拌匀毎服一錢茶調下晨午夕各一服後五七日先於牙縫内出臭黄涎渾身疼痛昏悶如醉次後利下膿血惡臭氣病根乃去按丹溪方輕粉二錢藥八味各半兩前四味為粗末炒紫色為度云須量人大小虛實與之證候重而急者須先以再造散下之候補養得還復與此藥服此藥須斷塩醬醋諸般魚肉椒料果實煨燒炙煿等止可淡粥及煑熟時菜亦須淡食茄亦不可食惟諸般蛇以淡酒蒸熟食之可以助藥攻下之劑病機二聖散治大風癘疾大黄半兩皂角刺三錢燒灰右將皂角刺一二箇燒灰研細煎大黄半兩湯調下二錢早服樺皮散中煎升麻湯下瀉青丸晚服二聖散此數等藥皆為緩疎泄血中風熱也三因通天再造散治大風惡疾欎金半錢大黄一兩炮白牽牛六錢半生半炒皂角刺一兩經年黒大者右為末毎服五錢日未出面東以無灰酒調下按已上二方並厥隂例藥也雜方元戎生眉散枽寄生南星半夏没藥各一錢右為細末生薑自然汁調成膏子先用自然銅擦過次以此塗之子和一方半夏生用羊糞燒焦各等分為末生薑汁調塗渫洗藥何首烏荆芥防風馬鞭草蔓荆子右為粗末毎二兩水一斗煎十數沸得藥力無風處渫洗本事方萆麻法治癘風十指攣曲節間疼不可忍漸至斷落萆麻去皮黄連剉各二兩右以小瓶入水一升同浸春夏三日秋冬五日後用萆麻子一粒孹破面赤以浸藥水吞下平旦服漸加至四五粒微利不妨水少更添水忌動風物累用得效按寳鑑以此二味用銀石噐着水大碗煑水盡即添熬三日二夜取出只用萆麻隂乾切作四段計五粒二十段作一服荆芥湯下用治諸癎病玉機微義卷四十
